name: PR Preview Pages

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build static site
        shell: bash
        run: bash .github/scripts/build-static-pages-site.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy PR preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deployment.outputs.page_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const marker = '<!-- PR_PREVIEW_PAGES_URL -->';
            const body = `${marker}
            ## GitHub Pages PR Preview

            | Field | Value |
            |---|---|
            | Preview URL | ${process.env.PREVIEW_URL} |
            | PR | #${context.payload.pull_request.number} |
            | Head SHA | \`${process.env.HEAD_SHA}\` |
            | Workflow | \`pr-preview-pages.yml\` |

            **Human acceptance required before merge.** Production Pages remains on \`main\` only.
            ${marker}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  report-preview-blocker:
    needs: deploy-preview
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment environment blocker on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- PR_PREVIEW_PAGES_BLOCKER -->';
            const body = `${marker}
            ## GitHub Pages PR Preview — Action Required

            Preview deploy **did not start** because the \`github-pages\` environment currently allows deployments from **\`main\` only**.

            ### Human / Codex steps (choose one)

            1. **GitHub Pages PR Preview (recommended)**
               - Repo **Settings → Pages → Preview deployments** → enable PR previews (if shown)
               - Repo **Settings → Environments → github-pages → Deployment branches**
               - Add branch: \`${{ github.event.pull_request.head.ref }}\` **or** allow all branches for preview window

            2. **Netlify / Cloudflare Pages (alternative)**
               - Add repo secrets: \`NETLIFY_AUTH_TOKEN\` + \`NETLIFY_SITE_ID\` **or** \`CLOUDFLARE_API_TOKEN\` + \`CLOUDFLARE_ACCOUNT_ID\`
               - Follow \`KGEN-AI-Company/reports/PR_PREVIEW_DEPLOY_PIPELINE_REPAIR_PROPOSAL.md\`

            ### Merge gate

            **PR #42 must not merge** until Human mobile/desktop preview acceptance passes.

            Workflow run: ${context.payload.pull_request.html_url.replace('/pull/', '/actions/runs/')}
            ${marker}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
