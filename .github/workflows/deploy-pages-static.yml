name: Deploy Pages Static

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build static site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          # Force GitHub Pages to publish static files without Jekyll or Liquid.
          touch _site/.nojekyll

          copy_file() {
            local src="$1"
            local dest="${2:-$1}"
            if [ -f "$src" ]; then
              mkdir -p "_site/$(dirname "$dest")"
              cp -a "$src" "_site/$dest"
            fi
          }

          copy_dir() {
            local src="$1"
            local dest="${2:-$1}"
            if [ -d "$src" ]; then
              mkdir -p "_site/$(dirname "$dest")"
              cp -a "$src" "_site/$dest"
            fi
          }

          if [ ! -f "index.html" ]; then
            echo "::error::Root index.html is required for the official homepage."
            exit 1
          fi
          copy_file "index.html"

          copy_file "12345.html"
          copy_file "wallet-12345.html"
          copy_file "wallet.html"
          copy_file "kgen32.svg"
          copy_file "logo.png"
          copy_file "README.md"
          copy_file "MANIFEST.json"
          copy_file "VERSION"

          copy_dir "K線西遊記"
          copy_dir "docs"
          copy_dir "archive"
          copy_dir "assets"
          copy_dir "KGEN"
          copy_dir "KGEN-Genesis"
          copy_dir "KGEN-Runtime"
          copy_dir "KGEN-SDK"
          copy_dir "KGEN-Canon"
          copy_dir "KGEN-Cursor-WorkOrders"
          copy_dir "KGEN-Agent-Office"
          copy_dir "KGEN-Organization"
          copy_dir "KGEN-AI-Company"
          copy_dir "KGEN-KAIOS"

          mkdir -p "_site/KGEN-KAIOS/dashboard"
          cat > "_site/KGEN-KAIOS/dashboard/build-info.json" <<EOF
          {
            "main_commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "workflow": "deploy-pages-static.yml",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mode": "read-only"
          }
          EOF

          mkdir -p "_site/KGEN-KAIOS/V8"
          cat > "_site/KGEN-KAIOS/V8/build-info.json" <<EOF
          {
            "main_commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "workflow": "deploy-pages-static.yml",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mode": "read-only",
            "kaios_version": "V8.0"
          }
          EOF

          mkdir -p "_site/KGEN-KAIOS/V8.1"
          cat > "_site/KGEN-KAIOS/V8.1/build-info.json" <<EOF
          {
            "main_commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "workflow": "deploy-pages-static.yml",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mode": "read-only",
            "kaios_version": "V8.1"
          }
          EOF

          mkdir -p "_site/KGEN-KAIOS/V8.2"
          cat > "_site/KGEN-KAIOS/V8.2/build-info.json" <<EOF
          {
            "main_commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "workflow": "deploy-pages-static.yml",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mode": "read-only",
            "kaios_version": "V8.2"
          }
          EOF

          mkdir -p "_site/KGEN-KAIOS/V8.3"
          cat > "_site/KGEN-KAIOS/V8.3/build-info.json" <<EOF
          {
            "main_commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "workflow": "deploy-pages-static.yml",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mode": "read-only",
            "kaios_version": "V8.3"
          }
          EOF

          mkdir -p "_site/KGEN-KAIOS/V9.0"
          cat > "_site/KGEN-KAIOS/V9.0/build-info.json" <<EOF
          {
            "main_commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "workflow": "deploy-pages-static.yml",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "mode": "read-only",
            "kaios_version": "V9.0"
          }
          EOF
          copy_file "KGEN_MASTER_LIBRARY_INDEX.md"
          copy_dir "whitepaper"
          copy_dir "wukong-temple"

          echo "Static site sample:"
          find _site -maxdepth 3 -type f | sort | sed 's#^_site/##' | head -n 200 || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
