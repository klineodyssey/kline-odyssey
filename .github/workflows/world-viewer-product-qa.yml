name: World Viewer Product QA

on:
  pull_request:
    paths:
      - "KGEN-KAIOS/world-viewer/**"
      - ".github/workflows/world-viewer-product-qa.yml"
  push:
    paths:
      - "KGEN-KAIOS/world-viewer/**"
      - ".github/workflows/world-viewer-product-qa.yml"

permissions:
  contents: read

concurrency:
  group: world-viewer-product-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  product-qa:
    name: Alpha product gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: KGEN-KAIOS/world-viewer/tests/requirements-qa.txt

      - name: Install QA dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r KGEN-KAIOS/world-viewer/tests/requirements-qa.txt
          python -m playwright install --with-deps chromium

      - name: Check Python and ES module syntax
        id: syntax
        continue-on-error: true
        shell: bash
        run: |
          python -m py_compile \
            KGEN-KAIOS/world-viewer/tests/acceptance_static.py \
            KGEN-KAIOS/world-viewer/tests/product_qa.py
          while IFS= read -r -d '' module; do
            node --input-type=module --check < "$module"
          done < <(find KGEN-KAIOS/world-viewer -type f -name '*.js' -print0)

      - name: Resolve changed-file scope
        id: changed
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          output="$RUNNER_TEMP/world-viewer-changed-files.txt"
          if [[ "$EVENT_NAME" == "pull_request" && -n "$BASE_SHA" ]]; then
            git diff --name-only --diff-filter=ACMR "$BASE_SHA...HEAD" > "$output"
          elif [[ -n "$BEFORE_SHA" && ! "$BEFORE_SHA" =~ ^0+$ ]] \
            && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            git diff --name-only --diff-filter=ACMR "$BEFORE_SHA..HEAD" > "$output"
          else
            git show --pretty=format: --name-only --diff-filter=ACMR HEAD > "$output"
          fi
          sort -u -o "$output" "$output"
          cat "$output"

      - name: Run static Alpha acceptance
        id: static
        continue-on-error: true
        shell: bash
        run: |
          python KGEN-KAIOS/world-viewer/tests/acceptance_static.py \
            < "$RUNNER_TEMP/world-viewer-changed-files.txt"

      - name: Run Digital Earth runtime integrity
        id: runtime
        continue-on-error: true
        shell: bash
        run: node KGEN-KAIOS/world-viewer/tests/runtime_integrity.mjs

      - name: Run Civilization runtime integrity
        id: civilization
        continue-on-error: true
        shell: bash
        run: node KGEN-KAIOS/world-viewer/tests/civilization_integrity.mjs

      - name: Run Civilization Genesis integrity
        id: genesis
        continue-on-error: true
        shell: bash
        run: node KGEN-KAIOS/world-viewer/tests/genesis_integrity.mjs

      - name: Run Civilization Production integrity
        id: production
        continue-on-error: true
        shell: bash
        run: node KGEN-KAIOS/world-viewer/tests/production_integrity.mjs

      - name: Run Settlement Economy integrity
        id: settlement
        continue-on-error: true
        shell: bash
        run: node KGEN-KAIOS/world-viewer/tests/settlement_economy_integrity.mjs

      - name: Run Civilization Governance integrity
        id: governance
        continue-on-error: true
        shell: bash
        run: node KGEN-KAIOS/world-viewer/tests/governance_integrity.mjs

      - name: Run Cambrian Biology integrity
        id: biology
        continue-on-error: true
        shell: bash
        run: node KGEN-KAIOS/world-viewer/tests/biology_integrity.mjs

      - name: Run Nation and Timeline integrity
        id: nation-timeline
        continue-on-error: true
        shell: bash
        run: node KGEN-KAIOS/world-viewer/tests/nation_timeline_integrity.mjs

      - name: Run Cosmic Technology integrity
        id: cosmic-technology
        continue-on-error: true
        shell: bash
        run: node KGEN-KAIOS/world-viewer/tests/cosmic_technology_integrity.mjs

      - name: Start static server
        shell: bash
        run: |
          python -m http.server 8080 --bind 127.0.0.1 \
            > "$RUNNER_TEMP/world-viewer-http.log" 2>&1 &
          echo "WORLD_VIEWER_SERVER_PID=$!" >> "$GITHUB_ENV"
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              http://127.0.0.1:8080/KGEN-KAIOS/world-viewer/index.html \
              > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/world-viewer-http.log"
          exit 1

      - name: Run browser Product QA
        id: product
        continue-on-error: true
        shell: bash
        run: |
          python KGEN-KAIOS/world-viewer/tests/product_qa.py \
            --base-url http://127.0.0.1:8080/KGEN-KAIOS/world-viewer/index.html \
            --output-dir "$RUNNER_TEMP/world-viewer-product-qa" \
            --baseline-dir KGEN-KAIOS/world-viewer/tests/baselines/sprint-010 \
            --require-baselines \
            --max-diff-ratio 0.12 \
            --pixel-threshold 32

      - name: Collect server log
        if: always()
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/world-viewer-product-qa"
          if [[ -f "$RUNNER_TEMP/world-viewer-http.log" ]]; then
            cp "$RUNNER_TEMP/world-viewer-http.log" \
              "$RUNNER_TEMP/world-viewer-product-qa/http-server.log"
          fi

      - name: Upload Product QA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-viewer-product-qa-${{ github.run_id }}
          path: ${{ runner.temp }}/world-viewer-product-qa
          if-no-files-found: error
          retention-days: 14

      - name: Stop static server
        if: always()
        shell: bash
        run: |
          if [[ -n "${WORLD_VIEWER_SERVER_PID:-}" ]]; then
            kill "$WORLD_VIEWER_SERVER_PID" 2>/dev/null || true
          fi

      - name: Enforce combined gate result
        if: always()
        shell: bash
        env:
          PRODUCT_OUTCOME: ${{ steps.product.outcome }}
          COSMIC_TECHNOLOGY_OUTCOME: ${{ steps.cosmic-technology.outcome }}
          NATION_TIMELINE_OUTCOME: ${{ steps.nation-timeline.outcome }}
          BIOLOGY_OUTCOME: ${{ steps.biology.outcome }}
          GOVERNANCE_OUTCOME: ${{ steps.governance.outcome }}
          SETTLEMENT_OUTCOME: ${{ steps.settlement.outcome }}
          PRODUCTION_OUTCOME: ${{ steps.production.outcome }}
          GENESIS_OUTCOME: ${{ steps.genesis.outcome }}
          CIVILIZATION_OUTCOME: ${{ steps.civilization.outcome }}
          RUNTIME_OUTCOME: ${{ steps.runtime.outcome }}
          STATIC_OUTCOME: ${{ steps.static.outcome }}
          SYNTAX_OUTCOME: ${{ steps.syntax.outcome }}
        run: |
          printf 'syntax=%s\nstatic=%s\nruntime=%s\ncivilization=%s\ngenesis=%s\nproduction=%s\nsettlement=%s\ngovernance=%s\nbiology=%s\nnation_timeline=%s\ncosmic_technology=%s\nproduct=%s\n' \
            "$SYNTAX_OUTCOME" "$STATIC_OUTCOME" "$RUNTIME_OUTCOME" "$CIVILIZATION_OUTCOME" "$GENESIS_OUTCOME" "$PRODUCTION_OUTCOME" "$SETTLEMENT_OUTCOME" "$GOVERNANCE_OUTCOME" "$BIOLOGY_OUTCOME" "$NATION_TIMELINE_OUTCOME" "$COSMIC_TECHNOLOGY_OUTCOME" "$PRODUCT_OUTCOME"
          [[ "$SYNTAX_OUTCOME" == "success" ]]
          [[ "$STATIC_OUTCOME" == "success" ]]
          [[ "$RUNTIME_OUTCOME" == "success" ]]
          [[ "$CIVILIZATION_OUTCOME" == "success" ]]
          [[ "$GENESIS_OUTCOME" == "success" ]]
          [[ "$PRODUCTION_OUTCOME" == "success" ]]
          [[ "$SETTLEMENT_OUTCOME" == "success" ]]
          [[ "$GOVERNANCE_OUTCOME" == "success" ]]
          [[ "$BIOLOGY_OUTCOME" == "success" ]]
          [[ "$NATION_TIMELINE_OUTCOME" == "success" ]]
          [[ "$COSMIC_TECHNOLOGY_OUTCOME" == "success" ]]
          [[ "$PRODUCT_OUTCOME" == "success" ]]
