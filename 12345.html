<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>KGEN 12345 悟空財神殿｜正式入口</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#05070b;color:#ffe28a;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;padding:16px;box-sizing:border-box}
    .card{width:min(560px,92vw);border:1px solid rgba(255,215,120,.6);border-radius:20px;background:rgba(10,12,20,.96);padding:20px;box-shadow:0 0 32px rgba(255,215,120,.18)}
    a,button{display:block;width:100%;box-sizing:border-box;text-align:center;margin-top:10px;padding:13px;border-radius:14px;border:1px solid rgba(255,215,120,.5);background:#ffe28a;color:#111;font-weight:900;text-decoration:none;cursor:pointer;font-size:15px}
    .sub{background:rgba(255,255,255,.06);color:#fff}
    .mm{background:#f6851b;color:#111}
    .hint{margin-top:12px;padding:12px;border-radius:12px;background:rgba(255,255,255,.06);color:#e8f4ff;font-size:14px;line-height:1.55}
    code{color:#8ff;word-break:break-all;font-size:12px}
  </style>
  <script>
    var TEMPLE_REL='K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/12345/index.html';
    var TEMPLE_ABS='https://klineodyssey.github.io/kline-odyssey/' + TEMPLE_REL;
    var WALLET_BRIDGE='wallet-12345.html';
    var METAMASK_DEEPLINK='https://metamask.app.link/dapp/klineodyssey.github.io/kline-odyssey/wallet-12345.html';
    function goTemple(){ window.location.href = TEMPLE_REL; }
    function isSocialInApp(){
      return /FBAN|FBAV|Facebook|Instagram|Line\//i.test(navigator.userAgent || '');
    }
    window.addEventListener('DOMContentLoaded', function(){
      var hint=document.getElementById('hint');
      var mm=document.getElementById('mmBtn');
      if(mm) mm.href = METAMASK_DEEPLINK;
      if(isSocialInApp() && hint){
        hint.textContent='目前在 Facebook/LINE 內建瀏覽器：請按「用 MetaMask 開啟」走 wallet-12345.html 橋接，不要直接開中文深層路徑。';
      }else if(window.ethereum && hint){
        hint.textContent='已偵測到錢包瀏覽器，即將進入神殿…';
        setTimeout(goTemple, 500);
      }else if(hint){
        hint.textContent='正式入口：一般瀏覽器可直接進神殿；要連錢包請走 wallet-12345.html 橋接。';
      }
    });
  </script>
</head>
<body>
  <div class="card">
    <h1>KGEN 12345 悟空財神殿</h1>
    <p>VERSION：<code>V2.0.6</code></p>
    <p>正式神殿：<code>K線西遊記/temples/12345/index.html</code></p>
    <div class="hint" id="hint">載入中…</div>
    <a href="K線西遊記/temples/12345/index.html">立即進入神殿</a>
    <a class="mm" href="wallet-12345.html" id="mmBtn">用 MetaMask 開啟（wallet-12345 橋接）</a>
    <a class="sub" href="wallet-12345.html">錢包橋接頁 wallet-12345.html</a>
    <button class="sub" onclick="navigator.clipboard&&navigator.clipboard.writeText(TEMPLE_ABS);this.textContent='已複製神殿網址';">複製神殿網址</button>
  </div>
</body>
</html>
