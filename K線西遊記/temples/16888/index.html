<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜悟空財神廟發財金 V2.2.8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 神殿 HUD */
        .god-hud { position: fixed; top: 10px; width: 100%; z-index: 1000; padding: 0 20px; box-sizing: border-box; }
        .hud-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--gold); font-family: 'Orbitron'; margin-bottom: 2px; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 8px; border: 0.5px solid #444; }
        #vault-f { width: 100%; height: 100%; background: var(--gold); }
        #brain-f { width: 100%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        /* 左側：財神廟獎池面板 */
        .info-panel { position: fixed; top: 120px; left: 15px; z-index: 1000; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); padding: 12px; border-radius: 12px; min-width: 220px; box-shadow: 0 0 20px rgba(255,215,120,0.2); }
        .pool-header { color: var(--gold); font-weight: 900; font-size: 16px; text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 8px; padding-bottom: 5px; }
        .pool-val { font-size: 24px; color: #fff; text-align: center; font-family: 'Orbitron'; text-shadow: 0 0 10px var(--gold); }
        .fairy-info { font-size: 11px; color: var(--cyan); background: rgba(0,242,255,0.1); padding: 8px; margin: 8px 0; border-radius: 5px; line-height: 1.4; }

        /* 右側：13生肖燈 */
        .lamps { position: fixed; right: 15px; top: 100px; z-index: 1000; display: grid; grid-template-columns: repeat(2, 45px); gap: 8px; }
        .lamp { width: 45px; height: 45px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #000; color: var(--gold); cursor: pointer; font-size: 14px; }
        .lamp.active { background: var(--gold); color: #000; box-shadow: 0 0 25px var(--gold); }

        /* 中央及相機 */
        #ufo { position: fixed; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 360px; height: 360px; background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover; opacity: 0.85; border-radius: 50%; z-index: 2; border: 5px solid var(--gold); box-shadow: 0 0 60px rgba(255,215,120,0.5); }
        #cam-feed { position: fixed; inset: 0; z-index: 1; opacity: 0.4; object-fit: cover; }

        /* 控制器 */
        .controls { position: fixed; bottom: 130px; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 0 35px; box-sizing: border-box; }
        .tag { font-family: 'Orbitron'; color: var(--cyan); font-size: 14px; }
        input[type=range].v-warp { width: 160px; transform: rotate(-90deg); margin-top: 80px; accent-color: var(--cyan); }
        input[type=range].h-steer { width: 220px; accent-color: var(--gold); }

        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 3px solid var(--gold); z-index: 1000; padding: 15px 5px; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .btn { padding: 12px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 11px; font-weight: 900; cursor: pointer; }
        .btn-red { color: var(--red); border-color: var(--red); }

        #canvas-3d { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

<video id="cam-feed" autoplay playsinline></video>
<div id="ufo"></div>
<div id="canvas-3d"></div>

<div class="god-hud">
    <div class="hud-row"><span>🏛️ 靈霄寶殿金庫: 50M KGEN</span><span>席位剩餘: 500/500</span></div>
    <div class="bar-bg"><div id="vault-f"></div></div>
    <div class="hud-row"><span>🧠 悟空大腦交易所: 50M 保證金</span><span>13生肖光明燈連動中</span></div>
    <div class="bar-bg"><div id="brain-f"></div></div>
</div>

<div class="info-panel">
    <div class="pool-header">📿 悟空財神廟獎池</div>
    <div class="pool-val" id="pool-txt">16888</div>
    <div class="fairy-info" id="fairy-txt">
        <b>當前狀態：等待受孕</b><br>
        目標仙女：巧仙(四仙女) 16888<br>
        專掌：事業運通做多
    </div>
    <button class="btn btn-red" style="width:100%" onclick="app.giveMoney()">🧧 發送發財金(獎池失血)</button>
    <button class="btn" style="width:100%; margin-top:5px; color:#0f0; border-color:#0f0;" onclick="app.returnWish()">🙏 信眾還願捐池</button>
</div>

<div class="lamps" id="lamps"></div>

<div class="controls">
    <div style="text-align:center;"><div id="w-val" class="tag">WARP: 1x</div><input type="range" id="warp" class="v-warp" min="1" max="150" value="1"></div>
    <div style="text-align:center;"><div id="s-val" class="tag">STEER: 0°</div><input type="range" id="steer" class="h-steer" min="-180" max="180" value="0"></div>
</div>

<div class="footer">
    <div class="btn-grid">
        <button class="btn" onclick="app.toggleCam()">📸 開起相機</button>
        <button class="btn" onclick="app.trade('CT')">📈 CT 交易</button>
        <button class="btn" onclick="app.trade('OFF')">📉 結算平倉</button>
        <button class="btn" onclick="app.speakIntro()">🎙️ 神宮介紹</button>
        <button class="btn" onclick="app.search()">🔍 查地址代碼</button>
        <button class="btn" onclick="app.capture()">📷 截圖拍照</button>
        <button class="btn" onclick="app.connect()">🦊 連結錢包</button>
        <button class="btn" onclick="app.speak('星球天道鎖定，財神廟發財金就緒')">🎙️ 客服語音</button>
    </div>
</div>

<script>
const app = {
    pool: 16888,
    fairies: [
        {n: "巧雲", t: 14520, r: "大仙女", p: "天樞:風調雨順做空"},
        {n: "巧虹", t: 14866, r: "二仙女", p: "天璇:家庭美滿做多"},
        {n: "巧芝", t: 16184, r: "三仙女", p: "天璣:育子收驚做空"},
        {n: "巧仙", t: 16888, r: "四仙女", p: "天權:事業運通做多"},
        {n: "巧蘭", t: 17347, r: "五仙女", p: "天衡:長命百歲做空"},
        {n: "巧梅", t: 18056, r: "六仙女", p: "闓陽:身體健康做多"},
        {n: "巧靈", t: 18459, r: "七仙女", p: "瑤光:感情圓滿多退"}
    ],
    zodiacs: ['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬','🐱'],

    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-3d').appendChild(this.renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 2000; i++) pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.14 }));
        this.scene.add(this.stars);

        this.camera.position.z = 15;
        this.initLamps();
        this.animate();
        this.speakIntro();
    },

    initLamps() {
        const wrap = document.getElementById('lamps');
        this.zodiacs.forEach(z => {
            const l = document.createElement('div');
            l.className = 'lamp'; l.innerText = z;
            l.onclick = () => { l.classList.toggle('active'); this.speak(`信眾還願點亮${z}燈，獎池增加。`); this.returnWish(); };
            wrap.appendChild(l);
        });
    },

    giveMoney() {
        const loss = Math.floor(Math.random() * 500 + 200);
        this.pool -= loss;
        this.updatePool();
        this.speak(`財神廟發放發財金，獎池失血 ${loss} 點，利益眾生。`);
    },

    returnWish() {
        const gain = Math.floor(Math.random() * 300 + 100);
        this.pool += gain;
        this.updatePool();
        this.speak(`信眾還願捐池 ${gain} 點，仙女獎池質量提升。`);
    },

    updatePool() {
        document.getElementById('pool-txt').innerText = Math.floor(this.pool);
        // 檢查成婚仙女
        const nearest = this.fairies.reduce((prev, curr) => Math.abs(curr.t - this.pool) < Math.abs(prev.t - this.pool) ? curr : prev);
        document.getElementById('fairy-txt').innerHTML = `<b>當前狀態：${this.pool >= 16888 ? '已可受孕' : '發放發財金中'}</b><br>
            目標仙女：${nearest.n}(${nearest.r}) ${nearest.t}<br>專掌：${nearest.p}`;
        
        if (Math.abs(this.pool - nearest.t) < 10) {
            this.speak(`注意！獎池抵達 ${nearest.n} 婚位，請兩位地址持有者決定是否成婚。`);
        }
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const warp = document.getElementById('warp').value;
        const steer = document.getElementById('steer').value;
        document.getElementById('w-val').innerText = `WARP: ${warp}x`;
        document.getElementById('s-val').innerText = `STEER: ${steer}°`;

        document.getElementById('ufo').style.transform = `translate(-50%, -50%) rotate(${steer}deg)`;

        const rad = (steer * Math.PI) / 180;
        const cosVal = Math.cos(rad);
        const p = this.stars.geometry.attributes.position.array;
        const speed = (warp / 400);

        for(let i=0; i<p.length; i+=3) {
            // 右移順時針 (天道軌道)
            p[i] += Math.sin(rad) * speed; 
            // 0度(多)上到下，180度(空)下到上
            p[i+1] -= speed * cosVal;

            if(p[i+1] > 25) p[i+1] = -25; if(p[i+1] < -25) p[i+1] = 25;
            if(p[i] > 25) p[i] = -25; if(p[i] < -25) p[i] = 25;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
    },

    async toggleCam() {
        const v = document.getElementById('cam-feed');
        if(v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        else { 
            const s = await navigator.mediaDevices.getUserMedia({video: true});
            v.srcObject = s; 
            this.speak("相機已開啟。");
        }
    },

    speakIntro() { this.speak("大聖吉祥，財神廟發財金系統就緒。獎池門檻一六八八八。點擊發送發財金可讓獎池失血，信眾還願則捐池。"); },
    trade(t) { this.speak(t==='CT' ? "現價下單，扣除交易稅。" : "結算成功。"); },
    search() { prompt("輸入 Token 地址："); },
    capture() { alert("截圖拍照已存入神宮日誌"); },
    connect() { this.speak("錢包連結成功。"); },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
