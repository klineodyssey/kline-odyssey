<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜金融生命體 v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }

        /* 🧩 版本控管：頂部資訊模組 */
        .hud-top-left { position: fixed; top: 20px; left: 20px; z-index: 100; pointer-events: none; border-left: 4px solid var(--cyan); padding-left: 15px; }
        .brand-name { font-size: 22px; color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .version-tag { font-family: 'Orbitron'; font-size: 10px; color: #666; letter-spacing: 2px; }

        /* 🧚 核心生命體：圓窗 */
        #ufo-wrapper { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 380px; height: 380px; z-index: 50; }
        #core-display { 
            width: 100%; height: 100%; border-radius: 50%; border: 12px double var(--gold);
            overflow: hidden; background: #000; position: relative; transition: transform 0.05s linear;
        }
        #fairy-img { width: 100%; height: 100%; object-fit: cover; }
        #monitor-webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; }
        
        /* 💬 留言器官：嚴格鎖定左下 (絕對不擋右上小圖) */
        #wish-box { position: absolute; bottom: 40px; left: 30px; z-index: 80; color: var(--cyan); font-weight: 900; font-size: 20px; text-shadow: 2px 2px 5px #000; pointer-events: none; }

        /* 📸 合照器官：嚴格鎖定右上 */
        #mini-fairy { 
            position: absolute; top: 20px; right: 20px; width: 85px; height: 85px; 
            border-radius: 50%; border: 2px solid var(--gold); display: none; z-index: 90;
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            box-shadow: 0 0 15px var(--gold);
        }

        /* 🚀 控制台 */
        .steer-panel { position: fixed; bottom: 180px; width: 100%; text-align: center; z-index: 100; }
        .footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 4px solid var(--gold); display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 100; }
        .btn { background: #111; border: 1px solid #444; color: #fff; padding: 15px 5px; font-weight: 900; cursor: pointer; font-size: 13px; }
        .btn.active { background: var(--cyan); color: #000; }
        canvas#galaxy { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="hud-top-left">
    <div class="brand-name">花果山台灣廣寒宮16888</div>
    <div id="clock" style="color: var(--cyan); font-family: 'Orbitron'; font-size: 14px;"></div>
    <div class="version-tag">FINANCIAL LIFE-FORM V2.0.4 - STABLE</div>
</div>

<div id="ufo-wrapper">
    <div id="core-display">
        <div id="wish-box">大聖駕到，光耀廣寒</div>
        <img id="fairy-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png" crossorigin="anonymous">
        <video id="monitor-webcam" autoplay playsinline></video>
        <div id="mini-fairy"></div>
    </div>
</div>

<canvas id="galaxy"></canvas>
<canvas id="capture-canvas" style="display:none;"></canvas>

<div class="steer-panel">
    <div style="font-family:'Orbitron'; font-size:48px; color:var(--cyan);" id="angle-txt">76°</div>
    <input type="range" id="steer-in" style="width:70%; accent-color:var(--gold);" min="-180" max="180" value="76">
</div>

<div class="footer">
    <button class="btn" onclick="app.capture()">📸 拍照存證</button>
    <button class="btn" onclick="app.toggleCam('user')">🤳 前鏡監控</button>
    <button class="btn" onclick="app.toggleCam('environment')">🌌 後鏡巡航</button>
    <button class="btn" onclick="app.setWish()">👤 許願/還願</button>
    <button class="btn">📈 CT 下單</button>
    <button class="btn" onclick="app.speak('廣寒宮語音系統正常')">🎙️ 客服語音</button>
    <button class="btn">🦊 錢包連結</button>
    <button class="btn" onclick="location.reload()">🔄 重啟生命體</button>
</div>

<script>
const app = {
    isCamOn: false,
    currentFacing: 'user',
    init() {
        this.initThree(); this.bind();
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleString(), 1000);
    },
    async toggleCam(mode) {
        const v = document.getElementById('monitor-webcam'), f = document.getElementById('fairy-img'), m = document.getElementById('mini-fairy');
        if (this.isCamOn && this.currentFacing === mode) {
            if(this.stream) this.stream.getTracks().forEach(t => t.stop());
            v.style.opacity = 0; f.style.opacity = 1; m.style.display = 'none';
            this.isCamOn = false; return;
        }
        try {
            if(this.stream) this.stream.getTracks().forEach(t => t.stop());
            this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
            v.srcObject = this.stream; v.style.opacity = 1; f.style.opacity = 0; m.style.display = 'block';
            this.isCamOn = true; this.currentFacing = mode;
            this.speak(mode === 'user' ? "開啟前置自拍器官" : "開啟後置巡航器官");
        } catch(e) { alert("攝像頭硬體啟動失敗"); }
    },
    setWish() {
        const msg = prompt("請輸入許願或還願文字（將鎖定在左下方）：", "大聖駕到，光耀廣寒");
        if(msg) document.getElementById('wish-box').innerText = msg;
    },
    capture() {
        const canvas = document.getElementById('capture-canvas'), video = document.getElementById('monitor-webcam');
        const fairy = document.getElementById('fairy-img'), wish = document.getElementById('wish-box').innerText;
        const ctx = canvas.getContext('2d'); canvas.width = 800; canvas.height = 800;

        // 1. 底圖處理 (如果是前鏡則鏡像，後鏡則正常)
        if(this.isCamOn) {
            if(this.currentFacing === 'user') { ctx.translate(800, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0, 800, 800);
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.drawImage(fairy, 620, 30, 150, 150); // 右上仙女小圖 (絕對不擋)
        } else { ctx.drawImage(fairy, 0, 0, 800, 800); }

        // 2. 文字存證 (座標隔離)
        ctx.fillStyle = "#ffd778"; ctx.font = "bold 32px Noto Sans TC";
        ctx.fillText("花果山台灣廣寒宮16888", 40, 60); // 左上品牌
        ctx.fillStyle = "#00f2ff"; ctx.font = "bold 30px Noto Sans TC";
        ctx.fillText(wish, 60, 740); // 左下許願 (完全避開右上)

        const link = document.createElement('a');
        link.download = `KGEN_V2_存證.png`; link.href = canvas.toDataURL(); link.click();
        this.speak("照片存證已下載");
    },
    bind() {
        const s = document.getElementById('steer-in'), core = document.getElementById('core-display');
        s.oninput = (e) => {
            document.getElementById('angle-txt').innerText = e.target.value + '°';
            core.style.transform = `rotate(${e.target.value}deg)`;
        };
    },
    initThree() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy'), antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry();
        const count = 4000; const pos = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 150;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15 }));
        this.scene.add(this.stars); this.camera.position.z = 50;
        const animate = () => {
            requestAnimationFrame(animate);
            const steerX = parseFloat(document.getElementById('steer-in').value);
            const rad = (steerX * Math.PI) / 180;
            const p = this.stars.geometry.attributes.position.array;
            for(let i=0; i<p.length; i+=3) {
                p[i] -= (Math.sin(rad) * 0.1); p[i+1] -= (Math.cos(rad) * 0.1);
                if(p[i] > 75) p[i] = -75; if(p[i] < -75) p[i] = 75;
                if(p[i+1] > 75) p[i+1] = -75; if(p[i+1] < -75) p[i+1] = 75;
            }
            this.stars.geometry.attributes.position.needsUpdate = true;
            this.renderer.render(this.scene, this.camera);
        };
        animate();
    },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
