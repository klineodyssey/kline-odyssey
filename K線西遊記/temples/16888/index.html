<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜神電神宮・花果山交易所 V2.2.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 神殿 HUD */
        .god-hud { position: fixed; top: 10px; width: 100%; z-index: 1000; padding: 0 20px; box-sizing: border-box; }
        .hud-title { font-size: 14px; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin-bottom: 5px; }
        .bar-wrap { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        #vault-f { width: 85%; height: 100%; background: linear-gradient(90deg, #b8860b, var(--gold)); }
        #brain-f { width: 40%; height: 100%; background: linear-gradient(90deg, #008b8b, var(--cyan)); box-shadow: 0 0 15px var(--cyan); }

        /* 席位實時監控 */
        .seat-monitor { position: fixed; top: 120px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid var(--gold); border-radius: 10px; box-shadow: 0 0 20px rgba(255,215,120,0.3); }
        .seat-item { margin-bottom: 8px; font-size: 13px; font-family: 'Orbitron'; }
        .seat-item span { color: var(--gold); font-weight: bold; }

        /* 13生肖光明燈 (神宮版) */
        .altar-lamps { position: fixed; right: 15px; top: 110px; z-index: 1000; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .god-lamp { width: 50px; height: 50px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #000; color: var(--gold); cursor: pointer; transition: 0.3s; font-size: 16px; }
        .god-lamp:hover { box-shadow: 0 0 20px var(--gold); transform: scale(1.1); }
        .god-lamp.active { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }

        /* 飛碟核心 */
        #ufo-core {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 380px; height: 380px;
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            opacity: 0.9; border-radius: 50%; z-index: 2; border: 5px solid var(--gold);
            box-shadow: 0 0 60px rgba(255, 215, 120, 0.6);
        }

        /* 操控系統 */
        .bridge { position: fixed; top: 25%; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #price { font-family: 'Orbitron'; font-size: 60px; text-shadow: 0 0 30px var(--cyan); }
        #hp-label { color: #ff3c00; font-size: 14px; font-weight: bold; }

        .cockpit-ctrls { position: fixed; bottom: 130px; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        .ctrl-tag { font-family: 'Orbitron'; color: var(--cyan); font-size: 16px; text-shadow: 0 0 10px var(--cyan); }
        input[type=range].god-v { width: 180px; transform: rotate(-90deg); margin-top: 80px; accent-color: var(--cyan); }
        input[type=range].god-h { width: 250px; accent-color: var(--gold); }

        .bottom-altar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 3px solid var(--gold); z-index: 1000; padding: 15px 5px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-god { padding: 14px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 11px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        #starfield { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

<div id="ufo-core"></div>
<div id="starfield"></div>

<div class="god-hud">
    <div class="hud-title">🏛️ 靈霄寶殿金庫 (50M KGEN) ｜ 交易稅 0.3% ｜ 黑洞蒸發 0.1%</div>
    <div class="bar-wrap"><div id="vault-f"></div></div>
    <div class="hud-title">🧠 悟空大腦 (花果山台灣交易所) ｜ 保證金: 50,000,000 KGEN</div>
    <div class="bar-wrap"><div id="brain-f"></div></div>
</div>

<div class="seat-monitor">
    <div class="seat-item">🐒 花果山席位: <span id="seat-1">342</span> / 500</div>
    <div class="seat-item">🙏 神明席位: <span id="seat-2">128</span> / 500</div>
    <div id="hp-label">HP 質量守恆: 100%</div>
</div>

<div class="altar-lamps" id="lamps"></div>

<div class="bridge">
    <div id="price">16888.88</div>
    <div id="god-msg" style="color:var(--gold); font-size:14px; background:rgba(0,0,0,0.6); display:inline-block; padding:5px 20px; border-radius:20px;">歡迎進入神電神宮</div>
</div>

<div class="cockpit-ctrls">
    <div style="text-align:center;">
        <div id="w-txt" class="ctrl-tag">1x</div>
        <input type="range" id="warp" class="god-v" min="1" max="150" value="1">
    </div>
    <div style="text-align:center;">
        <div id="s-txt" class="ctrl-tag">0°</div>
        <input type="range" id="steer" class="god-h" min="-180" max="180" value="0">
    </div>
</div>

<div class="bottom-altar">
    <div class="grid">
        <button class="btn-god" onclick="app.search()">🔍 查 Token 地址</button>
        <button class="btn-god" onclick="app.trade('CT')">📈 CT 現價交易</button>
        <button class="btn-god" onclick="app.trade('CLOSE')">📉 結算平倉</button>
        <button class="btn-god" onclick="app.speakIntro()">🎙️ 神宮介紹</button>
        <button class="btn-god" onclick="app.setWish()">🙏 許願留言</button>
        <button class="btn-god" onclick="app.capture()">📷 下載神蹟</button>
        <button class="btn-god" onclick="app.connect()">🦊 連結錢包</button>
        <button class="btn-god" onclick="app.speak('星球軌道已校準，天道巡航開啟')">🎙️ 客服語音</button>
    </div>
</div>

<script>
const app = {
    hp: 100,
    zodiacs: ['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬','🐱'],
    
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('starfield').appendChild(this.renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 2000; i++) pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.12 }));
        this.scene.add(this.stars);

        this.camera.position.z = 15;
        this.initLamps();
        this.animate();
        this.speakIntro(); // 開頁高品質介紹
        setInterval(() => this.kEngine(), 2000);
    },

    speakIntro() {
        const msg = "大聖吉祥！此處為廣寒宮神電神宮。花果山台灣交易所已上線，悟空大腦保證金上限五千萬 KGEN 質能穩定。靈霄寶殿席位有限，轉帳免稅，交易僅收零點三。請點選光明燈，開啟您的天道投資。";
        this.speak(msg);
        document.getElementById('god-msg').innerText = "客服：正在介紹花果山交易所...";
    },

    initLamps() {
        const wrap = document.getElementById('lamps');
        this.zodiacs.forEach(z => {
            const l = document.createElement('div');
            l.className = 'god-lamp';
            l.innerText = z;
            l.onclick = () => {
                l.classList.toggle('active');
                this.speak(`已點亮${z}年光明燈。功德加持，席位利潤增加。`);
            };
            wrap.appendChild(l);
        });
    },

    kEngine() {
        const diff = (Math.random() - 0.5) * 20;
        const newPrice = 16888 + diff;
        document.getElementById('price').innerText = newPrice.toFixed(2);
        const steer = parseInt(document.getElementById('steer').value);
        if(Math.abs(steer) > 100 && diff > 0) { // 做空價格卻漲，扣血
            this.hp -= 1;
            document.getElementById('hp-label').innerText = `HP 質量損耗: ${this.hp}%`;
        }
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const warp = parseInt(document.getElementById('warp').value);
        const steer = parseInt(document.getElementById('steer').value);
        document.getElementById('w-txt').innerText = warp + "x";
        document.getElementById('s-txt').innerText = steer + "°";

        // 美女圖對齊：右移順轉
        document.getElementById('ufo-core').style.transform = `translate(-50%, -50%) rotate(${steer}deg)`;

        // 星球軌道對齊 (絕對邏輯)
        const rad = (steer * Math.PI) / 180;
        const cosVal = Math.cos(rad);
        const p = this.stars.geometry.attributes.position.array;
        const speed = (warp / 500);

        for(let i=0; i<p.length; i+=3) {
            // 右移時強制順時針軌跡
            p[i] += Math.sin(rad) * speed; 
            
            // 0度(cos>0) 由上往下流 (y減少)
            // 180度(cos<0) 由下往上流 (y增加)
            p[i+1] -= speed * cosVal;

            if(p[i+1] > 25) p[i+1] = -25; if(p[i+1] < -25) p[i+1] = 25;
            if(p[i] > 25) p[i] = -25; if(p[i] < -25) p[i] = 25;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
    },

    search() {
        const addr = prompt("輸入 Token 地址：");
        if(addr) {
            this.speak("掃描神宮資料庫中...地址讀取成功，身份：一般百姓。");
            document.getElementById('god-msg').innerText = "診斷：百姓 Token 地址解析完成";
        }
    },

    trade(t) {
        if(t==='CT') this.speak("執行現價成交，交易稅零點三已扣除，黑洞開始蒸發。");
        else this.speak("平倉大吉，利潤已歸入靈霄金庫。");
    },

    connect() {
        this.speak("神經連結完成，歡迎登入悟空大腦交易所。");
        alert("MetaMask 連結成功");
    },

    capture() {
        const link = document.createElement('a');
        link.download = "GOD_宮_V225.png";
        link.href = this.renderer.domElement.toDataURL();
        link.click();
    },

    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); },
    setWish() {
        const w = prompt("向神明許願：");
        if(w) document.getElementById('god-msg').innerText = `【願】：${w}`;
    }
};
window.onload = () => app.init();
</script>
</body>
</html>
