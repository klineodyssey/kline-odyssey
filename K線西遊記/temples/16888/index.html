<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGEN 16888｜廣寒宮七仙女駕駛艙 V1.9.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #050608; --glass: rgba(20, 22, 28, 0.9); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* 頂部血量條 */
        .top-hud { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); width: 85%; z-index: 100; text-align: center; }
        .bar { width: 100%; height: 8px; background: #222; border: 1px solid var(--gold); border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #health-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff3c00, var(--gold)); }

        /* 側邊垂直滑桿 */
        .side-ctrl { position: fixed; top: 50%; transform: translateY(-50%); z-index: 150; display: flex; flex-direction: column; align-items: center; }
        .left-ctrl { left: 15px; }
        .right-ctrl { right: 15px; }
        input[type=range].vert { width: 180px; transform: rotate(-90deg); margin: 80px 0; accent-color: var(--gold); }
        .tag { font-size: 10px; color: var(--gold); text-shadow: 0 0 5px #000; }

        /* 中央 3D 容器 */
        #stage { width: 100vw; height: 100vh; position: absolute; z-index: 10; }

        /* 底部控制面板 */
        .terminal { position: fixed; bottom: 0; width: 100%; background: var(--glass); border-top: 2px solid var(--gold); z-index: 200; padding: 15px; transition: 0.3s; }
        .terminal.hide { transform: translateY(calc(100% - 40px)); }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; overflow-x: auto; }
        .btn { padding: 8px 15px; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 11px; white-space: nowrap; cursor: pointer; }
        .stat-card { background: rgba(0,0,0,0.4); padding: 10px; border: 1px solid rgba(255,215,120,0.2); flex: 1; }
    </style>
</head>
<body>

<div class="top-hud">
    <div class="tag">DNA / RNA 穩定度</div>
    <div class="bar"><div id="health-fill"></div></div>
</div>

<div class="side-ctrl left-ctrl">
    <div class="tag">曲率 (口數)</div>
    <input type="range" id="curv" class="vert" min="1" max="150" value="75">
</div>

<div class="side-ctrl right-ctrl">
    <div class="tag">方向盤 (360°)</div>
    <input type="range" id="angle" class="vert" min="0" max="360" value="180">
</div>

<div id="stage"></div>

<div class="terminal" id="term">
    <div style="text-align:center; color:var(--gold); cursor:pointer; margin-bottom:10px;" onclick="document.getElementById('term').classList.toggle('hide')">▲ 控制台選單 (V1.9.5)</div>
    <div style="display:flex; gap:10px;">
        <div class="stat-card">
            <div class="tag" style="color:var(--cyan)">受孕池進度</div>
            <div id="v-pool">0 / 16888</div>
        </div>
        <div class="stat-card">
            <div class="tag" style="color:var(--cyan)">宇宙坐標 (R/D)</div>
            <div id="v-physics">0.00 / 0.00</div>
        </div>
    </div>
    <div class="btn-row">
        <button class="btn" onclick="app.vow()">🔥 點火修行</button>
        <button class="btn" onclick="alert('第 13 生肖點燈成功！')">🏮 13生肖點燈</button>
        <button class="btn" onclick="app.takePhoto()">📷 拍照 (蓋許願戳印)</button>
        <button class="btn" onclick="app.log('啟動錄音引擎...')">🎤 錄音/錄影</button>
    </div>
</div>

<script>
const app = {
    pool: 0,
    fairyImg: "https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png",
    
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('stage').appendChild(this.renderer.domElement);

        // 載入指定仙女圖
        const loader = new THREE.TextureLoader();
        loader.crossOrigin = "anonymous";
        const texture = loader.load(this.fairyImg);
        
        const geometry = new THREE.CircleGeometry(4, 32);
        const material = new THREE.MeshBasicMaterial({ 
            map: texture, 
            transparent: true, 
            side: THREE.DoubleSide 
        });
        this.fairy = new THREE.Mesh(geometry, material);
        this.scene.add(this.fairy);

        // 粒子系統 (DNA 由下往上)
        this.createParticles();
        
        this.camera.position.z = 12;
        this.animate();
    },

    createParticles() {
        const pGeo = new THREE.BufferGeometry();
        const pPos = [];
        for(let i=0; i<1500; i++) pPos.push((Math.random()-0.5)*40, (Math.random()-0.5)*40, (Math.random()-0.5)*40);
        pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pPos, 3));
        this.pts = new THREE.Points(pGeo, new THREE.PointsMaterial({color: 0x00f2ff, size: 0.08, transparent: true, opacity: 0.5}));
        this.scene.add(this.pts);
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        
        const curv = document.getElementById('curv').value;
        const angle = document.getElementById('angle').value;
        const r = (angle - 180) / 180;
        const d = (curv / 150) * r;

        document.getElementById('v-physics').innerText = `${r.toFixed(2)} / ${d.toFixed(2)}`;
        document.getElementById('v-pool').innerText = `${this.pool} / 16888`;

        // 仙女隨方向盤旋轉與前後位移
        this.fairy.rotation.y = THREE.MathUtils.lerp(this.fairy.rotation.y, r * Math.PI/2, 0.05);
        this.fairy.position.z = THREE.MathUtils.lerp(this.fairy.position.z, d * 8, 0.05);

        // DNA 粒子由下往上 (做空方向)
        const pos = this.pts.geometry.attributes.position.array;
        for(let i=1; i<pos.length; i+=3) {
            pos[i] += 0.1; 
            if(pos[i] > 20) pos[i] = -20;
        }
        this.pts.geometry.attributes.position.needsUpdate = true;

        this.renderer.render(this.scene, this.camera);
    },

    vow() {
        this.pool += 1350;
        if(this.pool >= 16888) {
            alert("16888 達成！啟動下凡發財金流程。");
            this.pool = 0;
        }
    },
    
    takePhoto() {
        alert("照片已生成！左下角已蓋印 V1.9.5 與許願字樣。");
    }
};

window.onload = () => app.init();
</script>
</body>
</html>
