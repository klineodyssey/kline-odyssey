<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>KGEN 16888｜金融生命體肌肉滿血版</title>

  <!-- three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">

  <style>
    :root { --gold:#ffd778; --cyan:#00f2ff; --bg:#000; --energy:#ffcc00; --panel:rgba(20,20,0,.9); }
    html,body{ height:100%; }
    body{
      margin:0; padding:0;
      background:var(--bg); color:#fff;
      font-family:'Noto Sans TC',sans-serif;
      overflow:hidden;
      touch-action:none;
    }

    /* 🏛️ Top HUD */
    .hud-top{
      position:fixed; top:15px; width:96%; left:2%;
      display:flex; justify-content:space-between;
      z-index:100; pointer-events:none;
    }
    .brand-section{ border-left:5px solid var(--gold); padding-left:15px; background:linear-gradient(90deg,var(--panel),transparent); }
    .brand-name{ font-size:28px; color:var(--gold); text-shadow:0 0 15px var(--gold); }
    .sys-st{ font-family:'Orbitron',monospace; font-size:12px; color:var(--cyan); letter-spacing:1px; }

    .monitor-data{ display:flex; gap:20px; }
    .data-box{ background:var(--panel); border:1px solid #332200; padding:10px; border-top:2px solid var(--gold); }
    .grid-500{ display:grid; grid-template-columns:repeat(25,6px); gap:3px; margin-top:5px; }
    .dot{ width:6px; height:6px; background:#1a1a00; border-radius:1px; }
    .dot.on{ background:var(--energy); box-shadow:0 0 8px var(--energy); }

    /* 🚀 Left Warp Engine */
    .warp-engine{ position:fixed; left:45px; top:50%; transform:translateY(-50%); z-index:150; width:100px; text-align:center; }
    .warp-rail{
      height:450px; width:30px; background:#111; border:3px solid var(--energy);
      position:relative; margin:0 auto; border-radius:8px; overflow:hidden;
      box-shadow:0 0 20px rgba(255,204,0,.2);
    }
    #energy-fill{
      position:absolute; bottom:0; width:100%;
      background:linear-gradient(to top,#ff8800,var(--energy),#fff);
      transition:height .15s cubic-bezier(.17,.67,.83,.67);
      z-index:5;
    }
    .rail-step{ position:absolute; width:100%; height:2px; background:rgba(0,0,0,.4); z-index:10; }
    #warp-thumb{
      width:70px; height:35px; background:#fff; position:absolute;
      left:-20px; bottom:33%; cursor:pointer; border-radius:6px;
      box-shadow:0 0 30px #fff,0 0 15px var(--cyan);
      border:3px solid var(--cyan); z-index:30;
    }
    .warp-range{ position:absolute; top:0; left:0; width:100%; height:100%; -webkit-appearance:slider-vertical; opacity:0; cursor:pointer; z-index:40; }
    .warp-val-text{ margin-top:25px; color:var(--energy); font-family:'Orbitron',monospace; font-size:18px; text-shadow:0 0 10px var(--energy); }

    /* 🧚 Core Window */
    #core-anchor{ position:fixed; top:45%; left:52%; transform:translate(-50%,-50%); width:420px; height:420px; z-index:50; }
    #core-window{
      width:100%; height:100%;
      border-radius:50%; border:15px double var(--gold);
      overflow:hidden; background:#000; position:relative;
      box-shadow:0 0 80px rgba(255,215,120,.3);
      transition:transform .05s linear;
    }
    #fairy-img{ width:100%; height:100%; object-fit:cover; }
    #cam-view{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; }
    #mini-thumb{
      position:absolute; top:30px; right:30px; width:100px; height:100px;
      border-radius:50%; border:3px solid var(--gold); display:none; z-index:110;
      background:url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
      box-shadow:0 0 25px var(--gold);
    }
    #wish-label{
      position:absolute; bottom:50px; left:50px; z-index:85;
      color:#fff; font-weight:900; font-size:24px;
      text-shadow:2px 2px 10px #000,0 0 15px var(--cyan);
    }

    /* 🧬 GA Matrix */
    .ga-matrix{
      position:fixed; right:30px; top:50%; transform:translateY(-50%);
      width:180px; background:var(--panel); border:1px solid var(--energy);
      padding:15px; z-index:100; font-family:'Orbitron',monospace;
    }
    .ga-stat{ font-size:11px; margin-bottom:10px; color:var(--cyan); }
    .ga-bar{ height:6px; background:#111; margin-top:4px; overflow:hidden; border-radius:3px; }
    .ga-progress{ height:100%; background:var(--energy); width:0%; transition:width .5s; }

    /* 🎡 Steering */
    .steer-zone{ position:fixed; bottom:180px; width:100%; text-align:center; z-index:100; }
    .angle-readout{ font-family:'Orbitron',monospace; font-size:56px; color:var(--cyan); text-shadow:0 0 30px var(--cyan); }
    .steer-slider{ width:75%; max-width:900px; cursor:pointer; height:12px; accent-color:var(--gold); }

    /* 🛠️ Terminal */
    .footer-terminal{
      position:fixed; bottom:0; width:100%; background:#000; padding:20px;
      border-top:4px solid var(--gold);
      display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
      z-index:100;
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    }
    .term-btn{
      background:#0a0a0a; border:1px solid #444; color:#fff;
      padding:20px 5px; font-weight:900; cursor:pointer; transition:.2s;
      font-size:14px; border-radius:4px;
    }
    .term-btn:hover{ background:var(--gold); color:#000; }
    .term-btn.active-kgen{ border-color:var(--energy); color:var(--energy); box-shadow: inset 0 0 15px rgba(255,204,0,.2); }

    canvas#galaxy-bg{ position:fixed; inset:0; z-index:1; }
  </style>
</head>
<body>

  <div class="hud-top">
    <div class="brand-section">
      <div class="brand-name">KGEN 16888 金融生命體</div>
      <div class="sys-st" id="sys-clock">SYSTEM ONLINE | --</div>
    </div>
    <div class="monitor-data">
      <div class="data-box"><div>🏛️ 靈霄席位 (500)</div><div class="grid-500" id="g1"></div></div>
      <div class="data-box"><div>🐒 豪宅分紅 (500)</div><div class="grid-500" id="g2"></div></div>
    </div>
  </div>

  <div class="warp-engine">
    <div class="warp-rail" id="warp-rail-body">
      <div id="energy-fill"></div>
      <div id="warp-thumb"></div>
      <input type="range" id="warp-input-val" class="warp-range" min="0" max="100" value="33" />
    </div>
    <div class="warp-val-text" id="warp-txt">WARP 99x</div>
  </div>

  <div class="ga-matrix">
    <div style="color:var(--gold); font-size:14px; margin-bottom:10px; border-bottom:1px solid #444;">GA EVOLUTION</div>
    <div class="ga-stat">FITNESS: <span id="f-val">0.992</span><div class="ga-bar"><div class="ga-progress" id="f-bar"></div></div></div>
    <div class="ga-stat">MUTATION: <span id="m-val">0.021</span><div class="ga-bar"><div class="ga-progress" id="m-bar"></div></div></div>
    <div class="ga-stat">GEN: <span id="g-val">8422</span></div>
    <div style="color:var(--energy); font-size:12px; margin-top:10px;" id="ga-rank">RANK: GA-600</div>
  </div>

  <div id="core-anchor">
    <div id="core-window">
      <div id="wish-label">大聖駕到，光耀廣寒</div>
      <img id="fairy-img"
           src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png"
           crossorigin="anonymous" />
      <video id="cam-view" autoplay playsinline muted></video>
      <div id="mini-thumb"></div>
    </div>
  </div>

  <canvas id="galaxy-bg"></canvas>
  <canvas id="snap-canvas" style="display:none;"></canvas>

  <div class="steer-zone">
    <div class="angle-readout" id="ang-val">76°</div>
    <input type="range" id="steer-input-val" class="steer-slider" min="-180" max="180" value="76" />
  </div>

  <div class="footer-terminal">
    <button class="term-btn" onclick="app.capture()">📸 拍照存證</button>
    <button class="term-btn" onclick="app.cam('user')">🤳 前鏡自拍</button>
    <button class="term-btn" onclick="app.cam('environment')">🌌 後鏡巡航</button>
    <button class="term-btn active-kgen" onclick="app.boost()">💎 KGEN 沖等演化</button>
    <button class="term-btn active-kgen" onclick="app.autoHunt()">⚔️ 自動巡航打怪</button>
    <button class="term-btn" onclick="app.setWish()">👤 許願/還願</button>
    <button class="term-btn" onclick="app.speak('GA系統正在自動優化績效')">🧬 GA 優化</button>
    <button class="term-btn" onclick="location.reload()">🔄 重啟系統</button>
  </div>

  <script>
    const app = {
      isCam:false, camMode:'user', gaLevel:600,
      scene:null, camera:null, renderer:null, points:null,

      init(){
        this.initThree();
        this.buildUI();
        this.bind();
        setInterval(()=>this.tick(), 1000);
        this.updateWarp(33);
        this.speak("KGEN 16888 肌肉滿血版啟動。大聖，這次器官全齊了！");
        window.addEventListener('resize', ()=>this.onResize(), {passive:true});
        this.onResize();
      },

      tick(){
        document.getElementById('sys-clock').innerText = `SYSTEM ONLINE | ${new Date().toLocaleString()}`;

        // 500 dots flicker
        document.querySelectorAll('.dot').forEach(d=>{
          if(Math.random() > 0.92) d.classList.toggle('on');
        });

        // GA波動
        const fit = 0.9 + Math.random()*0.1;
        document.getElementById('f-val').innerText = fit.toFixed(3);
        document.getElementById('f-bar').style.width = (fit*100) + '%';
        document.getElementById('m-bar').style.width = (Math.random()*100) + '%';

        // 星海移動
        this.animateStars();
      },

      buildUI(){
        // 兩個 500-grid：各 500 點
        ['g1','g2'].forEach(id=>{
          const c = document.getElementById(id);
          c.innerHTML = '';
          for(let i=0;i<500;i++){
            const d = document.createElement('div');
            d.className = 'dot' + (Math.random() > 0.5 ? ' on' : '');
            c.appendChild(d);
          }
        });

        // rail steps
        const rail = document.getElementById('warp-rail-body');
        for(let i=0;i<25;i++){
          const step = document.createElement('div');
          step.className='rail-step';
          step.style.bottom = (i*4) + '%';
          rail.appendChild(step);
        }
      },

      updateWarp(val){
        val = Math.max(0, Math.min(100, Number(val)||0));
        document.getElementById('energy-fill').style.height = val + '%';
        document.getElementById('warp-thumb').style.bottom = `calc(${val}% - 17px)`;
        document.getElementById('warp-txt').innerText = `WARP ${val*3}x`;
      },

      boost(){
        if(this.gaLevel < 1000){
          this.gaLevel += 50;
          document.getElementById('ga-rank').innerText = `RANK: GA-${this.gaLevel}`;
          this.speak(`KGEN 注入能量，演化等級升至 ${this.gaLevel}`);
        }
      },

      autoHunt(){
        this.speak("啟動 GA 自動打怪模式，績效演化中。");
        const old = document.getElementById('wish-label').innerText;
        document.getElementById('wish-label').innerText = "⚔️ KGEN 自動打怪中...";
        setTimeout(()=>document.getElementById('wish-label').innerText = old, 3000);
      },

      async cam(mode){
        const v = document.getElementById('cam-view');
        const f = document.getElementById('fairy-img');
        const m = document.getElementById('mini-thumb');

        if(this.isCam && this.camMode === mode){
          this.stream?.getTracks?.().forEach(t=>t.stop());
          v.style.opacity = 0; f.style.opacity = 1; m.style.display = 'none';
          this.isCam = false;
          return;
        }
        try{
          this.stream?.getTracks?.().forEach(t=>t.stop());
          this.stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode: mode }, audio:false });
          v.srcObject = this.stream;
          v.style.opacity = 1; f.style.opacity = 0; m.style.display = 'block';
          v.style.transform = mode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
          this.isCam = true; this.camMode = mode;
        }catch(e){
          alert("攝像頭硬體未響應 / 權限被拒絕");
        }
      },

      capture(){
        const canvas = document.getElementById('snap-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 1000;

        const v = document.getElementById('cam-view');
        const f = document.getElementById('fairy-img');

        if(this.isCam){
          if(this.camMode === 'user'){ ctx.translate(1000,0); ctx.scale(-1,1); }
          ctx.drawImage(v,0,0,1000,1000);
          ctx.setTransform(1,0,0,1,0,0);
          ctx.drawImage(f,750,50,200,200);
        }else{
          ctx.drawImage(f,0,0,1000,1000);
        }

        ctx.fillStyle = "#ffd778"; ctx.font = "bold 40px 'Noto Sans TC', sans-serif";
        ctx.fillText("KGEN 16888 金融生命體", 50, 80);

        ctx.fillStyle = "#ffcc00"; ctx.font = "24px Orbitron, monospace";
        ctx.fillText(`EVO RANK: GA-${this.gaLevel} | ${new Date().toLocaleString()}`, 50, 120);

        ctx.fillStyle = "#fff"; ctx.font = "bold 45px 'Noto Sans TC', sans-serif";
        ctx.shadowBlur = 10; ctx.shadowColor = "#000";
        ctx.fillText(document.getElementById('wish-label').innerText, 70, 930);

        const link = document.createElement('a');
        link.download = "KGEN_MUSCLE_V4.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      },

      setWish(){
        const m = prompt("大聖請開金口：", document.getElementById('wish-label').innerText);
        if(m) document.getElementById('wish-label').innerText = m;
      },

      bind(){
        document.getElementById('steer-input-val').addEventListener('input', (e)=>{
          const v = Number(e.target.value||0);
          document.getElementById('ang-val').innerText = v + '°';
          document.getElementById('core-window').style.transform = `rotate(${v}deg)`;
        });

        document.getElementById('warp-input-val').addEventListener('input', (e)=>{
          this.updateWarp(e.target.value);
        });
      },

      initThree(){
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy-bg'), antialias:true, alpha:true });
        this.renderer.setPixelRatio(Math.min(2, window.devicePixelRatio||1));
        this.renderer.setSize(window.innerWidth, window.innerHeight);

        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(5000 * 3);
        for(let i=0;i<pos.length;i++) pos[i] = (Math.random()-0.5) * 160;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

        this.points = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.18 }));
        this.scene.add(this.points);

        this.camera.position.z = 50;
      },

      animateStars(){
        const warp = Number(document.getElementById('warp-input-val').value||0) / 40;
        if(!warp) {
          this.renderer.render(this.scene, this.camera);
          return;
        }

        const r = (Number(document.getElementById('steer-input-val').value||0) * Math.PI) / 180;
        const p = this.points.geometry.attributes.position.array;

        for(let i=0;i<p.length;i+=3){
          p[i]   -= Math.sin(r) * warp;
          p[i+1] -= Math.cos(r) * warp;

          if(p[i] > 80) p[i] = -80;
          if(p[i] < -80) p[i] = 80;
          if(p[i+1] > 80) p[i+1] = -80;
          if(p[i+1] < -80) p[i+1] = 80;
        }
        this.points.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
      },

      onResize(){
        if(!this.renderer || !this.camera) return;
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
      },

      speak(m){
        try{
          if(!window.speechSynthesis || !window.SpeechSynthesisUtterance) return;
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(m);
          u.lang = "zh-TW";
          window.speechSynthesis.speak(u);
        }catch(e){}
      }
    };

    window.addEventListener('load', ()=>app.init());
  </script>
</body>
</html>
