<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜天道座標校準版 V2.2.6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 神殿 HUD 總覽 */
        .god-hud { position: fixed; top: 10px; width: 100%; z-index: 1000; padding: 0 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 5px; }
        .hud-item { background: rgba(0,0,0,0.7); border-left: 3px solid var(--gold); padding: 5px 15px; border-radius: 0 10px 10px 0; }
        .label { font-size: 10px; color: var(--gold); font-family: 'Orbitron'; margin-bottom: 2px; }
        .bar-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s linear; }

        /* 左側：席位與獎池 */
        .info-panel { position: fixed; top: 130px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); padding: 12px; border-radius: 10px; min-width: 180px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-family: 'Orbitron'; border-bottom: 1px solid rgba(255,215,120,0.2); padding-bottom: 3px; }
        .info-row span { color: var(--cyan); }

        /* 右側：13生肖光明燈 */
        .altar-lamps { position: fixed; right: 15px; top: 110px; z-index: 1000; display: grid; grid-template-columns: repeat(2, 45px); gap: 8px; }
        .lamp { width: 45px; height: 45px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #000; color: var(--gold); cursor: pointer; font-size: 14px; transition: 0.3s; }
        .lamp.active { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        /* 中央仙女飛碟 */
        #fairy-ufo {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 380px; height: 380px;
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            opacity: 0.85; border-radius: 50%; z-index: 2; border: 5px solid var(--gold);
            box-shadow: 0 0 60px rgba(255, 215, 120, 0.5);
        }

        /* 控制台 */
        .controls { position: fixed; bottom: 130px; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        .tag { font-family: 'Orbitron'; color: var(--cyan); font-size: 14px; margin-bottom: 10px; display: block; }
        input[type=range].h-steer { width: 240px; accent-color: var(--gold); }
        input[type=range].v-warp { width: 180px; transform: rotate(-90deg); margin-top: 80px; accent-color: var(--cyan); }

        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); z-index: 1000; padding: 15px 5px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .btn { padding: 12px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 10px; font-weight: 900; cursor: pointer; }

        #starfield { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

<div id="fairy-ufo"></div>
<div id="starfield"></div>

<div class="god-hud">
    <div class="hud-item">
        <div class="label">靈霄寶殿金庫容納量: 50,000,000 KGEN</div>
        <div class="bar-bg"><div class="bar-fill" id="v-bar" style="width: 100%; background: var(--gold);"></div></div>
    </div>
    <div class="hud-item">
        <div class="label">悟空大腦(花果山交易所)保證金: 50,000,000 KGEN</div>
        <div class="bar-bg"><div class="bar-fill" id="b-bar" style="width: 100%; background: var(--cyan);"></div></div>
    </div>
</div>

<div class="info-panel">
    <div class="info-row">🧚 仙女獎池: <span id="pool-val">8,888,888</span></div>
    <div class="info-row">🐒 花果山席位: <span id="s1">500</span>/500</div>
    <div class="info-row">🙏 神明席位: <span id="s2">500</span>/500</div>
    <div class="info-row" style="color:var(--red); border:none;">HP 血量: <span id="hp-val">100%</span></div>
</div>

<div class="altar-lamps" id="lamps"></div>

<div class="controls">
    <div style="text-align:center;">
        <span id="w-val" class="tag">WARP: 1x</span>
        <input type="range" id="warp" class="v-warp" min="1" max="150" value="1">
    </div>
    <div style="text-align:center;">
        <span id="s-val" class="tag">STEER: 0°</span>
        <input type="range" id="steer" class="h-steer" min="-180" max="180" value="0">
    </div>
</div>

<div class="footer">
    <div class="grid">
        <button class="btn" onclick="app.checkToken()">🔍 查地址代碼</button>
        <button class="btn" onclick="app.trade('CT')">📈 CT 現價交易</button>
        <button class="btn" onclick="app.trade('OFF')">📉 結算平倉</button>
        <button class="btn" onclick="app.speakIntro()">🎙️ 神宮介紹</button>
        <button class="btn" onclick="app.setWish()">🙏 許願留言</button>
        <button class="btn" onclick="app.capture()">📷 下載神蹟</button>
        <button class="btn" onclick="app.connect()">🦊 連結錢包</button>
        <button class="btn" onclick="app.speak('星球流向鎖定，天道巡航就緒')">🎙️ 客服語音</button>
    </div>
</div>

<script>
const app = {
    hp: 100,
    zodiacs: ['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬','🐱'],
    
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('starfield').appendChild(this.renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 1800; i++) pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.13 }));
        this.scene.add(this.stars);

        this.camera.position.z = 15;
        this.initLamps();
        this.animate();
        setInterval(() => this.kEngine(), 2000);
        this.speakIntro();
    },

    initLamps() {
        const wrap = document.getElementById('lamps');
        this.zodiacs.forEach(z => {
            const l = document.createElement('div');
            l.className = 'lamp';
            l.innerText = z;
            l.onclick = () => {
                l.classList.toggle('active');
                this.speak(`已為${z}年信眾點燃光明燈，功德金歸入仙女獎池。`);
            };
            wrap.appendChild(l);
        });
    },

    speakIntro() {
        this.speak("大聖吉祥，此為神電神宮廣寒宮。花果山台灣交易所，悟空大腦保證金五千萬 KGEN 質能穩定。目前席位剩餘五百，仙女獎池盈餘同步中，天道座標已歸位。");
    },

    kEngine() {
        const diff = (Math.random() - 0.5) * 10;
        const steer = parseInt(document.getElementById('steer').value);
        if(Math.abs(steer) > 100 && diff > 0) {
            this.hp = Math.max(0, this.hp - 1);
            document.getElementById('hp-val').innerText = this.hp + "%";
        }
        // 模擬獎池隨機變動
        const pool = 8888888 + (Math.random() * 1000);
        document.getElementById('pool-val').innerText = Math.floor(pool).toLocaleString();
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const warp = parseInt(document.getElementById('warp').value);
        const steer = parseInt(document.getElementById('steer').value);
        
        document.getElementById('w-val').innerText = `WARP: ${warp}x`;
        document.getElementById('s-val').innerText = `STEER: ${steer}°`;

        // 飛碟旋轉 (向右增大 = 順時針)
        document.getElementById('fairy-ufo').style.transform = `translate(-50%, -50%) rotate(${steer}deg)`;

        // 星球軌道物理絕對同步
        const rad = (steer * Math.PI) / 180;
        const cosVal = Math.cos(rad);
        const p = this.stars.geometry.attributes.position.array;
        const speed = (warp / 400);

        for(let i=0; i<p.length; i+=3) {
            // 右移 X 增大時，粒子軌道產生順時針偏轉向量
            p[i] += Math.sin(rad) * speed; 
            
            // Y軸垂直流向：
            // 0度（做多）：由上至下 (cosVal > 0, 所以 Y 減少)
            // 180度（做空）：由下至上 (cosVal < 0, 所以 Y 增加)
            p[i+1] -= speed * cosVal;

            if(p[i+1] > 25) p[i+1] = -25; if(p[i+1] < -25) p[i+1] = 25;
            if(p[i] > 25) p[i] = -25; if(p[i] < -25) p[i] = 25;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
    },

    checkToken() {
        const addr = prompt("請輸入 Token 地址查詢：");
        if(addr) this.speak("代碼掃描中... 檢測到百姓資產地址，稅率同步完成。");
    },

    trade(t) {
        if(t==='CT') this.speak("K線實時成交已啟動，交易稅零點三扣除。");
        else this.speak("平倉結算成功，獲利已存入悟空大腦。");
    },

    connect() {
        this.speak("連結 MetaMask 成功，神經系統已接入交易所。");
        alert("錢包連結成功");
    },

    setWish() {
        const w = prompt("留言內容：");
        if(w) this.speak("願望已上傳靈霄寶殿。");
    },

    capture() {
        const link = document.createElement('a');
        link.download = "KGEN_V226_FINAL.png";
        link.href = this.renderer.domElement.toDataURL();
        link.click();
    },

    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
