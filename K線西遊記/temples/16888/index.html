<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>廣寒宮 16888｜嫦娥駕駛艙 V1.6</title>
  <style>
    :root{
      --bg:#06070b; --text: rgba(255,255,255,.92); --gold: rgba(255,215,120,.95); --line: rgba(255,255,255,.14);
    }
    body{ margin:0; font-family: system-ui; background: var(--bg); color: var(--text); overflow-x:hidden; }
    .wrap{ max-width:1100px; margin:0 auto; padding:20px 14px 100px; }
    .card{ border:1px solid var(--line); border-radius: 24px; background: rgba(255,255,255,.05); overflow:hidden; }
    
    /* 核心視窗：確保單圖置中不碎裂 */
    .fairyWrap{
      position:relative; width: 300px; height: 300px; margin: 30px auto; 
      border-radius: 50%; overflow:hidden; border: 2px solid var(--gold);
      box-shadow: 0 0 50px rgba(255,215,120,0.3); background: #000;
    }
    #fairyImg {
      width: 100%; height: 100%;
      background-image: url('./assets/fairy.png'); 
      background-size: cover;      /* 關鍵：填滿容器 */
      background-position: center 20%; /* 關鍵：對齊臉部與重點 */
      background-repeat: no-repeat;
      transition: transform 0.4s ease-out, filter 0.4s;
    }

    .sleepMask{ position:absolute; inset:0; background:rgba(0,0,0,0.5); display:none; place-items:center; z-index:5; backdrop-filter: blur(4px); color: var(--gold); }
    .sleepMask.on{ display:grid; }
    .kpiGrid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin:20px; }
    .kpi{ border:1px solid var(--line); border-radius: 18px; padding:15px; background:rgba(0,0,0,0.3); text-align:center; }
    .kpi b { font-size: 24px; color: var(--gold); display:block; }
    input[type="range"]{ width:100%; accent-color: var(--gold); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div style="padding:20px; text-align:center;">
        <h2 style="margin:0;">廣寒宮 16888 駕駛艙</h2>
      </div>
      <div class="fairyWrap">
        <div id="fairyImg"></div>
        <div class="sleepMask" id="sleepMask">嫦娥正在休息...</div>
      </div>
      <div style="padding:0 20px 20px;">
        <div class="kpiGrid">
          <div class="kpi">姿態 <b id="stance">REST</b></div>
          <div class="kpi">曲速 <b id="warpVal">10x</b></div>
        </div>
        <label>方向盤 (角度)</label>
        <input id="degRange" type="range" min="0" max="360" value="120" />
        <label style="display:block; margin-top:15px;">曲速引擎</label>
        <input id="warpRange" type="range" min="1" max="150" value="10" />
      </div>
    </div>
  </div>
<script>
  const $ = (id) => document.getElementById(id);
  function update() {
    const d = parseInt($("degRange").value);
    const w = parseInt($("warpRange").value);
    let s = "REST";
    if (d >= 10 && d <= 170) s = "LONG";
    else if (d >= 190 && d <= 350) s = "SHORT";

    $("stance").textContent = s;
    $("warpVal").textContent = w + "x";
    $("sleepMask").className = (s === "REST") ? "sleepMask on" : "sleepMask";

    const img = $("fairyImg");
    const glow = w / 150;
    // 根據角度輕微旋轉圖片，而不是切換幀
    img.style.transform = `scale(${1 + (w/400)}) rotate(${(d-120)*0.1}deg)`;
    img.style.filter = s === "REST" ? "brightness(0.6) blur(2px)" : `saturate(${1.2+glow}) brightness(${1.1+glow}) contrast(1.1)`;
  }
  $("degRange").oninput = update;
  $("warpRange").oninput = update;
  update();
</script>
</body>
</html>
