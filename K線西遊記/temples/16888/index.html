<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGEN 16888｜廣寒宮全向量導航 V2.1.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 中央月亮底圖：隨引擎同步旋轉 */
        #fairy-engine {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 380px; height: 380px;
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            opacity: 0.15; border-radius: 50%; z-index: 2; border: 2px solid rgba(255,215,120,0.1);
            transition: transform 0.2s ease-out;
        }

        /* 導航儀表 */
        .hud { position: fixed; top: 15px; width: 100%; z-index: 1000; padding: 0 20px; box-sizing: border-box; }
        .hud-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #fuel-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--red), var(--gold)); }

        /* 中心 K 線與 AI */
        #bridge { position: fixed; top: 25%; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #contract-ai { font-size: 12px; color: var(--cyan); background: rgba(0,0,0,0.8); padding: 8px 20px; border: 1px solid var(--cyan); border-radius: 30px; }
        #price { font-family: 'Orbitron'; font-size: 50px; text-shadow: 0 0 20px var(--cyan); margin: 10px 0; }

        /* 左右操作桿 */
        .stick { position: fixed; top: 55%; transform: translateY(-50%); z-index: 1000; }
        .l-stick { left: 15px; } .r-stick { right: 15px; }
        input[type=range].vert { width: 180px; transform: rotate(-90deg); margin: 80px -70px; accent-color: var(--gold); cursor: pointer; }

        #three-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        #cam-view { position: fixed; inset: 0; z-index: 1; opacity: 0.3; object-fit: cover; }

        /* 控制台 */
        .console { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); z-index: 1000; padding: 20px 10px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn { padding: 12px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 10px; font-weight: 900; }
        
        .wish-sign { position: fixed; bottom: 130px; left: 20px; z-index: 500; color: var(--gold); }
    </style>
</head>
<body>

<div id="fairy-engine"></div>
<video id="cam-view" autoplay playsinline></video>
<div id="three-canvas"></div>

<div class="hud">
    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--gold);">
        <span>玉帝神明銀行金庫：5000萬 KGEN</span>
        <span id="ai-mode">模式：百姓導航</span>
    </div>
    <div class="hud-bar"><div id="fuel-fill"></div></div>
</div>

<div id="bridge">
    <div id="contract-ai">AI 合約判斷：等待地址輸入...</div>
    <div id="price">16888.88</div>
    <div id="vector-data" style="font-size:10px; color:var(--gold);">向量方向: 180° | 曲速: 75x</div>
</div>

<div class="wish-sign">
    <div style="font-size:28px; font-weight:900;">16888 廣寒宮</div>
    <div id="user-msg">【願】：歲歲平安</div>
</div>

<div class="stick l-stick"><input type="range" id="warp" class="vert" min="1" max="150" value="75"></div>
<div class="stick r-stick"><input type="range" id="angle" class="vert" min="0" max="360" value="180"></div>

<div class="console">
    <div class="grid">
        <button class="btn" onclick="app.scanContract()">🔍 合約自動判斷</button>
        <button class="btn" onclick="app.trade('CT')">📈 CT下單</button>
        <button class="btn" onclick="app.trade('CLOSE')">📉 CT+1結算</button>
        <button class="btn" onclick="app.setWish()">🙏 許願留言</button>
        <button class="btn" onclick="app.capture()">📷 拍照下載</button>
        <button class="btn" onclick="app.toggleCam()">📸 影像開關</button>
        <button class="btn" onclick="app.connect()">🦊 錢包連結</button>
        <button class="btn" onclick="app.speak('向量引擎已鎖定，準備曲速前進')">🎙️ 客服語音</button>
    </div>
</div>

<script>
const app = {
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-canvas').appendChild(this.renderer.domElement);

        // 氣泡星球向量粒子
        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 1500; i++) {
            pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.particles = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15, transparent: true, opacity: 0.8 }));
        this.scene.add(this.particles);

        this.camera.position.z = 15;
        this.animate();
        setInterval(() => this.updateMarket(), 2000);
    },

    updateMarket() {
        const p = (16888 + (Math.random()-0.5)*15).toFixed(2);
        document.getElementById('price').innerText = p;
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const warp = document.getElementById('warp').value;
        const angle = parseInt(document.getElementById('angle').value);
        
        // --- 核心全向量引擎 ---
        // 將 0-360 度轉為弧度
        const rad = (angle * Math.PI) / 180;
        // 計算向量分量 (X 與 Y)
        const vx = Math.sin(rad) * (warp / 500);
        const vy = Math.cos(rad) * (warp / 500);

        // 1. 底圖美女旋轉聯動
        document.getElementById('fairy-engine').style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;
        
        // 2. 粒子流向隨角度改變
        const positions = this.particles.geometry.attributes.position.array;
        for(let i=0; i<positions.length; i+=3) {
            positions[i] += vx;     // X軸流向
            positions[i+1] -= vy;   // Y軸流向 (反向以符合視覺習慣)
            
            // 邊界迴圈處理
            if(positions[i] > 25) positions[i] = -25; if(positions[i] < -25) positions[i] = 25;
            if(positions[i+1] > 25) positions[i+1] = -25; if(positions[i+1] < -25) positions[i+1] = 25;
        }
        this.particles.geometry.attributes.position.needsUpdate = true;
        
        document.getElementById('vector-data').innerText = `向量方向: ${angle}° | 曲速: ${warp}x`;
        this.renderer.render(this.scene, this.camera);
    },

    scanContract() {
        const addr = prompt("請輸入掃描地址 (合約或 EOA)：");
        if(!addr) return;
        this.speak("正在透過廣寒宮 AI 掃描合約特徵");
        
        // 模擬 AI 自動判斷合約類型邏輯
        setTimeout(() => {
            let res = "";
            if(addr.length > 30) {
                res = "AI 判定：此為【神明合約】具備自動分紅與 30% 回禮邏輯";
                document.getElementById('ai-mode').innerText = "模式：神明分紅模式";
                this.speak("檢測到神明生命體，已自動對接分紅接口。");
            } else {
                res = "AI 判定：此為【百姓地址】啟用普通金融功能";
                document.getElementById('ai-mode').innerText = "模式：百姓導航";
            }
            document.getElementById('contract-ai').innerText = res;
        }, 1500);
    },

    setWish() {
        const w = prompt("輸入許願/還願/留言：");
        if(w) document.getElementById('user-msg').innerText = `【願】：${w}`;
    },

    async toggleCam() {
        const v = document.getElementById('cam-view');
        if(v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        else { const s = await navigator.mediaDevices.getUserMedia({video: true}); v.srcObject = s; }
    },

    capture() {
        const out = document.createElement('canvas'); out.width = 1080; out.height = 1920;
        const ctx = out.getContext('2d');
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,1080,1920);
        if(document.getElementById('cam-view').srcObject) ctx.drawImage(document.getElementById('cam-view'), 0,0,1080,1920);
        ctx.drawImage(this.renderer.domElement, 0,0,1080,1920);
        
        // 合成文字（左下角）
        ctx.fillStyle = "#ffd778"; ctx.font = "bold 60px Noto Sans TC";
        ctx.fillText("16888 廣寒宮 飛行紀錄", 50, 150);
        ctx.fillStyle = "#fff"; ctx.font = "40px Noto Sans TC";
        ctx.fillText(document.getElementById('user-msg').innerText, 50, 1850);
        ctx.fillText(document.getElementById('contract-ai').innerText, 50, 1780);

        const link = document.createElement('a');
        link.download = `GUANGHAN_VECTOR_${Date.now()}.png`;
        link.href = out.toDataURL();
        link.click();
    },

    trade(t) { this.speak(t==='CT'?"下單":"結算"); },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); },
    connect() { alert("連結靈霄寶殿中..."); }
};

window.onload = () => app.init();
</script>
</body>
</html>
