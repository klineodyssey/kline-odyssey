
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16888 廣寒宮 · K線西遊記</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    color:white;
    text-align:center;
    background:black;
}

/* 背景影片 */
#bgVideo{
    position:fixed;
    right:0;
    bottom:0;
    min-width:100%;
    min-height:100%;
    object-fit:cover;
    z-index:-1;
}

/* 主控制面板 */
.panel{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.5);
    padding:20px;
    border-radius:14px;
}

button{
    padding:10px 16px;
    margin:6px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.play{background:#00c853;color:white}
.pause{background:#d50000;color:white}
</style>
</head>

<body>

<!-- 背景影片 -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="video/guanghan.mp4" type="video/mp4">
</video>

<div class="panel">
<h2>🌕 16888 廣寒宮</h2>
<p>K線西遊記 · 月宮入口</p>

<button class="play" onclick="playMusic()">播放音樂</button>
<button class="pause" onclick="pauseMusic()">停止音樂</button>
</div>

<audio id="bgMusic"></audio>

<script>

let playlist = []
let index = 0
const audio = document.getElementById("bgMusic")

async function loadPlaylist(){

    try{
        const res = await fetch("music/playlist.json")
        playlist = await res.json()

        if(playlist.length>0){
            audio.src = playlist[0].url
        }

    }catch(e){
        console.log("playlist load error")
    }
}

function playMusic(){

    if(playlist.length==0) return

    audio.src = playlist[index].url
    audio.play()
}

function pauseMusic(){
    audio.pause()
}

audio.addEventListener("ended",()=>{

    index++
    if(index>=playlist.length) index=0

    audio.src = playlist[index].url
    audio.play()

})

loadPlaylist()

</script>

</body>
</html>
