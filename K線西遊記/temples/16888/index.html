<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>廣寒宮 16888｜合照駕駛艙 V2.0</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <style>
    :root{ --bg:#06070b; --gold:#ffd778; --line:rgba(255,255,255,0.14); --text:rgba(255,255,255,0.9); }
    body{ margin:0; font-family: sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
    .wrap{ max-width:1100px; margin:0 auto; padding:20px 14px 100px; }
    
    /* 上方油箱/血條 */
    .fuelBarWrap{ width: 300px; margin: 0 auto 10px; text-align:center; }
    .fuelLabel{ font-size:12px; color:var(--gold); font-weight:900; margin-bottom:4px; }
    .fuelBar{ height:12px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; border:1px solid var(--line); }
    #fuelInner{ width:50%; height:100%; background:linear-gradient(90deg, #ff4d4d, var(--gold)); transition:0.5s; }

    /* 仙女監視器 */
    .cockpit{ position:relative; width: 320px; height: 320px; margin: 0 auto; border-radius: 50%; border: 3px solid var(--gold); overflow:hidden; background:#000; box-shadow: 0 0 50px rgba(255,215,120,0.3); }
    #fairy{ width:100%; height:100%; background:url('./assets/fairy.png') no-repeat center 20% / cover; transition:0.4s; }
    
    /* 操作橫桿 (圖下方) */
    .controls{ width:320px; margin:20px auto; background:rgba(255,255,255,0.05); padding:15px; border-radius:20px; border:1px solid var(--line); }
    .controls label{ display:flex; justify-content:space-between; font-size:12px; color:var(--gold); font-weight:900; }
    input[type="range"]{ width:100%; accent-color:var(--gold); margin:8px 0 15px; }

    /* 左下方互動區 */
    .sideButtons{ position:fixed; bottom:20px; left:14px; z-index:100; display:flex; flex-direction:column; gap:10px; width:140px; }
    .camPreview{ width:140px; height:105px; background:#000; border-radius:12px; border:1px solid var(--gold); overflow:hidden; margin-bottom:5px; }
    #cam{ width:100%; height:100%; object-fit:cover; transform: scaleX(-1); }
    
    .btn{ padding:10px; border-radius:99px; border:1px solid var(--gold); background:rgba(0,0,0,0.6); color:var(--gold); font-weight:900; font-size:11px; cursor:pointer; }
    .btn.gold{ background:var(--gold); color:#000; }

    /* 隱藏的畫布用於合成合照 */
    #mergeCanvas{ display:none; }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="fuelBarWrap">
      <div class="fuelLabel">油箱能量 / 受孕進度 <span id="fuelText">10,000</span> / 16,888</div>
      <div class="fuelBar"><div id="fuelInner"></div></div>
      <div style="margin-top:8px; display:flex; justify-content:center; gap:10px;">
        <button class="btn" onclick="alert('許願成功')">許願</button>
        <button class="btn" onclick="alert('還願成功')">還願</button>
      </div>
    </div>

    <div class="cockpit">
      <div id="fairy"></div>
    </div>

    <div class="controls">
      <label>方向盤姿態 <span id="degVal">120°</span></label>
      <input id="degRange" type="range" min="0" max="360" value="120">
      
      <label>曲率（口數） <span id="warpVal">10x</span></label>
      <input id="warpRange" type="range" min="1" max="150" value="10">
      
      <button class="btn gold" style="width:100%" id="btnConnect">連接錢包 / 下幣測試</button>
    </div>
  </div>

  <div class="sideButtons">
    <div class="camPreview">
      <video id="cam" autoplay playsinline muted></video>
    </div>
    <button class="btn" id="btnCam">開啟相機</button>
    <button class="btn gold" id="btnSelfie">與仙女合照</button>
    <button class="btn" onclick="alert('錄影功能對接中')">錄影</button>
  </div>

  <canvas id="mergeCanvas"></canvas>

<script>
  const $ = (id) => document.getElementById(id);

  function update() {
    const deg = parseInt($("degRange").value);
    const warp = parseInt($("warpRange").value);
    const energy = warp * 112; // 模擬能量計算
    
    $("degVal").textContent = deg + "°";
    $("warpVal").textContent = warp + "x";
    $("fuelText").textContent = (10000 + energy).toLocaleString();
    
    // 更新血條
    const pct = Math.min(((10000 + energy) / 16888) * 100, 100);
    $("fuelInner").style.width = pct + "%";

    // 更新仙女縮放旋轉
    const fairy = $("fairy");
    fairy.style.transform = `scale(${1 + warp/500}) rotate(${(deg-120)*0.1}deg)`;
  }

  // 與仙女合照功能 (Canvas 合成)
  async function takeSelfie() {
    const cam = $("cam");
    const canvas = $("mergeCanvas");
    const ctx = canvas.getContext("2d");
    
    // 設定合成尺寸 (1080p)
    canvas.width = 1080; canvas.height = 1080;

    // 1. 畫背景 (如果是全屏背景可以加在這裡)
    ctx.fillStyle = "#06070b";
    ctx.fillRect(0,0,1080,1080);

    // 2. 畫你的相機畫面 (置底層)
    ctx.save();
    ctx.translate(1080, 0); ctx.scale(-1, 1); // 鏡像處理
    ctx.drawImage(cam, 0, 0, 1080, 1080);
    ctx.restore();

    // 3. 疊加仙女圖 (置上層，帶透明度或混合模式)
    const fairyImg = new Image();
    fairyImg.src = './assets/fairy.png'; 
    fairyImg.onload = () => {
      ctx.globalAlpha = 0.7; // 讓仙女有一點透明虛幻感
      ctx.drawImage(fairyImg, 140, 140, 800, 800);
      
      // 4. 下載圖片
      const link = document.createElement('a');
      link.download = '與仙女合照.png';
      link.href = canvas.toDataURL();
      link.click();
    };
  }

  // 相機開啟
  $("btnCam").onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'user'}});
    $("cam").srcObject = stream;
  };

  $("btnSelfie").onclick = takeSelfie;
  $("degRange").oninput = update;
  $("warpRange").oninput = update;
  
  update();
</script>
</body>
</html>
