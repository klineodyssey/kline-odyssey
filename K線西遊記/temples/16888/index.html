<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGEN 16888｜廣寒宮實體終端</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #050608; --panel: rgba(20, 22, 28, 0.9); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* 10MB 資源加載模擬器 */
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bar-container { width: 200px; height: 2px; background: #333; margin-top: 20px; }
        #bar { width: 0%; height: 100%; background: var(--gold); transition: width 0.1s; }

        #stage { width: 100vw; height: 100vh; }
        
        /* HUD 駕駛艙介面 */
        .hud { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content:间; padding: 20px; }
        .top-stats { display: flex; justify-content: space-around; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); padding: 20px; }
        .stat-val { color: var(--gold); font-size: 20px; font-weight: 900; display: block; text-align: center; }
        .stat-lab { font-size: 10px; opacity: 0.6; text-transform: uppercase; }

        .terminal { pointer-events: auto; background: var(--panel); border: 1px solid var(--gold); padding: 20px; border-radius: 8px; align-self: center; width: 90%; max-width: 500px; margin-bottom: 20px; }
        .ctrl-group { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .ctrl-group label { width: 100px; font-size: 12px; color: var(--gold); }
        input[type=range] { flex: 1; accent-color: var(--gold); }
        
        .btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn:active { background: var(--gold); color: #000; }
        
        #log { position: absolute; right: 20px; top: 120px; width: 200px; height: 150px; font-size: 10px; color: var(--cyan); text-align: right; overflow: hidden; }
    </style>
</head>
<body>

<div id="loader">
    <div style="letter-spacing: 8px; font-weight: 900;">KGEN V6.0</div>
    <div class="bar-container"><div id="bar"></div></div>
    <div id="status" style="font-size: 10px; margin-top: 10px; color: var(--gold);">BOOTING...</div>
</div>

<div id="stage"></div>

<div class="hud">
    <div class="top-stats">
        <div><span class="stat-lab">Universe CT</span><span id="v-ct" class="stat-val">0</span></div>
        <div><span class="stat-lab">Tug of War R</span><span id="v-r" class="stat-val">0.00</span></div>
        <div><span class="stat-lab">Wishing Pool</span><span id="v-pool" class="stat-val">0 / 16888</span></div>
    </div>
    
    <div id="log"></div>

    <div class="terminal">
        <div class="ctrl-group">
            <label>Cosmic CT</label>
            <input type="range" id="in-ct" min="-1" max="1" step="1" value="0">
        </div>
        <div class="ctrl-group">
            <label>Long (L)</label>
            <input type="range" id="in-l" min="0" max="10000" value="5000">
        </div>
        <div class="ctrl-group">
            <label>Short (S)</label>
            <input type="range" id="in-s" min="0" max="10000" value="5000">
        </div>
        <button class="btn" onclick="game.vow()">🔥 執行天條結算仪式</button>
    </div>
</div>

<script>
const game = {
    // 1. 初始化 3D 舞台
    init3D() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('stage').appendChild(this.renderer.domElement);

        // 核心載體：仙女靈體面板
        const geometry = new THREE.BoxGeometry(4, 6, 0.1);
        const material = new THREE.MeshPhongMaterial({ color: 0xffd778, emissive: 0x332200, shininess: 100, transparent: true, opacity: 0.9 });
        this.fairy = new THREE.Mesh(geometry, material);
        this.scene.add(this.fairy);

        // 粒子背景
        const pGeo = new THREE.BufferGeometry();
        const pPos = [];
        for(let i=0; i<1000; i++) pPos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pPos, 3));
        this.particles = new THREE.Points(pGeo, new THREE.PointsMaterial({color: 0x00f2ff, size: 0.05}));
        this.scene.add(this.particles);

        const light = new THREE.PointLight(0xffffff, 1.5, 100);
        light.position.set(5, 5, 5);
        this.scene.add(light, new THREE.AmbientLight(0x404040));
        this.camera.position.z = 10;
    },

    // 2. 啟動與循環
    async run() {
        this.init3D();
        this.pool = 0;
        
        // 模擬加載
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');
        const tasks = ["天條 V1.0 加載...", "11520 大腦同步...", "16888 廣寒宮定位...", "4D 渲染就緒..."];
        for(let i=0; i<=100; i+=2) {
            bar.style.width = i + '%';
            if(i%25==0) status.innerText = tasks[i/25];
            await new Promise(r => setTimeout(r, 20));
        }
        document.getElementById('loader').style.display = 'none';

        this.loop();
    },

    loop() {
        const update = () => {
            const L = parseFloat(document.getElementById('in-l').value);
            const S = parseFloat(document.getElementById('in-s').value);
            const CT = parseFloat(document.getElementById('in-ct').value);

            // 天條公式：R = (L-S)/(L+S)
            const R = (L - S) / (L + S + 0.001);
            const D = (0.6 * CT) + (0.4 * R);

            // 更新 UI
            document.getElementById('v-ct').innerText = CT;
            document.getElementById('v-r').innerText = R.toFixed(2);
            document.getElementById('v-pool').innerText = `${Math.floor(this.pool)} / 16888`;

            // 3D 物理連動
            this.fairy.rotation.y = THREE.MathUtils.lerp(this.fairy.rotation.y, R * Math.PI/3, 0.1);
            this.fairy.position.z = THREE.MathUtils.lerp(this.fairy.position.z, D * 5, 0.05);
            this.particles.rotation.y += 0.002;

            this.renderer.render(this.scene, this.camera);
            requestAnimationFrame(update);
        };
        update();
    },

    log(m) {
        const l = document.getElementById('log');
        l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
    },

    vow() {
        this.pool += 1350;
        this.log(`注入願力: +1350 KGEN`);
        if(this.pool >= 16888) {
            this.log("!!! 觸發廣寒宮結算 !!!");
            this.log("分配: 30% 靈霄 / 60% 玩家 / 10% 留池");
            this.pool = 0;
        }
    }
};

window.onload = () => game.run();
</script>
</body>
</html>
