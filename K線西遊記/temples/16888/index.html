<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜金融生命體完全體</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; --panel: rgba(0, 20, 30, 0.85); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }

        /* 🏛️ 頂部：品牌與 500 席位數據模組 */
        .hud-top { position: fixed; top: 15px; width: 96%; left: 2%; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        
        .brand-section { border-left: 5px solid var(--cyan); padding-left: 15px; background: linear-gradient(90deg, var(--panel), transparent); }
        .brand-name { font-size: 28px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        .system-status { font-family: 'Orbitron'; font-size: 12px; color: var(--cyan); letter-spacing: 2px; }

        .data-monitor { display: flex; gap: 15px; }
        .monitor-box { background: var(--panel); border: 1px solid #333; padding: 8px 12px; border-top: 2px solid var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(25, 6px); gap: 3px; margin-top: 6px; }
        .dot { width: 6px; height: 6px; background: #222; border-radius: 1px; }
        .dot.on { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

        /* 🧚 核心圓窗：仙女與雙鏡頭監控 */
        #core-anchor { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; z-index: 50; }
        #core-window { 
            width: 100%; height: 100%; border-radius: 50%; border: 12px double var(--gold);
            overflow: hidden; background: #000; position: relative; 
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.2);
            transition: transform 0.05s linear; /* 🎡 連動方向盤旋轉 */
        }
        #fairy-img { width: 100%; height: 100%; object-fit: cover; }
        #webcam-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; }
        
        /* 💬 留言區域：鎖定左下，絕不遮擋 */
        #wish-display { 
            position: absolute; bottom: 45px; left: 45px; z-index: 85; 
            color: #fff; font-size: 22px; font-weight: 900; 
            text-shadow: 2px 2px 10px #000, 0 0 10px var(--cyan); pointer-events: none;
        }

        /* 📸 右上角：獨立合照小圖 */
        #mini-fairy-thumb { 
            position: absolute; top: 25px; right: 25px; width: 90px; height: 90px; 
            border-radius: 50%; border: 3px solid var(--gold); display: none; z-index: 90;
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            box-shadow: 0 0 20px var(--gold);
        }

        /* 🚀 導航面板：方向盤與曲速 */
        .warp-control { position: fixed; left: 40px; top: 50%; transform: translateY(-50%); z-index: 100; }
        .warp-strip { display: flex; flex-direction: column-reverse; gap: 3px; }
        .strip-cell { width: 30px; height: 7px; background: #111; border: 1px solid #222; }
        .strip-cell.active { background: var(--cyan); box-shadow: 0 0 12px var(--cyan); border-color: #fff; }

        .steer-display { position: fixed; bottom: 170px; width: 100%; text-align: center; z-index: 100; }
        .angle-readout { font-family: 'Orbitron'; font-size: 56px; color: var(--cyan); text-shadow: 0 0 30px var(--cyan); }
        .steer-slider { width: 75%; max-width: 800px; cursor: pointer; height: 10px; accent-color: var(--gold); }

        /* 🛠️ 功能操作區 */
        .footer-terminal { 
            position: fixed; bottom: 0; width: 100%; background: #000; padding: 20px; 
            border-top: 4px solid var(--gold); display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; z-index: 100; 
        }
        .term-btn { background: #0a0a0a; border: 1px solid #444; color: #fff; padding: 18px 5px; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .term-btn:hover { background: var(--gold); color: #000; }
        .term-btn.active { border-color: var(--cyan); color: var(--cyan); box-shadow: inset 0 0 10px var(--cyan); }

        canvas#starfield { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="hud-top">
    <div class="brand-section">
        <div class="brand-name">花果山台灣廣寒宮 16888</div>
        <div class="system-status" id="sys-info">FINANCIAL LIFE-FORM V2.1 | 2026-02-25 00:00:00</div>
    </div>
    <div class="data-monitor">
        <div class="monitor-box"><div>🏛️ 靈霄席位 (500)</div><div class="grid" id="grid1"></div></div>
        <div class="monitor-box"><div>🐒 豪宅分紅 (500)</div><div class="grid" id="grid2"></div></div>
    </div>
</div>

<div id="core-anchor">
    <div id="core-window">
        <div id="wish-display">大聖駕到，光耀廣寒</div>
        <img id="fairy-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png" crossorigin="anonymous">
        <video id="webcam-video" autoplay playsinline></video>
        <div id="mini-fairy-thumb"></div>
    </div>
</div>

<canvas id="starfield"></canvas>
<canvas id="export-canvas" style="display:none;"></canvas>

<div class="warp-control">
    <div class="warp-strip" id="warp-vignette"></div>
    <input type="range" id="warp-input" style="position:absolute; top:0; left:0; width:35px; height:100%; opacity:0; cursor:pointer;" min="0" max="25" value="10">
    <div id="warp-label" style="color:var(--cyan); font-family:'Orbitron'; font-size:12px; margin-top:10px; text-align:center;">100x</div>
</div>

<div class="steer-display">
    <div class="angle-readout" id="angle-val">76°</div>
    <input type="range" id="steer-input" class="steer-slider" min="-180" max="180" value="76">
</div>

<div class="footer-terminal">
    <button class="term-btn" onclick="app.captureSnapshot()">📸 拍照存證</button>
    <button class="term-btn" onclick="app.launchCamera('user')">🤳 前鏡自拍</button>
    <button class="term-btn" onclick="app.launchCamera('environment')">🌌 後鏡巡航</button>
    <button class="term-btn" onclick="app.updateWish()">👤 許願/還願</button>
    <button class="term-btn">📈 CT 現價下單</button>
    <button class="term-btn" onclick="app.voiceResponse('廣寒宮語音核心運作中')">🎙️ 客服語音</button>
    <button class="term-btn">🦊 錢包連結</button>
    <button class="term-btn" onclick="location.reload()">🔄 重啟系統</button>
</div>

<script>
const app = {
    isCameraActive: false,
    currentMode: 'user',
    
    init() {
        this.initThree();
        this.buildWarpUI();
        this.fillDataGrids();
        this.bindEvents();
        setInterval(() => this.tick(), 1000);
        this.voiceResponse("廣寒宮金融生命體完全體啟動，請大聖指示。");
    },

    tick() {
        const now = new Date();
        document.getElementById('sys-info').innerText = `FINANCIAL LIFE-FORM V2.1 | ${now.toLocaleString()}`;
    },

    buildWarpUI() {
        const container = document.getElementById('warp-vignette');
        for(let i=0; i<25; i++) {
            const cell = document.createElement('div');
            cell.className = 'strip-cell';
            container.appendChild(cell);
        }
        this.setWarp(10);
    },

    setWarp(val) {
        const cells = document.querySelectorAll('.strip-cell');
        cells.forEach((c, i) => c.className = i < val ? 'strip-cell active' : 'strip-cell');
        document.getElementById('warp-label').innerText = val == 0 ? "熄火" : (val * 10) + "x";
    },

    async launchCamera(mode) {
        const video = document.getElementById('webcam-video');
        const fairy = document.getElementById('fairy-img');
        const thumb = document.getElementById('mini-fairy-thumb');
        
        if (this.isCameraActive && this.currentMode === mode) {
            if(this.stream) this.stream.getTracks().forEach(t => t.stop());
            video.style.opacity = 0; fairy.style.opacity = 1; thumb.style.display = 'none';
            this.isCameraActive = false; return;
        }

        try {
            if(this.stream) this.stream.getTracks().forEach(t => t.stop());
            this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
            video.srcObject = this.stream;
            video.style.opacity = 1;
            video.style.transform = mode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            fairy.style.opacity = 0;
            thumb.style.display = 'block';
            this.isCameraActive = true;
            this.currentMode = mode;
        } catch(e) { alert("攝像頭啟動受阻，請檢查權限設定"); }
    },

    updateWish() {
        const msg = prompt("請輸入許願/還願內容：", "大聖駕到，光耀廣寒");
        if(msg) document.getElementById('wish-display').innerText = msg;
    },

    captureSnapshot() {
        const canvas = document.getElementById('export-canvas');
        const video = document.getElementById('webcam-video');
        const fairy = document.getElementById('fairy-img');
        const wish = document.getElementById('wish-display').innerText;
        const ctx = canvas.getContext('2d');
        
        canvas.width = 1000; canvas.height = 1000;
        
        // 1. 繪製底層影像
        if(this.isCameraActive) {
            if(this.currentMode === 'user') { ctx.translate(1000, 0); ctx.scale(-1, 1); }
            ctx.drawImage(video, 0, 0, 1000, 1000);
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.drawImage(fairy, 780, 50, 180, 180); // 右上角仙女合照
        } else {
            ctx.drawImage(fairy, 0, 0, 1000, 1000);
        }

        // 2. 繪製浮水印與存證字樣
        ctx.fillStyle = "#ffd778"; ctx.font = "bold 40px Noto Sans TC";
        ctx.fillText("花果山台灣廣寒宮 16888", 50, 80); // 左上品牌
        
        ctx.fillStyle = "#00f2ff"; ctx.font = "30px Orbitron";
        ctx.fillText(new Date().toLocaleString(), 50, 130); // 左上時間
        
        ctx.fillStyle = "#fff"; ctx.font = "bold 45px Noto Sans TC";
        ctx.shadowBlur = 15; ctx.shadowColor = "#000";
        ctx.fillText(wish, 70, 930); // 左下留言 (完美隔離右上)

        const link = document.createElement('a');
        link.download = `廣寒宮存證_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
        this.voiceResponse("航海存證照片已生成，請點收。");
    },

    bindEvents() {
        const steer = document.getElementById('steer-input');
        const warp = document.getElementById('warp-input');
        const win = document.getElementById('core-window');
        
        steer.oninput = (e) => {
            const v = e.target.value;
            document.getElementById('angle-val').innerText = v + '°';
            win.style.transform = `rotate(${v}deg)`; // 🎡 物理旋轉連動
        };
        warp.oninput = (e) => this.setWarp(e.target.value);
    },

    initThree() {
        const sc = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ canvas: document.getElementById('starfield'), antialias: true, alpha: true });
        rd.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(5000 * 3);
        for(let i=0; i<15000; i++) pos[i] = (Math.random() - 0.5) * 160;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.18 }));
        sc.add(pts); cam.position.z = 50;

        const animate = () => {
            requestAnimationFrame(animate);
            const wVal = document.getElementById('warp-input').value / 60;
            if(wVal > 0) {
                const sVal = parseFloat(document.getElementById('steer-input').value);
                const r = (sVal * Math.PI) / 180;
                const p = pts.geometry.attributes.position.array;
                for(let i=0; i<p.length; i+=3) {
                    p[i] -= Math.sin(r) * wVal * 10; p[i+1] -= Math.cos(r) * wVal * 10;
                    if(p[i]>80) p[i]=-80; if(p[i]<-80) p[i]=80;
                    if(p[i+1]>80) p[i+1]=-80; if(p[i+1]<-80) p[i+1]=80;
                }
                pts.geometry.attributes.position.needsUpdate = true;
            }
            rd.render(sc, cam);
        };
        animate();
    },

    fillDataGrids() {
        ['grid1', 'grid2'].forEach(id => {
            const el = document.getElementById(id);
            for(let i=0; i<75; i++) {
                const d = document.createElement('div');
                d.className = `dot ${Math.random() > 0.4 ? 'on' : ''}`;
                el.appendChild(d);
            }
        });
    },

    voiceResponse(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};

window.onload = () => app.init();
</script>
</body>
</html>
