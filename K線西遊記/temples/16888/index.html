<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜座標系對齊版 V2.2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 頂部能量艙 */
        .hud-top { position: fixed; top: 10px; width: 100%; z-index: 1000; padding: 0 15px; box-sizing: border-box; }
        .bar-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 4px 0 10px; overflow: hidden; }
        #warp-bar { width: 10%; height: 100%; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); }
        #mass-bar { width: 100%; height: 100%; background: var(--gold); }

        /* 中央仙女圖 (座標同步：右移順轉) */
        #fairy-vessel {
            position: fixed; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 380px; height: 380px;
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            opacity: 0.7; border-radius: 50%; z-index: 2; border: 4px solid var(--gold);
            box-shadow: 0 0 50px rgba(255, 215, 120, 0.4);
            /* 旋轉邏輯：向右(正)則順時針(正) */
        }

        #bridge { position: fixed; top: 22%; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #price { font-family: 'Orbitron'; font-size: 52px; text-shadow: 0 0 20px var(--cyan); }
        #ai-status { background: rgba(0,0,0,0.85); padding: 5px 20px; border: 1px solid var(--cyan); border-radius: 20px; color: var(--cyan); font-size: 13px; display: inline-block; border: 1px solid var(--cyan); }

        /* 操作介面佈局 */
        .ufo-controls { position: fixed; bottom: 125px; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; align-items: flex-end; }
        .stick-label { font-size: 10px; color: var(--gold); margin-bottom: 5px; font-weight: bold; }
        input[type=range].v-warp { width: 180px; transform: rotate(-90deg); margin-top: 80px; accent-color: var(--cyan); }
        input[type=range].h-steer { width: 250px; accent-color: var(--gold); }

        .console { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); z-index: 1000; padding: 15px 5px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .btn { padding: 12px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 10px; font-weight: 900; }

        #three-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        #cam-feed { position: fixed; inset: 0; z-index: 1; opacity: 0.35; object-fit: cover; }
    </style>
</head>
<body>

<div id="fairy-vessel"></div>
<video id="cam-feed" autoplay playsinline></video>
<div id="three-canvas"></div>

<div class="hud-top">
    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--cyan);"><span>WARP ENERGY (1-150x)</span><span id="warp-txt">1x</span></div>
    <div class="bar-wrap"><div id="warp-bar"></div></div>
    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--gold);"><span>KGEN MASS OUTPUT</span><span id="mass-txt">90 KGEN</span></div>
    <div class="bar-wrap"><div id="mass-bar"></div></div>
</div>

<div id="bridge">
    <div id="ai-status">座標分析：X-Axis 導航模式</div>
    <div id="price">16888.88</div>
    <div id="nav-data" style="color:var(--gold); font-family:'Orbitron'; font-size:11px; margin-top:5px;">X-POS: 0 | THRUST: 0</div>
</div>

<div class="ufo-controls">
    <div style="text-align:center;">
        <div class="stick-label" style="color:var(--cyan);">曲速引擎</div>
        <input type="range" id="warp" class="v-warp" min="1" max="150" value="1">
    </div>
    <div style="text-align:center;">
        <div class="stick-label">飛碟方向盤 (X 座標)</div>
        <div style="display:flex; justify-content:space-between; width:250px; font-size:9px; color:var(--gold);">
            <span>左 (-180)</span><span>中 (0)</span><span>右 (180)</span>
        </div>
        <input type="range" id="steer" class="h-steer" min="-180" max="180" value="0">
    </div>
</div>

<div class="console">
    <div class="grid">
        <button class="btn" onclick="app.analyze()">🔍 地址智能診斷</button>
        <button class="btn" onclick="app.trade('CT')">📈 CT 下單</button>
        <button class="btn" onclick="app.trade('CLOSE')">📉 結算</button>
        <button class="btn" onclick="app.setWish()">🙏 許願留言</button>
        <button class="btn" onclick="app.capture()">📷 拍照下載</button>
        <button class="btn" onclick="app.toggleCam()">📸 影像監控</button>
        <button class="btn" onclick="app.connect()">🦊 銀行連結</button>
        <button class="btn" onclick="app.speak('座標系對齊完畢，航線順時針同步已開啟')">🎙️ 客服語音</button>
    </div>
</div>

<script>
const app = {
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-canvas').appendChild(this.renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 1500; i++) pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15 }));
        this.scene.add(this.stars);

        this.camera.position.z = 15;
        this.animate();
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const warp = parseInt(document.getElementById('warp').value);
        const steer = parseInt(document.getElementById('steer').value);

        // 1. 物理效率：cos(0)=1(多), cos(180)=-1(空)
        const rad = (steer * Math.PI) / 180;
        const efficiency = Math.cos(rad);
        const currentKgen = (90 * efficiency).toFixed(2);

        // 2. 座標與旋轉同步邏輯 (對齊用戶定義)
        // 右移(steer為正) -> 順時針轉(正)
        // 左移(steer為負) -> 逆時針轉(負)
        document.getElementById('fairy-vessel').style.transform = `translate(-50%, -50%) rotate(${steer}deg)`;

        // 3. UI 能量顯示
        document.getElementById('warp-txt').innerText = `${warp}x`;
        document.getElementById('warp-bar').style.width = (warp / 150 * 100) + "%";
        document.getElementById('mass-txt').innerText = `${currentKgen} KGEN`;
        document.getElementById('mass-bar').style.width = Math.abs(efficiency * 100) + "%";
        document.getElementById('mass-bar').style.background = currentKgen >= 0 ? "var(--cyan)" : "var(--red)";

        // 4. 粒子向量 (順時針同步導航)
        const speed = (warp / 500) * Math.abs(efficiency);
        const p = this.stars.geometry.attributes.position.array;
        for(let i=0; i<p.length; i+=3) {
            // 順時針同步：X座標隨steer正負偏向
            p[i] += Math.sin(rad) * speed; 
            p[i+1] -= Math.cos(rad) * speed * (currentKgen >= 0 ? 1 : -1);
            
            if(p[i] > 25) p[i] = -25; if(p[i] < -25) p[i] = 25;
            if(p[i+1] > 25) p[i+1] = -25; if(p[i+1] < -25) p[i+1] = 25;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        
        document.getElementById('nav-data').innerText = `X-POS: ${steer} | THRUST: ${(warp * currentKgen).toFixed(0)}`;
        this.renderer.render(this.scene, this.camera);
    },

    analyze() {
        const addr = prompt("請輸入分析地址：");
        if(!addr) return;
        
        let report = "";
        // 增強型自動判斷邏輯
        if(addr.toLowerCase().includes("kgen") || addr.length > 45) {
            report = "【神明/金庫合約】具備自動分紅接口";
        } else if (addr.startsWith("0x") && addr.length === 42) {
            // 標準錢包檢測
            report = "【一般百姓錢包】標準存貸模式";
        } else if (addr.length < 30) {
            report = "【仙女地址】30% 盈餘回流邏輯";
        } else {
            report = "未知物理地址，請重新輸入";
        }
        
        document.getElementById('ai-status').innerText = report;
        this.speak(report);
    },

    trade(t) { this.speak(t==='CT' ? "座標鎖定，推力全開" : "回收質量，結算離場"); },
    setWish() { 
        const w = prompt("輸入許願："); 
        if(w) document.getElementById('ai-status').innerText = `【願】：${w}`;
    },
    async toggleCam() {
        const v = document.getElementById('cam-feed');
        if(v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        else { const s = await navigator.mediaDevices.getUserMedia({video: true}); v.srcObject = s; }
    },
    capture() {
        const out = document.createElement('canvas'); out.width = 1080; out.height = 1920;
        const ctx = out.getContext('2d');
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,1080,1920);
        if(document.getElementById('cam-feed').srcObject) ctx.drawImage(document.getElementById('cam-feed'), 0,0,1080,1920);
        ctx.drawImage(this.renderer.domElement, 0,0,1080,1920);
        ctx.fillStyle = "#ffd778"; ctx.font = "bold 60px Noto Sans TC";
        ctx.fillText("16888 廣寒宮 座標紀錄", 50, 150);
        ctx.font = "38px Noto Sans TC";
        ctx.fillText(document.getElementById('ai-status').innerText, 50, 1850);
        const link = document.createElement('a');
        link.download = "UFO_COORDINATE_V220.png"; link.href = out.toDataURL(); link.click();
    },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
