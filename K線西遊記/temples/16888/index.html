<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜靈霄寶殿 × 火星豪宅實時成交終端</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; --dna: #ff00ff; --rna: #00ffaa; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100%; }

        /* 📊 K 線報價區 */
        .chart-panel { position: fixed; top: 120px; right: 15px; width: 320px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 10px; padding: 10px; z-index: 1000; }
        .price-row { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 20px; color: var(--cyan); }
        .k-line-container { height: 120px; display: flex; align-items: flex-end; gap: 3px; margin-top: 10px; border-bottom: 1px solid #444; }
        .k-bar { flex: 1; background: var(--red); min-height: 5px; transition: 0.3s; }
        .k-bar.up { background: var(--rna); }

        /* 🐒 雙席位監控 (500/500) */
        .seat-panel { position: fixed; top: 10px; left: 15px; width: 340px; z-index: 1000; }
        .seat-card { background: rgba(0,0,0,0.8); border-left: 4px solid var(--gold); padding: 8px; margin-bottom: 5px; }
        .seat-title { font-size: 11px; color: var(--gold); display: flex; justify-content: space-between; }
        .seat-grid { display: grid; grid-template-columns: repeat(20, 1fr); gap: 2px; margin-top: 5px; }
        .dot { width: 5px; height: 5px; background: #333; border-radius: 1px; }
        .dot.active { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }

        /* 🧬 DNA/RNA 成交窗口 */
        .trade-panel { position: fixed; bottom: 150px; left: 15px; width: 340px; background: rgba(0,0,0,0.9); border: 2px solid var(--dna); padding: 15px; border-radius: 12px; z-index: 1000; }
        .log-box { height: 80px; background: #111; font-size: 10px; color: #aaa; overflow-y: auto; padding: 5px; margin-top: 10px; font-family: 'Courier New'; }

        /* 漩渦物理軌道 */
        #ufo-core { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 380px; height: 380px; background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover; border-radius: 50%; border: 5px solid var(--gold); z-index: 2; }
        #canvas-3d { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 3px solid var(--gold); z-index: 1010; padding: 10px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .nav-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 0; font-size: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="ufo-core"></div>
<div id="canvas-3d"></div>

<div class="seat-panel">
    <div class="seat-card">
        <div class="seat-title">🏛️ 靈霄神明席位 <span>500 / 500</span></div>
        <div class="seat-grid" id="god-seats"></div>
    </div>
    <div class="seat-card" style="border-color: var(--cyan);">
        <div class="seat-title" style="color:var(--cyan);">🐒 火星齊天豪宅 <span>500 / 500</span></div>
        <div class="seat-grid" id="mars-seats"></div>
    </div>
</div>

<div class="chart-panel">
    <div class="price-row">
        <span>KGEN/USDT</span>
        <span id="price">1.6888</span>
    </div>
    <div class="k-line-container" id="k-line"></div>
    <div style="font-size:10px; color:var(--gold); margin-top:5px;">30% 殿 | 10% 池 | 60% 雙核自動分配執行中...</div>
</div>

<div class="trade-panel">
    <div style="text-align:center; color:var(--gold); font-size:14px; font-weight:bold;">🧬 仙女獎池: <span id="pool">16888</span></div>
    <div class="log-box" id="trade-log">>> 系統初始化...<br>>> 連結靈霄寶殿合約...</div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
        <button class="nav-btn" style="background:var(--dna); color:white; border:none;" onclick="app.trade('DNA')">DNA 求婚成交</button>
        <button class="nav-btn" style="background:var(--rna); color:black; border:none;" onclick="app.trade('RNA')">RNA 應婚成交</button>
    </div>
</div>

<div class="footer">
    <button class="nav-btn" onclick="app.callWallet()">🦊 呼叫錢包</button>
    <button class="nav-btn" onclick="app.toggleAuto()">🔄 自動交易</button>
    <button class="nav-btn" onclick="app.speak('分紅已入帳')">🎙️ 客服語音</button>
    <button class="nav-btn" style="background:var(--red); color:white; border:none;" onclick="app.stopSpeech()">🔇 停止</button>
    <button class="nav-btn" onclick="app.capture()">📷 截圖</button>
</div>

<script>
const app = {
    price: 1.6888,
    pool: 16888,
    kData: Array(25).fill(20),
    init() {
        this.initThree();
        this.renderSeats('god-seats');
        this.renderSeats('mars-seats');
        this.startKLine();
        this.speak("大聖，K線報價已對接，500席位分紅自動判定啟動。");
    },

    renderSeats(id) {
        const el = document.getElementById(id);
        for(let i=0; i<100; i++) { // 簡化顯示 100 個代表 500 席
            const d = document.createElement('div');
            d.className = 'dot ' + (Math.random() > 0.2 ? 'active' : '');
            el.appendChild(d);
        }
    },

    startKLine() {
        setInterval(() => {
            const change = (Math.random() - 0.48) * 0.1;
            this.price += change;
            document.getElementById('price').innerText = this.price.toFixed(4);
            this.kData.shift();
            this.kData.push(Math.max(10, Math.min(100, this.kData[this.kData.length-1] + change * 100)));
            this.drawK();
        }, 1000);
    },

    drawK() {
        const container = document.getElementById('k-line');
        container.innerHTML = '';
        this.kData.forEach((h, i) => {
            const b = document.createElement('div');
            b.className = 'k-bar' + (h > this.kData[i-1] ? ' up' : '');
            b.style.height = h + 'px';
            container.appendChild(b);
        });
    },

    trade(type) {
        this.pool += 1;
        const log = document.getElementById('trade-log');
        log.innerHTML += `<br>[成交] ${type} 地址表態，1 KGEN 已轉帳，30% 分紅鎖定...`;
        log.scrollTop = log.scrollHeight;
        document.getElementById('pool').innerText = Math.floor(this.pool);
    },

    initThree() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-3d').appendChild(this.renderer.domElement);
        
        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 2000; i++) pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.12 }));
        this.scene.add(this.stars);
        this.camera.position.z = 15;
        this.animate();
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        // 軌道物理校準：0度 = 由上往下 (注入)
        const p = this.stars.geometry.attributes.position.array;
        for(let i=0; i<p.length; i+=3) {
            p[i+1] -= 0.1; // 預設由上往下流動
            if(p[i+1] < -25) p[i+1] = 25;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
    },

    callWallet() { if(window.ethereum) window.ethereum.request({method:'eth_requestAccounts'}); else alert("未偵測到錢包"); },
    stopSpeech() { window.speechSynthesis.cancel(); },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
