<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜錄像黑盒子生命體</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; --energy: #ffcc00; --red: #ff4444; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }

        /* 🏛️ 頂部：500 席位監控 (肌肉組織) */
        .hud-top { position: fixed; top: 15px; width: 96%; left: 2%; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .brand-section { border-left: 5px solid var(--gold); padding-left: 15px; background: rgba(0,0,0,0.6); }
        .brand-name { font-size: 26px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        
        .monitor-data { display: flex; gap: 15px; }
        .data-box { background: rgba(20,20,0,0.8); border: 1px solid #332200; padding: 8px; border-top: 2px solid var(--gold); }
        .grid-500 { display: grid; grid-template-columns: repeat(20, 6px); gap: 3px; }
        .dot { width: 6px; height: 6px; background: #1a1a00; }
        .dot.on { background: var(--energy); box-shadow: 0 0 8px var(--energy); }

        /* 🚀 左側：曲速引擎 (手把向上，下方填充黃色階圖) */
        .warp-engine { position: fixed; left: 40px; top: 50%; transform: translateY(-50%); z-index: 150; width: 100px; text-align: center; }
        .warp-rail { height: 420px; width: 28px; background: #111; border: 3px solid var(--energy); position: relative; margin: 0 auto; border-radius: 6px; overflow: hidden; }
        #energy-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #ff6600, var(--energy), #fff); transition: height 0.1s; z-index: 5; }
        .rail-step { position: absolute; width: 100%; height: 2px; background: rgba(0,0,0,0.4); z-index: 10; }
        #warp-thumb { width: 66px; height: 32px; background: #fff; position: absolute; left: -19px; bottom: 33%; cursor: pointer; border-radius: 4px; box-shadow: 0 0 25px #fff; border: 3px solid var(--cyan); z-index: 30; }
        .warp-range { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-appearance: slider-vertical; opacity: 0; cursor: pointer; z-index: 40; }

        /* 📹 錄影狀態指示燈 */
        #rec-dot { width: 12px; height: 12px; background: var(--red); border-radius: 50%; display: none; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* 🧚 核心圓窗 (物理連動) */
        #core-anchor { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; z-index: 50; }
        #core-window { width: 100%; height: 100%; border-radius: 50%; border: 12px double var(--gold); overflow: hidden; background: #000; position: relative; transition: transform 0.05s linear; }
        #fairy-img { width: 100%; height: 100%; object-fit: cover; }
        #cam-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; }
        #rec-timer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-family: 'Orbitron'; color: var(--red); font-size: 18px; z-index: 120; display: none; }

        /* 🎡 方向盤與底部按鈕 */
        .steer-zone { position: fixed; bottom: 200px; width: 100%; text-align: center; z-index: 100; }
        .footer-terminal { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 4px solid var(--gold); display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 100; }
        .term-btn { background: #0a0a0a; border: 1px solid #444; color: #fff; padding: 18px 2px; font-weight: 900; cursor: pointer; font-size: 13px; }
        .btn-rec { border-color: var(--red); color: var(--red); box-shadow: inset 0 0 10px rgba(255,0,0,0.2); }
        .btn-kgen { border-color: var(--energy); color: var(--energy); }

        canvas#galaxy-bg { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="hud-top">
    <div class="brand-section">
        <div class="brand-name">KGEN 16888 錄像版</div>
        <div style="display:flex; align-items:center;">
            <div id="rec-dot"></div>
            <div id="sys-clock" style="font-family:'Orbitron'; font-size:12px; color:var(--cyan);">SYSTEM ONLINE</div>
        </div>
    </div>
    <div class="monitor-data">
        <div class="data-box"><div class="grid-500" id="g1"></div></div>
    </div>
</div>

<div class="warp-engine">
    <div class="warp-rail" id="warp-rail-body">
        <div id="energy-fill"></div>
        <div id="warp-thumb"></div>
        <input type="range" id="warp-slider" class="warp-range" min="0" max="100" value="33">
    </div>
    <div style="margin-top:20px; color:var(--energy); font-family:'Orbitron'; font-size:16px;" id="warp-txt">100x</div>
</div>

<div id="core-anchor">
    <div id="rec-timer">00:00</div>
    <div id="core-window">
        <div id="wish-label" style="position:absolute; bottom:50px; left:50px; z-index:85; color:#fff; font-weight:900; font-size:22px; text-shadow:0 0 10px #000;">大聖駕到，光耀廣寒</div>
        <img id="fairy-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png" crossorigin="anonymous">
        <video id="cam-view" autoplay playsinline></video>
    </div>
</div>

<canvas id="galaxy-bg"></canvas>
<canvas id="export-canvas" style="display:none;"></canvas>

<div class="steer-zone">
    <div id="ang-txt" style="font-family:'Orbitron'; font-size:48px; color:var(--cyan);">76°</div>
    <input type="range" id="steer-slider" style="width:70%; accent-color:var(--gold);" min="-180" max="180" value="76">
</div>

<div class="footer-terminal">
    <button class="term-btn" onclick="app.capture()">📸 拍照存證</button>
    <button id="rec-btn" class="term-btn btn-rec" onclick="app.toggleRec()">🔴 啟動錄影</button>
    <button class="term-btn btn-kgen" onclick="app.boost()">💎 KGEN 沖等</button>
    <button class="term-btn btn-kgen" onclick="app.autoHunt()">⚔️ 巡航打怪</button>
    <button class="term-btn" onclick="app.cam('user')">🤳 切換鏡頭</button>
</div>

<script>
const app = {
    isCam: false, camMode: 'user', ga: 600, recorder: null, chunks: [], recSec: 0,
    init() {
        this.initThree(); this.buildUI(); this.bind();
        setInterval(() => {
            document.getElementById('sys-clock').innerText = new Date().toLocaleString();
            document.querySelectorAll('.dot').forEach(d => { if(Math.random()>0.9) d.classList.toggle('on'); });
        }, 1000);
        this.updateWarp(33);
        this.speak("錄像器官已掛載，KGEN 黑盒子系統就緒。");
    },
    buildUI() {
        const g1 = document.getElementById('g1');
        for(let i=0; i<100; i++) {
            const d = document.createElement('div');
            d.className = 'dot' + (Math.random()>0.5?' on':'');
            g1.appendChild(d);
        }
        const rail = document.getElementById('warp-rail-body');
        for(let i=0; i<22; i++) {
            const step = document.createElement('div');
            step.className = 'rail-step';
            step.style.bottom = (i * 4.5) + '%';
            rail.appendChild(step);
        }
    },
    updateWarp(val) {
        document.getElementById('energy-fill').style.height = val + '%';
        document.getElementById('warp-thumb').style.bottom = `calc(${val}% - 16px)`;
        document.getElementById('warp-txt').innerText = `WARP ${val*3}x`;
    },
    async toggleRec() {
        if (this.recorder && this.recorder.state === "recording") {
            this.recorder.stop();
            this.stopTimer();
            document.getElementById('rec-btn').innerText = "🔴 啟動錄影";
            document.getElementById('rec-dot').style.display = "none";
            document.getElementById('rec-timer').style.display = "none";
            this.speak("錄影結束，黑盒子數據已封裝。");
        } else {
            const stream = document.getElementById('export-canvas').captureStream(30);
            this.recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            this.chunks = [];
            this.recorder.ondataavailable = e => this.chunks.push(e.data);
            this.recorder.onstop = () => {
                const blob = new Blob(this.chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'KGEN_GA_LOG.webm'; a.click();
            };
            this.startTimer();
            this.recorder.start();
            document.getElementById('rec-btn').innerText = "⏹️ 停止錄影";
            document.getElementById('rec-dot').style.display = "block";
            document.getElementById('rec-timer').style.display = "block";
            this.speak("黑盒子錄影開始，記錄演化數據。");
        }
    },
    startTimer() {
        this.recSec = 0;
        this.tInt = setInterval(() => {
            this.recSec++;
            const m = Math.floor(this.recSec / 60).toString().padStart(2, '0');
            const s = (this.recSec % 60).toString().padStart(2, '0');
            document.getElementById('rec-timer').innerText = `${m}:${s}`;
            this.syncCanvas(); // 持續繪製到畫布供錄影
        }, 33);
    },
    stopTimer() { clearInterval(this.tInt); },
    syncCanvas() {
        const cvs = document.getElementById('export-canvas'), ctx = cvs.getContext('2d');
        cvs.width = 720; cvs.height = 720;
        const v = document.getElementById('cam-view'), f = document.getElementById('fairy-img');
        ctx.save();
        if(this.isCam) {
            ctx.drawImage(v, 0, 0, 720, 720);
        } else ctx.drawImage(f, 0, 0, 720, 720);
        ctx.restore();
        // 疊加 HUD 訊息
        ctx.fillStyle = "#ffd778"; ctx.font = "bold 30px Noto Sans TC";
        ctx.fillText("KGEN 16888 GA-BLACKBOX", 30, 50);
        ctx.fillStyle = "#ff4444"; ctx.fillText(`REC ${document.getElementById('rec-timer').innerText}`, 30, 90);
    },
    boost() { this.ga += 50; this.speak(`進化至 GA ${this.ga}`); },
    autoHunt() { 
        this.speak("自動打怪中"); 
        document.getElementById('wish-label').innerText = "⚔️ 打怪錄影中...";
        setTimeout(()=> document.getElementById('wish-label').innerText = "大聖駕到，光耀廣寒", 2000);
    },
    async cam(mode) {
        const v = document.getElementById('cam-view'), f = document.getElementById('fairy-img');
        if (this.isCam) {
            this.stream.getTracks().forEach(t => t.stop());
            v.style.opacity = 0; f.style.opacity = 1; this.isCam = false;
        } else {
            this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            v.srcObject = this.stream; v.style.opacity = 1; f.style.opacity = 0; this.isCam = true;
        }
    },
    capture() { this.syncCanvas(); const link = document.createElement('a'); link.download = 'KGEN_SNAP.png'; link.href = document.getElementById('export-canvas').toDataURL(); link.click(); },
    bind() {
        document.getElementById('steer-slider').oninput = (e) => {
            const v = e.target.value;
            document.getElementById('ang-txt').innerText = v + '°';
            document.getElementById('core-window').style.transform = `rotate(${v}deg)`;
        };
        document.getElementById('warp-slider').oninput = (e) => this.updateWarp(e.target.value);
    },
    initThree() {
        const sc = new THREE.Scene(), cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy-bg'), antialias: true, alpha: true });
        rd.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry(), pos = new Float32Array(3000 * 3);
        for(let i=0; i<9000; i++) pos[i] = (Math.random() - 0.5) * 160;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15 }));
        sc.add(pts); cam.position.z = 50;
        const anim = () => {
            requestAnimationFrame(anim);
            const w = document.getElementById('warp-slider').value / 40;
            if(w > 0) {
                const r = (parseFloat(document.getElementById('steer-slider').value) * Math.PI) / 180;
                const p = pts.geometry.attributes.position.array;
                for(let i=0; i<p.length; i+=3) {
                    p[i] -= Math.sin(r) * w; p[i+1] -= Math.cos(r) * w;
                    if(p[i]>80) p[i]=-80; if(p[i]<-80) p[i]=80;
                    if(p[i+1]>80) p[i+1]=-80; if(p[i+1]<-80) p[i+1]=80;
                }
                pts.geometry.attributes.position.needsUpdate = true;
            }
            rd.render(sc, cam);
        };
        anim();
    },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
