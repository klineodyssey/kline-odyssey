<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜廣寒宮超光速終端</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; --warp-glow: #00f2ff; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }

        /* 🏛️ 500 席位監控 */
        .hud-header { position: fixed; top: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 100; }
        .seat-box { border: 1px solid rgba(255,215,120,0.3); padding: 10px; background: rgba(0,0,0,0.6); border-radius: 5px; }
        .grid { display: grid; grid-template-columns: repeat(25, 5px); gap: 2px; }
        .dot { width: 5px; height: 5px; background: #222; }
        .dot.on { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }

        /* 🧚 仙女監控核心 */
        #fairy-window {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; height: 350px; border-radius: 50%; border: 8px double var(--gold);
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            box-shadow: 0 0 50px rgba(255,215,120,0.5); z-index: 10;
        }

        /* 🚀 曲速引擎：垂直能量柱 (復刻設計) */
        .warp-container { position: fixed; left: 50px; top: 50%; transform: translateY(-50%); z-index: 100; text-align: center; }
        .warp-bar-wrapper { width: 40px; height: 300px; background: #111; border: 2px solid var(--cyan); position: relative; border-radius: 5px; }
        #warp-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #004444, var(--cyan)); transition: 0.1s; box-shadow: 0 0 20px var(--cyan); }
        .v-slider { -webkit-appearance: slider-vertical; width: 40px; height: 300px; position: absolute; top: 0; left: 0; opacity: 0; cursor: pointer; }

        /* 🎡 飛碟方向盤：76° 雙軌控制器 */
        .steering-panel { position: fixed; bottom: 150px; width: 100%; text-align: center; z-index: 100; }
        .angle-display { font-family: 'Orbitron'; font-size: 42px; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }
        .steer-track { width: 80%; max-width: 600px; -webkit-appearance: none; height: 4px; background: var(--gold); margin: 20px auto; position: relative; }
        .steer-track::-webkit-slider-thumb { -webkit-appearance: none; width: 50px; height: 25px; background: #fff; border: 3px solid var(--gold); border-radius: 5px; cursor: pointer; box-shadow: 0 0 15px var(--gold); }

        /* 🛠️ 六大按鈕 */
        .footer { position: fixed; bottom: 0; width: 100%; background: #000; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; border-top: 2px solid var(--gold); z-index: 100; }
        .btn { background: #111; border: 1px solid #444; color: #fff; padding: 15px; font-weight: 900; cursor: pointer; border-radius: 5px; }
        .btn:hover { border-color: var(--gold); }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

<div id="fairy-window"></div>

<div class="hud-header">
    <div class="seat-box"><div>神明席位 500</div><div class="grid" id="g1"></div></div>
    <div class="seat-box"><div>豪宅分紅 500</div><div class="grid" id="g2"></div></div>
</div>

<div class="warp-container">
    <div style="font-family:'Orbitron'; color:var(--cyan); margin-bottom:10px;">WARP</div>
    <div class="warp-bar-wrapper"><div id="warp-fill" style="height: 10%;"></div><input type="range" id="warp-ctrl" class="v-slider" min="1" max="1000" value="100"></div>
    <div id="warp-val" style="margin-top:10px; font-family:'Orbitron';">100x</div>
</div>

<div class="steering-panel">
    <div class="angle-display" id="angle-val">76°</div>
    <div style="font-size:12px; color:var(--gold); letter-spacing:5px;">飛碟方向盤 (K航道)</div>
    <input type="range" id="steer-ctrl" class="steer-track" min="-180" max="180" value="76">
</div>

<div class="footer">
    <button class="btn">📈 CT 現價下單</button><button class="btn">📉 結算平倉</button><button class="btn">👤 許願留言</button>
    <button class="btn">📸 影像監控</button><button class="btn">🦊 錢包連結</button><button class="btn">🎙️ 客服語音</button>
</div>

<script>
const app = {
    init() {
        this.initThree();
        this.fillGrid('g1'); this.fillGrid('g2');
        this.handleControls();
        window.speechSynthesis.speak(new SpeechSynthesisUtterance("廣寒宮終端就位，星球流向同步成功"));
    },
    fillGrid(id) {
        const g = document.getElementById(id);
        for(let i=0; i<125; i++) {
            const d = document.createElement('div');
            d.className = `dot ${Math.random() > 0.4 ? 'on' : ''}`;
            g.appendChild(d);
        }
    },
    handleControls() {
        const s = document.getElementById('steer-ctrl');
        const w = document.getElementById('warp-ctrl');
        const f = document.getElementById('warp-fill');
        
        s.oninput = () => {
            document.getElementById('angle-val').innerText = s.value + '°';
            document.getElementById('fairy-window').style.transform = `translate(-50%, -50%) rotate(${s.value}deg)`;
        };
        w.oninput = () => {
            f.style.height = (w.value / 10) + '%';
            document.getElementById('warp-val').innerText = w.value + 'x';
        };
    },
    initThree() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(this.renderer.domElement);

        // ✨ 星球顆粒流向系統 (核心重寫)
        const geo = new THREE.BufferGeometry();
        const count = 5000;
        const pos = new Float32Array(count * 3);
        for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 100;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        
        const mat = new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15, transparent: true, opacity: 0.8 });
        this.stars = new THREE.Points(geo, mat);
        this.scene.add(this.stars);
        this.camera.position.z = 40;
        this.animate();
    },
    animate() {
        requestAnimationFrame(() => this.animate());
        
        const warp = document.getElementById('warp-ctrl').value / 200;
        const angle = (document.getElementById('steer-ctrl').value * Math.PI) / 180;
        
        // 🌌 星球流向隨方向盤角度偏移 (真正物理連動)
        const positions = this.stars.geometry.attributes.position.array;
        for(let i = 0; i < positions.length; i += 3) {
            // 根據方向盤角度計算流向向量
            positions[i] += Math.sin(angle) * warp;   // X 軸偏移
            positions[i+1] -= Math.cos(angle) * warp; // Y 軸偏移
            
            // 邊界再生循環
            if (positions[i] > 50) positions[i] = -50;
            if (positions[i] < -50) positions[i] = 50;
            if (positions[i+1] > 50) positions[i+1] = -50;
            if (positions[i+1] < -50) positions[i+1] = 50;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
    }
};
window.onload = () => app.init();
</script>
</body>
</html>
