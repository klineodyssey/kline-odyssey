<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜齊天火星豪宅終極終端 V4.0.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; 
            --dna: #ff00ff; --rna: #00ffaa; --bg: #050505; 
            --panel-bg: rgba(0, 0, 0, 0.9);
        }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* 🏛️ 頂部：雙 500 席位 (靈霄殿神明 & 火星豪宅租客) */
        .god-hud { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 20px; background: linear-gradient(180deg, rgba(0,0,0,1) 0%, transparent 100%); border-bottom: 1px solid rgba(255, 215, 120, 0.2); }
        .hud-flex { display: flex; justify-content: space-between; gap: 30px; }
        .seat-section { flex: 1; background: rgba(255, 215, 120, 0.05); padding: 10px; border-radius: 8px; border-left: 5px solid var(--gold); }
        .seat-header { font-family: 'Orbitron'; font-size: 13px; color: var(--gold); display: flex; justify-content: space-between; margin-bottom: 8px; }
        .seat-grid { display: grid; grid-template-columns: repeat(25, 1fr); gap: 3px; }
        .dot { width: 6px; height: 6px; background: #222; border-radius: 1px; transition: 0.3s; }
        .dot.god { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .dot.mars { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

        /* 📈 右側：K 線報價面板 */
        .right-terminal { position: fixed; top: 120px; right: 20px; width: 350px; z-index: 1000; }
        .glass-box { background: var(--panel-bg); border: 2px solid var(--gold); border-radius: 15px; padding: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.9); }
        .price-hero { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .price-val { font-family: 'Orbitron'; font-size: 32px; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); }
        .k-chart-container { height: 160px; display: flex; align-items: flex-end; gap: 3px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .k-bar { flex: 1; transition: height 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 1px; }
        .up { background: var(--rna); box-shadow: 0 0 5px var(--rna); }
        .down { background: var(--red); box-shadow: 0 0 5px var(--red); }

        /* 📜 左側：DNA/RNA 成交日誌與自動判斷 */
        .left-terminal { position: fixed; top: 120px; left: 20px; width: 350px; z-index: 1000; }
        .pool-info { text-align: center; margin-bottom: 15px; }
        .pool-num { font-family: 'Orbitron'; font-size: 40px; color: #fff; text-shadow: 0 0 20px var(--gold); }
        .trade-log { height: 150px; background: #000; border: 1px solid #222; border-radius: 5px; overflow-y: auto; padding: 10px; font-size: 11px; font-family: 'Courier New'; color: #0f0; margin: 15px 0; border-left: 2px solid var(--dna); }
        .log-line { margin-bottom: 5px; border-bottom: 1px dotted #222; }

        /* 🏎️ 中央控制：曲速引擎與方向盤 */
        .cockpit { position: fixed; bottom: 150px; width: 100%; display: flex; justify-content: space-between; padding: 0 100px; box-sizing: border-box; z-index: 1100; pointer-events: none; }
        .lever-box { pointer-events: auto; display: flex; flex-direction: column; align-items: center; }
        .lever-text { font-family: 'Orbitron'; color: var(--gold); font-size: 16px; margin-bottom: 10px; text-shadow: 0 0 10px var(--gold); }
        
        input[type=range] { cursor: pointer; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .v-warp { width: 250px; height: 12px; transform: rotate(-90deg); margin-top: 100px; accent-color: var(--cyan); }
        .h-steer { width: 350px; height: 12px; accent-color: var(--gold); }

        /* 🛸 飛碟核心物理 */
        #ufo-ship { position: fixed; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 450px; height: 450px; border: 12px double var(--gold); border-radius: 50%; z-index: 2; background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover; box-shadow: 0 0 100px rgba(255,215,120,0.3); transition: transform 0.1s linear; }
        #webgl-stars { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* 🛠️ 底部：神宮導覽列 */
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--panel-bg); border-top: 5px solid var(--gold); z-index: 1010; padding: 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .action-btn { background: none; border: 2px solid var(--gold); color: var(--gold); padding: 15px 0; font-weight: 900; cursor: pointer; border-radius: 8px; font-size: 12px; transition: 0.3s; }
        .action-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>

<div id="ufo-ship"></div>
<div id="webgl-stars"></div>

<div class="god-hud">
    <div class="hud-flex">
        <div class="seat-section">
            <div class="seat-header">🏛️ 靈霄神明席位 <span>500 / 500</span></div>
            <div class="seat-grid" id="god-grid"></div>
        </div>
        <div class="seat-section" style="border-color: var(--cyan);">
            <div class="seat-header" style="color:var(--cyan);">🐒 火星齊天豪宅 <span>500 / 500</span></div>
            <div class="seat-grid" id="mars-grid"></div>
        </div>
    </div>
</div>

<div class="left-terminal">
    <div class="glass-box">
        <div class="pool-info">
            <div style="font-size:12px; color:var(--gold);">🧬 仙女獎池 (16888 臨界)</div>
            <div class="pool-num" id="pool-disp">16888</div>
        </div>
        <div class="trade-log" id="log-box">>> 天道合約啟動...<br>>> 監測 500 席位收租狀態...</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="action-btn" style="border-color:var(--dna)" onclick="app.autoDecide('DNA')">DNA 求婚成交</button>
            <button class="action-btn" style="border-color:var(--rna)" onclick="app.autoDecide('RNA')">RNA 應婚成交</button>
        </div>
    </div>
</div>

<div class="right-terminal">
    <div class="glass-box">
        <div class="price-hero">
            <span style="color:var(--gold); font-size:14px;">KGEN/USDT</span>
            <span class="price-val" id="price-disp">1.6888</span>
        </div>
        <div class="k-chart-container" id="k-chart"></div>
        <div style="margin-top:15px; font-size:11px; color:#aaa; line-height:1.6;">
            天條分配：<br>
            ● 30% 歸靈霄殿 (500神明分紅)<br>
            ● 10% 留存獎池 (永續經營)<br>
            ● 60% 歸雙地址 (表態競爭)
        </div>
    </div>
</div>

<div class="cockpit">
    <div class="lever-box">
        <div class="lever-text" id="warp-txt">WARP 1x</div>
        <input type="range" id="warp-engine" class="v-warp" min="1" max="500" value="1">
    </div>
    <div class="lever-box" style="justify-content: flex-end;">
        <div class="lever-text" id="steer-txt">STEER 0°</div>
        <input type="range" id="steer-wheel" class="h-steer" min="-180" max="180" value="0">
    </div>
</div>

<div class="footer">
    <button class="action-btn" onclick="app.callWallet()">🦊 呼叫錢包</button>
    <button class="action-btn" onclick="app.speak('分紅已入帳')">🎙️ 客服語音</button>
    <button class="action-btn" onclick="app.search()">🔍 查席位地址</button>
    <button class="action-btn" style="border-color:var(--red)" onclick="app.stop()">🔇 停止語音</button>
    <button class="action-btn" onclick="app.capture()">📷 降旨截圖</button>
</div>

<script>
const app = {
    price: 1.6888,
    pool: 16888,
    kData: Array(40).fill(50),
    
    init() {
        this.initThree();
        this.createSeats('god-grid', 'god');
        this.createSeats('mars-grid', 'mars');
        this.runEngine();
        this.speak("大聖，終極神宮架構已完工。曲速引擎對接K線，方向盤校準天條，請大聖指示！");
    },

    createSeats(id, type) {
        const grid = document.getElementById(id);
        for(let i=0; i<125; i++) {
            const d = document.createElement('div');
            d.className = `dot ${Math.random() > 0.3 ? type : ''}`;
            grid.appendChild(d);
        }
    },

    runEngine() {
        setInterval(() => {
            const w = document.getElementById('warp-engine').value;
            const change = (Math.random() - 0.48) * (w / 150);
            this.price += change;
            document.getElementById('price-disp').innerText = this.price.toFixed(4);
            
            this.kData.shift();
            this.kData.push(Math.max(10, Math.min(150, this.kData[this.kData.length-1] + change * 200)));
            this.drawK();
            
            if(Math.random() > 0.95) this.addLog(`[席位分紅] 0x${Math.random().toString(16).substr(2,6)} 已收租`);
        }, 800);
    },

    drawK() {
        const c = document.getElementById('k-chart');
        c.innerHTML = '';
        this.kData.forEach((h, i) => {
            const b = document.createElement('div');
            b.className = `k-bar ${h >= this.kData[i-1] ? 'up' : 'down'}`;
            b.style.height = `${h}px`;
            c.appendChild(b);
        });
    },

    addLog(m) {
        const b = document.getElementById('log-box');
        const l = document.createElement('div');
        l.className = 'log-line';
        l.innerText = `[${new Date().toLocaleTimeString()}] ${m}`;
        b.prepend(l);
    },

    autoDecide(type) {
        if(type === 'REFUSE') {
            this.addLog(`⚠ 表態拒絕！30% 分紅沒收，回流獎池`);
            this.pool += 5000;
        } else {
            this.addLog(`✔ ${type} 表態成交！1 KGEN 轉帳中，獲 30% 分紅`);
            this.pool += 1;
            this.callWallet();
        }
        document.getElementById('pool-disp').innerText = Math.floor(this.pool);
    },

    initThree() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('webgl-stars').appendChild(this.renderer.domElement);
        const geo = new THREE.BufferGeometry();
        const pts = [];
        for(let i=0; i<3000; i++) pts.push((Math.random()-0.5)*70, (Math.random()-0.5)*70, (Math.random()-0.5)*70);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15 }));
        this.scene.add(this.stars);
        this.camera.position.z = 25;
        this.animate();
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const w = document.getElementById('warp-engine').value;
        const s = document.getElementById('steer-wheel').value;
        document.getElementById('warp-txt').innerText = `WARP ${w}x`;
        document.getElementById('steer-txt').innerText = `STEER ${s}°`;

        // 飛碟轉向：右拉 = 順時針
        document.getElementById('ufo-ship').style.transform = `translate(-50%, -50%) rotate(${s}deg)`;

        const rad = (s * Math.PI) / 180;
        const speed = w / 400;
        const pos = this.stars.geometry.attributes.position.array;
        for(let i=0; i<pos.length; i+=3) {
            pos[i] += Math.sin(rad) * speed;
            pos[i+1] -= Math.cos(rad) * speed; // 0度由上往下
            if(pos[i+1] < -35) pos[i+1] = 35; if(pos[i+1] > 35) pos[i+1] = -35;
            if(pos[i] < -35) pos[i] = 35; if(pos[i] > 35) pos[i] = -35;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
    },

    callWallet() { if(window.ethereum) window.ethereum.request({method:'eth_requestAccounts'}); },
    search() { prompt("輸入地址查詢分紅席位："); },
    capture() { alert("神蹟已記錄"); },
    stop() { window.speechSynthesis.cancel(); },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
