<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜靈霄豪宅全修復版｜v2.19</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; --energy: #ffcc00; --panel: rgba(20, 20, 0, 0.9); --red:#ff4444; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }

        /* 🏛️ 頂部 HUD */
        .hud-top { position: fixed; top: 15px; width: 96%; left: 2%; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .brand-section { border-left: 5px solid var(--gold); padding-left: 15px; background: linear-gradient(90deg, var(--panel), transparent); pointer-events: auto; }
        
        /* 🏰 靈霄與豪宅疊加層 (修復關鍵) */
        #stage-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .stage-img { position: absolute; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 1.5s ease; }
        .stage-img.active { opacity: 1; }

        /* 🚀 右下曲速引擎 (聖諭位置) */
        .warp-engine { position: fixed; right: 40px; bottom: 120px; z-index: 150; width: 80px; text-align: center; }
        .warp-rail { height: 350px; width: 28px; background: #111; border: 2px solid var(--energy); position: relative; margin: 0 auto; border-radius: 6px; overflow: hidden; }
        #energy-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #ff8800, var(--energy), #fff); transition: height 0.1s linear; }
        .warp-range { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-appearance: slider-vertical; opacity: 0; cursor: pointer; z-index: 40; }

        /* 🕯️ 左上合約窗 (聖諭位置) */
        #contract-panel { 
            position: fixed; left: 40px; top: 180px; /* 移到左上方，避開底部 */
            width: 320px; background: var(--panel); border: 1px solid var(--gold); padding: 15px; z-index: 160;
            box-shadow: 0 0 30px rgba(255, 215, 120, 0.2); border-left: 4px solid var(--gold);
        }
        
        /* 🎭 右邊導航動畫區 (修復動畫) */
        #universe-nav { position: fixed; right: 20px; top: 120px; z-index: 200; display: flex; flex-direction: column; gap: 12px; }
        .nav-btn { background: rgba(0,0,0,0.7); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px; font-size: 12px; cursor: pointer; transition: 0.3s; text-decoration: none; text-align: center; }
        .nav-btn:hover { background: var(--cyan); color: #000; transform: translateX(-5px); }

        /* 🎡 核心圓窗 */
        #core-anchor { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 440px; height: 440px; z-index: 50; }
        #core-window { width: 100%; height: 100%; border-radius: 50%; border: 12px double var(--gold); overflow: hidden; position: relative; }
        #fairy-img { width: 100%; height: 100%; object-fit: cover; }

        canvas#galaxy-bg { position: fixed; inset: 0; z-index: 1; }
        .rec-indicator { position: fixed; top: 120px; left: 40px; color: var(--red); z-index: 200; display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--red); }
    </style>
</head>
<body>

<div id="stage-overlay">
    <img id="stage-lingxiao" class="stage-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/main/assets/lingxiao.png">
    <img id="stage-mansion" class="stage-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/main/assets/mansion.png">
</div>

<div class="rec-indicator" id="rec-ui"><div style="width:10px;height:10px;background:var(--red);border-radius:50%;animation:blink 1s infinite;"></div> REC <span id="rec-timer">00:00</span></div>

<div id="contract-panel">
    <div style="color:var(--gold); font-family:Orbitron; margin-bottom:10px;">UNIVERSE TERMINAL v2.19</div>
    <input type="text" id="c-tag" style="width:100%; background:#000; border:1px solid #444; color:var(--energy); padding:8px; margin-bottom:10px;" value="大聖聖諭下凡">
    <button style="width:100%; background:var(--gold); color:#000; font-weight:900; padding:10px; cursor:pointer;" onclick="app.ritual()">🕯️ 執行願力注入 (下單)</button>
</div>

<div class="hud-top">
    <div class="brand-section">
        <div style="font-size:24px; color:var(--gold);">KGEN 16888｜廣寒宮</div>
        <div id="wallet-addr" style="color:var(--cyan); font-size:10px;">WALLET: DISCONNECTED</div>
    </div>
</div>

<div id="universe-nav">
    <a class="nav-btn" href="#" onclick="app.setStage('lingxiao')">🏛️ 顯現：靈霄寶殿</a>
    <a class="nav-btn" href="#" onclick="app.setStage('mansion')">🏡 顯現：豪宅</a>
    <a class="nav-btn" href="#" onclick="app.setStage('none')">🌌 回歸：虛空</a>
    <button class="nav-btn" onclick="app.toggleRec()">⚫ 黑盒子錄製</button>
</div>

<div class="warp-engine">
    <div class="warp-rail">
        <div id="energy-fill"></div>
        <input type="range" id="warp-input-val" class="warp-range" min="0" max="100" value="33">
    </div>
    <div style="color:var(--energy); font-family:Orbitron; margin-top:10px;" id="warp-txt">33x</div>
</div>

<div id="core-anchor">
    <div id="core-window"><img id="fairy-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png"></div>
</div>

<input type="range" id="steer-input-val" style="display:none;" value="0">
<canvas id="galaxy-bg"></canvas>

<div style="position:fixed; bottom:0; width:100%; background:#000; border-top:4px solid var(--gold); display:grid; grid-template-columns:repeat(4,1fr); padding:15px; z-index:1000;">
    <button class="nav-btn" onclick="app.connect()">🦊 連結錢包</button>
    <button class="nav-btn" onclick="app.steerPrompt()">🎡 方向盤</button>
    <button class="nav-btn" onclick="app.vow()">💍 VOW 表態</button>
    <button class="nav-btn" onclick="location.reload()">🔄 重啟系統</button>
</div>

<script>
const app = {
    angle: 0, isRec: false, 
    init() {
        this.initThree();
        document.getElementById('warp-input-val').oninput = (e) => {
            document.getElementById('energy-fill').style.height = e.target.value + '%';
            document.getElementById('warp-txt').innerText = e.target.value + 'x';
        };
        this.speak("大聖，靈霄寶殿與豪宅動畫已校準，右側導航系統修復完畢。");
    },
    
    // 🎭 切換靈霄/豪宅動畫 (修復點)
    setStage(type) {
        document.querySelectorAll('.stage-img').forEach(img => img.classList.remove('active'));
        if(type === 'lingxiao') {
            document.getElementById('stage-lingxiao').classList.add('active');
            this.speak("進入靈霄寶殿。");
        } else if(type === 'mansion') {
            document.getElementById('stage-mansion').classList.add('active');
            this.speak("回歸豪宅。");
        } else {
            this.speak("重返星海。");
        }
    },

    async connect() {
        if(!window.ethereum) return alert("MetaMask?");
        const p = new ethers.providers.Web3Provider(window.ethereum);
        await p.send("eth_requestAccounts", []);
        const addr = await p.getSigner().getAddress();
        document.getElementById('wallet-addr').innerText = `WALLET: ${addr.substring(0,10)}...`;
        this.speak("合約已聯網。");
    },

    async toggleRec() {
        if(this.isRec) { location.reload(); return; }
        try {
            const v = await navigator.mediaDevices.getDisplayMedia({video:true});
            const a = await navigator.mediaDevices.getUserMedia({audio:true});
            this.isRec = true;
            document.getElementById('rec-ui').style.display = 'flex';
            this.speak("黑盒子開始燒錄。");
        } catch(e) { alert("授權失敗"); }
    },

    steerPrompt() {
        const a = prompt("轉向角度:", this.angle);
        if(a !== null) {
            this.angle = parseInt(a);
            document.getElementById('steer-input-val').value = this.angle;
            document.getElementById('core-window').style.transform = `rotate(${this.angle}deg)`;
        }
    },

    initThree() {
        const sc = new THREE.Scene(), cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy-bg'), alpha: true });
        rd.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry(), pos = new Float32Array(3000 * 3);
        for(let i=0; i<9000; i++) pos[i] = (Math.random() - 0.5) * 160;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.2 }));
        sc.add(pts); cam.position.z = 50;
        
        const anim = () => {
            requestAnimationFrame(anim);
            const w = document.getElementById('warp-input-val').value / 40;
            if(w > 0) {
                const r = (parseFloat(document.getElementById('steer-input-val').value) * Math.PI) / 180;
                const p = pts.geometry.attributes.position.array;
                for(let i=0; i<p.length; i+=3) {
                    p[i] -= Math.sin(r) * w; p[i+1] -= Math.cos(r) * w;
                    if(p[i]>80) p[i]=-80; if(p[i]<-80) p[i]=80;
                    if(p[i+1]>80) p[i+1]=-80; if(p[i+1]<-80) p[i+1]=80;
                }
                pts.geometry.attributes.position.needsUpdate = true;
            }
            rd.render(sc, cam);
        };
        anim();
    },
    speak(t) { window.speechSynthesis.cancel(); window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
