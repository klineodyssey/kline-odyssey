<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGEN 16888｜時光飛碟 V2.0.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }

        /* 左右操作桿：貼死邊緣 */
        .stick { position: fixed; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .l-stick { left: 0px; } .r-stick { right: 0px; }
        input[type=range].vert { width: 250px; transform: rotate(-90deg); margin: 100px -80px; accent-color: var(--gold); }
        .label { font-size: 10px; color: var(--gold); font-weight: 900; text-shadow: 1px 1px 2px #000; }

        /* 背景層級 */
        #cam-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        #three-container { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* 頂部血量/油量 */
        .header { position: fixed; top: 0; width: 100%; padding: 10px; z-index: 500; text-align: center; background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent); }
        .fuel-bar { width: 70%; height: 12px; background: #222; border: 1px solid var(--gold); border-radius: 6px; margin: 5px auto; overflow: hidden; }
        #fuel-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff3c00, var(--gold)); }

        /* 控制面板 */
        .panel { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); border-top: 2px solid var(--gold); z-index: 1000; padding: 15px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { padding: 12px; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 11px; font-weight: 900; cursor: pointer; }

        #wish-stamp { position: fixed; bottom: 160px; left: 20px; z-index: 500; font-family: 'Noto Sans TC'; color: var(--gold); font-size: 20px; text-shadow: 2px 2px 5px #000; font-weight: 900; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-size:12px; color:var(--gold); letter-spacing: 2px;">KGEN ODYSSEY V2.0.0</div>
    <div class="fuel-bar"><div id="fuel-fill"></div></div>
    <div id="status" style="font-size:10px; color:var(--cyan);">系統就緒</div>
</div>

<video id="cam-video" autoplay playsinline></video>
<div id="three-container"></div>
<div id="wish-stamp"></div>

<div class="stick l-stick">
    <div class="label">曲率</div>
    <input type="range" id="curv" class="vert" min="0" max="150" value="75">
</div>
<div class="stick r-stick">
    <div class="label">方向</div>
    <input type="range" id="angle" class="vert" min="0" max="360" value="180">
</div>

<div class="panel">
    <div class="btn-grid">
        <button class="btn" onclick="app.trade('LONG')">做多交易</button>
        <button class="btn" onclick="app.trade('SHORT')">做空交易</button>
        <button class="btn" onclick="app.toggleCam()">🎬 切換相機</button>
        <button class="btn" onclick="app.capture()">📷 拍下合照</button>
        <button class="btn" onclick="app.setWish()">🙏 許願還願</button>
        <button class="btn" onclick="app.speak('歡迎進入廣寒宮，我是您的 AI 導師。')">🎙️ AI 客服</button>
    </div>
</div>

<script>
const app = {
    fairyImg: "https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png",
    
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-container').appendChild(this.renderer.domElement);

        const loader = new THREE.TextureLoader();
        loader.crossOrigin = "anonymous";
        this.fairy = new THREE.Mesh(new THREE.CircleGeometry(4, 32), new THREE.MeshBasicMaterial({ map: loader.load(this.fairyImg), transparent: true }));
        this.scene.add(this.fairy);

        this.createStars();
        this.camera.position.z = 10;
        this.animate();
    },

    createStars() {
        const geo = new THREE.BufferGeometry();
        const pos = [];
        for(let i=0; i<800; i++) pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1}));
        this.scene.add(this.stars);
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const ang = parseInt(document.getElementById('angle').value);
        const crv = document.getElementById('curv').value;
        let flow = (ang >= 30 && ang <= 150) ? -1 : (ang >= 210 && ang <= 330 ? 1 : 0);
        
        const p = this.stars.geometry.attributes.position.array;
        for(let i=1; i<p.length; i+=3) {
            p[i] += flow * (crv / 150);
            if(p[i] > 25) p[i] = -25; if(p[i] < -25) p[i] = 25;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.fairy.rotation.y = (ang-180)*0.01;
        this.renderer.render(this.scene, this.camera);
    },

    async toggleCam() {
        const v = document.getElementById('cam-video');
        if(v.style.display === "block") return v.style.display = "none";
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            v.srcObject = stream;
            v.style.display = "block";
        } catch(e) { alert("無法開啟相機，請確認權限。"); }
    },

    capture() {
        const v = document.getElementById('cam-video');
        const c3d = this.renderer.domElement;
        const out = document.createElement('canvas');
        out.width = c3d.width; out.height = c3d.height;
        const ctx = out.getContext('2d');

        if(v.style.display === "block") ctx.drawImage(v, 0, 0, out.width, out.height);
        ctx.drawImage(c3d, 0, 0); // 疊加 3D
        
        // 疊加文字
        ctx.fillStyle = "#ffd778";
        ctx.font = "bold 30px Orbitron";
        ctx.fillText("KGEN V2.0.0", 30, 50);
        const wish = document.getElementById('wish-stamp').innerText;
        if(wish) {
            ctx.font = "bold 24px Noto Sans TC";
            ctx.fillText(wish, 30, out.height - 100);
        }

        const link = document.createElement('a');
        link.download = "KGEN_MEMORABLE.png";
        link.href = out.toDataURL();
        link.click();
    },

    speak(m) {
        const u = new SpeechSynthesisUtterance(m);
        u.lang = 'zh-TW';
        window.speechSynthesis.speak(u);
    },

    trade(t) {
        this.speak(`啟動錢包連線中，目前環境為${t === 'LONG' ? '做多' : '做空'}。`);
        alert(`呼叫錢包執行 ${t} 交易...`);
    },

    setWish() {
        const w = prompt("請輸入您的許願或還願：");
        document.getElementById('wish-stamp').innerText = w || "";
    }
};

window.onload = () => app.init();
</script>
</body>
</html>
