<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGEN 16888｜超光速 AI 飛碟機 V1.9.9.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* 側邊桿：完全透明背景並貼邊 */
        .stick { position: fixed; top: 50%; transform: translateY(-50%); z-index: 2000; width: 20px; }
        .l-stick { left: 0; } .r-stick { right: 0; }
        input[type=range].vert { 
            width: 280px; height: 10px; transform: rotate(-90deg); 
            margin-left: -130px; /* 這裡微調位移確保完全靠邊 */
            accent-color: var(--gold); cursor: pointer; opacity: 0.6;
        }

        /* 頂部資訊 */
        .header { position: fixed; top: 0; width: 100%; text-align: center; z-index: 1000; padding: 5px; font-size: 10px; color: var(--gold); background: rgba(0,0,0,0.5); }
        
        /* 相機與畫布層 */
        #video-bg { position: fixed; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; display: none; }
        #canvas-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        /* AI 客服 */
        #ai-box { position: fixed; top: 60px; right: 20px; width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--cyan); z-index: 1500; display: none; overflow: hidden; box-shadow: 0 0 15px var(--cyan); }
        #ai-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 下方控制板 */
        .panel { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); border-top: 1px solid var(--gold); z-index: 1800; padding: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 0 10px; }
        .btn { padding: 12px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 10px; font-weight: 900; }
        
        #wish-text { position: fixed; bottom: 120px; left: 20px; z-index: 1600; font-size: 14px; color: var(--gold); text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div class="header">KGEN ODYSSEY V1.9.9.2 | <span id="clock">00:00:00</span></div>

<div class="stick l-stick"><input type="range" id="curv" class="vert" min="0" max="150" value="75"></div>
<div class="stick r-stick"><input type="range" id="angle" class="vert" min="0" max="360" value="180"></div>

<video id="video-bg" autoplay playsinline muted></video>
<div id="canvas-layer"></div>
<div id="ai-box"><img src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png"></div>
<div id="wish-text"></div>

<div class="panel">
    <div class="grid">
        <button class="btn" onclick="app.trade('LONG')">做多 下單</button>
        <button class="btn" onclick="app.trade('SHORT')">做空 下單</button>
        <button class="btn" onclick="app.takeSnap()">📷 拍照下載</button>
        <button class="btn" id="cam-btn" onclick="app.toggleCam()">🎬 相機/錄製</button>
        <button class="btn" onclick="app.setWish()">🙏 許願還願</button>
        <button class="btn" onclick="app.showLamp()">🏮 13生肖燈</button>
    </div>
</div>

<script>
const app = {
    fairyImg: "https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png",
    
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        // 重要修復：preserveDrawingBuffer 設為 true 才能截圖
        this.renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true, 
            preserveDrawingBuffer: true 
        });
        
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-layer').appendChild(this.renderer.domElement);

        const loader = new THREE.TextureLoader();
        loader.crossOrigin = "anonymous";
        this.fairy = new THREE.Mesh(
            new THREE.CircleGeometry(4, 32), 
            new THREE.MeshBasicMaterial({ map: loader.load(this.fairyImg), transparent: true })
        );
        this.scene.add(this.fairy);

        this.createStars();
        this.camera.position.z = 12;
        this.animate();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString();
