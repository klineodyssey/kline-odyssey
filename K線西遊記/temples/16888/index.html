<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>KGEN 16888｜MoonTrust / PoolDuel 前端整合版｜v2.00</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
  <style>
    :root { --gold:#ffd778; --cyan:#00f2ff; --bg:#000; --energy:#ffcc00; --panel:rgba(20,20,0,.9); --red:#ff4444; }
    body,html{margin:0;padding:0;background:var(--bg);color:#fff;font-family:'Noto Sans TC',sans-serif;overflow:hidden;height:100vh}
    canvas#galaxy-bg{position:fixed;inset:0;z-index:1}
    .hud-top{position:fixed;top:12px;width:96%;left:2%;display:flex;justify-content:space-between;z-index:120;pointer-events:none}
    .brand-section{border-left:5px solid var(--gold);padding-left:14px;background:linear-gradient(90deg,var(--panel),transparent)}
    .brand-name{font-size:26px;color:var(--gold);text-shadow:0 0 15px var(--gold)}
    .sys-st{font-family:'Orbitron';font-size:12px;color:var(--cyan);letter-spacing:1px}
    .monitor-data{display:flex;gap:14px}
    .data-box{background:var(--panel);border:1px solid #332200;padding:10px;border-top:2px solid var(--gold);pointer-events:none}
    .grid-500{display:grid;grid-template-columns:repeat(25,6px);gap:3px;margin-top:5px}
    .dot{width:6px;height:6px;background:#1a1a00;border-radius:1px}
    .dot.on{background:var(--energy);box-shadow:0 0 8px var(--energy)}

    .warp-engine{position:fixed;left:18px;top:50%;transform:translateY(-50%);z-index:150;width:120px;text-align:center}
    .warp-rail{height:420px;width:30px;background:#111;border:3px solid var(--energy);position:relative;margin:0 auto;border-radius:8px;overflow:hidden;box-shadow:0 0 20px rgba(255,204,0,.2)}
    #energy-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#ff8800,var(--energy),#fff);transition:height .15s cubic-bezier(.17,.67,.83,.67);z-index:5}
    .rail-step{position:absolute;width:100%;height:2px;background:rgba(0,0,0,.4);z-index:10}
    #warp-thumb{width:70px;height:35px;background:#fff;position:absolute;left:-20px;bottom:33%;cursor:pointer;border-radius:6px;box-shadow:0 0 30px #fff,0 0 15px var(--cyan);border:3px solid var(--cyan);z-index:30}
    .warp-range{position:absolute;top:0;left:0;width:100%;height:100%;-webkit-appearance:slider-vertical;opacity:0;cursor:pointer;z-index:40}
    .warp-val-text{margin-top:18px;color:var(--energy);font-family:'Orbitron';font-size:16px;text-shadow:0 0 10px var(--energy)}
    #rec-ind{margin-top:8px;color:var(--red);display:none}

    #core-anchor{position:fixed;top:45%;left:52%;transform:translate(-50%,-50%);width:380px;height:380px;z-index:60}
    #core-window{width:100%;height:100%;border-radius:50%;border:15px double var(--gold);overflow:hidden;background:#000;position:relative;box-shadow:0 0 80px rgba(255,215,120,.3);transition:transform .05s linear}
    #fairy-img{width:100%;height:100%;object-fit:cover}
    #cam-view{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0}
    #mini-thumb{position:absolute;top:24px;right:24px;width:92px;height:92px;border-radius:50%;border:3px solid var(--gold);display:none;z-index:110;background:url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;box-shadow:0 0 25px var(--gold)}
    #wish-label{position:absolute;bottom:40px;left:38px;z-index:85;color:#fff;font-weight:900;font-size:22px;text-shadow:2px 2px 10px #000,0 0 15px var(--cyan)}

    .ga-matrix{position:fixed;right:12px;top:50%;transform:translateY(-50%);width:210px;background:var(--panel);border:1px solid var(--energy);padding:12px;z-index:130;font-family:'Orbitron'}
    .ga-stat{font-size:11px;margin-bottom:10px;color:var(--cyan)}
    .ga-bar{height:6px;background:#111;margin-top:4px;overflow:hidden;border-radius:3px}
    .ga-progress{height:100%;background:var(--energy);width:0%;transition:width .5s}

    .steer-zone{position:fixed;bottom:206px;width:100%;text-align:center;z-index:140}
    .angle-readout{font-family:'Orbitron';font-size:46px;color:var(--cyan);text-shadow:0 0 30px var(--cyan)}
    .steer-slider{width:78%;max-width:900px;cursor:pointer;height:12px;accent-color:var(--gold)}

    .footer-terminal{position:fixed;bottom:0;width:100%;background:#000;padding:14px;border-top:4px solid var(--gold);display:grid;grid-template-columns:repeat(4,1fr);gap:10px;z-index:150}
    .term-btn{background:#0a0a0a;border:1px solid #444;color:#fff;padding:14px 5px;font-weight:900;cursor:pointer;transition:.2s;font-size:13px;border-radius:4px}
    .term-btn:hover{background:var(--gold);color:#000}
    .term-btn.active-kgen{border-color:var(--energy);color:var(--energy);box-shadow:inset 0 0 15px rgba(255,204,0,.2)}
    .term-btn.btn-rec{border-color:var(--red);color:var(--red);box-shadow:inset 0 0 12px rgba(255,68,68,.2)}

    /* Panel */
    .panel{
      position:fixed; left:50%; top:8px; transform:translateX(-50%);
      z-index:200; width:min(980px, 94vw); pointer-events:auto;
      background:rgba(0,0,0,.82); border:1px solid rgba(255,215,120,.35);
      border-radius:10px; padding:10px 12px; backdrop-filter: blur(6px);
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    }
    .panel input,.panel select{
      background:#0b0b0b; color:#fff; border:1px solid rgba(0,242,255,.25);
      border-radius:8px; padding:8px 10px; font-family:'Orbitron'; font-size:12px;
      outline:none;
    }
    .panel .btn{
      background:rgba(255,215,120,.12); border:1px solid rgba(255,215,120,.6); color:var(--gold);
      border-radius:10px; padding:8px 10px; font-family:'Orbitron'; font-weight:900; cursor:pointer;
    }
    .panel .btn:active{transform:translateY(1px)}
    .badge{font-family:'Orbitron';font-size:12px;color:var(--cyan)}
    .warn{color:#ffcc00}
    .ok{color:#7CFF7C}
    .err{color:#ff6666}
    .mini{font-size:11px; opacity:.9}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  </style>
</head>
<body>

<canvas id="galaxy-bg"></canvas>

<div class="hud-top">
  <div class="brand-section">

<!-- Web3 Panel -->

  <button class="term-btn" id="btn-capture">📸 拍照存證</button>
  <button class="term-btn btn-rec" id="btn-rec">🔴 黑盒子錄影(僅UI)</button>
  <button class="term-btn" id="btn-cam-user">🤳 前鏡自拍</button>
  <button class="term-btn" id="btn-cam-env">🌌 後鏡巡航</button>
  <button class="term-btn active-kgen" id="btn-boost">💎 KGEN 沖等演化</button>
  <button class="term-btn active-kgen" id="btn-hunt">⚔️ 自動巡航打怪</button>

<script>
/* ===========================
   Minimal Web3 helpers (no deps)
   =========================== */
const ABI_ERC20 = [
  {"constant":true,"inputs":[{"name":"a","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"type":"function"},
  {"constant":false,"inputs":[{"name":"spender","type":"address"},{"name":"amount","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},
  {"constant":true,"inputs":[{"name":"owner","type":"address"},{"name":"spender","type":"address"}],"name":"allowance","outputs":[{"name":"","type":"uint256"}],"type":"function"},
  {"constant":false,"inputs":[{"name":"to","type":"address"},{"name":"amount","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"}
];

// MoonTrust V1.2.0 essential ABI
const ABI_MOONTRUST = [
  {"inputs":[],"name":"poolBalance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[],"name":"targetPool","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"deposit","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"internalType":"address","name":"playerA","type":"address"},{"internalType":"address","name":"playerB","type":"address"}],"name":"settleRound","outputs":[{"internalType":"uint256","name":"roundId","type":"uint256"}],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"roundId","type":"uint256"},{"internalType":"address","name":"partner","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],"name":"vow","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"internalType":"uint256","name":"roundId","type":"uint256"}],"name":"claimWeddingEscrow","outputs":[],"stateMutability":"nonpayable","type":"function"}
];

// Optional: PoolDuel contract ABI (from earlier draft); keep minimal
const ABI_POOLDUEL = [
  {"inputs":[{"internalType":"uint8","name":"side","type":"uint8"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"uint256","name":"minPx","type":"uint256"},{"internalType":"uint256","name":"maxPx","type":"uint256"}],"name":"placeOrder","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[],"name":"poolBalance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
];

function $(id){ return document.getElementById(id); }
function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
function fmt18(x){ // string big int to KGEN
  try{
    const s = BigInt(x).toString();
    const pad = s.padStart(19,'0');
    const i = pad.slice(0,-18).replace(/^0+/, '') || '0';
    const d = pad.slice(-18).slice(0,4);
    return `${i}.${d}`;
  }catch(e){ return '-'; }
}
function toWei18(amountStr){
  const s = String(amountStr||'0').trim();
  if(!s) return 0n;
  const [i, d=''] = s.split('.');
  const di = (d + '0'.repeat(18)).slice(0,18);
  return BigInt(i||'0') * 10n**18n + BigInt(di);
}

const web3 = {
  provider:null, acct:null, chainId:null,
  async connect(){
    if(!window.ethereum){
      this.msg("err","找不到錢包：請用 Chrome/Android + MetaMask。");
      return;
    }
    this.provider = window.ethereum;
    const accts = await this.provider.request({ method:'eth_requestAccounts' });
    this.acct = accts && accts[0];
    this.chainId = await this.provider.request({ method:'eth_chainId' });
    $("st-acct").textContent = this.acct ? (this.acct.slice(0,6)+"..."+this.acct.slice(-4)) : "-";
    $("st-net").textContent = "NET: " + this.chainId;
    this.msg("ok","錢包已連線");
  },
  async call(to, data){
    return await this.provider.request({ method:'eth_call', params:[{to, data}, "latest"]});
  },
  async send(to, data){
    return await this.provider.request({ method:'eth_sendTransaction', params:[{ from:this.acct, to, data }]});
  },
  // very small ABI encoder for a few functions (supports address,uint256,uint8)
  sig(name, types){ // keccak not available -> use precomputed via hard-coded map below
    return null;
  }
};

// Precomputed selectors (keccak256)
const SEL = {
  // ERC20
  balanceOf: "0x70a08231",
  approve:   "0x095ea7b3",
  allowance: "0xdd62ed3e",
  transfer:  "0xa9059cbb",
  // MoonTrust
  poolBalance:"0x90f1d8b6", // poolBalance()
  targetPool:"0x5d36b190",  // targetPool()
  deposit:"0xb6b55f25",     // deposit(uint256)
};

function pad32hex(hex){ return hex.replace(/^0x/,'').padStart(64,'0'); }
function encAddr(a){ return pad32hex(a.toLowerCase().replace(/^0x/,'')); }
function encUint(x){
  const bi = (typeof x === 'bigint') ? x : BigInt(x);
  return bi.toString(16).padStart(64,'0');
}
function data1(sel, a){ return sel + encUint(a); }
function dataAddrUint(sel, addr, amt){
  return sel + encAddr(addr) + encUint(amt);
}
function dataAddrAddrUint(sel, a, b, amt){
  return sel + encAddr(a) + encAddr(b) + encUint(amt);
}
function parseUint256(hex){
  try{ return BigInt(hex); }catch(e){}
  try{ return BigInt("0x"+hex.replace(/^0x/,'').slice(-64)); }catch(e){ return 0n; }
}

const app = {
  isCam:false, camMode:'user', gaLevel:1,
  warpX:0,
  stream:null,
  _rd:null, _cam:null,

  // config
  baseCapital: 5888n * 10n**18n,
  feeBps: 500n, // 5%
  init(){
    this.initThree();
    this.buildUI();
    this.bindUI();
    setInterval(()=>this.tick(), 1000);
    this.updateWarp(33);
    this.applySteer(0, true);
    this.onResize();
    window.addEventListener('resize', ()=>this.onResize(), {passive:true});
  },
  msg(kind, text){
    const el = $("st-msg");
    el.className = "badge mini " + (kind==="ok"?"ok":kind==="err"?"err":"warn");
    el.textContent = text;
  },
  tick(){
    $("sys-clock").textContent = `SYSTEM ONLINE | ${new Date().toLocaleString()}`;
    document.querySelectorAll('.dot').forEach(d=>{ if(Math.random()>0.92) d.classList.toggle('on'); });
    const fit = 0.9 + Math.random()*0.1;
    $("f-val").textContent = fit.toFixed(3);
    $("f-bar").style.width = (fit*100)+'%';
    $("m-bar").style.width = (Math.random()*100)+'%';
    $("g-val").textContent = String(this.gaLevel);
    $("ga-rank").textContent = `RANK: GA-${this.gaLevel}`;
  },
  buildUI(){
    ['g1','g2'].forEach(id=>{
      const c = $(id); c.innerHTML="";
      for(let i=0;i<100;i++){
        const d=document.createElement('div');
        d.className='dot'+(Math.random()>0.5?' on':'');
        c.appendChild(d);
      }
    });
    const rail = $("warp-rail-body");
    for(let i=0;i<25;i++){
      const step=document.createElement('div');
      step.className='rail-step';
      step.style.bottom=(i*4)+'%';
      rail.appendChild(step);
    }
  },
  getWarpXFromPct(pct){
    const p = clamp(Number(pct)||0,0,100);
    const cap = Math.max(1, Number(this.gaLevel)||1);
    if(p===0) return 0;
    return Math.max(1, Math.round((p/100)*cap));
  },
  updateWarp(val){
    const pct=clamp(parseFloat(val)||0,0,100);
    const warpX=this.getWarpXFromPct(pct);
    this.warpX=warpX;
    $("energy-fill").style.height=pct+'%';
    $("warp-thumb").style.bottom=`calc(${pct}% - 17px)`;
    $("warp-txt").textContent=`WARP ${warpX}x`;
  },
  applySteer(v, silent=false){
    const ang=clamp(Number(v)||0,-180,180);
    $("ang-val").textContent = `${ang}°`;
    $("core-window").style.transform = `rotate(${ang}deg)`;
    $("steer-input-val").value = String(ang);
  },
  async cam(mode){
    const v=$("cam-view"), f=$("fairy-img"), m=$("mini-thumb");
    if(this.isCam && this.camMode===mode){
      this.stream && this.stream.getTracks().forEach(t=>t.stop());
      v.style.opacity=0; f.style.opacity=1; m.style.display='none';
      this.isCam=false;
      return;
    }
    try{
      if(this.stream) this.stream.getTracks().forEach(t=>t.stop());
      this.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:mode},audio:false});
      v.srcObject=this.stream; v.style.opacity=1; f.style.opacity=0; m.style.display='block';
      v.style.transform = mode==='user'?'scaleX(-1)':'scaleX(1)';
      this.isCam=true; this.camMode=mode;
    }catch(e){ alert("攝像頭權限被拒絕/硬體未響應"); }
  },
  capture(){
    const canvas=$("snap-canvas"), ctx=canvas.getContext('2d');
    canvas.width=900; canvas.height=900;
    const v=$("cam-view"), f=$("fairy-img");
    if(this.isCam){
      if(this.camMode==='user'){ ctx.translate(900,0); ctx.scale(-1,1); }
      try{ ctx.drawImage(v,0,0,900,900); }catch(e){ ctx.fillStyle="#000"; ctx.fillRect(0,0,900,900); }
      ctx.setTransform(1,0,0,1,0,0);
      ctx.drawImage(f, 670, 40, 200, 200);
    }else{
      ctx.drawImage(f,0,0,900,900);
    }
    ctx.fillStyle="#ffd778"; ctx.font="bold 36px Noto Sans TC";
    ctx.fillText("KGEN 16888｜MoonTrust v2.00", 40, 70);
    ctx.fillStyle="#00f2ff"; ctx.font="bold 20px Orbitron";
    ctx.fillText(`ANGLE ${$("steer-input-val").value}°  WARP ${this.warpX}x  GA ${this.gaLevel}`, 40, 105);
    ctx.fillStyle="#fff"; ctx.font="bold 34px Noto Sans TC";
    ctx.shadowBlur=10; ctx.shadowColor="#000";
    ctx.fillText($("wish-label").textContent, 40, 860);
    ctx.shadowBlur=0;
    const a=document.createElement('a');
    a.download=`KGEN_16888_SNAPSHOT_v2_00.png`;
    a.href=canvas.toDataURL();
    a.click();
  },
  boost(){
    if(this.gaLevel < 1000){
      this.gaLevel = Math.min(1000, this.gaLevel + 1);
      const pctNow = parseFloat($("warp-input-val").value)||0;
      this.updateWarp(pctNow);
      this.msg("ok",`GA 升級到 ${this.gaLevel}`);
    }
  },
  hunt(){
    const old=$("wish-label").textContent;
    $("wish-label").textContent="⚔️ 自動巡航打怪中...";
    setTimeout(()=>{$("wish-label").textContent=old;}, 2000);
  },
  wish(){
    const m=prompt("輸入許願/還願文字：", $("wish-label").textContent);
    if(m) $("wish-label").textContent=m;
  },
  help(){
    alert(
`V2.00 前端整合（手機可操作）\n\n1) 先 CONNECT WALLET\n2) 填入 MoonTrust 16888 合約地址（部署後再填）\n3) PLACE ORDER：會先檢查 allowance，不夠會先要求 approve，再 deposit 入池。\n4) WISH/還願(入池)：直接把 KGEN transfer 到合約，變成獎池。\n\n注意：目前沒有自動判斷輸贏；結算(3+3)與玩家 A/B 由 Oracle(先用 deployer) 在鏈上呼叫 settleRound(A,B) 觸發。`
    );
  },

  bindUI(){
    $("steer-input-val").addEventListener('input', e=>this.applySteer(e.target.value));
    $("warp-input-val").addEventListener('input', e=>this.updateWarp(e.target.value));

    $("btn-capture").onclick = ()=>this.capture();
    $("btn-cam-user").onclick = ()=>this.cam('user');
    $("btn-cam-env").onclick  = ()=>this.cam('environment');
    $("btn-boost").onclick = ()=>this.boost();
    $("btn-hunt").onclick = ()=>this.hunt();
    $("btn-wish").onclick = ()=>this.wish();
    $("btn-help").onclick = ()=>this.help();

    $("btn-connect").onclick = async ()=>{
      try{ await web3.connect(); await this.refresh(); }
      catch(e){ this.msg("err", e?.message||"連線失敗"); }
    };
    $("btn-refresh").onclick = ()=>this.refresh();
    $("btn-order").onclick = ()=>this.placeOrder();
    $("btn-donate").onclick = ()=>this.donateToPool();
  },

  async refresh(){
    const mt = $("moontrust").value.trim();
    const token = $("kgen-token").value.trim();
    if(!web3.provider || !web3.acct){
      this.msg("warn","尚未連線錢包");
      return;
    }
    if(!mt || !/^0x[a-fA-F0-9]{40}$/.test(mt)){
      this.msg("warn","請先填入 16888 合約地址");
      return;
    }
    if(!token || !/^0x[a-fA-F0-9]{40}$/.test(token)){
      this.msg("err","KGEN Token 地址不合法");
      return;
    }

    try{
      // poolBalance()
      const poolHex = await web3.call(mt, SEL.poolBalance + "0".repeat(64));
      const pool = parseUint256(poolHex);
      $("st-pool").textContent = fmt18(pool) + " KGEN";

      const targetHex = await web3.call(mt, SEL.targetPool + "0".repeat(64));
      const target = parseUint256(targetHex);
      $("st-target").textContent = fmt18(target) + " KGEN";

      // user balance
      const balHex = await web3.call(token, SEL.balanceOf + encAddr(web3.acct));
      const bal = parseUint256(balHex);
      this.msg("ok", `餘額 ${fmt18(bal)} KGEN｜池 ${fmt18(pool)} / 16888`);
    }catch(e){
      this.msg("err", "刷新失敗：可能 ABI/地址不對 或 尚未部署");
    }
  },

  async ensureAllowance(spender, neededWei){
    const token = $("kgen-token").value.trim();
    const allowanceHex = await web3.call(token, SEL.allowance + encAddr(web3.acct) + encAddr(spender));
    const allow = parseUint256(allowanceHex);
    if(allow >= neededWei) return true;

    this.msg("warn","需要先 approve（錢包會跳出）");
    // approve(spender, amount) => approve neededWei * 2
    const amt = neededWei * 2n;
    const data = SEL.approve + encAddr(spender) + encUint(amt);
    await web3.send(token, data);
    return true;
  },

  async donateToPool(){
    const mt = $("moontrust").value.trim();
    const token = $("kgen-token").value.trim();
    const amtStr = $("order-amt").value.trim() || "10";
    const amt = toWei18(amtStr);
    if(amt <= 0n){ this.msg("err","金額需 > 0"); return; }

    if(!web3.provider || !web3.acct){ this.msg("err","先 CONNECT WALLET"); return; }
    if(!mt || !/^0x[a-fA-F0-9]{40}$/.test(mt)){ this.msg("err","請填入 16888 合約地址"); return; }

    try{
      // transfer(contract, amt)
      const data = SEL.transfer + encAddr(mt) + encUint(amt);
      await web3.send(token, data);
      this.msg("ok", "已送出入池轉帳（WISH/還願）");
      setTimeout(()=>this.refresh(), 1200);
    }catch(e){
      this.msg("err","入池轉帳失敗/取消");
    }
  },

  async placeOrder(){
    // For A: treat as deposit into MoonTrust pool (real transferFrom)
    const mt = $("moontrust").value.trim();
    const amtStr = $("order-amt").value.trim() || "10";
    const amt = toWei18(amtStr);
    if(amt <= 0n){ this.msg("err","下單金額需 > 0"); return; }

    if(!web3.provider || !web3.acct){ this.msg("err","先 CONNECT WALLET"); return; }
    if(!mt || !/^0x[a-fA-F0-9]{40}$/.test(mt)){ this.msg("err","請填入 16888 合約地址"); return; }

    // min/max are user-defined, just recorded in UI for now
    const minPx = $("order-min").value.trim();
    const maxPx = $("order-max").value.trim();
    const side = $("order-side").value;

    try{
      await this.ensureAllowance(mt, amt);
      // deposit(amount)
      const data = SEL.deposit + encUint(amt);
      await web3.send(mt, data);
      this.msg("ok", `已下單(${side})｜${amtStr} KGEN 入池｜區間 ${minPx||"-"} ~ ${maxPx||"-"}`);
      setTimeout(()=>this.refresh(), 1200);
    }catch(e){
      this.msg("err","下單/入池失敗（可能取消或 gas 不足）");
    }
  },

  initThree(){
    const sc = new THREE.Scene();
    const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const rd  = new THREE.WebGLRenderer({ canvas:$("galaxy-bg"), antialias:true, alpha:true });
    rd.setPixelRatio(Math.min(2, window.devicePixelRatio||1));
    rd.setSize(window.innerWidth, window.innerHeight);

    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(5000*3);
    for(let i=0;i<15000;i++) pos[i]=(Math.random()-0.5)*160;
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color:0x00f2ff, size:0.18 }));
    sc.add(pts); cam.position.z=50;

    const anim = ()=>{
      requestAnimationFrame(anim);
      const pct = parseFloat($("warp-input-val").value)||0;
      const warpX = this.getWarpXFromPct(pct);
      const w = warpX / 200;
      if(w>0){
        const r = (parseFloat($("steer-input-val").value)*Math.PI)/180;
        const p = pts.geometry.attributes.position.array;
        for(let i=0;i<p.length;i+=3){
          p[i]   -= Math.sin(r)*w;
          p[i+1] -= Math.cos(r)*w;
          if(p[i]>80) p[i]=-80; if(p[i]<-80) p[i]=80;
          if(p[i+1]>80) p[i+1]=-80; if(p[i+1]<-80) p[i+1]=80;
        }
        pts.geometry.attributes.position.needsUpdate=true;
      }
      rd.render(sc, cam);
    };
    anim();
    this._rd=rd; this._cam=cam;
  },

  onResize(){
    if(!this._rd || !this._cam) return;
    this._cam.aspect = window.innerWidth / window.innerHeight;
    this._cam.updateProjectionMatrix();
    this._rd.setSize(window.innerWidth, window.innerHeight);
  }
};

window.addEventListener('load', ()=>app.init());
</script>
</body>
</html>
