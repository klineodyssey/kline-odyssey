<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜K線實時引擎 V2.2.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 儀表板：血量與金庫 */
        .hud-main { position: fixed; top: 10px; width: 100%; z-index: 1000; padding: 0 15px; box-sizing: border-box; }
        .hud-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--gold); font-family: 'Orbitron'; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); margin: 3px 0 8px; border-radius: 3px; overflow: hidden; border: 1px solid #333; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #00ff00); transition: 0.3s; }
        #vault-fill { width: 80%; height: 100%; background: var(--gold); }

        /* 席位監控 */
        .seats { position: fixed; top: 100px; left: 15px; font-size: 9px; color: var(--cyan); z-index: 1000; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; border-left: 2px solid var(--cyan); }

        /* 中央仙女圖 (旋轉鎖定) */
        #fairy-ufo {
            position: fixed; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 360px; height: 360px;
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            opacity: 0.8; border-radius: 50%; z-index: 2; border: 4px solid var(--gold);
            box-shadow: 0 0 50px rgba(255, 215, 120, 0.5);
        }

        #bridge { position: fixed; top: 22%; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #price { font-family: 'Orbitron'; font-size: 55px; text-shadow: 0 0 25px var(--cyan); }
        #ai-log { background: rgba(0,0,0,0.8); padding: 5px 20px; border: 1px solid var(--cyan); border-radius: 20px; color: var(--cyan); font-size: 12px; display: inline-block; }

        /* 操控台標籤 */
        .ctrl-grid { position: fixed; bottom: 120px; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .stick { text-align: center; position: relative; }
        .tag { font-family: 'Orbitron'; color: var(--cyan); font-size: 15px; margin-bottom: 5px; }
        input[type=range].v-warp { width: 180px; transform: rotate(-90deg); margin-top: 80px; accent-color: var(--cyan); }
        input[type=range].h-steer { width: 260px; accent-color: var(--gold); }

        .console { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); z-index: 1000; padding: 15px 5px; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .btn { padding: 12px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 10px; font-weight: 900; }

        #three-box { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        #cam { position: fixed; inset: 0; z-index: 1; opacity: 0.35; object-fit: cover; }
    </style>
</head>
<body>

<div id="fairy-ufo"></div>
<video id="cam" autoplay playsinline></video>
<div id="three-box"></div>

<div class="hud-main">
    <div class="hud-row"><span>玩家血量 (HP)</span><span id="hp-txt">100%</span></div>
    <div class="bar-bg"><div id="hp-fill"></div></div>
    <div class="hud-row"><span>靈霄寶殿金庫: 50,000,000 KGEN</span><span>交易稅: 0.3%</span></div>
    <div class="bar-bg"><div id="vault-fill"></div></div>
</div>

<div class="seats">
    <div>🐒 花果山席位: <span id="s1">500</span>/500</div>
    <div>🙏 神明席位: <span id="s2">500</span>/500</div>
    <div style="color:var(--gold); margin-top:5px;">2s K線引擎連動中</div>
</div>

<div id="bridge">
    <div id="ai-log">客服系統：請連結錢包以開始交易</div>
    <div id="price">16888.88</div>
    <div id="k-info" style="color:var(--gold); font-size:12px; font-family:'Orbitron';">W=mgh | K-ENGINE ACTIVE</div>
</div>

<div class="ctrl-grid">
    <div class="stick">
        <div id="warp-val" class="tag">1x</div>
        <div style="font-size:10px; color:var(--cyan);">曲速引擎</div>
        <input type="range" id="warp" class="v-warp" min="1" max="150" value="1">
    </div>
    <div class="stick">
        <div id="steer-val" class="tag">0°</div>
        <div style="font-size:10px; color:var(--gold);">飛碟方向盤 (K航道)</div>
        <input type="range" id="steer" class="h-steer" min="-180" max="180" value="0">
    </div>
</div>

<div class="console">
    <div class="btn-grid">
        <button class="btn" onclick="app.checkToken()">🔍 查 Token 地址</button>
        <button class="btn" onclick="app.trade('CT')">📈 CT 現價下單</button>
        <button class="btn" onclick="app.trade('CLOSE')">📉 結算平倉</button>
        <button class="btn" onclick="app.setWish()">🙏 許願留言</button>
        <button class="btn" onclick="app.capture()">📷 下載日誌</button>
        <button class="btn" onclick="app.toggleCam()">📸 影像監控</button>
        <button class="btn" onclick="app.connect()">🦊 錢包連結</button>
        <button class="btn" onclick="app.speak('歡迎進入廣寒宮，我是您的導航客服。若無錢包，請點擊右下角按鈕連結。')">🎙️ 客服語音</button>
    </div>
</div>

<script>
const app = {
    hp: 100,
    walletConnected: false,
    
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-box').appendChild(this.renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 1500; i++) pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15 }));
        this.scene.add(this.stars);

        this.camera.position.z = 15;
        this.animate();
        this.startKEngine();
        
        // 開頁語音
        setTimeout(() => this.speak("導航系統就緒，星球軌道已校準。"), 1000);
    },

    startKEngine() {
        setInterval(() => {
            const warp = parseInt(document.getElementById('warp').value);
            const steer = parseInt(document.getElementById('steer').value);
            const diff = (Math.random() - 0.5) * 10;
            const newPrice = 16888 + diff;
            document.getElementById('price').innerText = newPrice.toFixed(2);
            
            // 血量邏輯：方向盤與價格走勢相反時扣血
            if(Math.abs(steer) > 90 && diff > 0) { // 做空但價格漲
                this.hp -= (warp / 50);
                if(this.hp < 0) this.hp = 0;
                this.updateHP();
            }
        }, 2000); // 2秒生成引擎
    },

    updateHP() {
        document.getElementById('hp-txt').innerText = Math.floor(this.hp) + "%";
        document.getElementById('hp-fill').style.width = this.hp + "%";
        if(this.hp <= 0) this.speak("警告！血量耗盡，飛碟失去動力。");
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const warp = parseInt(document.getElementById('warp').value);
        const steer = parseInt(document.getElementById('steer').value);

        document.getElementById('warp-val').innerText = warp + "x";
        document.getElementById('steer-val').innerText = steer + "°";

        const rad = (steer * Math.PI) / 180;
        const efficiency = Math.cos(rad);

        // 美女圖同步：右移順轉
        document.getElementById('fairy-ufo').style.transform = `translate(-50%, -50%) rotate(${steer}deg)`;

        // 星球氣泡物理：0度順轉上到下，180度下到上
        const p = this.stars.geometry.attributes.position.array;
        const speed = (warp / 400);

        for(let i=0; i<p.length; i+=3) {
            p[i] += Math.sin(rad) * speed; // X軸偏轉
            p[i+1] -= speed * efficiency;  // Y軸流向
            if(p[i+1] > 25) p[i+1] = -25; if(p[i+1] < -25) p[i+1] = 25;
            if(p[i] > 25) p[i] = -25; if(p[i] < -25) p[i] = 25;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
    },

    checkToken() {
        const addr = prompt("請輸入 Token 地址查詢：");
        if(!addr) return;
        this.speak("正在掃描鏈上合約");
        const isOfficial = addr.toLowerCase().includes("kgen");
        const msg = isOfficial ? "此為 KGEN 官方合約，稅率 0.3%，支持黑洞蒸發。" : "此為普通 Token，讀取為一般百姓地址。";
        document.getElementById('ai-log').innerText = msg;
        this.speak(msg);
    },

    trade(t) {
        if(!this.walletConnected) {
            this.speak("偵測到未連結錢包。請點擊右下角小狐狸圖示，安裝或啟動錢包。");
            return;
        }
        this.speak(t==='CT' ? "執行現價交易，J線數據記錄中" : "結算成功");
    },

    connect() {
        this.walletConnected = true;
        this.speak("錢包連結成功，已接入悟空大腦交易所。您可以開始真實成交了。");
        document.getElementById('ai-status');
        alert("已連結 MetaMask 錢包");
    },

    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); },
    
    async toggleCam() {
        const v = document.getElementById('cam');
        if(v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        else { const s = await navigator.mediaDevices.getUserMedia({video: true}); v.srcObject = s; }
    },

    capture() {
        const link = document.createElement('a');
        link.download = "KGEN_KENGINE_V223.png";
        link.href = this.renderer.domElement.toDataURL();
        link.click();
    }
};
window.onload = () => app.init();
</script>
</body>
</html>
