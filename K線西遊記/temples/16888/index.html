<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K線西遊記｜花果山台灣 V2.0.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 錢包狀態標籤 */
        #wallet-info { position: fixed; top: 10px; left: 10px; z-index: 700; font-size: 10px; color: var(--cyan); background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; border: 1px solid var(--cyan); }

        .stick { position: fixed; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .l-stick { left: 0px; } .r-stick { right: 0px; }
        input[type=range].vert { width: 200px; transform: rotate(-90deg); margin: 80px -70px; accent-color: var(--gold); }

        #cam-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #three-container { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

        .watermark-group { position: fixed; bottom: 180px; left: 20px; z-index: 500; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .brand-text { font-size: 24px; color: var(--gold); font-weight: 900; }

        #fairy-thumb { position: fixed; top: 20px; right: 20px; width: 100px; height: 100px; border: 2px solid var(--gold); border-radius: 10px; z-index: 600; display: none; background-size: cover; background-position: center; }

        .panel { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); border-top: 1px solid var(--gold); z-index: 1000; padding: 15px; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn { padding: 10px 5px; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="wallet-info">錢包未連接</div>
<video id="cam-video" autoplay playsinline></video>
<div id="three-container"></div>
<div id="fairy-thumb"></div>

<div class="watermark-group">
    <div class="brand-text">K線西遊記 花果山台灣</div>
    <div id="live-time" style="font-size:12px;"></div>
    <div id="wish-text" style="color:var(--cyan); font-size:14px;"></div>
</div>

<div class="stick l-stick"><input type="range" id="curv" class="vert" min="0" max="150" value="75"></div>
<div class="stick r-stick"><input type="range" id="angle" class="vert" min="0" max="360" value="180"></div>

<div class="panel">
    <div class="btn-grid">
        <button class="btn" onclick="app.connectWallet()">🦊 連接錢包</button>
        <button class="btn" onclick="app.toggleCam()">📸 開相機</button>
        <button class="btn" onclick="app.toggleFairy()">🧚 仙女合照</button>
        <button class="btn" onclick="app.capture()">📷 拍照下載</button>
        <button class="btn" onclick="app.trade('LONG')">📈 做多</button>
        <button class="btn" onclick="app.trade('SHORT')">📉 做空</button>
        <button class="btn" onclick="app.setWish()">🙏 許願</button>
        <button class="btn" onclick="app.speak('西遊修行中')">🎙️ AI客服</button>
    </div>
</div>

<script>
const app = {
    fairyImg: "https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png",
    userAddr: null,
    
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-container').appendChild(this.renderer.domElement);
        this.camera.position.z = 10;
        document.getElementById('fairy-thumb').style.backgroundImage = `url(${this.fairyImg})`;
        setInterval(() => { document.getElementById('live-time').innerText = new Date().toLocaleString(); }, 1000);
        this.animate();
    },

    async connectWallet() {
        if (window.ethereum) {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                this.userAddr = await signer.getAddress();
                const balance = await provider.getBalance(this.userAddr);
                const ethStr = ethers.utils.formatEther(balance).substring(0, 6);
                document.getElementById('wallet-info').innerText = `${this.userAddr.substring(0,6)}... | ${ethStr} ETH`;
                this.speak("錢包已連接，花果山能量注入成功。");
            } catch (e) { this.speak("錢包連線失敗。"); }
        } else {
            this.speak("未偵測到錢包。請安裝 MetaMask、Trust 或 OKX 錢包。");
            window.open("https://metamask.io/", "_blank");
        }
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const ang = parseInt(document.getElementById('angle').value);
        const crv = document.getElementById('curv').value;
        this.renderer.render(this.scene, this.camera);
    },

    async toggleCam() {
        const v = document.getElementById('cam-video');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        v.srcObject = stream;
    },

    toggleFairy() {
        const f = document.getElementById('fairy-thumb');
        f.style.display = (f.style.display === 'none' || !f.style.display) ? 'block' : 'none';
    },

    capture() {
        const v = document.getElementById('cam-video');
        const c3d = this.renderer.domElement;
        const out = document.createElement('canvas');
        out.width = v.videoWidth || 800; out.height = v.videoHeight || 600;
        const ctx = out.getContext('2d');
        ctx.drawImage(v, 0, 0, out.width, out.height);
        ctx.drawImage(c3d, 0, 0, out.width, out.height);
        
        ctx.fillStyle = "#ffd778"; ctx.font = "bold 30px Noto Sans TC";
        ctx.fillText("K線西遊記 花果山台灣", 30, out.height - 100);
        ctx.fillStyle = "#fff"; ctx.font = "20px Orbitron";
        ctx.fillText(new Date().toLocaleString(), 30, out.height - 60);

        const link = document.createElement('a');
        link.download = "KGEN_MEMO.png";
        link.href = out.toDataURL();
        link.click();
    },

    trade(t) {
        if(!this.userAddr) return this.connectWallet();
        this.speak(`準備發起${t === 'LONG' ? '做多' : '做空'}合約，請在錢包點擊確認。`);
        alert(`發送交易指令到錢包: ${t}`);
    },

    setWish() {
        const w = prompt("輸入許願內容：");
        document.getElementById('wish-text').innerText = w ? `願：${w}` : "";
    },

    speak(m) {
        const u = new SpeechSynthesisUtterance(m);
        u.lang = 'zh-TW';
        window.speechSynthesis.speak(u);
    }
};

window.onload = () => app.init();
</script>
</body>
</html>
