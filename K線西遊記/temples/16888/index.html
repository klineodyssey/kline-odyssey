<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜正名演化金融生命體</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; --energy: #ffcc00; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }

        /* 🏛️ 頂部正名：KGEN 修正 */
        .hud-header { position: fixed; top: 15px; width: 96%; left: 2%; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .brand-box { border-left: 5px solid var(--gold); padding-left: 15px; background: rgba(0,0,0,0.5); }
        .brand-name { font-size: 26px; color: var(--gold); text-shadow: 0 0 15px var(--gold); letter-spacing: 2px; }
        .ga-tag { font-family: 'Orbitron'; color: var(--energy); font-size: 14px; margin-top: 5px; }

        /* 📉 KGEN 能量階梯：黃色視覺強化 */
        .energy-module { position: fixed; right: 40px; top: 50%; transform: translateY(-50%); z-index: 120; text-align: center; }
        .energy-tower { display: flex; flex-direction: column-reverse; gap: 5px; margin-bottom: 10px; }
        .energy-step { width: 50px; height: 14px; background: #221a00; border: 1px solid #443300; transition: all 0.2s; box-shadow: inset 0 0 5px #000; }
        .energy-step.active { background: var(--energy); box-shadow: 0 0 15px var(--energy), inset 0 0 10px #fff; border-color: #fff; }
        .energy-label { color: var(--energy); font-family: 'Orbitron'; font-size: 12px; font-weight: 700; text-shadow: 0 0 5px var(--energy); }

        /* 🚀 曲速器官：KGEN 推進感 */
        .warp-module { position: fixed; left: 30px; top: 50%; transform: translateY(-50%); z-index: 120; width: 80px; text-align: center; }
        .warp-rail { height: 350px; width: 14px; background: #111; border: 2px solid var(--cyan); position: relative; margin: 0 auto; border-radius: 7px; }
        #warp-thumb { width: 50px; height: 25px; background: linear-gradient(var(--cyan), #0088ff); position: absolute; left: -18px; bottom: 33%; cursor: pointer; border-radius: 4px; box-shadow: 0 0 20px var(--cyan); border: 1px solid #fff; z-index: 10; }
        .warp-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-appearance: slider-vertical; opacity: 0; cursor: pointer; }

        /* 🧚 核心生命體 */
        #core-anchor { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 380px; height: 380px; z-index: 50; }
        #core-window { width: 100%; height: 100%; border-radius: 50%; border: 10px double var(--gold); overflow: hidden; background: #000; position: relative; transition: transform 0.1s linear; }
        #fairy-img { width: 100%; height: 100%; object-fit: cover; }
        #webcam-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; }
        #mini-fairy { position: absolute; top: 20px; right: 20px; width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--gold); display: none; z-index: 110; background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover; }
        #wish-text { position: absolute; bottom: 45px; left: 45px; z-index: 85; color: #fff; font-weight: 900; font-size: 20px; text-shadow: 0 0 10px #000; }

        .steer-panel { position: fixed; bottom: 170px; width: 100%; text-align: center; z-index: 100; }
        .angle-val { font-family: 'Orbitron'; font-size: 48px; color: var(--cyan); }

        .footer-terminal { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 3px solid var(--gold); display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 100; }
        .btn { background: #0a0a0a; border: 1px solid #444; color: #fff; padding: 15px 2px; font-weight: 900; cursor: pointer; font-size: 12px; }
        .btn.kgen-boost { border-color: var(--energy); color: var(--energy); box-shadow: 0 0 10px rgba(255,204,0,0.2); }
        canvas#galaxy { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="hud-header">
    <div class="brand-box">
        <div class="brand-name">花果山台灣廣寒宮 16888</div>
        <div class="ga-tag" id="ga-status">EVO LEVEL: GA-600</div>
    </div>
    <div style="text-align:right; font-family:'Orbitron'; color:var(--energy);" id="clock"></div>
</div>

<div class="energy-module">
    <div class="energy-tower" id="energy-tower"></div>
    <div class="energy-label">KGEN ENERGY</div>
</div>

<div class="warp-module">
    <div class="warp-rail">
        <div id="warp-thumb"></div>
        <input type="range" id="warp-in" class="warp-input" min="0" max="300" value="100">
    </div>
    <div style="color:var(--cyan); font-family:'Orbitron'; font-size:14px; margin-top:15px;" id="warp-val">100x</div>
</div>

<div id="core-anchor">
    <div id="core-window">
        <div id="wish-text">大聖駕到，光耀廣寒</div>
        <img id="fairy-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png" crossorigin="anonymous">
        <video id="webcam-view" autoplay playsinline></video>
        <div id="mini-fairy"></div>
    </div>
</div>

<canvas id="galaxy"></canvas>
<canvas id="export-canvas" style="display:none;"></canvas>

<div class="steer-panel">
    <div class="angle-val" id="angle-txt">76°</div>
    <input type="range" id="steer-in" style="width:70%; accent-color:var(--gold);" min="-180" max="180" value="76">
</div>

<div class="footer-terminal">
    <button class="btn" onclick="app.capture()">📸 拍照存證</button>
    <button class="btn" onclick="app.cam('user')">🤳 前鏡自拍</button>
    <button class="btn" onclick="app.cam('environment')">🌌 後鏡巡航</button>
    <button class="btn kgen-boost" onclick="app.boost()">💎 KGEN 沖等演化</button>
    <button class="btn kgen-boost" onclick="app.autoHunt()">⚔️ 自動巡航打怪</button>
    <button class="btn" onclick="app.setWish()">👤 許願/還願</button>
    <button class="btn" onclick="app.speak('KGEN 系統優化中')">🧬 GA 優化</button>
    <button class="btn" onclick="location.reload()">🔄 重啟系統</button>
</div>

<script>
const app = {
    isCam: false, camMode: 'user', ga: 600,
    init() {
        this.initThree(); this.buildEnergy(); this.bind();
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString();
            if(Math.random() > 0.8) this.updateEnergy();
        }, 1000);
        this.speak("KGEN 金融生命體 v3.0 已正名。GA 600 演化引擎就緒。");
    },
    buildEnergy() {
        const tower = document.getElementById('energy-tower');
        for(let i=0; i<15; i++) {
            const step = document.createElement('div');
            step.className = 'energy-step';
            tower.appendChild(step);
        }
        this.updateEnergy();
    },
    updateEnergy() {
        const steps = document.querySelectorAll('.energy-step');
        const activeCount = Math.floor((this.ga / 1000) * 15) + (Math.random() > 0.5 ? 1 : 0);
        steps.forEach((s, i) => s.className = i < activeCount ? 'energy-step active' : 'energy-step');
    },
    boost() {
        if(this.ga < 1000) {
            this.ga += 50; this.updateEnergy();
            document.getElementById('ga-status').innerText = `EVO LEVEL: GA-${this.ga}`;
            this.speak(`KGEN 注入成功，演化等級提升至 ${this.ga}`);
        } else { this.speak("已達 KGEN 巔峰演化態。"); }
    },
    autoHunt() {
        this.speak("自動巡航打怪啟動，正在套用 GA 優化參數。");
        const original = document.getElementById('wish-text').innerText;
        document.getElementById('wish-text').innerText = "⚔️ KGEN 自動打怪中...";
        setTimeout(() => document.getElementById('wish-text').innerText = original, 3000);
    },
    async cam(mode) {
        const v = document.getElementById('webcam-view'), f = document.getElementById('fairy-img'), m = document.getElementById('mini-fairy');
        if (this.isCam && this.camMode === mode) {
            this.stream.getTracks().forEach(t => t.stop());
            v.style.opacity = 0; f.style.opacity = 1; m.style.display = 'none';
            this.isCam = false; return;
        }
        try {
            if(this.stream) this.stream.getTracks().forEach(t => t.stop());
            this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
            v.srcObject = this.stream; v.style.opacity = 1; f.style.opacity = 0; m.style.display = 'block';
            v.style.transform = mode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            this.isCam = true; this.camMode = mode;
        } catch(e) { alert("攝像頭啟動失敗"); }
    },
    capture() {
        const canvas = document.getElementById('export-canvas'), ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 1000;
        const v = document.getElementById('webcam-view'), f = document.getElementById('fairy-img');
        if(this.isCam) {
            if(this.camMode === 'user') { ctx.translate(1000,0); ctx.scale(-1,1); }
            ctx.drawImage(v, 0, 0, 1000, 1000);
            ctx.setTransform(1,0,0,1,0,0);
            ctx.drawImage(f, 750, 50, 200, 200);
        } else ctx.drawImage(f, 0, 0, 1000, 1000);
        
        ctx.fillStyle = "#ffd778"; ctx.font = "bold 40px Noto Sans TC";
        ctx.fillText("花果山台灣廣寒宮 16888", 50, 80);
        ctx.fillStyle = "#ffcc00"; ctx.font = "24px Orbitron";
        ctx.fillText(`KGEN EVO: GA-${this.ga}`, 50, 120);
        ctx.fillStyle = "#fff"; ctx.font = "bold 45px Noto Sans TC";
        ctx.fillText(document.getElementById('wish-text').innerText, 70, 930);
        
        const link = document.createElement('a'); link.download = `KGEN_3.0_STAMP.png`;
        link.href = canvas.toDataURL(); link.click();
    },
    setWish() {
        const m = prompt("大聖請開金口：", "大聖駕到，光耀廣寒");
        if(m) document.getElementById('wish-text').innerText = m;
    },
    bind() {
        document.getElementById('steer-in').oninput = (e) => {
            const v = e.target.value;
            document.getElementById('angle-txt').innerText = v + '°';
            document.getElementById('core-window').style.transform = `rotate(${v}deg)`;
        };
        document.getElementById('warp-in').oninput = (e) => {
            const v = e.target.value;
            document.getElementById('warp-val').innerText = v + "x";
            document.getElementById('warp-thumb').style.bottom = (v / 300 * 100) + '%';
        };
    },
    initThree() {
        const sc = new THREE.Scene(), cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy'), antialias: true, alpha: true });
        rd.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry(), pos = new Float32Array(5000 * 3);
        for(let i=0; i<15000; i++) pos[i] = (Math.random() - 0.5) * 160;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15 }));
        sc.add(pts); cam.position.z = 50;
        const anim = () => {
            requestAnimationFrame(anim);
            const w = document.getElementById('warp-in').value / 60;
            if(w > 0) {
                const r = (parseFloat(document.getElementById('steer-in').value) * Math.PI) / 180;
                const p = pts.geometry.attributes.position.array;
                for(let i=0; i<p.length; i+=3) {
                    p[i] -= Math.sin(r) * w; p[i+1] -= Math.cos(r) * w;
                    if(p[i]>80) p[i]=-80; if(p[i]<-80) p[i]=80;
                    if(p[i+1]>80) p[i+1]=-80; if(p[i+1]<-80) p[i+1]=80;
                }
                pts.geometry.attributes.position.needsUpdate = true;
            }
            rd.render(sc, cam);
        };
        anim();
    },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
