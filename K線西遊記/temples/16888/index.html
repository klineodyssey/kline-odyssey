<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜混沌生命演化矩陣</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --energy: #ffcc00; --red: #ff3333; --pink: #ff66cc; }
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }

        /* 🏛️ 頂部：500神位 + 500豪宅 + 彩金池 (器官長大) */
        .hud-top { position: fixed; top: 10px; width: 98%; left: 1%; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 15px; z-index: 100; }
        .stat-group { background: rgba(20,20,0,0.8); border: 1px solid var(--gold); padding: 5px; font-size: 10px; }
        .grid-500 { display: grid; grid-template-columns: repeat(25, 1fr); gap: 1px; margin-top: 3px; }
        .dot { width: 4px; height: 4px; background: #222; }
        .dot.active { background: var(--energy); box-shadow: 0 0 5px var(--energy); }
        .jackpot { font-family: 'Orbitron'; font-size: 24px; color: var(--gold); text-align: center; text-shadow: 0 0 10px var(--gold); }

        /* 🚀 左側：曲速引擎 (肌肉拉桿 + 黃色階圖油箱) */
        .warp-engine { position: fixed; left: 30px; top: 50%; transform: translateY(-50%); z-index: 150; }
        .warp-rail { height: 400px; width: 35px; background: #111; border: 3px solid var(--gold); position: relative; border-radius: 5px; overflow: hidden; }
        #energy-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #ff0000, var(--energy), #fff); transition: height 0.1s; }
        #warp-handle { width: 60px; height: 25px; background: #fff; position: absolute; left: -15px; bottom: 33%; border-radius: 4px; z-index: 20; border: 2px solid var(--cyan); box-shadow: 0 0 20px #fff; }
        .warp-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-appearance: slider-vertical; opacity: 0; cursor: pointer; z-index: 30; }

        /* ♈ 12+1 生肖點燈 (新器官) */
        .zodiac-circle { position: fixed; right: 20px; top: 50px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; z-index: 100; }
        .zodiac-lamp { width: 35px; height: 35px; border: 1px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #666; }
        .zodiac-lamp.on { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        /* 🧬 DNA/RNA 與 生殖演化矩陣 */
        .bio-engine { position: fixed; right: 20px; bottom: 180px; width: 180px; background: rgba(30,0,30,0.7); border: 1px solid var(--pink); padding: 10px; z-index: 100; font-family: 'Orbitron'; }
        .dna-str { font-size: 10px; color: var(--pink); white-space: nowrap; overflow: hidden; animation: scroll 2s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* 🧚 核心生命體 (受精/分裂模式) */
        #core-anchor { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 380px; height: 380px; z-index: 50; }
        #core-window { width: 100%; height: 100%; border-radius: 50%; border: 10px double var(--gold); overflow: hidden; position: relative; transition: 0.1s; }
        #fairy-img { width: 100%; height: 100%; object-fit: cover; filter: hue-rotate(0deg); }
        .sperm { position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; pointer-events: none; }

        /* ⛽ 血量與油箱 */
        .vitals { position: fixed; left: 150px; bottom: 180px; width: 250px; z-index: 100; }
        .bar-wrap { height: 15px; background: #222; border: 1px solid #444; margin-top: 5px; position: relative; }
        .bar-inner { height: 100%; transition: width 0.3s; }

        .footer-terminal { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 4px solid var(--gold); display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 200; }
        .btn { background: #111; border: 1px solid #444; color: #fff; padding: 12px 2px; font-weight: 900; cursor: pointer; font-size: 12px; }
        .btn.kgen { border-color: var(--energy); color: var(--energy); }
        .btn.sex { border-color: var(--pink); color: var(--pink); }

        canvas#bg { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="hud-top">
    <div class="stat-group">
        <div>🏛️ 齊天神明席位 (500)</div>
        <div class="grid-500" id="god-grid"></div>
    </div>
    <div class="stat-group">
        <div class="jackpot">💰 KGEN 彩金池: $16,888,777,000</div>
        <div style="display:flex; justify-content: space-around; margin-top:5px;">
            <span>DNA: ATCG-READY</span><span>RNA: TRANS-ON</span>
        </div>
    </div>
    <div class="stat-group">
        <div>🐒 齊天豪宅席位 (500)</div>
        <div class="grid-500" id="mansion-grid"></div>
    </div>
</div>

<div class="zodiac-circle" id="zodiac-box"></div>

<div class="warp-engine">
    <div class="warp-rail">
        <div id="energy-fill"></div>
        <div id="warp-handle"></div>
        <input type="range" id="warp-in" class="warp-input" min="0" max="100" value="33">
    </div>
</div>

<div class="vitals">
    HP 血量 <div class="bar-wrap"><div class="bar-inner" style="width:88%; background:var(--red);"></div></div>
    FUEL 油箱 <div class="bar-wrap"><div class="bar-inner" id="fuel-bar" style="width:33%; background:var(--energy);"></div></div>
</div>

<div class="bio-engine">
    <div class="dna-str">A-T-C-G-G-C-T-A-T-A-C-G-G-A-T</div>
    <div style="font-size:12px; color:var(--pink); margin-top:5px;">🧬 演化生殖中...</div>
    <div id="evo-status" style="font-size:10px; color:#fff;">GA-600 ACTIVE</div>
</div>

<div id="core-anchor">
    <div id="core-window">
        <div id="wish-txt" style="position:absolute; top:20%; width:100%; text-align:center; font-size:24px; font-weight:900; text-shadow:0 0 10px #000; z-index:80;">許願/還願</div>
        <img id="fairy-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png">
    </div>
</div>

<canvas id="bg"></canvas>

<div class="footer-terminal">
    <button class="btn kgen" onclick="app.autoHunt()">⚔️ 巡航打怪</button>
    <button class="btn sex" onclick="app.makeLove()">🧬 精卵結合(演化)</button>
    <button class="btn" onclick="app.setWish()">🙏 許願/還願</button>
    <button class="btn kgen" onclick="app.boost()">💎 KGEN 沖等</button>
    <button class="btn" onclick="app.capture()">📸 拍照存證</button>
    <button class="btn" onclick="app.toggleCam()">🤳 切換鏡頭</button>
    <button class="btn" id="rec-btn" onclick="app.toggleRec()">🔴 錄像紀錄</button>
    <button class="btn" onclick="location.reload()">🔄 器官重組</button>
</div>

<script>
const app = {
    ga: 600,
    init() {
        this.initThree(); this.buildGrids(); this.bind();
        setInterval(() => this.tick(), 100);
        this.speak("KGEN 混沌生命完全體已就緒。器官正在自我修復與增長。");
    },
    buildGrids() {
        const gods = document.getElementById('god-grid');
        const mans = document.getElementById('mansion-grid');
        for(let i=0; i<100; i++) { // 先填充100個示意，實際可增長
            gods.appendChild(document.createElement('div')).className = 'dot active';
            mans.appendChild(document.createElement('div')).className = 'dot active';
        }
        const z = ["鼠","牛","虎","兔","龍","蛇","馬","羊","猴","雞","狗","豬","貓"];
        const zbox = document.getElementById('zodiac-box');
        z.forEach(s => {
            const l = document.createElement('div');
            l.className = 'zodiac-lamp' + (Math.random()>0.5?' on':'');
            l.innerText = s; zbox.appendChild(l);
        });
    },
    tick() {
        if(Math.random() > 0.95) {
            document.querySelectorAll('.dot').forEach(d => d.classList.toggle('active', Math.random()>0.3));
        }
    },
    makeLove() {
        this.speak("DNA 與 RNA 正在交叉互補，GA 演化精子已進入結合期。");
        for(let i=0; i<20; i++) {
            const s = document.createElement('div');
            s.className = 'sperm';
            s.style.left = '50%'; s.style.top = '50%';
            document.getElementById('core-window').appendChild(s);
            const angle = Math.random() * Math.PI * 2;
            const dist = 200;
            s.animate([
                { transform: `translate(0,0)`, opacity: 1 },
                { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
            ], { duration: 1000, easing: 'ease-out' }).onfinish = () => s.remove();
        }
        this.ga += 10;
        document.getElementById('evo-status').innerText = `GA-${this.ga} EVOLVING`;
        document.getElementById('fairy-img').style.filter = `hue-rotate(${this.ga}deg)`;
    },
    updateWarp(val) {
        document.getElementById('energy-fill').style.height = val + '%';
        document.getElementById('warp-handle').style.bottom = `calc(${val}% - 12px)`;
        document.getElementById('fuel-bar').style.width = val + '%';
    },
    setWish() {
        const m = prompt("向 KGEN 許願：", "大聖駕到，光耀廣寒");
        if(m) document.getElementById('wish-txt').innerText = m;
    },
    autoHunt() { this.speak("自動巡航打怪中，16888 彩金池鎖定。"); },
    boost() { this.ga += 100; this.updateWarp(100); this.speak("KGEN 強制沖等，器官進化。"); },
    bind() {
        document.getElementById('warp-in').oninput = (e) => this.updateWarp(e.target.value);
    },
    initThree() {
        const sc = new THREE.Scene(), cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ canvas: document.getElementById('bg'), antialias: true, alpha: true });
        rd.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry(), pos = new Float32Array(5000 * 3);
        for(let i=0; i<15000; i++) pos[i] = (Math.random()-0.5)*200;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.1 }));
        sc.add(pts); cam.position.z = 100;
        const anim = () => {
            requestAnimationFrame(anim);
            pts.rotation.y += 0.002;
            rd.render(sc, cam);
        };
        anim();
    },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
