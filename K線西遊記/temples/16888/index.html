<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜Web3 金融生命體</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; --panel: rgba(0, 20, 32, 0.9); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }

        /* 🏛️ 頂部：品牌、錢包與 GA 狀態 */
        .hud-header { position: fixed; top: 15px; width: 96%; left: 2%; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .brand-section { border-left: 5px solid var(--gold); padding-left: 15px; background: linear-gradient(90deg, var(--panel), transparent); }
        .wallet-status { font-family: 'Orbitron'; color: var(--cyan); font-size: 12px; margin-top: 5px; letter-spacing: 1px; }

        /* 🚀 曲速器官：感官強化版 */
        .warp-module { position: fixed; left: 30px; top: 50%; transform: translateY(-50%); z-index: 120; width: 80px; text-align: center; }
        .warp-rail { height: 350px; width: 14px; background: #111; border: 2px solid var(--cyan); position: relative; margin: 0 auto; border-radius: 10px; box-shadow: 0 0 15px rgba(0,242,255,0.3); }
        #warp-thumb { width: 50px; height: 25px; background: linear-gradient(var(--cyan), #0088ff); position: absolute; left: -18px; bottom: 40%; cursor: pointer; border-radius: 4px; box-shadow: 0 0 20px var(--cyan); border: 1px solid #fff; }
        .warp-input-proxy { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-appearance: slider-vertical; opacity: 0; cursor: pointer; }
        .warp-label { margin-top: 20px; color: var(--cyan); font-family: 'Orbitron'; font-size: 16px; text-shadow: 0 0 10px var(--cyan); }

        /* 🧚 核心圓窗 */
        #core-anchor { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 380px; height: 380px; z-index: 50; }
        #core-window { width: 100%; height: 100%; border-radius: 50%; border: 10px double var(--gold); overflow: hidden; background: #000; position: relative; transition: transform 0.1s linear; box-shadow: 0 0 60px rgba(255,215,120,0.2); }
        #fairy-img { width: 100%; height: 100%; object-fit: cover; }
        #webcam-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; }
        #mini-fairy { position: absolute; top: 20px; right: 20px; width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--gold); display: none; z-index: 110; background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover; }
        #wish-text { position: absolute; bottom: 45px; left: 45px; z-index: 85; color: #fff; font-weight: 900; font-size: 20px; text-shadow: 0 0 10px var(--cyan); }

        /* 🎡 方向盤 */
        .steer-display { position: fixed; bottom: 170px; width: 100%; text-align: center; z-index: 100; }
        .angle-val { font-family: 'Orbitron'; font-size: 52px; color: var(--cyan); }

        /* 🛠️ 控制台 */
        .footer-terminal { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; border-top: 3px solid var(--gold); display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 100; }
        .btn { background: #0a0a0a; border: 1px solid #444; color: #fff; padding: 15px 2px; font-weight: 900; cursor: pointer; font-size: 13px; border-radius: 4px; }
        .btn:active { background: var(--gold); color: #000; }
        canvas#galaxy { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="hud-header">
    <div class="brand-section">
        <div style="font-size:26px; color:var(--gold); font-weight:900;">花果山台灣廣寒宮 16888</div>
        <div class="wallet-status" id="wallet-info">WALLET: NOT CONNECTED</div>
        <div style="font-family:'Orbitron'; color:var(--cyan); font-size:12px;" id="ga-level">GA: 100 (HIGH-PLAYER)</div>
    </div>
    <div style="text-align:right; font-family:'Orbitron'; color:var(--cyan); padding-top:10px;" id="clock"></div>
</div>

<div class="warp-module">
    <div class="warp-rail">
        <div id="warp-thumb"></div>
        <input type="range" id="warp-slider" class="warp-input-proxy" min="0" max="300" value="100">
    </div>
    <div class="warp-label" id="warp-read">WARP 100x</div>
</div>

<div id="core-anchor">
    <div id="core-window">
        <div id="wish-text">大聖駕到，光耀廣寒</div>
        <img id="fairy-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png" crossorigin="anonymous">
        <video id="webcam-view" autoplay playsinline></video>
        <div id="mini-fairy"></div>
    </div>
</div>

<canvas id="galaxy"></canvas>
<canvas id="export-canvas" style="display:none;"></canvas>

<div class="steer-display">
    <div class="angle-val" id="angle-txt">76°</div>
    <input type="range" id="steer-in" style="width:70%; accent-color:var(--gold);" min="-180" max="180" value="76">
</div>

<div class="footer-terminal">
    <button class="btn" onclick="app.capture()">📸 拍照存證</button>
    <button class="btn" onclick="app.cam('user')">🤳 前鏡自拍</button>
    <button class="btn" onclick="app.cam('environment')">🌌 後鏡巡航</button>
    <button class="btn" onclick="app.setWish()">👤 許願/還願</button>
    <button class="btn" onclick="app.connectWallet()">🦊 錢包連線</button>
    <button class="btn" onclick="app.evolve()">🧬 GA 演化</button>
    <button class="btn" onclick="app.speak('正在同步 K 線分紅數據')">📈 分紅計算</button>
    <button class="btn" onclick="location.reload()">🔄 重啟系統</button>
</div>

<script>
const app = {
    isCam: false, camMode: 'user', ga: 100, wallet: null,
    init() {
        this.initThree(); this.bind();
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleString(), 1000);
        this.speak("廣寒宮金融生命體 v2.5 啟動。錢包系統與曲速感應器已就緒。");
    },
    async connectWallet() {
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                this.wallet = accounts[0];
                const display = this.wallet.substring(0,6) + '...' + this.wallet.substring(38);
                document.getElementById('wallet-info').innerText = `WALLET: ${display}`;
                document.getElementById('wallet-info').style.color = "#00ff00";
                this.speak("錢包已成功掛載，廣寒宮資產已同步。");
            } catch (e) { alert("錢包連線取消"); }
        } else { alert("請安裝 MetaMask 錢包"); }
    },
    evolve() {
        this.ga += 100;
        const rank = this.ga >= 600 ? "BANK ELITE" : "HIGH-PLAYER";
        document.getElementById('ga-level').innerText = `GA: ${this.ga} (${rank})`;
        this.speak(`DNA 演化至 GA ${this.ga}`);
    },
    setWarp(v) {
        document.getElementById('warp-read').innerText = v == 0 ? "STALL" : `WARP ${v}x`;
        document.getElementById('warp-thumb').style.bottom = (v / 300 * 100) + '%';
    },
    async cam(mode) {
        const v = document.getElementById('webcam-view'), f = document.getElementById('fairy-img'), m = document.getElementById('mini-fairy');
        if (this.isCam && this.camMode === mode) {
            this.stream.getTracks().forEach(t => t.stop());
            v.style.opacity = 0; f.style.opacity = 1; m.style.display = 'none';
            this.isCam = false; return;
        }
        try {
            if(this.stream) this.stream.getTracks().forEach(t => t.stop());
            this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
            v.srcObject = this.stream; v.style.opacity = 1; f.style.opacity = 0; m.style.display = 'block';
            v.style.transform = mode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            this.isCam = true; this.camMode = mode;
        } catch(e) { alert("攝像頭連接失敗"); }
    },
    setWish() {
        const msg = prompt("大聖請開金口：", "大聖駕到，光耀廣寒");
        if(msg) document.getElementById('wish-text').innerText = msg;
    },
    capture() {
        const canvas = document.getElementById('export-canvas'), ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 1000;
        const v = document.getElementById('webcam-view'), f = document.getElementById('fairy-img');
        if(this.isCam) {
            if(this.camMode === 'user') { ctx.translate(1000,0); ctx.scale(-1,1); }
            ctx.drawImage(v, 0, 0, 1000, 1000);
            ctx.setTransform(1,0,0,1,0,0);
            ctx.drawImage(f, 750, 50, 200, 200);
        } else ctx.drawImage(f, 0, 0, 1000, 1000);
        
        ctx.fillStyle = "#ffd778"; ctx.font = "bold 38px Noto Sans TC";
        ctx.fillText("花果山台灣廣寒宮 16888", 50, 80);
        ctx.fillStyle = "#00f2ff"; ctx.font = "24px Orbitron";
        ctx.fillText(`GA: ${this.ga} | WALLET: ${this.wallet || 'NONE'}`, 50, 120);
        ctx.fillText(new Date().toLocaleString(), 50, 155);
        ctx.fillStyle = "#fff"; ctx.font = "bold 45px Noto Sans TC";
        ctx.fillText(document.getElementById('wish-text').innerText, 70, 930);
        
        const link = document.createElement('a'); link.download = `KGEN_WEB3_STAMP.png`;
        link.href = canvas.toDataURL(); link.click();
        this.speak("金融生命存證照片已封裝。");
    },
    bind() {
        document.getElementById('steer-in').oninput = (e) => {
            const val = e.target.value;
            document.getElementById('angle-txt').innerText = val + '°';
            document.getElementById('core-window').style.transform = `rotate(${val}deg)`;
        };
        document.getElementById('warp-slider').oninput = (e) => this.setWarp(e.target.value);
    },
    initThree() {
        const sc = new THREE.Scene(), cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy'), antialias: true, alpha: true });
        rd.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry(), pos = new Float32Array(5000 * 3);
        for(let i=0; i<15000; i++) pos[i] = (Math.random() - 0.5) * 160;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15 }));
        sc.add(pts); cam.position.z = 50;
        const anim = () => {
            requestAnimationFrame(anim);
            const w = document.getElementById('warp-slider').value / 60;
            if(w > 0) {
                const r = (parseFloat(document.getElementById('steer-in').value) * Math.PI) / 180;
                const p = pts.geometry.attributes.position.array;
                for(let i=0; i<p.length; i+=3) {
                    p[i] -= Math.sin(r) * w; p[i+1] -= Math.cos(r) * w;
                    if(p[i]>80) p[i]=-80; if(p[i]<-80) p[i]=80;
                    if(p[i+1]>80) p[i+1]=-80; if(p[i+1]<-80) p[i+1]=80;
                }
                pts.geometry.attributes.position.needsUpdate = true;
            }
            rd.render(sc, cam);
        };
        anim();
    },
    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
