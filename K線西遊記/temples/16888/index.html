/* ===========================
   WEB3 合約對齊（PoolDuel + MoonTrust）
   - PoolDuel：下單即真成交，輸贏在池內即時結算
   - MoonTrust：達標後由 Oracle settleRound，玩家做 vow（1~2 KGEN）表態，雙方表態可領紅包托管
   =========================== */
const web3 = {
  provider: null,
  signer: null,
  addr: null,
  demo: false,

  // ==== chain guard (BSC) ====
  BSC_CHAIN_ID_DEC: 56,
  BSC_CHAIN_ID_HEX: "0x38",
  async ensureBSC(){
    if(!window.ethereum) return true;
    try{
      const cid = await window.ethereum.request({ method:"eth_chainId" });
      const el = document.getElementById("w3-chain");
      if(el) el.innerText = cid;
      if(cid && cid.toLowerCase() === this.BSC_CHAIN_ID_HEX) return true;

      // Try switch to BSC
      try{
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: this.BSC_CHAIN_ID_HEX }]
        });
      }catch(swErr){
        // If not added, try add chain then switch
        if(swErr && (swErr.code === 4902 || String(swErr.message||"").includes("Unrecognized chain"))){
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
              chainId: this.BSC_CHAIN_ID_HEX,
              chainName: "BNB Smart Chain",
              nativeCurrency: { name:"BNB", symbol:"BNB", decimals:18 },
              rpcUrls: ["https://bsc-dataseed.binance.org/","https://bsc-dataseed1.defibit.io/","https://bsc-dataseed1.ninicoin.io/"],
              blockExplorerUrls: ["https://bscscan.com"]
            }]
          });
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: this.BSC_CHAIN_ID_HEX }]
          });
        }else{
          throw swErr;
        }
      }
      const cid2 = await window.ethereum.request({ method:"eth_chainId" });
      const el2 = document.getElementById("w3-chain");
      if(el2) el2.innerText = cid2;
      return (cid2 && cid2.toLowerCase() === this.BSC_CHAIN_ID_HEX);
    }catch(e){
      console.warn("ensureBSC failed", e);
      return false;
    }
  },


  // 固定 Token（你給的）
  KGEN: "0xBA3d3810e58735cb6813bC1CDc5458C0d71432Be",

  // 你部署後填上（會自動記到 localStorage）
  UNIVERSE: "0xAbF1EBF153A69Cf383a1435AFC20F7232D893D63", // LIVE KGEN_16888_Universe_V5_2_0

  // 最小 ABI（對齊 Universe V5.2.0：入池 + 下單 + 查詢 + 事件）
  abiERC20: [
    "function approve(address spender, uint256 amount) external returns (bool)",
    "function allowance(address owner, address spender) external view returns (uint256)",
    "function balanceOf(address a) external view returns (uint256)",
    "function decimals() external view returns (uint8)"
  ],
  abiUniverse: [
    "function ritualDeposit(uint256 amount, bytes32 tag) external",
    "function placeOrder(uint8 side, uint256 amountIn) external",
    "function poolBalance() external view returns (uint256)",
    "function canTriggerRound() external view returns (bool)",
    "function minOrder() external view returns (uint256)",
    "function maxOrder() external view returns (uint256)",
    "function vowWindowSec() external view returns (uint32)",
    "function loveWindowSec() external view returns (uint32)",
    "function treasury8888() external view returns (address)",
    "function kgen() external view returns (address)",
    "function TRIGGER() external view returns (uint256)",
    "function MIN_FLOOR() external view returns (uint256)",
    "function ROUND_TOTAL() external view returns (uint256)",
    "function configLocked() external view returns (bool)",
    "function roundId() external view returns (uint256)",
    "function rounds(uint256) external view returns (address a,address b,uint40 settledAt,uint40 vowDeadlineAt,uint40 loveDeadlineAt,uint256 escrowA,uint256 escrowB,bool aVowed,bool bVowed,bool aClaimed,bool bClaimed,bool settled)",
    "event OrderPlaced(address indexed user,uint8 side,uint256 amountIn,uint256 feeTotal,uint256 feeToTreasury,uint256 feeToPool,uint256 stake)",
    "event OrderResolved(address indexed user,uint8 side,uint8 outcome,bool win,uint256 payout)",
    "event RoundTriggered(uint256 indexed roundId,address indexed playerA,address indexed playerB,uint256 poolBefore)",
    "event RoundSettled(uint256 indexed roundId,address indexed playerA,address indexed playerB,uint256 toAInstant,uint256 toBInstant,uint256 escrowA,uint256 escrowB,uint40 settledAt,uint40 vowDeadlineAt,uint40 loveDeadlineAt)",
    "event RitualDeposit(address indexed from,uint256 amount,bytes32 indexed tag)"
  ],

  // ===== helpers =====
  cKGEN(){ return new ethers.Contract(this.KGEN, this.abiERC20, this.signer); },
  cUNI(){ return new ethers.Contract(this.UNIVERSE, this.abiUniverse, this.signer); },

  load(){
    try{
      const u = localStorage.getItem("KGEN_16888_UNIVERSE_ADDR") || "";
      if(u && ethers.utils.isAddress(u)) this.UNIVERSE = u;
    }catch(_){}
    this.ui();
  },

  ui(){
const uel=document.getElementById('w3-uni'); if(uel) uel.innerText = this.UNIVERSE ? this.UNIVERSE : '未設定（可先 Demo）';
    (()=>{const el=document.getElementById("w3-mode"); if(el) el.innerText=this.demo ? "DEMO MODE" : "LIVE MODE";})();
  },

  setUniverseAddr(){
    const v = (document.getElementById("uni-addr-input").value || "").trim();
    if(!ethers.utils.isAddress(v)) return alert("合約地址格式錯誤");
    this.UNIVERSE = v;
    try{ localStorage.setItem("KGEN_16888_UNIVERSE_ADDR", v); }catch(_){}
    this.ui();
    this.refresh();
    app.speak("Universe 合約地址已設定。");
  },

  async connect(){
    try{
      if(!window.ethereum){
        this.demo = true;
        this.ui();
        app.speak("未偵測到錢包。已進入 Demo 模式，你仍可體驗玩法。");
        return;
      }
      await window.ethereum.request({ method:"eth_requestAccounts" });
      const okChain = await this.ensureBSC();
      if(!okChain){
        alert("請切到 BNB Smart Chain (BSC)。目前錢包在 Ethereum 或其他鏈，會導致顯示 ethereum 並無法續玩。");
        this.demo = true;
        this.ui();
        this.demoRefresh();
        return;
      }
      this.provider = new ethers.providers.Web3Provider(window.ethereum);
      try{ const net = await this.provider.getNetwork(); const ch = document.getElementById("w3-chain"); if(ch) ch.innerText = (net && (net.name||"") ? (net.name + " (" + net.chainId + ")") : ("chain " + (net?net.chainId:"--"))); }catch(_){ }
      this.signer = this.provider.getSigner();
      this.addr = await this.signer.getAddress();
const wa=document.getElementById('w3-addr'); if(wa) wa.innerText = this.addr;
      this.demo = false;
      this.ui();
      await this.refresh();
      await this.refreshUser();
      await this.bindEvents();
      app.speak("錢包已連線。廣寒宮誓約引擎已啟動。");
    }catch(e){
      console.error(e);
      this.demo = true;
      this.ui();
      alert("錢包連線失敗，已切回 Demo 模式");
    }

<script>
/* =========================
   Auto Battle Mode (v2.21.1)
   UI-only autopilot demo:
   - toggles auto steering/flow values if range inputs exist
   - animates steering/flow knobs and avatar image subtly
   Does NOT touch contract.
========================= */
(function(){
  function qs(sel){ return document.querySelector(sel); }
  const wheel = qs('#steer-knob') || qs('.steer-knob') || qs('#steer') || qs('.steer');
  const flow  = qs('#flow-knob')  || qs('.flow-knob')  || qs('#flow')  || qs('.flow');
  const avatar= qs('#hero') || qs('#avatar') || qs('.hero') || qs('.avatar') || qs('img[src*="fairy"]');

  const state = { on:false, raf:0, lastOrder:0 };

  // 方向盤角度 → 多空（依你的規則）
  // 0~90 與 0~-90 為多；90~180 與 -90~-180 為空
  function sideFromSteerDeg(deg){
    let a = Number(deg);
    if(!Number.isFinite(a)) a = 0;
    while(a > 180) a -= 360;
    while(a < -180) a += 360;
    return (a >= -90 && a <= 90) ? 'UP' : 'DOWN';
  }

  function step(ts){
    if(!state.on) return;
    const t = ts/1000;
    const a = (Math.sin(t*0.9)*0.5 + 0.5);     // 0..1
    const b = (Math.sin(t*0.7+1.2)*0.5 + 0.5); // 0..1

    // Update inputs if present
    const steerInput = qs('#steer-input') || qs('input[name="steer"]') || qs('#steerRange');
    const flowInput  = qs('#flow-input')  || qs('input[name="flow"]')  || qs('#flowRange');

    let steerDeg = 0;
    if(steerInput){
      const min = Number(steerInput.min||0), max = Number(steerInput.max||100);
      steerDeg = Math.round(min + a*(max-min));
      steerInput.value = steerDeg;
      steerInput.dispatchEvent(new Event('input', {bubbles:true}));
    }
    if(flowInput){
      const min = Number(flowInput.min||0), max = Number(flowInput.max||100);
      flowInput.value = Math.round(min + b*(max-min));
      flowInput.dispatchEvent(new Event('input', {bubbles:true}));
    }

    // Auto side tag + auto order (demo/live)
    const side = sideFromSteerDeg(steerDeg);
    const autoTag = document.getElementById('autoTag');
    if(autoTag){ autoTag.textContent = (side==='UP') ? 'AUTO: LONG' : 'AUTO: SHORT'; }

    // 每 2.4 秒自動下單/模擬一次（不改合約；是否真下單由 placeOrder 內部決定）
    if(ts - state.lastOrder > 2400){
      state.lastOrder = ts;
      if(typeof window.placeOrder === 'function'){
        window.placeOrder(side);
      }
    }

    // Visual motion
    if(wheel){ wheel.style.transform = `translateY(${Math.sin(t*1.4)*3}px) rotate(${(a*120-60).toFixed(1)}deg)`; }
    if(flow){  flow.style.transform  = `translateY(${Math.sin(t*1.2+0.7)*3}px) rotate(${(b*120-60).toFixed(1)}deg)`; }
    if(avatar){
      avatar.style.transform = `translateY(${Math.sin(t*0.8)*4}px) translateX(${Math.sin(t*0.6)*2}px)`;
      avatar.style.filter = `hue-rotate(${Math.floor(a*30-15)}deg)`;
    }

    state.raf = requestAnimationFrame(step);
  }

  window.app = window.app || {};
  window.app.toggleAutoBattle = function(){
    state.on = !state.on;
    const btn = document.getElementById('auto-battle-btn');
    if(btn) btn.textContent = state.on ? "🤖 自動打怪模式：ON" : "🤖 自動打怪模式：OFF";
    if(state.on){
      state.raf = requestAnimationFrame(step);
    }else{
      try{ cancelAnimationFrame(state.raf); }catch(e){}
      if(wheel) wheel.style.transform='';
      if(flow) flow.style.transform='';
      if(avatar){ avatar.style.transform=''; avatar.style.filter=''; }
    }
  };
})();

/* =========================
   AUTO CRUISE / AUTO BATTLE
   - Tied to bottom button: #btnAutoBattle
   - Simulates long/short swing, updates direction wheel + planet flow + GA mini-panel bars
   - Does NOT touch on-chain, does NOT auto-approve, purely UI simulation
========================= */
(function(){
  const AUTO = { on:false, t:null, phase:0, dir:1 };

  function qs(sel){ try{return document.querySelector(sel);}catch(e){return null;} }
  function qsa(sel){ try{return Array.from(document.querySelectorAll(sel));}catch(e){return [];} }

  function setElText(el, txt){ if(!el) return; el.textContent = txt; }
  function setRange(el, v){
    if(!el) return;
    const min = ("min" in el) ? Number(el.min||0) : 0;
    const max = ("max" in el) ? Number(el.max||100) : 100;
    const vv = Math.max(min, Math.min(max, v));
    el.value = String(vv);
    el.dispatchEvent(new Event("input", {bubbles:true}));
    el.dispatchEvent(new Event("change", {bubbles:true}));
  }

  function pickRange(candidates){
    for(const sel of candidates){
      const el = qs(sel);
      if(el && el.tagName === "INPUT" && (el.type||"").toLowerCase()==="range") return el;
    }
    // fallback: first visible range in page
    const all = qsa('input[type="range"]');
    for(const el of all){
      const r = el.getBoundingClientRect();
      if(r.width>40 && r.height>10) return el;
    }
    return null;
  }

  // likely controls (best-effort across versions)
  const steerRange = pickRange(["#steerRange","#rangeSteer","#steer","#dirRange","#wheelRange"]);
  const flowRange  = pickRange(["#flowRange","#rangeFlow","#flow","#planetFlowRange","#planetRange"]);

  // UI targets (best-effort)
  const autoBadge = qs("#autoBadge") || (function(){
    const b = document.createElement("div");
    b.id="autoBadge";
    b.style.cssText="position:fixed;left:12px;bottom:92px;z-index:99999;padding:8px 10px;border:1px solid rgba(255,215,120,.35);border-radius:12px;background:rgba(0,0,0,.55);color:#fff;font-weight:800;font-size:12px;letter-spacing:.5px;display:none;";
    b.textContent="AUTO: OFF";
    document.body.appendChild(b);
    return b;
  })();

  function setAutoUI(on, mode){
    autoBadge.style.display = on ? "block" : "none";
    autoBadge.textContent = on ? ("AUTO: "+mode) : "AUTO: OFF";
    autoBadge.style.boxShadow = on ? "0 0 18px rgba(255,215,120,.25)" : "none";
  }

  function syncVisuals(longMode, p){
    // direction wheel / joystick visual
    const wheel = qs("#directionWheel") || qs("#dirWheel") || qs(".direction-wheel") || qs(".wheel");
    if(wheel){
      const deg = (longMode ? 20 : -20) + (p*30);
      wheel.style.transform = `rotate(${deg}deg)`;
    }

    // planet flow / star stream
    const flow = qs("#planetFlow") || qs("#flowLine") || qs(".planet-flow") || qs(".flow-line");
    if(flow){
      const x = (longMode ? 1 : -1) * (p*18);
      flow.style.transform = `translateX(${x}px)`;
      flow.style.opacity = "1";
    }

    // main beauty ring subtle drift
    const ring = qs("#beautyRing") || qs(".beauty-ring") || qs(".main-ring");
    if(ring){
      ring.style.filter = longMode ? "drop-shadow(0 0 18px rgba(0,255,255,.18))" : "drop-shadow(0 0 18px rgba(255,120,120,.16))";
    }

    // GA mini bars sweep (left->right->reset)
    const bars = qsa(".ga-bar, .gaBar, [data-ga-bar]");
    if(bars.length){
      const w = Math.round(100 * p);
      bars.forEach(el=>{
        el.style.width = w + "%";
        el.style.opacity = "1";
      });
    }
  }

  function step(){
    AUTO.phase += 1;
    // ping-pong 0..1..0
    const raw = (AUTO.phase % 120) / 120; // 0..0.99
    const p = raw <= 0.5 ? raw*2 : (1-raw)*2;

    const longMode = (AUTO.phase % 240) < 120; // switch every ~120 ticks
    const modeTxt = longMode ? "LONG" : "SHORT";
    setAutoUI(true, modeTxt);

    // update ranges (if exist) so other listeners update the scene
    if(steerRange) setRange(steerRange, longMode ? 75 + p*20 : 25 - p*20);
    if(flowRange)  setRange(flowRange,  longMode ? 70 + p*25 : 30 - p*25);

    syncVisuals(longMode, p);
  }

  function toggleAuto(){
    AUTO.on = !AUTO.on;
    try{
      const badgeEl = qs("#autoModeBadge");
      if(badgeEl) badgeEl.textContent = AUTO.on ? "ON" : "OFF";
    }catch(e){}
    if(AUTO.on){
      setAutoUI(true, "LONG");
      if(AUTO.t) clearInterval(AUTO.t);
      AUTO.t = setInterval(step, 250);
    }else{
      if(AUTO.t) clearInterval(AUTO.t);
      AUTO.t = null;
      setAutoUI(false, "OFF");
    }
  }

  
  // keep backward-compat: older onclick calls app.autoHunt()
  try{ if(window.app){ window.app.autoHunt = toggleAuto; } }catch(e){}
// bind
  const btn = qs("#btnAutoBattle");
  if(btn){
    btn.addEventListener("click", function(e){
      e.preventDefault();
      e.stopPropagation();
      toggleAuto();
    }, {passive:false});
  }

  // expose
  window.__KGEN_AUTO_BATTLE__ = { toggle: toggleAuto };
})();
</script>

女"}, {"v": 16888, "n": "巧仙", "d": "天權做多｜四仙女"}, {"v": 17347, "n": "巧蘭", "d": "天衡做空｜五仙女"}, {"v": 18056, "n": "巧梅", "d": "闓陽做多｜六仙女"}, {"v": 18459, "n": "巧靈", "d": "瑤光多退｜七仙女"}];
  const MOON_POINT = 16888;
  const MOON_KM = 384400;

  function $(id) { return document.getElementById(id); }
  function toNum(x) {
    if (x === null || x === undefined) return NaN;
    if (typeof x === 'number') return x;
    const s = String(x).trim().replace(/,/g,'');
    if (!s) return NaN;
    return Number(s);
  }
  function fmt(x) {
    if (!isFinite(x)) return '--';
    // keep up to 4 decimals if small, else int
    const ax = Math.abs(x);
    if (ax >= 1000) return String(Math.round(x));
    if (ax >= 10) return x.toFixed(2);
    return x.toFixed(4);
  }
  function currentSteerDeg() {
    const el = $('steer-input-val');
    return el ? (toNum(el.textContent) || 0) : 0;
  }
  function sideFromDeg(deg) {
    // User rule:
    // 0..90 and 0..-90 => LONG
    // 90..180 and -90..-180 => SHORT
    if (deg >= -90 && deg <= 90) return 'LONG';
    return 'SHORT';
  }
  function nearestCoord(ct) {
    let best = null, bestDiff = Infinity;
    for (const c of COORDS) {
      const diff = Math.abs(c.v - ct);
      if (diff < bestDiff) { bestDiff = diff; best = c; }
    }
    return best;
  }
  function kmFromCT(ct) {
    return (ct / MOON_POINT) * MOON_KM;
  }

  // expose helpers
  window.app = window.app || {};
  app._ct = app._ct ?? NaN;
  app._ct1 = app._ct1 ?? NaN;

  app.setCT = (v) => {
    const n = toNum(v);
    if (!isFinite(n)) return;
    app._ct = n;
    if ($('ct-in')) $('ct-in').value = String(n);
    app.updateCoordPanel();
  };

  
  // === on-chain quote (CT) sync: KGEN/WBNB + WBNB/USDT on PancakeSwap v2 ===
  const RPC_BSC = "https://bsc-dataseed.binance.org/";
  const ADDR = {
    KGEN: "0xBA3d3810e58735cb6813bC1CDc5458C0d71432Be",
    WBNB: "0xBB4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c",
    USDT: "0x55d398326f99059fF775485246999027B3197955",
    FACTORY_V2: "0xCA143Ce32Fe78f1f7019d7d551a6402fC5350c73",
    KGEN_WBNB_PAIR: "0xf36640d7327b53ba3d7fcc1d98dfc1b85574b6c2"
  };
  const ABI_PAIR = [
    "function getReserves() view returns (uint112 reserve0, uint112 reserve1, uint32 blockTimestampLast)",
    "function token0() view returns (address)",
    "function token1() view returns (address)"
  ];
  const ABI_FACTORY = [
    "function getPair(address tokenA, address tokenB) external view returns (address pair)"
  ];

  async function _safeProvider(){
    try{
      if (app._provider) return app._provider;
    }catch(e){}
    try{
      return new ethers.providers.JsonRpcProvider(RPC_BSC);
    }catch(e){
      return null;
    }
  }

  async function fetchPairPrice(provider, pairAddr, baseAddr){
    // returns { basePerOther, otherPerBase, otherAddr }
    const pair = new ethers.Contract(pairAddr, ABI_PAIR, provider);
    const [r, t0, t1] = await Promise.all([pair.getReserves(), pair.token0(), pair.token1()]);
    const reserve0 = Number(ethers.utils.formatUnits(r.reserve0, 18));
    const reserve1 = Number(ethers.utils.formatUnits(r.reserve1, 18));
    const token0 = String(t0).toLowerCase();
    const token1 = String(t1).toLowerCase();
    const base = String(baseAddr).toLowerCase();

    // price = base / other
    if (token0 === base){
      const baseRes = reserve0, otherRes = reserve1;
      const basePerOther = baseRes / otherRes;
      const otherPerBase = otherRes / baseRes;
      return { basePerOther, otherPerBase, otherAddr: t1 };
    }
    if (token1 === base){
      const baseRes = reserve1, otherRes = reserve0;
      const basePerOther = baseRes / otherRes;
      const otherPerBase = otherRes / baseRes;
      return { basePerOther, otherPerBase, otherAddr: t0 };
    }
    throw new Error("BASE_NOT_IN_PAIR");
  }

  async function fetchPoolQuote(){
    const provider = await _safeProvider();
    if (!provider) return null;

    // KGEN/WBNB (known pair)
    const kgenWbnb = await fetchPairPrice(provider, ADDR.KGEN_WBNB_PAIR, ADDR.WBNB);
    // base=WBNB so basePerOther = WBNB/KGEN; otherPerBase = KGEN/WBNB
    const bnbPerKgen = kgenWbnb.basePerOther;
    const kgenPerBnb = kgenWbnb.otherPerBase;

    // WBNB/USDT (factory lookup)
    let usdtPair = null;
    try{
      const factory = new ethers.Contract(ADDR.FACTORY_V2, ABI_FACTORY, provider);
      usdtPair = await factory.getPair(ADDR.WBNB, ADDR.USDT);
    }catch(e){ usdtPair = null; }

    let usdtPerBnb = null;
    if (usdtPair && usdtPair !== ethers.constants.AddressZero){
      const wbnbUsdt = await fetchPairPrice(provider, usdtPair, ADDR.USDT);
      // base=USDT so basePerOther = USDT/WBNB
      usdtPerBnb = wbnbUsdt.basePerOther;
    }

    const usdtPerKgen = usdtPerBnb ? (bnbPerKgen * usdtPerBnb) : null;

    return { kgenPerBnb, bnbPerKgen, usdtPerBnb, usdtPerKgen, ts: Date.now() };
  }

  async function startPoolTicker(){
    if (app._poolTickerStarted) return;
    app._poolTickerStarted = true;

    const tick = async () => {
      try{
        const q = await fetchPoolQuote();
        if (q){
          app._poolQuote = q;
          // CT input follows quote (prefer USDT/KGEN if available)
          const ctVal = q.usdtPerKgen ?? q.bnbPerKgen;
          if ($('ct-in')) $('ct-in').value = (ctVal==null? "" : String(ctVal));
          app.updateCoordPanel();
        }
      }catch(e){
        // silent
      }
    };

    tick();
    setInterval(tick, 6000);
  }

app.updateCoordPanel = () => {
    const deg = currentSteerDeg();
    const side = sideFromDeg(deg);
    if ($('cp-side')) $('cp-side').textContent = `SIDE: ${side}  (deg ${fmt(deg)})`;

    // CT sync with on-chain pool quote (prefer USDT/KGEN; fallback BNB/KGEN)
    if ($('cp-ct')){
      const q = app._poolQuote;
      if (q && (q.usdtPerKgen!=null || q.bnbPerKgen!=null)){
        const val = (q.usdtPerKgen!=null) ? q.usdtPerKgen : q.bnbPerKgen;
        const unit = (q.usdtPerKgen!=null) ? "USDT/KGEN" : "BNB/KGEN";
        $('cp-ct').textContent = `CT(鏈上報價): ${val.toFixed(6)} ${unit}`;
      }else{
        const local = isFinite(app._ct) ? app._ct : toNum($('ct-in')?.value);
        $('cp-ct').textContent = isFinite(local) ? `CT: ${fmt(local)}` : 'CT: --';
      }
    }

    const ct = isFinite(app._ct) ? app._ct : toNum($('ct-in')?.value);
    if (isFinite(ct)) {
      const near = nearestCoord(ct);
      if ($('cp-nearest')) $('cp-nearest').innerHTML = near ? `${near.n} <span class="muted">({fmt(near.v)})</span>` : '--';
      const km = kmFromCT(ct);
      if ($('cp-km')) $('cp-km').textContent = `${fmt(km)} km`;
    } else {
      if ($('cp-nearest')) $('cp-nearest').textContent = '--';
      if ($('cp-km')) $('cp-km').textContent = '--';
    }

    if ($('cp-ct1')) $('cp-ct1').textContent = isFinite(app._ct1) ? fmt(app._ct1) : '--';

    // keep AUTO badge consistent if exists
    const autoTag = document.getElementById('auto-tag');
    if (autoTag && autoTag.textContent && autoTag.textContent.includes('AUTO')) {
      // only update the side label part, keep styling
      autoTag.textContent = `AUTO: ${side}`;
    }
  };

  app.openCoordModal = () => {
    const modal = $('coord-modal');
    if (!modal) return;
    modal.style.display = 'block';
    app.renderCoordList('');
    setTimeout(() => $('cm-q')?.focus(), 50);
  };
  app.closeCoordModal = () => {
    const modal = $('coord-modal');
    if (!modal) return;
    modal.style.display = 'none';
  };
  app.renderCoordList = (q) => {
    const list = $('cm-list');
    if (!list) return;
    const query = (q||'').trim().toLowerCase();
    const filtered = !query ? COORDS : COORDS.filter(c =>
      String(c.v).toLowerCase().includes(query) ||
      (c.n||'').toLowerCase().includes(query) ||
      (c.d||'').toLowerCase().includes(query)
    );
    list.innerHTML = filtered.map(c => `
      <div class="cm-item" data-v="${c.v}">
        <div class="cm-v">${fmt(c.v)}</div>
        <div>
          <div class="cm-n">${c.n}</div>
          <div class="cm-d">${c.d || ''}</div>
        </div>
      </div>
    `).join('') || '<div style="opacity:.75;padding:14px;">沒有符合的座標</div>';

    list.querySelectorAll('.cm-item').forEach(el => {
      el.addEventListener('click', () => {
        const v = toNum(el.getAttribute('data-v'));
        app.setCT(v);
        app.closeCoordModal();
      });
    });
  };

  app.syncFromWheel = () => {
    // Use current steering direction to set CT+1 guess (sign)
    const ct = isFinite(app._ct) ? app._ct : toNum($('ct-in')?.value);
    if (!isFinite(ct)) return;
    const deg = currentSteerDeg();
    const side = sideFromDeg(deg);
    const delta = toNum(document.getElementById('amt-in')?.value) || 0;
    if (!isFinite(delta) || delta === 0) {
      // fallback small step
      app._ct1 = ct + (side === 'LONG' ? 72 : -72);
    } else {
      app._ct1 = ct + (side === 'LONG' ? delta : -delta);
    }
    app.updateCoordPanel();
  };

  app.orderGuess = (dir) => {
    // When user presses UP/DOWN, treat the "amount" input as the delta guess for CT+1.
    // (If user wants pure KGEN order amount, keep using it; this just updates CT+1 preview.)
    const ct = isFinite(app._ct) ? app._ct : toNum($('ct-in')?.value);
    if (!isFinite(ct)) return;
    const delta = toNum(document.getElementById('amt-in')?.value) || 0;
    const step = (isFinite(delta) && delta !== 0) ? delta : 72;
    app._ct1 = ct + (dir === 'UP' ? step : -step);
    app.updateCoordPanel();
  };

  // Wire up input / modal search
  $('ct-in')?.addEventListener('input', (e) => {
    app._ct = toNum(e.target.value);
    app.updateCoordPanel();
  });
  $('cm-q')?.addEventListener('input', (e) => app.renderCoordList(e.target.value));
  $('coord-modal')?.addEventListener('click', (e) => {
    if (e.target && e.target.id === 'coord-modal') app.closeCoordModal();
  });

  // Patch applySteer to keep UI consistent, without breaking existing logic.
  if (typeof window.applySteer === 'function' && !window.__applySteerPatched_v2204) {
    window.__applySteerPatched_v2204 = true;
    const _orig = window.applySteer;
    window.applySteer = function(deg) {
      _orig(deg);
      try { app.updateCoordPanel(); } catch(_e) {}
    };
  }

  // initial
  setTimeout(() => {
    try{ startPoolTicker(); }catch(e){}

    // default CT = 16888 (moon) if empty
    if ($('ct-in') && !String($('ct-in').value||'').trim()) {
      app.setCT(16888);
    } else {
      app.updateCoordPanel();
    }
  }, 300);
})();

</script>
</body>
</html>
