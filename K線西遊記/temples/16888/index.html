<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>廣寒宮 16888｜駕駛艙 V1.9.5（操作優化版）</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <style>
    /* 繼承原檔配色系統 */
    :root{
      --bg:#06070b; --panel: rgba(255,255,255,.06); --text: rgba(255,255,255,.92);
      --gold: rgba(255,215,120,.95); --line: rgba(255,255,255,.14);
    }
    *{box-sizing:border-box}
    body{ margin:0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x:hidden; }

    .wrap{ max-width:1100px; margin:0 auto; padding:16px 14px 120px; }
    .card{ border:1px solid var(--line); border-radius: 24px; background: rgba(255,255,255,.05); overflow:hidden; margin-bottom:12px; }
    
    /* 監視器容器 */
    .cockpit{ position:relative; min-height: 520px; background: #000; padding:10px; }
    canvas#fx{ position:absolute; inset:0; z-index:2; pointer-events:none; }
    
    /* 美女圖容器 */
    .fairyWrap{
      position:relative; width: 280px; height: 280px; margin: 10px auto; 
      border-radius: 50%; overflow:hidden; z-index:1;
      border: 3px solid var(--gold); box-shadow: 0 0 50px rgba(255,215,120,0.3);
    }
    #fairy {
      width: 100%; height: 100%;
      background: url('./assets/fairy.png') no-repeat center 20%;
      background-size: cover;
      transition: transform 0.4s ease-out, filter 0.4s;
    }

    /* 新增：圖下方的快速操作區 */
    .quickControl{ 
      position:relative; z-index:10; background: rgba(0,0,0,0.6); 
      padding:15px; border-radius: 20px; border: 1px solid var(--line);
      margin: 10px 5px;
    }
    .quickControl label{ display:flex; justify-content: space-between; font-size:12px; color:var(--gold); font-weight:900; }
    .quickControl input[type="range"]{ width:100%; accent-color: var(--gold); margin: 8px 0 15px; cursor:pointer; }

    .kpiGrid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px; }
    .kpi{ border:1px solid var(--line); border-radius: 18px; background: rgba(0,0,0,0.4); padding:12px; text-align:center; }
    .kpi .v{ font-size:18px; font-weight:950; color: var(--gold); }
    
    .btn{ width:100%; padding:14px; border-radius:999px; border:1px solid var(--gold); background:none; color:var(--gold); font-weight:900; cursor:pointer; }
    .log{ font-family: monospace; font-size:11px; opacity:0.5; padding:10px; max-height:80px; overflow:auto; }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="card">
      <div class="cockpit">
        <canvas id="fx"></canvas>
        
        <div class="fairyWrap">
          <div id="fairy"></div>
        </div>

        <div class="quickControl">
          <label>方向盤姿態 <span id="degVal">120°</span></label>
          <input id="degRange" type="range" min="0" max="360" value="120">
          
          <label>曲率能量 <span id="warpVal">10x</span></label>
          <input id="warpRange" type="range" min="1" max="150" value="10">
        </div>

        <div class="kpiGrid">
          <div class="kpi">姿態<div class="v" id="stance">REST</div></div>
          <div class="kpi">能量匯流<div class="v" id="energy">10,000</div></div>
        </div>
      </div>
    </section>

    <section class="card" style="padding:15px;">
      <button class="btn" id="btnCoin">啟動下幣合約測試</button>
      <div class="log" id="log">系統日誌：等待錢包連線...</div>
    </section>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  
  // 核心視覺更新邏輯
  function updateUI() {
    const deg = parseInt($("degRange").value);
    const warp = parseInt($("warpRange").value);
    
    $("degVal").textContent = deg + "°";
    $("warpVal").textContent = warp + "x";
    $("energy").textContent = (warp * 1000).toLocaleString();

    let s = "REST";
    if (deg >= 10 && deg <= 170) s = "LONG";
    else if (deg >= 190 && deg <= 350) s = "SHORT";
    $("stance").textContent = s;

    const img = $("fairy");
    const glow = warp / 150;

    // 修正：不再使用序列幀位移
    // 改用單圖自適應旋轉與縮放
    if (s === "REST") {
      img.style.filter = "brightness(0.6) blur(2px)";
      img.style.transform = "scale(1)";
    } else {
      img.style.filter = `saturate(${1.2+glow}) brightness(${1.1+glow}) drop-shadow(0 0 ${20+glow*30}px gold)`;
      img.style.transform = `scale(${1 + (warp/400)}) rotate(${(deg-120)*0.1}deg)`;
    }
  }

  // 錢包下幣按鈕介接
  $("btnCoin").onclick = async () => {
    if (window.ethereum) {
      try {
        const acc = await ethereum.request({ method: 'eth_requestAccounts' });
        $("log").textContent = `錢包連線成功: ${acc[0].substring(0,10)}...`;
        // 此處預留給你的合約下幣代碼 (Contract Interaction)
      } catch (e) {
        $("log").textContent = "連線取消";
      }
    } else {
      alert("請安裝 MetaMask 錢包");
    }
  };

  $("degRange").oninput = updateUI;
  $("warpRange").oninput = updateUI;
  
  updateUI();
</script>
</body>
</html>
