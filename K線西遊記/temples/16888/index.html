<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>16888 Duel Engine v1.54</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
body { background:#000; color:#0f0; font-family:Arial; text-align:center; }
button { padding:12px 20px; margin:10px; font-size:16px; cursor:pointer; }
#log { margin-top:20px; white-space:pre-line; }
</style>
</head>
<body>

<h2>16888 對賭引擎 v1.54</h2>

<button id="connectBtn">CONNECT WALLET</button>
<button id="longBtn">開多 (10 KGEN)</button>
<button id="shortBtn">開空 (10 KGEN)</button>
<button id="settleBtn">CT+1 結算</button>

<div id="log"></div>

<script>
let provider;
let signer;
let userAddress;

const TOKEN_ADDRESS = "0xBA3d3810e58735cb6813bC1CDc5458C0d71432Be";

// 部署16888後填入
let MOONTRUST_ADDRESS = "";

const ORDER_SIZE = ethers.utils.parseEther("10");

const ERC20_ABI = [
  "function approve(address spender, uint256 amount) public returns (bool)"
];

const DUEL_ABI = [
  "function openOrder(bool isLong) external",
  "function settle() external"
];

const log = (msg) => {
  document.getElementById("log").innerText += msg + "\n";
};

document.getElementById("connectBtn").addEventListener("click", async () => {
  if (!window.ethereum) {
    alert("請安裝 MetaMask");
    return;
  }

  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  userAddress = await signer.getAddress();

  log("已連線: " + userAddress);
});

document.getElementById("longBtn").addEventListener("click", async () => {
  await openPosition(true);
});

document.getElementById("shortBtn").addEventListener("click", async () => {
  await openPosition(false);
});

document.getElementById("settleBtn").addEventListener("click", async () => {
  if (!MOONTRUST_ADDRESS) {
    alert("16888 合約尚未部署");
    return;
  }

  const duel = new ethers.Contract(MOONTRUST_ADDRESS, DUEL_ABI, signer);
  const tx = await duel.settle();
  await tx.wait();
  log("已結算完成");
});

async function openPosition(isLong) {
  if (!MOONTRUST_ADDRESS) {
    alert("16888 合約尚未部署");
    return;
  }

  const token = new ethers.Contract(TOKEN_ADDRESS, ERC20_ABI, signer);
  const duel = new ethers.Contract(MOONTRUST_ADDRESS, DUEL_ABI, signer);

  log("批准 10 KGEN...");
  let tx = await token.approve(MOONTRUST_ADDRESS, ORDER_SIZE);
  await tx.wait();

  log("開倉中...");
  tx = await duel.openOrder(isLong);
  await tx.wait();

  log("開倉完成");
}
</script>

</body>
</html>
