<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>廣寒宮 16888｜宇宙天條 V4.0</title>
    <style>
        :root { --bg: #06070b; --gold: #ffd778; --red: #ff4d4d; --green: #00ffcc; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* 1. 頂部天條狀態欄 */
        .header { width: 100%; padding: 10px; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; font-size: 10px; position: fixed; top: 0; z-index: 100; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 14px; color: var(--gold); font-weight: 900; }

        /* 2. 3D 宇宙 K 線舞台 */
        .stage-4d { width: 100vw; height: 60vh; display: flex; align-items: center; justify-content: center; perspective: 1000px; padding-top: 50px; }
        .kline-container { position: relative; width: 300px; height: 300px; transform-style: preserve-3d; transition: 0.1s; }
        .fairy-avatar { position: absolute; width: 250px; height: 250px; border-radius: 50%; border: 4px solid var(--gold); background: url('./assets/fairy.png') no-repeat center/cover; box-shadow: 0 0 50px rgba(255,215,120,0.4); left: 25px; top: 25px; }

        /* 3. 操作區：四旋鈕與拔河 */
        .controls { position: absolute; bottom: 100px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .slider-wrap { width: 85%; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .slider-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--gold); }
        input[type=range] { width: 100%; accent-color: var(--gold); }

        /* 4. 下單與結算 (左下) */
        .actions { position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 8px; }
        .btn { padding: 12px 20px; border-radius: 20px; border: 1px solid var(--gold); background: #000; color: var(--gold); font-weight: 900; cursor: pointer; }
        .btn-gold { background: var(--gold); color: #000; }

        /* 5. 宇宙日誌 (右下) */
        .logs { position: fixed; bottom: 20px; right: 20px; width: 150px; height: 80px; font-size: 9px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 10px; overflow: hidden; opacity: 0.7; }
    </style>
</head>
<body>

<div class="header">
    <div class="stat-item">宇宙節奏 (CT)<span class="stat-val" id="stCT">0</span></div>
    <div class="stat-item">人群拔河 (R)<span class="stat-val" id="stR">0.00</span></div>
    <div class="stat-item">金箍棒重<span class="stat-val" id="stW">13500 斤</span></div>
    <div class="stat-item">許願池<span class="stat-val" id="stP">0 / 16888</span></div>
</div>

<div class="stage-4d">
    <div class="kline-container" id="kStage">
        <div class="fairy-avatar" id="fairy"></div>
    </div>
</div>

<div class="controls">
    <div class="slider-wrap">
        <div class="slider-label"><span>多方 L</span><span id="valL">5000</span></div>
        <input type="range" id="rngL" min="0" max="10000" value="5000">
    </div>
    <div class="slider-wrap">
        <div class="slider-label"><span>空方 S</span><span id="valS">5000</span></div>
        <input type="range" id="rngS" min="0" max="10000" value="5000">
    </div>
    <div class="slider-wrap">
        <div class="slider-label"><span>方向盤 (CT)</span><span id="valCT">0</span></div>
        <input type="range" id="rngCT" min="-1" max="1" step="1" value="0">
    </div>
</div>

<div class="actions">
    <button class="btn btn-gold" onclick="settle()">13500 斤強制結算</button>
    <button class="btn" onclick="wish()">點火許願 (+100 KGEN)</button>
</div>

<div class="logs" id="log">系統啟動：遵循天條 V1.0...</div>

<script>
    const $ = (id) => document.getElementById(id);
    let pool = 0;

    function updateEngine() {
        // 1. 取得天條物理量
        const L = parseFloat($("rngL").value);
        const S = parseFloat($("rngS").value);
        const CT = parseFloat($("rngCT").value);
        const epsilon = 0.0001;

        // 2. 天條公式 4.2：拔河值 R
        const R = (L - S) / (L + S + epsilon);
        
        // 3. 天條公式 5.2：合成方向 D (w1=0.6, w2=0.4)
        const D = (0.6 * CT) + (0.4 * R);

        // 更新顯示
        $("valL").textContent = L; $("valS").textContent = S; $("valCT").textContent = CT;
        $("stCT").textContent = CT; $("stR").textContent = R.toFixed(2);
        $("stP").textContent = `${Math.floor(pool)} / 16888`;

        // 4. 3D 視覺反應 (App 遊戲感角色移動)
        const stage = $("kStage");
        const fairy = $("fairy");
        
        // 隨 D 方向產生 3D 偏轉
        stage.style.transform = `rotateY(${R * 30}deg) rotateX(${CT * -20}deg)`;
        
        // 顏色隨方向改變 (多方青色，空方紅色)
        fairy.style.borderColor = D > 0 ? "var(--green)" : "var(--red)";
        fairy.style.boxShadow = `0 0 50px ${D > 0 ? "rgba(0,255,204,0.5)" : "rgba(255,77,77,0.5)"}`;
        
        requestAnimationFrame(updateEngine);
    }

    function wish() {
        pool += 100;
        log("許願成功，能量注入 100 KGEN");
        if(pool >= 16888) {
            alert("天條觸發：仙女下凡 (Lunar Descent)！");
            pool = 1688; // 留池 10%
        }
    }

    function settle() {
        log("執行天條 6.1：勝負判定中...");
        // 這裡可串接你的合約結算
    }

    function log(m) { $("log").innerHTML = `> ${m}<br>` + $("log").innerHTML; }

    updateEngine();
</script>
</body>
</html>
