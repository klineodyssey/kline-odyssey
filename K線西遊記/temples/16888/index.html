<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>廣寒宮 16888｜嫦娥駕駛艙 V1.6</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root{
      --bg:#06070b;
      --text: rgba(255,255,255,.92);
      --gold: rgba(255,215,120,.95);
      --line: rgba(255,255,255,.14);
    }
    body{
      margin:0; font-family: system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height:100vh; overflow-x:hidden;
    }
    .wrap{ max-width:1100px; margin:0 auto; padding:20px 14px 120px; }
    .card{ border:1px solid var(--line); border-radius: 24px; background: rgba(255,255,255,.05); overflow:hidden; position:relative; }
    
    /* 圓形視窗與嫦娥圖片設定 */
    .fairyWrap{
      position:relative; width: 300px; height: 300px; margin: 30px auto; 
      border-radius: 50%; overflow:hidden; 
      border: 2px solid var(--gold);
      box-shadow: 0 0 50px rgba(255,215,120,0.2);
      background: #000;
    }
    #fairyImg {
      width: 100%; height: 100%;
      background-image: url('./assets/fairy.png'); /* 讀取你上傳的那張嫦娥圖 */
      background-size: cover; /* 確保圖片填滿圓圈 */
      background-position: center 20%; /* 稍微向上對齊，確保臉部與胸部在中央 */
      background-repeat: no-repeat;
      transition: transform 0.3s ease-out; /* 縮放平滑度 */
    }
    
    .sleepMask{ position:absolute; inset:0; background:rgba(0,0,0,0.6); display:none; place-items:center; z-index:5; backdrop-filter: blur(4px); color: var(--gold); font-weight:900; }
    .sleepMask.on{ display:grid; }
    
    .kpiGrid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin:20px 0; }
    .kpi{ border:1px solid var(--line); border-radius: 18px; padding:15px; background:rgba(0,0,0,0.3); text-align:center; }
    .kpi b { font-size: 24px; color: var(--gold); display:block; }
    
    input[type="range"]{ width:100%; accent-color: var(--gold); cursor:pointer; }
    .btn{ width:100%; padding:15px; border-radius:12px; border:1px solid var(--gold); background:transparent; color:var(--gold); font-weight:bold; cursor:pointer; margin-top:10px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div style="padding:20px; text-align:center;">
        <h2 style="margin:0;">廣寒宮 16888 駕駛艙</h2>
        <small style="color:rgba(255,255,255,0.5)">嫦娥近照監控中...</small>
      </div>

      <div class="fairyWrap">
        <div id="fairyImg"></div> 
        <div class="sleepMask" id="sleepMask">嫦娥正在休息...</div>
      </div>

      <div style="padding:0 20px 20px;">
        <div class="kpiGrid">
          <div class="kpi">姿態 <b id="stance">REST</b></div>
          <div class="kpi">曲速 <b id="warpVal">1x</b></div>
        </div>

        <label>控制方向盤 (角度)</label>
        <input id="degRange" type="range" min="0" max="360" value="120" />
        
        <label style="display:block; margin-top:15px;">注入能量 (曲速)</label>
        <input id="warpRange" type="range" min="1" max="200" value="1" />

        <button class="btn" onclick="alert('同步成功！')">啟動節律同步</button>
      </div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  let STATE = { deg: 120, warp: 1 };

  function update() {
    const d = STATE.deg;
    const w = STATE.warp;
    
    // 判定姿態
    let s = "REST";
    if ((d >= 10 && d <= 170)) s = "LONG";
    else if ((d >= 190 && d <= 350)) s = "SHORT";

    $("stance").textContent = s;
    $("warpVal").textContent = w + "x";
    
    // 休息遮罩
    $("sleepMask").className = (s === "REST") ? "sleepMask on" : "sleepMask";

    // 縮放效果：曲速越高，圖片離玩家越近 (放大)
    const scale = 1 + (w / 400); 
    $("fairyImg").style.transform = `scale(${scale})`;
  }

  $("degRange").oninput = (e) => { STATE.deg = e.target.value; update(); };
  $("warpRange").oninput = (e) => { STATE.warp = e.target.value; update(); };

  update();
</script>
</body>
</html>
