<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>16888 廣寒宮｜音樂播放器修正版 V2.46.8</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; margin:0; background:#0b0f18; color:#e8eefc;}
    .wrap{max-width:920px;margin:0 auto;padding:16px;}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:14px;margin:12px 0;backdrop-filter: blur(10px);}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{background:#ffffff14;color:#e8eefc;border:1px solid #ffffff26;border-radius:12px;padding:10px 12px;font-weight:700}
    button:active{transform:translateY(1px)}
    input[type="range"]{width:160px}
    .list{display:grid;gap:8px;margin-top:10px}
    .item{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.14);display:flex;justify-content:space-between;gap:10px;align-items:center}
    .item small{opacity:.75}
    .badge{font-size:12px;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.18);opacity:.9}
    .ok{border-color:rgba(40,255,140,.35)}
    .bad{border-color:rgba(255,80,80,.35)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;white-space:pre-wrap;word-break:break-word;opacity:.85}
    a{color:#9fc2ff}
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:8px 0 0 0;">16888 廣寒宮｜音樂播放器修正版 <span class="badge">V2.46.8</span></h2>
    <div class="card">
      <div class="row">
        <button id="btnInit">啟動音樂（必按一次）</button>
        <button id="btnPlay" disabled>播放</button>
        <button id="btnPause" disabled>暫停</button>
        <button id="btnPrev" disabled>上一首</button>
        <button id="btnNext" disabled>下一首</button>
        <span>音量</span>
        <input id="vol" type="range" min="0" max="1" step="0.01" value="0.8"/>
        <span id="now" class="badge">未載入</span>
      </div>

      <div style="margin-top:10px;">
        <div class="mono" id="pathInfo"></div>
      </div>

      <audio id="audio" preload="metadata" playsinline></audio>

      <div class="list" id="list"></div>
    </div>

    <div class="card">
      <div style="font-weight:800;margin-bottom:8px;">診斷訊息（如果沒聲音，請貼這段給我）</div>
      <div class="mono" id="log"></div>
    </div>

    <div class="card">
      <div style="opacity:.9;line-height:1.55">
        這版修正重點：<br/>
        1) GitHub Pages / 手機瀏覽器常禁止「自動播放」，所以一定要先按一次「啟動音樂」。<br/>
        2) 以 <b>目前頁面所在資料夾</b> 自動推導 <b>music/playlist.json</b> 與音檔路徑，避免 ?=123 或中文路徑造成抓不到。<br/>
        3) 內建錯誤顯示：抓不到 playlist / 音檔 404 / 播放被瀏覽器擋住，都會寫在診斷區。<br/>
      </div>
    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const audio = $('audio');
  const logEl = $('log');
  const listEl = $('list');
  const nowEl = $('now');

  const btnInit = $('btnInit');
  const btnPlay = $('btnPlay');
  const btnPause = $('btnPause');
  const btnPrev = $('btnPrev');
  const btnNext = $('btnNext');

  const vol = $('vol');
  audio.volume = parseFloat(vol.value || "0.8");
  vol.addEventListener('input', () => audio.volume = parseFloat(vol.value));

  const log = (msg) => {
    const t = new Date().toISOString();
    logEl.textContent += `[${t}] ${msg}\\n`;
  };

  // Robust base directory (strip query/hash; keep trailing slash)
  const hrefNoQ = location.href.split('#')[0].split('?')[0];
  const baseDir = hrefNoQ.substring(0, hrefNoQ.lastIndexOf('/') + 1);
  const playlistUrl = baseDir + 'music/playlist.json';

  $('pathInfo').textContent =
    `baseDir: ${baseDir}\\nplaylist: ${playlistUrl}\\n` +
    `note: music/ 需與本 index.html 同層(同資料夾)`;

  let tracks = [];
  let idx = 0;
  let initialized = false;

  const setButtons = (on) => {
    btnPlay.disabled = !on;
    btnPause.disabled = !on;
    btnPrev.disabled = !on;
    btnNext.disabled = !on;
  };

  const safeDecode = (s) => {
    try { return decodeURIComponent(s); } catch { return s; }
  };

  const render = () => {
    listEl.innerHTML = '';
    if (!tracks.length) {
      listEl.innerHTML = `<div class="item bad"><div>找不到歌曲清單（playlist.json）</div><small>請看下方診斷</small></div>`;
      return;
    }
    tracks.forEach((t, i) => {
      const name = t.title || t.name || t.file || `Track ${i+1}`;
      const el = document.createElement('div');
      el.className = 'item ' + (i === idx ? 'ok' : '');
      el.innerHTML = `<div style="min-width:0;">
        <div style="font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
        <small>${safeDecode(t.file || '')}</small>
      </div>
      <div class="row" style="margin-left:auto;">
        <span class="badge">${i === idx ? 'Now' : '#' + (i+1)}</span>
        <button data-i="${i}" style="padding:8px 10px;border-radius:10px;">播放</button>
      </div>`;
      el.querySelector('button').addEventListener('click', async () => {
        idx = i;
        await loadAndPlay(true);
      });
      listEl.appendChild(el);
    });
  };

  const normalizeTracks = (json) => {
    // 支援兩種格式:
    // A) { "tracks": [{ "file": "song1.mp3", "title": "Song 1" }, ...] }
    // B) [ "song1.mp3", "song2.mp3" ]
    if (Array.isArray(json)) {
      return json.map((x) => typeof x === 'string' ? ({ file: x, title: x }) : x);
    }
    if (json && Array.isArray(json.tracks)) return json.tracks;
    return [];
  };

  const absUrl = (file) => {
    if (!file) return '';
    if (/^https?:\\/\\//i.test(file)) return file;
    // 將每一段做 encode，避免中文、空白
    const parts = file.split('/').map(encodeURIComponent);
    return baseDir + 'music/' + parts.join('/');
  };

  const loadPlaylist = async () => {
    log(`fetch playlist: ${playlistUrl}`);
    try {
      const res = await fetch(playlistUrl, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      tracks = normalizeTracks(json);
      log(`playlist loaded: ${tracks.length} track(s)`);
    } catch (e) {
      log(`playlist error: ${e.message || e}`);
      // fallback: 嘗試直接找 song1.mp3
      tracks = [{ file: 'song1.mp3', title: 'song1.mp3（fallback）' }];
      log(`fallback to song1.mp3 (請確認 music/song1.mp3 存在)`);
    }
    if (!tracks.length) {
      tracks = [{ file: 'song1.mp3', title: 'song1.mp3（fallback）' }];
      log(`empty playlist -> fallback to song1.mp3`);
    }
    render();
  };

  const loadAndPlay = async (userGesture=false) => {
    if (!tracks.length) return;
    const t = tracks[idx];
    const url = absUrl(t.file);
    nowEl.textContent = `${t.title || t.file || 'Track'} (${idx+1}/${tracks.length})`;
    audio.src = url;
    audio.load();
    log(`load track #${idx+1}: ${url}`);

    try {
      await audio.play();
      log(`play ok`);
    } catch (e) {
      log(`play blocked: ${e.message || e}`);
      if (!userGesture) log(`hint: 需按「啟動音樂」或列表播放按鈕（user gesture）`);
      else log(`hint: 若仍無聲音，多半是 404 / CORS / MP3 編碼問題`);
    }
    render();
  };

  const next = async () => {
    idx = (idx + 1) % tracks.length;
    await loadAndPlay(true);
  };
  const prev = async () => {
    idx = (idx - 1 + tracks.length) % tracks.length;
    await loadAndPlay(true);
  };

  audio.addEventListener('ended', () => next());
  audio.addEventListener('error', () => {
    const err = audio.error;
    log(`audio error: code=${err ? err.code : 'n/a'}`);
  });

  btnInit.addEventListener('click', async () => {
    if (initialized) return;
    initialized = true;
    setButtons(true);
    log(`init clicked (user gesture granted)`);
    await loadPlaylist();
    await loadAndPlay(true);
  });

  btnPlay.addEventListener('click', () => loadAndPlay(true));
  btnPause.addEventListener('click', () => { audio.pause(); log('pause'); });
  btnNext.addEventListener('click', next);
  btnPrev.addEventListener('click', prev);

  // Auto load playlist (no autoplay)
  loadPlaylist().then(() => {
    setButtons(true);
    log('ready (no autoplay). click 「啟動音樂」 to start.');
  });

})();
</script>
</body>
</html>
