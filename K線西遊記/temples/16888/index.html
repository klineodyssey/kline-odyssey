<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGEN 16888｜廣寒宮全功能版 V2.1.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 工程進度條 (回歸) */
        .top-monitor { position: fixed; top: 10px; width: 100%; z-index: 1000; padding: 0 15px; box-sizing: border-box; }
        .bar-label { display: flex; justify-content: space-between; font-size: 9px; color: var(--gold); font-family: 'Orbitron'; }
        .bar-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 4px 0 8px; overflow: hidden; border: 0.5px solid #333; }
        #prog-fill { width: 98%; height: 100%; background: var(--red); box-shadow: 0 0 10px var(--red); }
        #fuel-fill { width: 100%; height: 100%; background: var(--cyan); transition: width 0.3s; }

        /* 中央圓形美女 (隨引擎旋轉) */
        #fairy-circle {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 340px; height: 340px;
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            opacity: 0.2; border-radius: 50%; z-index: 2; pointer-events: none; transition: transform 0.2s linear;
        }

        /* 中央橋接資訊 */
        #bridge { position: fixed; top: 25%; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #nav-mode { background: rgba(0,0,0,0.8); padding: 5px 20px; border: 1px solid var(--gold); border-radius: 20px; color: var(--gold); font-size: 13px; }
        #price { font-family: 'Orbitron'; font-size: 45px; text-shadow: 0 0 15px var(--cyan); margin: 10px 0; }

        /* 操作桿 */
        .stick { position: fixed; top: 55%; transform: translateY(-50%); z-index: 1000; }
        .l-stick { left: 15px; } .r-stick { right: 15px; }
        input[type=range].vert { width: 160px; transform: rotate(-90deg); margin: 70px -60px; accent-color: var(--gold); }

        #three-canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        #player-cam { position: fixed; inset: 0; z-index: 1; opacity: 0.3; object-fit: cover; }

        /* 下方控制台 */
        .console { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 1px solid var(--gold); z-index: 1000; padding: 15px 5px; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .btn { padding: 12px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 9px; font-weight: 900; }

        /* 品牌與許願 (左下) */
        .brand-wish { position: fixed; bottom: 120px; left: 20px; z-index: 500; text-align: left; pointer-events: none; }
    </style>
</head>
<body>

<div id="fairy-circle"></div>
<video id="player-cam" autoplay playsinline></video>
<div id="three-canvas"></div>

<div class="top-monitor">
    <div class="bar-label"><span>GUANGHAN PALACE PROGRESS</span><span>98% (回歸)</span></div>
    <div class="bar-wrap"><div id="prog-fill"></div></div>
    <div class="bar-label"><span>BANK MARGIN / FUEL</span><span id="fuel-val">100%</span></div>
    <div class="bar-wrap"><div id="fuel-fill"></div></div>
</div>

<div id="bridge">
    <div id="nav-mode">系統就緒</div>
    <div id="price">16888.88</div>
    <div id="vector-info" style="font-size:10px; color:var(--cyan);">向量: 0° | 狀態: 平倉觀望</div>
</div>

<div class="brand-wish">
    <div style="font-size:26px; color:var(--gold); font-weight:900;">16888 廣寒宮</div>
    <div id="wish-display" style="color:var(--cyan); font-weight:bold;">【願】：廣聚財源</div>
</div>

<div class="stick l-stick"><input type="range" id="warp" class="vert" min="1" max="150" value="75"></div>
<div class="stick r-stick"><input type="range" id="angle" class="vert" min="0" max="360" value="180"></div>

<div class="console">
    <div class="btn-grid">
        <button class="btn" onclick="app.scan()">🔍 合約/地址判斷</button>
        <button class="btn" onclick="app.trade('CT')">📈 CT 現價下單</button>
        <button class="btn" onclick="app.trade('CLOSE')">📉 手動結算</button>
        <button class="btn" onclick="app.setWish()">🙏 許願留言</button>
        <button class="btn" onclick="app.capture()">📷 拍照下載</button>
        <button class="btn" onclick="app.toggleCam()">📸 影像監控</button>
        <button class="btn" onclick="app.connect()">🦊 連結錢包</button>
        <button class="btn" onclick="app.speak('向量導航回歸，監工正常')">🎙️ 客服語音</button>
    </div>
</div>

<script>
const app = {
    fuel: 100,
    hasPosition: false,

    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-canvas').appendChild(this.renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 1200; i++) pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.12 }));
        this.scene.add(this.stars);

        this.camera.position.z = 15;
        this.animate();
        setInterval(() => {
            document.getElementById('price').innerText = (16888 + (Math.random()-0.5)*12).toFixed(2);
        }, 1500);
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const warp = document.getElementById('warp').value;
        const angle = parseInt(document.getElementById('angle').value);

        // --- 全向量引擎 & 多空觀望邏輯 ---
        const rad = (angle * Math.PI) / 180;
        let modeText = "";
        let flowDir = 0; // 0:平倉, 1:流動

        // 方向盤邏輯定義
        if ((angle >= 330) || (angle < 30) || (angle >= 150 && angle < 210)) {
            modeText = "休息觀望 (自動平倉)";
            flowDir = 0;
            if(this.hasPosition) this.autoClose(); // 進入觀望區自動平倉
        } else if (angle >= 30 && angle < 150) {
            modeText = "🚀 做多航道";
            flowDir = 1;
        } else if (angle >= 210 && angle < 330) {
            modeText = "📉 做空航道";
            flowDir = -1;
        }

        document.getElementById('vector-info').innerText = `向量: ${angle}° | 狀態: ${modeText}`;
        document.getElementById('fairy-circle').style.transform = `translate(-50%, -50%) rotate(${angle}deg)`;

        // 星球向量位移
        const p = this.stars.geometry.attributes.position.array;
        const vx = Math.sin(rad) * (warp / 600) * Math.abs(flowDir);
        const vy = Math.cos(rad) * (warp / 600) * Math.abs(flowDir);

        for(let i=0; i<p.length; i+=3) {
            p[i] += vx;
            p[i+1] -= vy;
            if(p[i] > 25) p[i] = -25; if(p[i] < -25) p[i] = 25;
            if(p[i+1] > 25) p[i+1] = -25; if(p[i+1] < -25) p[i+1] = 25;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
    },

    autoClose() {
        this.hasPosition = false;
        this.speak("進入觀望區，自動平倉結算");
        console.log("Auto-Closed at angle change");
    },

    trade(type) {
        if(type === 'CT') {
            this.hasPosition = true;
            this.fuel -= 5;
            this.speak("CT 現價下單成功");
        } else {
            this.hasPosition = false;
            this.fuel += 10;
            this.speak("結算出場");
        }
        document.getElementById('fuel-fill').style.width = Math.min(100, this.fuel) + "%";
        document.getElementById('fuel-val').innerText = this.fuel + "%";
    },

    scan() {
        const addr = prompt("輸入掃描地址：");
        if(addr) {
            const isGod = addr.length > 30;
            document.getElementById('nav-mode').innerText = isGod ? "模式：神明分紅模式" : "模式：百姓導航";
            this.speak(isGod ? "偵測到神明地址" : "百姓地址，正常計息");
        }
    },

    setWish() {
        const w = prompt("輸入許願：");
        if(w) document.getElementById('wish-display').innerText = `【願】：${w}`;
    },

    async toggleCam() {
        const v = document.getElementById('player-cam');
        if(v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        else { const s = await navigator.mediaDevices.getUserMedia({video: true}); v.srcObject = s; }
    },

    capture() {
        const out = document.createElement('canvas'); out.width = 1080; out.height = 1920;
        const ctx = out.getContext('2d');
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,1080,1920);
        if(document.getElementById('player-cam').srcObject) ctx.drawImage(document.getElementById('player-cam'), 0,0,1080,1920);
        ctx.drawImage(this.renderer.domElement, 0,0,1080,1920);
        ctx.fillStyle = "#ffd778"; ctx.font = "bold 55px Noto Sans TC";
        ctx.fillText("16888 廣寒宮 導航誌", 50, 150);
        ctx.fillStyle = "#fff"; ctx.font = "35px Noto Sans TC";
        ctx.fillText(document.getElementById('wish-display').innerText, 50, 1850);
        ctx.fillText(document.getElementById('vector-info').innerText, 50, 1780);
        const link = document.createElement('a');
        link.download = `GUANGHAN_V214_${Date.now()}.png`;
        link.href = out.toDataURL();
        link.click();
    },

    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); },
    connect() { alert("連結中..."); }
};

window.onload = () => app.init();
</script>
</body>
</html>
