<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜13生肖光明燈版 V2.2.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }

        /* 頂部 HUD：金庫與腦容量 */
        .hud-v2 { position: fixed; top: 10px; width: 100%; z-index: 1000; padding: 0 15px; box-sizing: border-box; }
        .hud-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--gold); font-family: 'Orbitron'; }
        .bar-bg { width: 100%; height: 5px; background: rgba(255,255,255,0.1); margin: 3px 0 8px; border-radius: 2px; }
        #vault-f { width: 80%; height: 100%; background: var(--gold); }
        #brain-f { width: 60%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        /* 13 生肖光明燈 */
        .zodiac-panel { position: fixed; right: 10px; top: 100px; z-index: 1000; display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
        .lamp { width: 45px; height: 45px; border: 1px solid var(--gold); border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); color: var(--gold); cursor: pointer; }
        .lamp.active { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        /* 席位與血量 */
        .status-left { position: fixed; top: 100px; left: 15px; font-size: 10px; color: var(--cyan); z-index: 1000; }
        .hp-box { width: 150px; height: 15px; border: 1px solid #fff; margin-top: 5px; overflow: hidden; }
        #hp-fill { height: 100%; width: 100%; background: #0f0; transition: 0.3s; }

        /* 中央仙女圖 */
        #fairy-vessel {
            position: fixed; top: 48%; left: 50%; transform: translate(-50%, -50%);
            width: 360px; height: 360px;
            background: url('https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png') center/cover;
            opacity: 0.8; border-radius: 50%; z-index: 2; border: 4px solid var(--gold);
            box-shadow: 0 0 50px rgba(255, 215, 120, 0.5);
        }

        #bridge { position: fixed; top: 22%; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #price { font-family: 'Orbitron'; font-size: 50px; text-shadow: 0 0 25px var(--cyan); }

        /* 操控桿 */
        .controls { position: fixed; bottom: 120px; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .tag { font-family: 'Orbitron'; color: var(--cyan); font-size: 14px; }
        input[type=range].v-warp { width: 160px; transform: rotate(-90deg); margin-top: 80px; accent-color: var(--cyan); }
        input[type=range].h-steer { width: 220px; accent-color: var(--gold); }

        .console { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); border-top: 2px solid var(--gold); z-index: 1000; padding: 15px 5px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .btn { padding: 12px 0; border: 1px solid var(--gold); color: var(--gold); background: none; font-size: 10px; font-weight: 900; }

        #three-box { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        #cam { position: fixed; inset: 0; z-index: 1; opacity: 0.35; object-fit: cover; }
    </style>
</head>
<body>

<div id="fairy-vessel"></div>
<video id="cam" autoplay playsinline></video>
<div id="three-box"></div>

<div class="hud-v2">
    <div class="hud-row"><span>靈霄殿金庫: 50,000,000 KGEN</span><span>蒸發率 0.1%</span></div>
    <div class="bar-bg"><div id="vault-f"></div></div>
    <div class="hud-row"><span>悟空大腦保證金: 50,000,000 KGEN</span><span>腦容量 100%</span></div>
    <div class="bar-bg"><div id="brain-f"></div></div>
</div>

<div class="status-left">
    <div>🐒 花果山席位: 500 | 🙏 神明: 500</div>
    <div style="margin-top:5px;">血量 HP:</div>
    <div class="hp-box"><div id="hp-fill"></div></div>
    <div style="color:var(--gold); margin-top:5px;">2s K線引擎 (質能守恆)</div>
</div>

<div class="zodiac-panel" id="lamps">
    </div>

<div id="bridge">
    <div id="price">16888.88</div>
    <div id="ai-log" style="color:var(--cyan); font-size:12px;">客服：點擊生肖燈賺取利潤分紅</div>
</div>

<div class="controls">
    <div style="text-align:center;">
        <div id="w-val" class="tag">1x</div>
        <input type="range" id="warp" class="v-warp" min="1" max="150" value="1">
    </div>
    <div style="text-align:center;">
        <div id="s-val" class="tag">0°</div>
        <input type="range" id="steer" class="h-steer" min="-180" max="180" value="0">
    </div>
</div>

<div class="console">
    <div class="grid">
        <button class="btn" onclick="app.searchToken()">🔍 查 Token 地址</button>
        <button class="btn" onclick="app.trade('CT')">📈 CT 現價下單</button>
        <button class="btn" onclick="app.trade('CLOSE')">📉 結算平倉</button>
        <button class="btn" onclick="app.setWish()">🙏 許願留言</button>
        <button class="btn" onclick="app.capture()">📷 截圖日誌</button>
        <button class="btn" onclick="app.toggleCam()">📸 影像監控</button>
        <button class="btn" onclick="app.connect()">🦊 連結錢包</button>
        <button class="btn" onclick="app.speak('星球流向校準完成。13生肖光明燈已點亮。')">🎙️ 客服語音</button>
    </div>
</div>

<script>
const app = {
    hp: 100,
    zodiacs: ['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬','🐱'],
    init() {
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-box').appendChild(this.renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = [];
        for (let i = 0; i < 1500; i++) pos.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.15 }));
        this.scene.add(this.stars);

        this.camera.position.z = 15;
        this.initLamps();
        this.animate();
        setInterval(() => this.kEngine(), 2000);
    },

    initLamps() {
        const wrap = document.getElementById('lamps');
        this.zodiacs.forEach(z => {
            const l = document.createElement('div');
            l.className = 'lamp';
            l.innerText = z;
            l.onclick = () => {
                l.classList.toggle('active');
                this.speak(`點亮${z}生肖燈，貢獻JGEN獲取分紅。`);
            };
            wrap.appendChild(l);
        });
    },

    kEngine() {
        const diff = (Math.random() - 0.5) * 15;
        const newPrice = 16888 + diff;
        document.getElementById('price').innerText = newPrice.toFixed(2);
        const steer = parseInt(document.getElementById('steer').value);
        if(Math.abs(steer) > 90 && diff > 0) { // 錯向扣血
            this.hp -= 2;
            if(this.hp < 0) this.hp = 0;
            document.getElementById('hp-fill').style.width = this.hp + "%";
        }
    },

    animate() {
        requestAnimationFrame(() => this.animate());
        const warp = parseInt(document.getElementById('warp').value);
        const steer = parseInt(document.getElementById('steer').value);
        document.getElementById('w-val').innerText = warp + "x";
        document.getElementById('s-val').innerText = steer + "°";

        const rad = (steer * Math.PI) / 180;
        const efficiency = Math.cos(rad);

        // 美女圖旋轉：右移(正) -> 順時針(正)
        document.getElementById('fairy-vessel').style.transform = `translate(-50%, -50%) rotate(${steer}deg)`;

        // 星球物理流向修正 (絕對對齊)
        const p = this.stars.geometry.attributes.position.array;
        const speed = (warp / 400);

        for(let i=0; i<p.length; i+=3) {
            p[i] += Math.sin(rad) * speed; // X軸跟隨轉向
            
            // Y軸流向校準：
            // 0度(efficiency>0) -> 上往下(減法)
            // 180度(efficiency<0) -> 下往上(加法)
            p[i+1] -= speed * efficiency; 

            if(p[i+1] > 25) p[i+1] = -25; if(p[i+1] < -25) p[i+1] = 25;
            if(p[i] > 25) p[i] = -25; if(p[i] < -25) p[i] = 25;
        }
        this.stars.geometry.attributes.position.needsUpdate = true;
        this.renderer.render(this.scene, this.camera);
    },

    searchToken() {
        const addr = prompt("輸入 Token 地址查詢：");
        if(addr) {
            this.speak("掃描代碼成功。此為百姓資產，稅率 0.3% 已同步。");
            document.getElementById('ai-log').innerText = "診斷：百姓 Token 代碼 1:1 對齊。";
        }
    },

    trade(t) {
        this.speak(t==='CT' ? "進入 K 線實時成交，黑洞蒸發 0.1% 啟動。" : "平倉結算，利潤已存入花果山席位。");
    },

    connect() {
        this.speak("接入 MetaMask 成功。歡迎進入悟空大腦交易所。");
        alert("錢包連結成功");
    },

    async toggleCam() {
        const v = document.getElementById('cam');
        if(v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
        else { const s = await navigator.mediaDevices.getUserMedia({video: true}); v.srcObject = s; }
    },

    capture() {
        const link = document.createElement('a');
        link.download = "KGEN_FINAL_V224.png";
        link.href = this.renderer.domElement.toDataURL();
        link.click();
    },

    speak(m) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(m)); },
    setWish() {
        const w = prompt("留言內容：");
        if(w) document.getElementById('ai-log').innerText = `【願】：${w}`;
    }
};
window.onload = () => app.init();
</script>
</body>
</html>
