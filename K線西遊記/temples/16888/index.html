<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KGEN 16888｜金融生命體 v1.60｜原版物理連動合約版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        /* 完全繼承 1.5 原版 CSS */
        :root { --gold: #ffd778; --cyan: #00f2ff; --bg: #000; --energy: #ffcc00; --panel: rgba(20, 20, 0, 0.9); --red:#ff4444; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; height: 100vh; }

        .hud-top { position: fixed; top: 15px; width: 96%; left: 2%; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .brand-section { border-left: 5px solid var(--gold); padding-left: 15px; background: linear-gradient(90deg, var(--panel), transparent); pointer-events: auto; }
        .brand-name { font-size: 26px; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        .sys-st { font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); }
        
        .monitor-data { display: flex; gap: 20px; pointer-events: auto; }
        .data-box { background: var(--panel); border: 1px solid #332200; padding: 8px; border-top: 2px solid var(--gold); min-width: 180px; }
        .grid-500 { display: grid; grid-template-columns: repeat(20, 6px); gap: 3px; margin-top: 5px; }
        .dot { width: 6px; height: 6px; background: #1a1a00; border-radius: 1px; transition: background 0.3s; }
        .dot.on { background: var(--energy); box-shadow: 0 0 8px var(--energy); }

        /* 🚀 曲速引擎 (原版物理) */
        .warp-engine { position: fixed; left: 45px; top: 50%; transform: translateY(-50%); z-index: 150; width: 100px; text-align: center; }
        .warp-rail { height: 400px; width: 30px; background: #111; border: 3px solid var(--energy); position: relative; margin: 0 auto; border-radius: 8px; overflow: hidden; }
        #energy-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #ff8800, var(--energy), #fff); transition: height 0.1s linear; }
        .warp-range { position: absolute; top: 0; left: 0; width: 100%; height: 100%; -webkit-appearance: slider-vertical; opacity: 0; cursor: pointer; z-index: 40; }
        .warp-val-text { margin-top: 15px; color: var(--energy); font-family: 'Orbitron'; font-size: 20px; }

        /* 🎡 核心 (原版) */
        #core-anchor { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 420px; height: 420px; z-index: 50; }
        #core-window { width: 100%; height: 100%; border-radius: 50%; border: 12px double var(--gold); overflow: hidden; position: relative; transition: transform 0.1s ease-out; }
        #fairy-img { width: 100%; height: 100%; object-fit: cover; }
        #cam-view { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity:0; }

        /* 🎥 黑盒子 REC 指示燈 (v1.6 新增，不影響原版佈局) */
        .rec-indicator { position: fixed; top: 160px; left: 45px; color: var(--red); font-family: 'Orbitron'; font-size: 14px; z-index: 200; display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--red); }
        .dot-blink { width: 10px; height: 10px; background: var(--red); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* 🛠️ 控制台 (全功能合約按鈕) */
        .footer-terminal { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 4px solid var(--gold); display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 15px; z-index: 1000; }
        .term-btn { background: #111; border: 1px solid #444; color: #fff; padding: 12px 2px; font-weight: 900; cursor: pointer; font-size: 13px; border-radius: 4px; transition: 0.2s; }
        .term-btn:hover { background: var(--gold); color: #000; }
        .btn-rec { border-color: var(--red); color: var(--red); }
        .btn-wallet { border-color: var(--cyan); color: var(--cyan); }

        canvas#galaxy-bg { position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="rec-indicator" id="rec-ui"><div class="dot-blink"></div> REC <span id="rec-timer">00:00</span></div>

<div class="hud-top">
    <div class="brand-section">
        <div class="brand-name">KGEN 16888 v1.60</div>
        <div class="sys-st" id="sys-clock">SYSTEM ONLINE</div>
        <div class="sys-st" id="wallet-addr" style="color:var(--cyan); font-size:9px;">WALLET: NOT CONNECTED</div>
    </div>
    <div class="monitor-data">
        <div class="data-box"><div>🏛️ 宇宙席位 (Universe)</div><div class="grid-500" id="g1"></div></div>
        <div class="data-box"><div>🕯️ 願力池 (Gauss)</div><div id="pool-val" style="font-family:'Orbitron'; color:var(--energy); font-size:18px;">0.00 KGEN</div></div>
    </div>
</div>

<div class="warp-engine">
    <div class="warp-rail">
        <div id="energy-fill"></div>
        <input type="range" id="warp-input-val" class="warp-range" min="0" max="100" value="33">
    </div>
    <div class="warp-val-text" id="warp-txt">33x</div>
</div>

<div id="core-anchor">
    <div id="core-window">
        <img id="fairy-img" src="https://raw.githubusercontent.com/klineodyssey/kline-odyssey/62dd71c64630001cc7d067079cfc63093fd64413/K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/16888/assets/fairy.png">
        <video id="cam-view" autoplay playsinline muted></video>
    </div>
    <input type="range" id="steer-input-val" style="display:none;" value="0">
</div>

<canvas id="galaxy-bg"></canvas>

<div class="footer-terminal">
    <button class="term-btn btn-wallet" onclick="app.connect()">🦊 連結合約</button>
    <button class="term-btn" onclick="app.ritual()">🕯️ 願力注入 (下單)</button>
    <button class="term-btn" onclick="app.vow()">💍 VOW 表態 (3+3)</button>
    <button class="term-btn" onclick="app.claimEscrow()">🎁 領取托管紅包</button>
    <button class="term-btn btn-rec" id="rec-btn" onclick="app.toggleRec()">⚫ 黑盒子錄影</button>
    <button class="term-btn" onclick="app.steerPrompt()">🎡 轉向 (Steer)</button>
</div>

<script>
/**
 * KGEN 16888 v1.60 滿血合約版
 * 繼承 index1.5 原版物理偏移公式，絕不異常
 */
const UNIVERSE_ADDR = "0x..."; // 部署後填入
const KGEN_ADDR = "0xBA3d3810e58735cb6813bC1CDc5458C0d71432Be";
const ABI = [
    "function ritualDeposit(uint256 amount, string tag) external",
    "function vow(address target, uint256 amount) external",
    "function claimWeddingEscrow(uint256 id) external",
    "function getUniverseInfo() external view returns (uint256 balance, uint256 currentRound, uint256 totalVowed)",
    "function approve(address spender, uint256 amount) returns (bool)"
];

const app = {
    angle: 0, isRec: false, isCam: false,
    recorder: null, chunks: [],
    provider: null, signer: null, contract: null,

    init() {
        this.initThree();
        this.buildGrids();
        
        // 1.5 原版 Slider 連動邏輯
        const warpIn = document.getElementById('warp-input-val');
        warpIn.oninput = (e) => {
            document.getElementById('energy-fill').style.height = e.target.value + '%';
            document.getElementById('warp-txt').innerText = e.target.value + 'x';
        };

        setInterval(() => {
            document.getElementById('sys-clock').innerText = new Date().toLocaleString();
            this.flicker();
            if(this.contract) this.updatePool();
        }, 1000);

        this.speak("v1.60 宇宙合約版就緒。物理連動正常。");
    },

    // 🦊 錢包與合約
    async connect() {
        if (!window.ethereum) return alert("MetaMask?");
        this.provider = new ethers.providers.Web3Provider(window.ethereum);
        await this.provider.send("eth_requestAccounts", []);
        this.signer = this.provider.getSigner();
        this.contract = new ethers.Contract(UNIVERSE_ADDR, ABI, this.signer);
        const addr = await this.signer.getAddress();
        document.getElementById('wallet-addr').innerText = `WALLET: ${addr.substring(0,8)}...`;
        this.speak("宇宙聯網成功。");
    },

    // 🕯️ 願力注入 (下單) - 嚴格遵守 V5.1.0 邏輯
    async ritual() {
        if(!this.signer) return this.connect();
        const amt = prompt("注入 KGEN 數量 (推動 16888 輪轉):", "1000");
        if(!amt) return;
        try {
            const parsedAmt = ethers.utils.parseEther(amt);
            const kgen = new ethers.Contract(KGEN_ADDR, ["function approve(address,uint256) returns(bool)"], this.signer);
            this.speak("正在進行預先授權...");
            const tx1 = await kgen.approve(UNIVERSE_ADDR, parsedAmt);
            await tx1.wait();
            
            this.speak("注入願力，下凡投胎啟動。");
            const tx2 = await this.contract.ritualDeposit(parsedAmt, "KGEN 16888 Final Push");
            await tx2.wait();
            this.speak("注入成功。");
        } catch(e) { this.speak("儀式失敗。"); }
    },

    // 💍 VOW 表態 (3天視窗期)
    async vow() {
        if(!this.signer) return this.connect();
        const target = prompt("輸入表態對象地址:");
        const amt = prompt("表態金額 (1~2 KGEN):", "1");
        if(target && amt) {
            const tx = await this.contract.vow(target, ethers.utils.parseEther(amt));
            await tx.wait();
            this.speak("表態成功。");
        }
    },

    // 📹 黑盒子錄影 (螢幕+語音) - v1.60 進化
    async toggleRec() {
        if(this.isRec) {
            this.recorder.stop();
            this.isRec = false;
            document.getElementById('rec-btn').innerText = "⚫ 黑盒子錄影";
            document.getElementById('rec-ui').style.display = 'none';
            return;
        }
        try {
            const vStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            const aStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const combined = new MediaStream([...vStream.getTracks(), ...aStream.getTracks()]);
            this.chunks = [];
            this.recorder = new MediaRecorder(combined, { mimeType: 'video/webm' });
            this.recorder.ondataavailable = e => this.chunks.push(e.data);
            this.recorder.onstop = () => {
                const blob = new Blob(this.chunks, { type: 'video/webm' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `KGEN_BLACKBOX_${Date.now()}.webm`; a.click();
                combined.getTracks().forEach(t => t.stop());
            };
            this.recorder.start();
            this.isRec = true;
            document.getElementById('rec-btn').innerText = "🛑 停止燒錄";
            document.getElementById('rec-ui').style.display = 'flex';
            this.speak("黑盒子燒錄中，大聖請下旨。");
        } catch(e) { alert("錄影授權失敗"); }
    },

    // 🎡 方向盤旋轉 (調用 1.5 原版 Slider)
    steerPrompt() {
        const a = prompt("調整方向盤角度 (-180 至 180):", this.angle);
        if(a !== null) {
            this.angle = parseInt(a);
            document.getElementById('steer-input-val').value = this.angle;
            document.getElementById('core-window').style.transform = `rotate(${this.angle}deg)`;
            this.speak(`方向盤轉向 ${this.angle} 度。`);
        }
    },

    // 🌌 1.5 原版星空渲染與物理公式 (完全保留)
    initThree() {
        const sc = new THREE.Scene(), cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ canvas: document.getElementById('galaxy-bg'), antialias: false, alpha: true });
        rd.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry(), pos = new Float32Array(3000 * 3);
        for(let i=0; i<9000; i++) pos[i] = (Math.random() - 0.5) * 160;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.18 }));
        sc.add(pts); cam.position.z = 50;

        const anim = () => {
            requestAnimationFrame(anim);
            // 🚀 原版物理公式：這行不能改，改了方向盤就異常
            const w = document.getElementById('warp-input-val').value / 40;
            if(w > 0) {
                const r = (parseFloat(document.getElementById('steer-input-val').value) * Math.PI) / 180;
                const p = pts.geometry.attributes.position.array;
                for(let i=0; i<p.length; i+=3) {
                    p[i] -= Math.sin(r) * w; p[i+1] -= Math.cos(r) * w;
                    if(p[i]>80) p[i]=-80; if(p[i]<-80) p[i]=80;
                    if(p[i+1]>80) p[i+1]=-80; if(p[i+1]<-80) p[i+1]=80;
                }
                pts.geometry.attributes.position.needsUpdate = true;
            }
            rd.render(sc, cam);
        };
        anim();
    },

    buildGrids() {
        const g1 = document.getElementById('g1');
        for(let i=0; i<100; i++) {
            const d = document.createElement('div');
            d.className = 'dot';
            g1.appendChild(d);
        }
    },
    flicker() {
        document.querySelectorAll('.dot').forEach(d => d.classList.toggle('on', Math.random() > 0.9));
    },
    async updatePool() {
        try {
            const info = await this.contract.getUniverseInfo();
            document.getElementById('pool-val').innerText = `${parseFloat(ethers.utils.formatEther(info.balance)).toFixed(2)} KGEN`;
        } catch(e){}
    },
    speak(t) { window.speechSynthesis.cancel(); window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
