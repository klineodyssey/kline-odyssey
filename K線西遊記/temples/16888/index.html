<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>廣寒宮 16888｜宇宙文明實體終端 V6.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #ffd778; --cyan: #00f2ff; --red: #ff3c00;
            --bg: #050608; --panel: rgba(20, 22, 28, 0.95);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; }

        /* 加載畫面 */
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-bar { width: 250px; height: 2px; background: rgba(255,255,255,0.1); margin-top: 20px; position: relative; }
        .loader-progress { position: absolute; width: 0%; height: 100%; background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        /* 3D 舞台容器 */
        #stage-4d { width: 100vw; height: 65vh; background: radial-gradient(circle, #1a1a2e 0%, #050608 100%); }

        /* UI 面板 */
        .cockpit-ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .hud-top {
            position: absolute; top: 0; width: 100%; height: 80px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex; justify-content: space-around; align-items: center;
        }
        .stat-value { font-size: 20px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,120,0.5); }
        .stat-label { font-size: 10px; opacity: 0.6; text-align: center; }

        .terminal {
            position: absolute; bottom: 0; width: 100%; height: 35vh;
            background: var(--panel); border-top: 1px solid rgba(255,215,120,0.3);
            pointer-events: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        .control-row { display: flex; align-items: center; gap: 15px; }
        .slider-meta { width: 90px; font-size: 11px; color: var(--gold); }
        input[type=range] { flex: 1; accent-color: var(--gold); }

        #cosmic-log {
            position: absolute; right: 20px; top: 90px; width: 220px; height: 120px;
            font-size: 10px; color: var(--cyan); overflow: hidden; text-align: right;
            line-height: 1.5; pointer-events: none;
        }
        .btn {
            flex: 1; padding: 15px; border: 1px solid var(--gold); background: transparent;
            color: var(--gold); font-weight: 900; cursor: pointer;
        }
        .btn:hover { background: rgba(255,215,120,0.1); }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div style="font-size: 24px; font-weight: 900; letter-spacing: 5px;">KGEN ENGINE V6.0</div>
    <div class="loader-bar"><div class="loader-progress" id="load-bar"></div></div>
    <div class="status-text" id="status-text" style="margin-top:10px; font-size:10px; color:var(--gold);">INITIALIZING...</div>
</div>

<div id="stage-4d"></div>

<div class="cockpit-ui">
    <div class="hud-top">
        <div class="stat-box"><div class="stat-label">宇宙節奏 CT</div><div id="hud-ct" class="stat-value">0</div></div>
        <div class="stat-box"><div class="stat-label">人群拔河 R</div><div id="hud-r" class="stat-value">0.00</div></div>
        <div class="stat-box"><div class="stat-label">合成方向 D</div><div id="hud-d" class="stat-value">0.00</div></div>
    </div>
    <div id="cosmic-log"></div>
    <div class="terminal">
        <div class="control-row">
            <div class="slider-meta">方向盤 (CT)</div>
            <input type="range" id="ctrl-ct" min="-1" max="1" step="1" value="0">
        </div>
        <div class="control-row">
            <div class="slider-meta">多方勢能 (L)</div>
            <input type="range" id="ctrl-l" min="0" max="10000" value="5000">
        </div>
        <div class="control-row">
            <div class="slider-meta">空方勢能 (S)</div>
            <input type="range" id="ctrl-s" min="0" max="10000" value="5000">
        </div>
        <div style="display:flex; gap:10px; margin-top:auto;">
            <button class="btn" onclick="app.ignite()">🔥 注入能量 (13500 斤)</button>
            <button class="btn" onclick="app.log('啟動 16888 結算程序...')">🏛️ 進入廣寒宮</button>
        </div>
    </div>
</div>

<script>
const app = {
    state: { L: 5000, S: 5000, CT: 0, pool: 0 },
    
    // --- 第一批與第二批：天條引擎核心 ---
    engine: {
        config: { w1: 0.6, w2: 0.4, lastClose: 30000 },
        tick: function(ct, l, s) {
            const r = (l - s) / (l + s + 0.000001);
            const d = (0.6 * ct) + (0.4 * r);
            const v = 1.0 + (Math.abs(r) * 0.5); // 波動率隨拔河劇烈程度增加
            return { r, d, v };
        }
    },

    // --- 第三批：THREE.JS 3D 渲染矩陣 ---
    renderer: {
        scene: null, camera: null, randerer: null, fairy: null,
        init: function() {
            const container = document.getElementById('stage-4d');
            this.scene = new THREE.Scene();
            this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight * 0.65), 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight * 0.65);
            container.appendChild(this.renderer.domElement);

            // 建立仙女載體（暫用金色發光面板）
            const geo = new THREE.BoxGeometry(4, 6, 0.2);
            const mat = new THREE.MeshPhongMaterial({ color: 0xffd778, emissive: 0x332200, shininess: 100 });
            this.fairy = new THREE.Mesh(geo, mat);
            this.scene.add(this.fairy);

            // 建立宇宙粒子
            const starGeo = new THREE.BufferGeometry();
            const positions = [];
            for(let i=0; i<1500; i++) positions.push((Math.random()-0.5)*40, (Math.random()-0.5)*40, (Math.random()-0.5)*40);
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            this.stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0x00f2ff, size: 0.05}));
            this.scene.add(this.stars);

            this.scene.add(new THREE.PointLight(0xffffff, 1, 100).clone().set(5,5,5));
            this.scene.add(new THREE.AmbientLight(0x404040));
            this.camera.position.z = 12;
        },
        update: function(data) {
            // 角色隨 R 左右側身轉向
            this.fairy.rotation.y = THREE.MathUtils.lerp(this.fairy.rotation.y, data.r * Math.PI/3, 0.1);
            // 角色隨 D 前後位移
            this.fairy.position.z = THREE.MathUtils.lerp(this.fairy.position.z, data.d * 4, 0.05);
            // 隨 V 產生微小震動
            this.fairy.position.x = (Math.random()-0.5) * (data.v - 1) * 0.3;
            this.stars.rotation.y += 0.001;
            this.renderer.render(this.scene, this.camera);
        }
    },

    // --- 啟動與循環 ---
    init: async function() {
        // 模擬加載 10MB 資源的儀式
        const bar = document.getElementById('load-bar');
        for(let i=0; i<=100; i+=5) {
            bar.style.width = i + '%';
            await new Promise(r => setTimeout(r, 50));
        }
        document.getElementById('loading-overlay').style.display = 'none';
        
        this.renderer.init();
        this.startLoop();
        this.log("廣寒宮終端已連線。");
    },

    startLoop: function() {
        const run = () => {
            const l = parseFloat(document.getElementById('ctrl-l').value);
            const s = parseFloat(document.getElementById('ctrl-s').value);
            const ct = parseFloat(document.getElementById('ctrl-ct').value);
            
            const k = this.engine.tick(ct, l, s);
            
            document.getElementById('hud-r').innerText = k.r.toFixed(2);
            document.getElementById('hud-ct').innerText = ct;
            document.getElementById('hud-d').innerText = k.d.toFixed(2);
            
            this.renderer.update(k);
            requestAnimationFrame(run);
        };
        run();
    },

    log: function(m) {
        const l = document.getElementById('cosmic-log');
        l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
    },

    ignite: function() {
        this.log("金箍棒能量注入...");
        this.state.pool += 135;
    }
};

window.onload = () => app.init();
window.onresize = () => {
    app.renderer.camera.aspect = window.innerWidth / (window.innerHeight * 0.65);
    app.renderer.camera.updateProjectionMatrix();
    app.renderer.renderer.setSize(window.innerWidth, window.innerHeight * 0.65);
};
</script>
</body>
</html>
