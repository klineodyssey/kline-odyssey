<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>廣寒宮 16888｜宇宙文明實體終端 V6.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #ffd778;
            --cyan: #00f2ff;
            --red: #ff3c00;
            --bg: #050608;
            --panel: rgba(20, 22, 28, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; }

        /* 啟動加載畫面：10MB 資源加載感 */
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-bar {
            width: 250px; height: 2px; background: rgba(255,255,255,0.1);
            margin-top: 20px; position: relative; overflow: hidden;
        }
        .loader-progress {
            position: absolute; width: 0%; height: 100%; background: var(--gold);
            box-shadow: 0 0 15px var(--gold); transition: width 0.3s;
        }
        .status-text { font-size: 10px; color: var(--gold); margin-top: 10px; letter-spacing: 2px; text-transform: uppercase; }

        /* 4D 舞台 */
        #stage-4d { width: 100vw; height: 100vh; position: absolute; z-index: 1; }

        /* 駕駛艙面板 (Cockpit) */
        .cockpit-ui {
            position: absolute; inset: 0; pointer-events: none; z-index: 10;
            border: 1px solid rgba(255,215,120,0.1);
        }

        /* 頂部：天條數據欄 */
        .hud-top {
            position: absolute; top: 0; width: 100%; height: 80px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-around; align-items: center; padding: 0 20px;
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 9px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
        .stat-value { font-size: 18px; font-weight: 900; color: var(--gold); }

        /* 底部：操作終端 */
        .terminal {
            position: absolute; bottom: 0; width: 100%; height: 35vh;
            background: var(--panel); border-top: 1px solid var(--gold);
            pointer-events: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        .control-row { display: flex; align-items: center; gap: 15px; }
        .slider-meta { width: 80px; font-size: 10px; color: var(--gold); }
        input[type=range] { flex: 1; accent-color: var(--gold); cursor: pointer; }

        /* 結算按鈕區 */
        .action-dock {
            display: flex; gap: 10px; margin-top: auto;
        }
        .btn {
            flex: 1; padding: 15px; border: 1px solid var(--gold); background: transparent;
            color: var(--gold); font-weight: 900; border-radius: 4px; transition: 0.3s;
        }
        .btn:active { background: var(--gold); color: #000; }
        .btn-ignite { background: rgba(255, 215, 120, 0.1); border-width: 2px; }

        /* 宇宙日誌 */
        #cosmic-log {
            position: absolute; right: 20px; top: 100px; width: 200px; height: 150px;
            font-size: 10px; color: var(--cyan); overflow-y: hidden; text-align: right;
            mask-image: linear-gradient(to top, #fff, transparent);
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="font-size: 24px; font-weight: 900; letter-spacing: 5px;">KGEN 16888</div>
        <div class="loader-bar"><div class="loader-progress" id="load-bar"></div></div>
        <div class="status-text" id="status-text">INITIALIZING QUANTUM TERMINAL...</div>
    </div>

    <div id="stage-4d"></div>

    <div class="cockpit-ui">
        <div class="hud-top">
            <div class="stat-box"><div class="stat-label">宇宙節奏 CT</div><div class="stat-value" id="hud-ct">0</div></div>
            <div class="stat-box"><div class="stat-label">人群拔河 R</div><div class="stat-value" id="hud-r">0.00</div></div>
            <div class="stat-box"><div class="stat-label">許願池進度</div><div class="stat-value" id="hud-pool">0 / 16888</div></div>
        </div>

        <div id="cosmic-log"></div>

        <div class="terminal">
            <div class="control-row">
                <div class="slider-meta">方向盤 (CT)</div>
                <input type="range" id="ctrl-ct" min="-1" max="1" step="1" value="0">
            </div>
            <div class="control-row">
                <div class="slider-meta">多方 L</div>
                <input type="range" id="ctrl-l" min="0" max="10000" value="5000">
            </div>
            <div class="control-row">
                <div class="slider-meta">空方 S</div>
                <input type="range" id="ctrl-s" min="0" max="10000" value="5000">
            </div>

            <div class="action-dock">
                <button class="btn btn-ignite" onclick="app.ignite()">🔥 點火修行</button>
                <button class="btn" onclick="app.settle()">13500 斤結算</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * 宇宙文明實體終端 - 核心邏輯架構
         */
        const app = {
            state: {
                L: 5000, S: 5000, CT: 0, pool: 0,
                isLoaded: false
            },

            // 實裝天條核心演算法
            /**
         * 宇宙天條實體引擎 V1.0 - 深層邏輯
         * 負責計算 D = 0.6*CT + 0.4*R 並衍生 OHLC
         */
        app.engine = {
            config: {
                w1: 0.6, // 宇宙節奏權重
                w2: 0.4, // 人群拔河權重
                baseScale: 100, // 基礎波動單位
                volatility: 1.0, // 初始 V 值 (天條 4.1)
                lastClose: 30000 // 初始 K 線位置
            },

            // 存儲歷史 K 線，為後續 10MB 大數據做準備
            history: [],

            /**
             * 核心合成方向算法 (天條 5.2)
             */
            getDirection: function(ct, l, s) {
                const epsilon = 0.000001;
                const r = (l - s) / (l + s + epsilon); // 拔河值 R
                const d = (this.config.w1 * ct) + (this.config.w2 * r);
                return { r, d };
            },

            /**
             * 生成宇宙 K 線 (天條 5.5)
             * 基於當前物理量產生一根 4D 空間的燭線數據
             */
            tick: function(ct, l, s) {
                const { r, d } = this.getDirection(ct, l, s);
                
                // 動態 V：當拔河越激烈 (L+S 越大) 或 CT 偏移越大，V 越高
                const activity = (l + s) / 5000;
                this.config.volatility = 1.0 + (activity * 0.2) + (Math.abs(ct) * 0.5);
                
                const range = this.config.baseScale * this.config.volatility;
                const open = this.config.lastClose;
                
                // 收盤價隨 D 方向移動 (Close = Open + D*Range)
                const close = open + (d * range);
                
                // 影線生成 (天條 5.3)
                const high = Math.max(open, close) + (range * Math.random() * 0.3);
                const low = Math.min(open, close) - (range * Math.random() * 0.3);
                
                const kLine = {
                    open, high, low, close,
                    r, d, v: this.config.volatility,
                    time: Date.now()
                };

                this.config.lastClose = close;
                this.history.push(kLine);
                if(this.history.length > 100) this.history.shift(); // 保持緩衝區
                
                return kLine;
            }
        };

        // 強化渲染循環中的數據連動
        app.startRenderLoop = function() {
            const update = () => {
                // 1. 讀取滑桿數值
                const currentL = parseFloat(document.getElementById('ctrl-l').value);
                const currentS = parseFloat(document.getElementById('ctrl-s').value);
                const currentCT = parseFloat(document.getElementById('ctrl-ct').value);

                // 2. 驅動天條引擎運轉
                const currentK = this.engine.tick(currentCT, currentL, currentS);

                // 3. UI 實時反饋
                document.getElementById('hud-r').innerText = currentK.r.toFixed(3);
                document.getElementById('hud-ct').innerText = currentCT;
                
                // 數值異常發光提醒 (天條 4.3：劇烈波動)
                const rValEl = document.getElementById('hud-r');
                if(Math.abs(currentK.r) > 0.8) {
                    rValEl.style.color = 'var(--red)';
                    rValEl.style.textShadow = '0 0 10px var(--red)';
                } else {
                    rValEl.style.color = 'var(--gold)';
                    rValEl.style.textShadow = 'none';
                }

                // 4. 預留：將 currentK 丟入下一批的 3D 渲染器
                if(this.renderer && this.renderer.fairy) {
                    this.renderer.updateFairy(currentK);
                }

                setTimeout(() => requestAnimationFrame(update), 100); // 宇宙節拍：每 0.1 秒一跳
            };
            update();
        };

            init: async function() {
                this.log("終端自檢中...");
                await this.simulateLoading();
                this.startRenderLoop();
            },

            simulateLoading: async function() {
                const bar = document.getElementById('load-bar');
                const txt = document.getElementById('status-text');
                const steps = ["加載天條邏輯...", "注入 16888 合約 ABI...", "建立 4D 渲染矩陣...", "啟動廣寒宮通訊..."];
                
                for(let i = 0; i <= 100; i += 2) {
                    bar.style.width = i + '%';
                    if(i % 25 === 0) txt.innerText = steps[i/25];
                    await new Promise(r => setTimeout(r, 30));
                }
                document.getElementById('loading-overlay').style.display = 'none';
                this.log("宇宙引擎已啟動。");
            },

            log: function(msg) {
                const el = document.getElementById('cosmic-log');
                el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML;
            },

            ignite: function() {
                this.state.pool += 135;
                this.log("注入能量：+135 KGEN");
                document.getElementById('hud-pool').innerText = `${Math.floor(this.state.pool)} / 16888`;
            },

            settle: function() {
                this.log("執行天條 6.1 判定...");
                // 這裡將在第二批程式中接入勝負計算
            },

            startRenderLoop: function() {
                const update = () => {
                    this.state.L = parseFloat(document.getElementById('ctrl-l').value);
                    this.state.S = parseFloat(document.getElementById('ctrl-s').value);
                    this.state.CT = parseFloat(document.getElementById('ctrl-ct').value);

                    const R = this.engine.calculateR(this.state.L, this.state.S);
                    document.getElementById('hud-r').innerText = R.toFixed(2);
                    document.getElementById('hud-ct').innerText = this.state.CT;

                    requestAnimationFrame(update);
                };
                update();
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
