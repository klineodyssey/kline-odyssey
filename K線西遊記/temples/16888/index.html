<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />

  <title>廣寒宮 16888｜七仙女飛碟駕駛艙 V1.6.1（單張圖｜上下粒子｜語音｜錢包）</title>

  <!-- ethers v5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

  <style>
    :root{
      --bg:#06070b;
      --panel: rgba(255,255,255,.06);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --line: rgba(255,255,255,.14);
      --gold: rgba(255,215,120,.95);
      --cyan: rgba(120,255,220,.95);
      --pink: rgba(255,170,220,.95);
      --shadow: 0 16px 70px rgba(0,0,0,.60);
      --r2: 999px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: var(--sans);
      background: radial-gradient(1200px 800px at 30% 20%, rgba(120,170,255,.10), transparent 60%), var(--bg);
      color: var(--text); min-height:100vh; overflow-x:hidden;
    }

    .topRight{
      position:fixed; right:12px; top:calc(12px + var(--safe-top));
      z-index:90; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px; padding:9px 12px; border:1px solid var(--line);
      border-radius: var(--r2); background: rgba(0,0,0,.38); backdrop-filter: blur(10px);
      font-size:12px; text-decoration:none; font-weight:850; cursor:pointer; user-select:none;
    }
    .pill.gold{ border-color: rgba(255,215,120,.35); color: var(--gold); }
    .pill.on{ outline:2px solid rgba(120,255,220,.35); }

    .wrap{ max-width:1100px; margin:0 auto; padding:16px 14px calc(140px + var(--safe-bottom)); }
    header{ padding-top: 70px; display:flex; gap:14px; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; }
    .brand .h{ font-weight:950; font-size:18px; }
    .brand .sub{ font-size:12px; color:var(--muted); margin-top:6px; }

    .grid{ margin-top:14px; display:grid; grid-template-columns: 1.15fr .85fr; gap:12px; }
    @media (max-width: 980px){ .grid{ grid-template-columns:1fr; } }

    .card{
      border:1px solid var(--line); border-radius: 24px; background: rgba(255,255,255,.05);
      box-shadow: var(--shadow); overflow:hidden;
    }
    .cardHead{
      padding:14px; border-bottom:1px solid rgba(255,255,255,.08);
      display:flex; justify-content:space-between; align-items:center;
    }
    .cardBody{ padding:14px; }

    .cockpit{
      position:relative; min-height: 560px;
      background: rgba(0,0,0,0.18);
    }
    canvas#fx{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

    .fairyWrap{
      position:relative; width: 280px; height: 280px; margin: 18px auto 8px;
      border-radius: 50%; overflow:hidden;
      border:1px solid rgba(255,215,120,.25); background: rgba(0,0,0,.35);
      box-shadow: 0 0 60px rgba(255,215,120,0.12);
    }
    /* ✅ 單張圖最穩：img + object-fit */
    img#fairyImg{
      width:100%; height:100%; display:block;
      object-fit: cover;
      object-position: 50% 18%;
      transform-origin:center;
      transition: transform .35s ease, filter .35s ease;
      will-change: transform, filter;
    }

    .sleepMask{
      position:absolute; inset:0; display:none; place-items:center;
      background:rgba(0,0,0,0.55); backdrop-filter: blur(4px);
      color: var(--gold); font-weight:900; letter-spacing:1px;
    }
    .sleepMask.on{ display:grid; }

    .kpiGrid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:12px; }
    .kpi{
      border:1px solid rgba(255,255,255,.1); border-radius: 18px; padding:12px;
      background:rgba(0,0,0,0.22);
    }
    .kpi .t{ font-size:12px; color:var(--muted); }
    .kpi .v{ font-weight:950; font-size:20px; margin-top:6px; color: var(--gold); }
    .kpi .v.cyan{ color: var(--cyan); }

    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .btn{
      padding:10px 14px; border-radius:999px; border:1px solid var(--line);
      background:rgba(255,255,255,0.10); color:#fff; cursor:pointer; font-weight:900;
    }
    .btn.gold{ border-color: rgba(255,215,120,.45); color: var(--gold); }
    .btn.danger{ border-color: rgba(255,120,120,.35); color: rgba(255,180,180,.95); }

    input[type="range"]{ width:100%; accent-color: var(--gold); }
    textarea{
      width:100%; background:rgba(0,0,0,0.30); border:1px solid var(--line); color:#fff;
      border-radius:14px; padding:10px; min-height:86px;
    }

      font-family:var(--mono); font-size:10px; background:rgba(0,0,0,0.30);
