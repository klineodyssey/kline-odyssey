<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>五指山悟空財神殿 V1</title>
<style>
body{margin:0;background:#000;color:#fff;overflow:hidden;font-family:sans-serif;}
#core{
position:absolute;top:50%;left:50%;
width:140px;height:140px;border-radius:50%;
transform:translate(-50%,-50%);
background:radial-gradient(circle,#ffcc66,#ff6600);
box-shadow:0 0 60px #ff9900;
animation:pulse 2s infinite;cursor:pointer;
}
@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}
#flash{
position:absolute;width:100%;height:100%;
background:#fff;opacity:0;transition:.5s;
}
#hud{
position:absolute;top:10px;left:10px;opacity:0;transition:.5s;
}
.battle #hud{opacity:1;}
.line{
position:absolute;width:2px;height:100%;
background:rgba(255,200,100,.3);
}
#lineL{left:30%;}
#lineR{right:30%;}
</style>
</head>

<body>

<div id="lineL" class="line"></div>
<div id="lineR" class="line"></div>

<div id="core"></div>
<div id="flash"></div>

<div id="hud">
CT: 0<br>
Mode: BATTLE
</div>

<script>
let mode="TEMPLE";

document.getElementById("core").onclick=()=>{
let flash=document.getElementById("flash");
flash.style.opacity=1;

setTimeout(()=>{
document.body.classList.add("battle");
},300);

setTimeout(()=>{
flash.style.opacity=0;
},800);
};
</script>

</body>
</html>
