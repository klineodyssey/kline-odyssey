<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGEN 宇宙心臟 - 五指山悟空財神殿 12345</title>
    <style>
        :root {
            --wukong-gold: #ffd700;
            --temple-red: #8b0000;
            --kgen-glow: rgba(255, 215, 0, 0.6);
            --bg-dark: #080000;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a0000 0%, #080000 100%);
            color: white;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. 心臟脈動 Logo */
        @keyframes heartBeat {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--wukong-gold)); }
            15% { transform: scale(1.1); filter: drop-shadow(0 0 25px var(--wukong-gold)); }
            30% { transform: scale(1); filter: drop-shadow(0 0 5px var(--wukong-gold)); }
        }

        .temple-core {
            margin-top: 40px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, var(--wukong-gold) 0%, var(--temple-red) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: heartBeat 2s infinite ease-in-out;
            border: 3px solid #000;
            box-shadow: 0 0 30px var(--temple-red);
        }

        .core-symbol { font-size: 3rem; color: black; font-weight: 900; }

        /* 2. 交易控制面板 (繼承 V3.4) */
        .swap-panel {
            width: 90%;
            max-width: 420px;
            background: rgba(20, 0, 0, 0.9);
            border: 2px solid var(--wukong-gold);
            border-radius: 15px;
            margin: 30px 0;
            padding: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(139, 0, 0, 0.5);
        }

        .input-group {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            border: 1px inset #333;
            margin-bottom: 20px;
        }

        .input-group label { font-size: 0.75rem; color: #888; display: block; margin-bottom: 5px; }
        .input-group input {
            background: transparent; border: none; color: white; width: 100%;
            font-size: 1.5rem; outline: none; font-weight: bold;
        }

        /* 3. 儀式按鈕：煉金模式 */
        .ritual-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, #8b0000, #ff0000, #8b0000);
            background-size: 200% auto;
            border: 1px solid var(--wukong-gold);
            border-radius: 10px;
            color: var(--wukong-gold);
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.5s;
            letter-spacing: 5px;
            animation: moveGradient 3s linear infinite;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .ritual-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--wukong-gold);
            color: white;
        }

        /* 4. 底部敘事 */
        .footer-text {
            color: #444;
            font-size: 0.8rem;
            text-align: center;
            padding: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="temple-core">
        <div class="core-symbol">悟</div>
    </div>

    <h2 style="letter-spacing: 8px; margin-top: 20px;">悟空財神殿</h2>
    <p style="color: var(--wukong-gold); font-size: 0.9rem; letter-spacing: 2px;">座標：12345 ｜ 宇宙心臟</p>

    <main class="swap-panel">
        <div style="text-align: center; margin-bottom: 20px; font-size: 0.85rem; color: #aaa;">
            <span id="bp-status">🔴 尚未連線宇宙</span>
        </div>

        <div class="input-group">
            <label>投入 USDT (子彈)</label>
            <input type="number" id="usdt-amount" placeholder="0.00">
        </div>

        <div style="text-align: center; margin-bottom: 20px; color: var(--wukong-gold);">
            <span style="font-size: 1.2rem;">↓</span>
        </div>

        <div class="input-group">
            <label>獲得 KGEN (身份質量)</label>
            <input type="text" id="kgen-output" placeholder="預計獲取..." readonly>
        </div>

        <button class="ritual-btn" onclick="startRitual()">啟動煉金儀式</button>
    </main>

    <footer class="footer-text">
        「你得到的，不是幣。是身份。」<br>
        🌕 花果山火星・信念不滅
    </footer>

    <script>
        // 模擬兌換邏輯與儀式反饋
        function startRitual() {
            const btn = document.querySelector('.ritual-btn');
            const status = document.getElementById('bp-status');
            const amount = document.getElementById('usdt-amount').value;

            if(!amount || amount <= 0) {
                alert("大聖，請先填入子彈（USDT）！");
                return;
            }

            btn.innerText = "正在震碎壓制...";
            btn.style.pointerEvents = "none";
            status.innerText = "🟡 正在引導財氣...";

            setTimeout(() => {
                status.innerText = "🟢 12345 能量對接成功";
                status.style.color = "#00ff00";
                btn.innerText = "財氣覺醒・儀式完成";
                btn.style.background = "#111";
                btn.style.color = "#00ff00";
                alert("儀式完成！KGEN 質量已注入你的靈魂座標。");
            }, 2500);
        }

        // 自動計算預計獲取 (模擬 BurnEngine)
        document.getElementById('usdt-amount').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('kgen-output').value = val ? (val * 100).toLocaleString() : "";
        });
    </script>
</body>
</html>
