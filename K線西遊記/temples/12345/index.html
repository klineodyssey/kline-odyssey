<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGEN 宇宙入口 - 火星殿 28555</title>
    <style>
        :root {
            --kgen-gold: #ffcc00;
            --kgen-glow: rgba(255, 204, 0, 0.6);
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.95);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 繼承廣寒宮風格的標題與裝飾 */
        .header-section {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--kgen-glow);
            width: 100%;
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
        }

        .title-glow {
            font-size: 2rem;
            color: var(--kgen-gold);
            text-shadow: 0 0 15px var(--kgen-glow);
            letter-spacing: 4px;
        }

        /* 核心控制面板：BP-Panel 風格 */
        .control-panel {
            width: 90%;
            max-width: 600px;
            background: var(--panel-bg);
            border: 2px solid var(--kgen-gold);
            border-radius: 15px;
            margin: 30px 0;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .status-bar {
            background: #222;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }

        .action-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #ffcc00, #ff9900);
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .action-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--kgen-glow);
        }

        .footer-narrative {
            padding: 20px;
            font-style: italic;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>

    <section class="header-section">
        <div class="title-glow">#K線西遊記</div>
        <p>花果山火星｜宇宙入口 16888</p>
    </section>

    <main class="control-panel">
        <div class="status-bar" id="bp-status">
            <span>系統狀態：等待修行者登入</span>
            <span id="wallet-indicator">🔴 未連線</span>
        </div>

        <div style="margin-bottom: 30px;">
            <h3 style="color: var(--kgen-gold);">STEP 6｜兌換 KGEN</h3>
            <p style="font-size: 0.85rem; color: #888;">合約座標：0xBA3d...32Be</p>
            
            <div style="background: #111; padding: 15px; border-radius: 10px; border: 1px inset #333;">
                <label style="font-size: 0.7rem; color: #666;">支付 USDT (子彈)</label>
                <input type="number" placeholder="0.00" style="background: transparent; border: none; color: white; width: 100%; font-size: 1.5rem; outline: none;">
            </div>
        </div>

        <button class="action-btn" onclick="connectWallet()">啟動宇宙連線</button>
    </main>

    <footer class="footer-narrative">
        「你得到的，不是幣。是身份。」<br>
        🌕 信念不滅・市場無界
    </footer>

    <script>
        async function connectWallet() {
            console.log("正在啟動廣寒宮 V3.7.4 錢包橋接...");
            const statusText = document.getElementById('bp-status');
            
            // 模擬連線動畫
            statusText.style.color = "#ffcc00";
            statusText.innerText = "正在通訊：正在尋找小狐狸與幣安錢包...";
            
            // 此處應接入你上個檔中的 window.ethereum 或 WalletConnectProvider 邏輯
            setTimeout(() => {
                document.getElementById('wallet-indicator').innerText = "🟢 已進入宇宙";
                alert("歡迎進入廣寒宮！準備好你的燃料（BNB）了嗎？");
            }, 1500);
        }
    </script>

</body>
</html>
