<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE V12.4 真實運行版</title>
<style>
body{margin:0;background:#05070f;color:#fff;font-family:Arial}
canvas{position:fixed;inset:0}
.hud{position:fixed;top:10px;right:10px;background:rgba(0,0,0,.6);padding:10px;border-radius:10px}
.ctrl{position:fixed;bottom:20px;width:100%}
.joy{position:absolute;left:20px;width:120px;height:120px;background:#222;border-radius:50%}
.joy-inner{position:absolute;width:40px;height:40px;background:gold;border-radius:50%}
.yaw{position:absolute;left:50%;transform:translateX(-50%);width:200px;height:60px;background:#222;border-radius:30px}
.yaw-inner{position:absolute;width:40px;height:40px;background:gold;border-radius:50%}
.lev{position:absolute;right:20px;width:60px;height:200px;background:#222;border-radius:30px}
.knob{position:absolute;width:40px;height:40px;background:gold;border-radius:50%}
</style>
</head>
<body>
<div class="hud" id="hud"></div>
<canvas id="c"></canvas>

<div class="ctrl">
<div class="joy" id="joy"><div class="joy-inner" id="ji"></div></div>
<div class="yaw" id="yaw"><div class="yaw-inner" id="yi"></div></div>
<div class="lev" id="lev"><div class="knob" id="li"></div></div>
</div>

<script>
const c=document.getElementById('c'),x=c.getContext('2d');
function fit(){c.width=innerWidth;c.height=innerHeight}fit();onresize=fit;

let S={
 x:0,y:0,ct:0,t:0,
 yaw:0,lev:0,
 vx:0,vy:0
};

function signedDeg(){
 let d=(S.yaw*180/Math.PI)%360;
 if(d>180)d-=360;if(d<-180)d+=360;
 return d;
}

function zone(){return Math.abs(signedDeg())<=90?'多':'空';}
function dir(){return zone()=='多'?1:-1;}

function update(){
 // CT 推進
 let d=dir()*S.lev*0.02;
 S.ct+=d;
 S.y=S.ct;
 S.t++;
}

function draw(){
 x.fillStyle="#000";x.fillRect(0,0,c.width,c.height);

 // 畫價格線
 x.strokeStyle="lime";
 x.beginPath();
 for(let i=0;i<200;i++){
  let yy=300+i*2;
  let val=S.ct-(200-i)*0.05;
  x.lineTo(100+i*3,yy-val);
 }
 x.stroke();

 document.getElementById('hud').innerHTML=
 `CT:${S.ct.toFixed(2)}<br>
 Angle:${signedDeg().toFixed(1)}°<br>
 Zone:${zone()}<br>
 Leverage:${S.lev.toFixed(1)}x<br>
 Time:T+${S.t}`;
}

function loop(){update();draw();requestAnimationFrame(loop)}loop();

// controls
let joy=document.getElementById('joy'),ji=document.getElementById('ji');
joy.onpointermove=e=>{
 if(e.buttons){
  let r=joy.getBoundingClientRect();
  let dx=e.clientX-r.left-60;
  let dy=e.clientY-r.top-60;
  S.x=dx/50;
  ji.style.left=(dx+60-20)+'px';
  ji.style.top=(dy+60-20)+'px';
 }
};

let yaw=document.getElementById('yaw'),yi=document.getElementById('yi');
yaw.onpointermove=e=>{
 if(e.buttons){
  let r=yaw.getBoundingClientRect();
  let dx=e.clientX-r.left-r.width/2;
  S.yaw=dx/100*Math.PI;
  yi.style.left=(dx+r.width/2-20)+'px';
 }
};

let lev=document.getElementById('lev'),li=document.getElementById('li');
lev.onpointermove=e=>{
 if(e.buttons){
  let r=lev.getBoundingClientRect();
  let y=e.clientY-r.top;
  let v=1-(y/r.height);
  S.lev=Math.max(0,v*150);
  li.style.top=(y-20)+'px';
 }
};
</script>
</body>
</html>
