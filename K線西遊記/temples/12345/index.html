
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WUZHISHAN_12345_scene_v3.html</title>
<style>
:root{
  --bg:#07070d;
  --gold:#f2d57a;
  --gold2:#ffb347;
  --cyan:#79d7ff;
  --red:#ff7575;
  --green:#86ff7a;
  --panel:rgba(10,8,12,.58);
  --line:rgba(255,255,255,.10);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);font-family:"Noto Sans TC",Arial,sans-serif;color:#fff;touch-action:none}
canvas{position:fixed;inset:0}
#bg{z-index:0}
#coreCanvas{z-index:1}
.panel{
  position:fixed;z-index:120;background:var(--panel);border:1px solid rgba(255,255,255,.12);
  border-radius:16px;padding:10px 12px;backdrop-filter:blur(12px);
  box-shadow:0 10px 28px rgba(0,0,0,.22);
}
#brand{top:12px;left:12px;max-width:40vw}
#brand .t1{font-size:21px;font-weight:900;color:var(--gold)}
#brand .t2{font-size:11px;color:#ead9af;margin-top:4px}
#brand .t3{font-size:11px;color:var(--cyan);margin-top:4px}
#hud{
  top:12px;right:12px;min-width:240px;font-size:12px;line-height:1.55;
}
.hud-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hud-box{padding:7px 9px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(255,255,255,.03)}
.hud-k{font-size:10px;color:#ecdba4}
.hud-v{font-size:15px;font-weight:900;color:var(--cyan);margin-top:4px}
#centerInfo{
  position:fixed;left:50%;top:61%;transform:translateX(-50%);z-index:102;
  padding:8px 14px;border-radius:999px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.09);
  font-size:12px;color:#ffefc6
}
.core-shell{
  position:fixed;left:50%;top:32%;transform:translate(-50%,-50%);
  width:min(42vw,300px);height:min(42vw,300px);z-index:100
}
.core-ring{
  position:absolute;inset:0;border-radius:50%;overflow:hidden;border:2px solid rgba(242,213,122,.9);
  box-shadow:0 0 0 4px rgba(242,213,122,.06),0 0 42px rgba(242,213,122,.12);
}
.core-ring::after{
  content:"";position:absolute;inset:18px;border-radius:50%;border:1px dashed rgba(121,215,255,.22);
  animation:spin 22s linear infinite;
}
.core-glow{
  position:absolute;inset:-22px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,196,82,.15) 0,rgba(255,132,36,.07) 35%,transparent 62%);
  filter:blur(7px);animation:pulse 2.6s ease-in-out infinite;
}
.temple-heart-hit{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:126px;height:126px;border-radius:50%;cursor:pointer;background:transparent;z-index:4;
}
.orbit-note{
  position:absolute;left:50%;bottom:-28px;transform:translateX(-50%);
  font-size:11px;color:#ffefc6;background:rgba(0,0,0,.42);
  border:1px solid rgba(255,255,255,.08);padding:6px 12px;border-radius:999px;white-space:nowrap
}
#klinePanel{
  position:fixed;left:12px;bottom:190px;width:min(340px,46vw);z-index:122;
}
.k-head{display:flex;align-items:center;justify-content:space-between;color:var(--gold);font-weight:900;font-size:13px;margin-bottom:8px}
.k-head .symtabs{display:flex;gap:6px}
.sym{
  border-radius:999px;padding:5px 10px;border:1px solid rgba(242,213,122,.18);cursor:pointer;background:rgba(255,255,255,.03);font-size:11px
}
.sym.active{background:rgba(242,213,122,.14);color:#ffefbb}
#klineCanvas{
  width:100%;height:128px;display:block;border-radius:12px;background:
   linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.08)),
   repeating-linear-gradient(to right,rgba(255,255,255,.05) 0,rgba(255,255,255,.05) 1px,transparent 1px,transparent 34px),
   repeating-linear-gradient(to bottom,rgba(255,255,255,.05) 0,rgba(255,255,255,.05) 1px,transparent 1px,transparent 26px);
}
.k-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.mini{
  border-radius:12px;background:rgba(255,255,255,.03);padding:8px 9px;border:1px solid rgba(255,255,255,.08)
}
.mini .k{font-size:10px;color:#eedfb2}
.mini .v{font-size:13px;color:var(--cyan);font-weight:900;margin-top:4px}
.controls{
  position:fixed;left:0;right:0;bottom:82px;height:190px;z-index:145;pointer-events:none
}
.joy,.yaw,.warp{pointer-events:auto}
.joy{
  position:absolute;left:18px;bottom:8px;width:132px;height:132px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid var(--line)
}
.joy:before{content:"";position:absolute;inset:16px;border-radius:50%;border:1px solid rgba(255,255,255,.1)}
.joy-inner{position:absolute;left:44px;top:44px;width:44px;height:44px;border-radius:50%;background:var(--gold)}
.ctrl-label{position:absolute;left:50%;transform:translateX(-50%);top:-18px;font-size:11px;color:#ffecc0}
.yaw{
  position:absolute;left:50%;transform:translateX(-50%);bottom:22px;width:min(52vw,360px);height:68px;
  background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:999px
}
.yaw-track{position:absolute;left:14px;right:14px;top:29px;height:10px;border-radius:999px;background:rgba(255,255,255,.14)}
.yaw-fill{position:absolute;left:50%;top:29px;height:10px;border-radius:999px;background:linear-gradient(90deg,rgba(121,215,255,.25),rgba(121,215,255,.96));width:0}
.yaw-inner{position:absolute;left:calc(50% - 24px);top:10px;width:48px;height:48px;border-radius:50%;background:var(--gold)}
.warp{
  position:absolute;right:18px;bottom:0;width:68px;height:178px;border-radius:34px;background:rgba(255,255,255,.07);border:1px solid var(--line)
}
.warp-track{position:absolute;left:29px;top:12px;bottom:12px;width:10px;border-radius:999px;background:rgba(255,255,255,.14)}
.warp-fill{position:absolute;left:29px;bottom:12px;width:10px;height:0;border-radius:999px;background:linear-gradient(to top,#ff8600,#ffd35c,#fff2ad)}
.warp-inner{position:absolute;left:12px;top:67px;width:44px;height:44px;border-radius:50%;background:var(--gold)}
.warp-top,.warp-bottom{position:absolute;left:50%;transform:translateX(-50%);font-size:11px;color:#ffecc0}
.warp-top{top:-18px}.warp-bottom{bottom:-18px}
.footer{
  position:fixed;left:10px;right:10px;bottom:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;z-index:140
}
.footer button{
  border-radius:12px;border:1px solid rgba(242,213,122,.18);background:rgba(0,0,0,.56);color:#fff;padding:12px 8px;font-weight:900;font-size:12px;cursor:pointer
}
.footer .gold{color:#ffebaf;border-color:rgba(242,213,122,.36)}
#portalFlash{
  position:fixed;inset:0;z-index:210;pointer-events:none;opacity:0;
  background:radial-gradient(circle at center, rgba(255,246,212,.95) 0, rgba(255,212,100,.85) 10%, rgba(255,170,72,.42) 24%, rgba(0,0,0,0) 58%);
}
#portalFlash.on{animation:flash .95s ease forwards}
#toast{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:220;display:none;
  background:rgba(0,0,0,.84);border:1px solid #666;border-radius:12px;padding:12px 16px
}
@keyframes flash{0%{opacity:0;transform:scale(.8)}18%{opacity:1;transform:scale(1)}60%{opacity:1;transform:scale(1.6)}100%{opacity:0;transform:scale(2.2)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@media (max-width:860px){
  #brand{max-width:44vw}
  #brand .t1{font-size:18px}
  #hud{right:8px;min-width:200px}
  .core-shell{width:min(58vw,250px);height:min(58vw,250px)}
  #klinePanel{width:min(300px,48vw)}
  .footer{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div id="brand" class="panel">
  <div class="t1">五指山悟空財神殿</div>
  <div class="t2">12345 TempleHeart｜場景實作版</div>
  <div class="t3" id="clock">SYSTEM ONLINE | --</div>
</div>

<div id="hud" class="panel">
  <div class="hud-grid">
    <div class="hud-box"><div class="hud-k">MODE</div><div class="hud-v" id="hudMode">BATTLE</div></div>
    <div class="hud-box"><div class="hud-k">ZONE</div><div class="hud-v" id="hudZone">多</div></div>
    <div class="hud-box"><div class="hud-k">ANGLE</div><div class="hud-v" id="hudAngle">0°</div></div>
    <div class="hud-box"><div class="hud-k">WARP</div><div class="hud-v" id="hudWarp">0.0x</div></div>
    <div class="hud-box"><div class="hud-k">X</div><div class="hud-v" id="hudX">0.0</div></div>
    <div class="hud-box"><div class="hud-k">Y</div><div class="hud-v" id="hudY">0.0</div></div>
    <div class="hud-box"><div class="hud-k">Z</div><div class="hud-v" id="hudZ">0.0</div></div>
    <div class="hud-box"><div class="hud-k">CT</div><div class="hud-v" id="hudCT">0.0</div></div>
  </div>
</div>

<canvas id="bg"></canvas>

<div class="core-shell">
  <div class="core-glow"></div>
  <div class="core-ring">
    <canvas id="coreCanvas" width="300" height="300"></canvas>
    <div class="temple-heart-hit" id="templeHeart"></div>
  </div>
  <div class="orbit-note">TempleHeart｜K線核心｜世界入口</div>
</div>

<div id="centerInfo">CT 依附在雙透視通道上｜漲向前，跌向後</div>

<div id="klinePanel" class="panel">
  <div class="k-head">
    <span>實際 K 線</span>
    <div class="symtabs">
      <button class="sym active" data-symbol="BTCUSDT">BTC</button>
      <button class="sym" data-symbol="BNBUSDT">BNB</button>
      <button class="sym" data-symbol="ETHUSDT">USDT</button>
    </div>
  </div>
  <canvas id="klineCanvas" width="320" height="128"></canvas>
  <div class="k-meta">
    <div class="mini"><div class="k">SYMBOL</div><div class="v" id="metaSymbol">BTCUSDT</div></div>
    <div class="mini"><div class="k">PRICE</div><div class="v" id="metaPrice">--</div></div>
    <div class="mini"><div class="k">OPEN</div><div class="v" id="metaOpen">--</div></div>
    <div class="mini"><div class="k">HIGH / LOW</div><div class="v" id="metaHL">--</div></div>
  </div>
</div>

<div class="controls">
  <div class="joy" id="joy">
    <div class="ctrl-label">Move｜X 左右 / Y 前後</div>
    <div class="joy-inner" id="joyInner"></div>
  </div>
  <div class="yaw" id="yaw">
    <div class="ctrl-label">Yaw｜0° = 12點鐘｜-90~+90 多｜其餘空</div>
    <div class="yaw-track"></div>
    <div class="yaw-fill" id="yawFill"></div>
    <div class="yaw-inner" id="yawInner"></div>
  </div>
  <div class="warp" id="warp">
    <div class="warp-top">150x</div>
    <div class="warp-track"></div>
    <div class="warp-fill" id="warpFill"></div>
    <div class="warp-inner" id="warpInner"></div>
    <div class="warp-bottom">0x</div>
  </div>
</div>

<div class="footer">
  <button class="gold" id="btnPortal">TempleHeart</button>
  <button id="btnPredict">預測</button>
  <button id="btnBoss">Boss</button>
  <button id="btnHeal">回復</button>
  <button id="btnReset">重置</button>
</div>

<div id="portalFlash"></div>
<div id="toast"></div>

<script>
const bg = document.getElementById('bg');
const ctx = bg.getContext('2d');
const coreCanvas = document.getElementById('coreCanvas');
const c2 = coreCanvas.getContext('2d');
const klineCanvas = document.getElementById('klineCanvas');
const kctx = klineCanvas.getContext('2d');

function fit(){ bg.width=innerWidth; bg.height=innerHeight; }
addEventListener('resize', fit); fit();

function nowText(){
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
setInterval(()=>document.getElementById('clock').textContent='SYSTEM ONLINE | '+nowText(),500);
document.getElementById('clock').textContent='SYSTEM ONLINE | '+nowText();

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(window.__t); window.__t=setTimeout(()=>el.style.display='none',1200);
}

const S = {
  mode:'BATTLE',
  x:0,y:0,z:0,ct:0,yaw:0,
  moveX:0, moveY:0, yawInput:0, warp:0, warpInput:0,
  predict:true,
  monsters:[],
  candles:[],
  liveCandles:[],
  symbol:'BTCUSDT',
  lastFetch:0,
  kOpen:0, kHigh:0, kLow:0, kClose:0
};
for(let i=0;i<120;i++) S.candles.push({o:0,c:0,p:0,v:1+Math.random()*4});
function signedDeg(){
  let deg = (S.yaw * 180 / Math.PI) % 360;
  if (deg > 180) deg -= 360;
  if (deg < -180) deg += 360;
  return deg;
}
function zone(){ return Math.abs(signedDeg()) <= 90 ? '多' : '空'; }
function updateHUD(){
  document.getElementById('hudMode').textContent=S.mode;
  document.getElementById('hudZone').textContent=zone();
  document.getElementById('hudAngle').textContent=signedDeg().toFixed(1)+'°';
  document.getElementById('hudWarp').textContent=S.warp.toFixed(1)+'x';
  document.getElementById('hudX').textContent=S.x.toFixed(1);
  document.getElementById('hudY').textContent=S.y.toFixed(1);
  document.getElementById('hudZ').textContent=S.z.toFixed(1);
  document.getElementById('hudCT').textContent=S.ct.toFixed(2);
}
function worldToCamera(wx, wy){
  const dx = wx - S.x;
  const dy = wy - S.y;
  const cos = Math.cos(-S.yaw), sin = Math.sin(-S.yaw);
  return { x: dx*cos - dy*sin, y: dx*sin + dy*cos };
}
function cameraToScreen(cx, baseY, cam){
  return [cx + cam.x, baseY + cam.y*0.58 - S.z*15];
}
function ctLanePoint(ctNorm){
  const cx = bg.width/2;
  const nearY = bg.height*0.92;
  const farY = bg.height*0.34 + 18 - S.z*5;
  const clamped = Math.max(-1, Math.min(1, ctNorm));
  const t = (clamped + 1) / 2; // -1 back, +1 forward
  const y = nearY - (nearY - farY) * t;
  const width = 250 - 200 * t; // open more near, narrow far
  return { y, left: cx - width, right: cx + width };
}

function drawBackground(){
  const grad = ctx.createLinearGradient(0,0,0,bg.height);
  if(zone()==='多'){
    grad.addColorStop(0,'#0e1524'); grad.addColorStop(.55,'#15253c'); grad.addColorStop(1,'#0a0f18');
  } else {
    grad.addColorStop(0,'#2b0f18'); grad.addColorStop(.55,'#5a2331'); grad.addColorStop(1,'#130d12');
  }
  ctx.fillStyle=grad; ctx.fillRect(0,0,bg.width,bg.height);

  const cx = bg.width/2;
  const horizon = bg.height*0.34 - S.z*5;
  const nearY = bg.height*0.92;
  // lanes slightly opened
  ctx.strokeStyle='rgba(242,213,122,.38)';
  ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(cx-250,nearY); ctx.lineTo(cx-58,horizon+18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+250,nearY); ctx.lineTo(cx+58,horizon+18); ctx.stroke();

  ctx.strokeStyle='rgba(255,255,255,.07)';
  ctx.lineWidth=1;
  for(let i=1;i<=10;i++){
    const t=i/10;
    const y=nearY-(nearY-horizon)*t;
    const w=250-(192*t);
    ctx.beginPath(); ctx.moveTo(cx-w,y); ctx.lineTo(cx+w,y); ctx.stroke();
  }

  // moving streaks
  ctx.strokeStyle='rgba(255,255,255,.07)';
  for(let i=0;i<28;i++){
    const sy=(i/28)*bg.height;
    ctx.beginPath(); ctx.moveTo((i*67+performance.now()*0.05)%bg.width-120, sy);
    ctx.lineTo((i*67+performance.now()*0.05)%bg.width, sy-16);
    ctx.stroke();
  }

  // CT marker on lane
  const ctNorm = Math.max(-1, Math.min(1, S.ct / 1200));
  const lane = ctLanePoint(ctNorm);
  const mx = bg.width/2;
  ctx.strokeStyle='rgba(121,215,255,.95)';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(lane.left,lane.y); ctx.lineTo(lane.right,lane.y); ctx.stroke();
  ctx.fillStyle='rgba(121,215,255,.95)';
  ctx.beginPath(); ctx.arc(mx, lane.y, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#d8f7ff';
  ctx.font='bold 12px Arial';
  ctx.fillText('CT '+S.ct.toFixed(2), mx+10, lane.y-8);

  // central glow
  const glow=ctx.createRadialGradient(cx,bg.height*0.34,18,cx,bg.height*0.34,300);
  glow.addColorStop(0,'rgba(255,200,100,.18)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow; ctx.fillRect(0,0,bg.width,bg.height);
}
function drawCore(){
  c2.clearRect(0,0,coreCanvas.width,coreCanvas.height);
  const cx=coreCanvas.width/2, cy=coreCanvas.height/2;
  const rg=c2.createRadialGradient(cx,cy,18,cx,cy,140);
  rg.addColorStop(0, zone()==='多'?'rgba(90,180,255,.25)':'rgba(255,90,90,.26)');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  c2.fillStyle=rg; c2.beginPath(); c2.arc(cx,cy,140,0,Math.PI*2); c2.fill();

  const baseR=84+S.z*0.8;
  S.candles.forEach((k,i)=>{
    const deg = signedDeg();
    const theta = ((deg-90) * Math.PI/180) + i/S.candles.length*Math.PI*2 + performance.now()*0.0002;
    const rr = baseR + k.v*1.15;
    const x = cx + Math.cos(theta)*rr;
    const y = cy + Math.sin(theta)*rr*0.84;
    c2.strokeStyle = k.c>=k.o ? '#86ff7a' : '#ff7575';
    c2.beginPath(); c2.moveTo(x,y); c2.lineTo(x,y-(k.c-k.o)*1.8); c2.stroke();
    if(S.predict){
      c2.strokeStyle='rgba(121,215,255,.95)';
      c2.beginPath(); c2.moveTo(x+1.1,y); c2.lineTo(x+1.1,y-(k.p-k.o)*1.8); c2.stroke();
    }
  });
  c2.strokeStyle='rgba(242,213,122,.34)';
  for(let i=0;i<3;i++){
    c2.beginPath();
    c2.ellipse(cx,cy,62+i*18,44+i*13,0.4+i*0.18,0,Math.PI*2);
    c2.stroke();
  }
  c2.beginPath(); c2.arc(cx,cy,16,0,Math.PI*2); c2.fillStyle='rgba(242,213,122,.88)'; c2.fill();

  // 12 o'clock indicator
  c2.strokeStyle='rgba(255,255,255,.25)';
  c2.beginPath();
  c2.moveTo(cx, cy-118);
  c2.lineTo(cx, cy-142);
  c2.stroke();
  c2.fillStyle='#fff5c2';
  c2.font='bold 11px Arial';
  c2.fillText('0°', cx-8, cy-148);
}
function genInternalCandle(){
  const dir = zone()==='多' ? 1 : -1;
  const last = S.candles[S.candles.length-1].c;
  const delta = dir*(S.warp/150)*1.2 + (Math.random()-.5)*0.6;
  const close = last + delta;
  const pred = close + dir*(S.warp/150)*0.7 + (Math.random()-.5)*0.2;
  S.candles.push({o:last,c:close,p:pred,v:1+Math.random()*4});
  if(S.candles.length>120) S.candles.shift();
}
function drawKlinePanel(){
  kctx.clearRect(0,0,klineCanvas.width,klineCanvas.height);
  const data = S.liveCandles.length ? S.liveCandles.slice(-26) : S.candles.slice(-26).map(d=>({o:d.o,h:Math.max(d.o,d.c)+1,l:Math.min(d.o,d.c)-1,c:d.c}));
  const highs = data.map(d=>+d.h), lows = data.map(d=>+d.l);
  const max = Math.max(...highs), min = Math.min(...lows);
  const range = Math.max(.0001, max-min);
  data.forEach((d,i)=>{
    const x=6+i*12;
    const yo=114-((d.o-min)/range)*92;
    const yc=114-((d.c-min)/range)*92;
    const yh=114-((d.h-min)/range)*92;
    const yl=114-((d.l-min)/range)*92;
    kctx.strokeStyle=d.c>=d.o?'#79ff91':'#ff7575';
    kctx.beginPath(); kctx.moveTo(x+4,yh); kctx.lineTo(x+4,yl); kctx.stroke();
    kctx.fillStyle=d.c>=d.o?'#79ff91':'#ff7575';
    kctx.fillRect(x, Math.min(yo,yc), 8, Math.max(2, Math.abs(yc-yo)));
  });
}
async function fetchKlines(symbol){
  try{
    const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=60`;
    const res = await fetch(url);
    const rows = await res.json();
    if(!Array.isArray(rows)) throw new Error('bad');
    S.liveCandles = rows.map(r=>({
      o:+r[1], h:+r[2], l:+r[3], c:+r[4]
    }));
    const last=S.liveCandles[S.liveCandles.length-1];
    S.kOpen=last.o; S.kHigh=last.h; S.kLow=last.l; S.kClose=last.c;
    document.getElementById('metaSymbol').textContent=symbol;
    document.getElementById('metaPrice').textContent=last.c.toFixed(2);
    document.getElementById('metaOpen').textContent=last.o.toFixed(2);
    document.getElementById('metaHL').textContent=`${last.h.toFixed(2)} / ${last.l.toFixed(2)}`;
  }catch(err){
    document.getElementById('metaSymbol').textContent=symbol+' (fallback)';
    document.getElementById('metaPrice').textContent='offline';
    document.getElementById('metaOpen').textContent='--';
    document.getElementById('metaHL').textContent='-- / --';
  }
}
function updateModel(){
  S.x += S.moveX*1.8;
  S.y += S.moveY*1.8;
  S.yaw += S.yawInput*0.05;
  S.warp += S.warpInput*2.4;
  if(S.warp<0) S.warp=0;
  if(S.warp>150) S.warp=150;
  S.z = (S.warp/150)*8;
  const dir = zone()==='多' ? 1 : -1;
  const delta = dir*(S.warp/150)*0.35 + (Math.random()-.5)*0.04;
  S.ct += delta;
  genInternalCandle();
  const now = Date.now();
  if(now - S.lastFetch > 30000){
    S.lastFetch = now;
    fetchKlines(S.symbol);
  }
}
function loop(){
  updateModel();
  drawBackground();
  drawCore();
  drawKlinePanel();
  updateHUD();
  requestAnimationFrame(loop);
}
loop();

// controls
(function(){
  const joy=document.getElementById('joy'), inner=document.getElementById('joyInner');
  function setP(x,y){
    const r=joy.getBoundingClientRect(); let dx=x-r.left-r.width/2, dy=y-r.top-r.height/2;
    const max=40, len=Math.hypot(dx,dy)||1; if(len>max){ dx=dx/len*max; dy=dy/len*max; }
    S.moveX = dx/max;
    S.moveY = -dy/max;
    inner.style.left=(44+dx)+'px'; inner.style.top=(44+dy)+'px';
  }
  function reset(){ S.moveX=0; S.moveY=0; inner.style.left='44px'; inner.style.top='44px'; }
  joy.addEventListener('pointerdown',e=>{e.preventDefault(); setP(e.clientX,e.clientY);});
  joy.addEventListener('pointermove',e=>{ if(e.buttons) setP(e.clientX,e.clientY); });
  joy.addEventListener('pointerup',reset); joy.addEventListener('pointercancel',reset);
})();
(function(){
  const yaw=document.getElementById('yaw'), inner=document.getElementById('yawInner'), fill=document.getElementById('yawFill');
  function setP(x){
    const r=yaw.getBoundingClientRect(), max=(r.width/2)-24; let dx=x-r.left-r.width/2; if(dx>max) dx=max; if(dx<-max) dx=-max;
    const deg = (dx/max)*180;
    S.yaw = deg*Math.PI/180;
    inner.style.left=(r.width/2-24+dx)+'px';
    if(dx>=0){ fill.style.left='50%'; fill.style.width=(dx/max*50)+'%'; }
    else{ fill.style.left=(50+dx/max*50)+'%'; fill.style.width=(-dx/max*50)+'%'; }
  }
  yaw.addEventListener('pointerdown',e=>{e.preventDefault(); setP(e.clientX);});
  yaw.addEventListener('pointermove',e=>{ if(e.buttons) setP(e.clientX); });
})();
(function(){
  const warp=document.getElementById('warp'), inner=document.getElementById('warpInner'), fill=document.getElementById('warpFill');
  function setP(y){
    const r=warp.getBoundingClientRect(), max=(r.height/2)-24; let dy=y-r.top-r.height/2; if(dy>max) dy=max; if(dy<-max) dy=-max;
    const pct = 1 - ((dy+max)/(max*2));
    S.warp = Math.max(0, Math.min(150, pct*150));
    S.z = (S.warp/150)*8;
    inner.style.top=(67+dy)+'px';
    fill.style.height=(pct*154)+'px';
  }
  warp.addEventListener('pointerdown',e=>{e.preventDefault(); setP(e.clientY);});
  warp.addEventListener('pointermove',e=>{ if(e.buttons) setP(e.clientY); });
})();

document.querySelectorAll('.sym').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.sym').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    S.symbol = btn.dataset.symbol;
    fetchKlines(S.symbol);
  };
});
document.getElementById('btnPortal').onclick=()=>{
  const flash=document.getElementById('portalFlash');
  flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
  toast('TempleHeart 啟動');
};
document.getElementById('btnPredict').onclick=()=>{ S.predict=!S.predict; toast('預測 '+(S.predict?'開':'關')); };
document.getElementById('btnBoss').onclick=()=>toast('Boss 佈局待接');
document.getElementById('btnHeal').onclick=()=>toast('回復觸發');
document.getElementById('btnReset').onclick=()=>{ S.x=0; S.y=0; S.z=0; S.ct=0; S.yaw=0; S.warp=0; toast('已重置'); };

document.getElementById('templeHeart').onclick=()=>{
  const flash=document.getElementById('portalFlash');
  flash.classList.remove('on'); void flash.offsetWidth; flash.classList.add('on');
  toast('TempleHeart 入口觸發');
};

fetchKlines(S.symbol);
</script>
