<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>KLINE App Game｜12345 五指山悟空財神殿 V3.6.1 極簡沉浸版</title>
<style>
:root{
  --panel:rgba(8,12,22,.46);
  --panel2:rgba(8,12,22,.95);
  --line:rgba(255,215,120,.22);
  --gold:#ffd978;
  --text:#eef4ff;
  --muted:#adbbd2;
  --shadow:0 18px 50px rgba(0,0,0,.42);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:#000;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
#app{position:fixed;inset:0;background:radial-gradient(circle at 50% 42%, rgba(18,34,60,.88), rgba(5,7,13,1) 58%);overflow:hidden}
canvas{position:fixed;inset:0;width:100%;height:100%}
button{pointer-events:auto}

/* ultra minimal top bar */
.topbar{position:fixed;left:12px;right:12px;top:12px;z-index:50;display:flex;justify-content:space-between;align-items:center;pointer-events:none}
.titlebar,.infofab{background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(10px);box-shadow:var(--shadow)}
.titlebar{padding:10px 14px;border-radius:18px;color:var(--gold);font-weight:900;font-size:clamp(18px,3vw,28px)}
.infofab{padding:10px 14px;border-radius:16px;color:#fff;font-weight:900;pointer-events:auto}

/* center world */
.center-wrap{position:fixed;left:50%;top:35%;transform:translate(-50%,-50%);width:min(66vw,500px);height:min(66vw,500px);z-index:10;pointer-events:none}
.ring{position:absolute;inset:0;border-radius:50%;border:8px double rgba(255,215,120,.82);overflow:hidden;box-shadow:0 0 0 4px rgba(255,215,120,.10),0 0 90px rgba(255,195,60,.26);animation:ringSpin 34s linear infinite}
.wukong-core{position:absolute;inset:0;overflow:hidden;border-radius:50%;filter:drop-shadow(0 0 48px rgba(255,215,120,.42))}
.wukong-core img{width:100%;height:100%;object-fit:cover;display:block;transform-origin:50% 55%;animation:pulse 3.1s ease-in-out infinite}
.wukong-eye{position:absolute;top:37%;width:22%;height:10%;border-radius:999px;background:radial-gradient(circle at 50% 50%, rgba(255,215,120,.76), rgba(255,215,120,0) 72%);filter:blur(8px);opacity:.0;transition:opacity .18s ease,left .15s ease,right .15s ease}
.wukong-eye.left{left:25%}.wukong-eye.right{right:25%}
.ring-glow{position:absolute;inset:-22px;border-radius:50%;border:1px solid rgba(255,215,120,.18);animation:aura 4.2s ease-out infinite}
.crosshair{position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);width:18px;height:18px;z-index:12;pointer-events:none}
.crosshair:before,.crosshair:after{content:"";position:absolute;background:rgba(255,255,255,.88)}
.crosshair:before{left:8px;top:0;width:2px;height:18px}
.crosshair:after{left:0;top:8px;width:18px;height:2px}

/* small fade tip only */
.node-tip{position:fixed;left:50%;top:58%;transform:translateX(-50%);display:none;z-index:60;padding:10px 14px;border-radius:999px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.12);box-shadow:var(--shadow);font-weight:900;pointer-events:none;backdrop-filter:blur(8px)}
.node-tip.show{display:block;animation:fadeInOut 2.2s ease both}

/* tiny live hud */
.livehud{position:fixed;right:12px;top:66px;z-index:40;display:grid;gap:8px;pointer-events:none}
.livebox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px 10px;backdrop-filter:blur(10px);box-shadow:var(--shadow);font-size:12px}
.livebox .k{color:var(--muted)} .livebox .v{font-weight:900}

/* controls always on top */
.controls{position:fixed;left:0;right:0;bottom:86px;height:194px;z-index:999999 !important;pointer-events:none}
.joy-wrap{position:absolute;left:16px;bottom:8px;width:136px;height:136px;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);box-shadow:var(--shadow);pointer-events:auto;touch-action:none}
.joy-ring{position:absolute;inset:14px;border-radius:50%;border:1px solid rgba(255,255,255,.08)}
.joy-knob{position:absolute;left:43px;top:43px;width:50px;height:50px;border-radius:50%;background:var(--gold);box-shadow:0 8px 20px rgba(0,0,0,.35)}
.alt-wrap{position:absolute;right:16px;bottom:0;width:62px;height:180px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);box-shadow:var(--shadow);pointer-events:auto;touch-action:none}
.alt-track{position:absolute;left:26px;top:12px;bottom:12px;width:10px;border-radius:999px;background:rgba(255,255,255,.13)}
.alt-knob{position:absolute;left:10px;top:69px;width:42px;height:42px;border-radius:50%;background:var(--gold);box-shadow:0 8px 20px rgba(0,0,0,.35)}
.alt-label-top,.alt-label-bottom{position:absolute;left:50%;transform:translateX(-50%);font-size:11px;font-weight:900}
.alt-label-top{top:-24px}.alt-label-bottom{bottom:-24px}
.yaw-wrap{position:absolute;left:50%;transform:translateX(-50%);bottom:22px;width:min(48vw,380px);height:72px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);box-shadow:var(--shadow);pointer-events:auto;touch-action:none;z-index:1000001}
.yaw-track{position:absolute;left:14px;right:14px;top:31px;height:10px;border-radius:999px;background:rgba(255,255,255,.18)}
.yaw-fill{position:absolute;left:50%;top:31px;height:10px;border-radius:999px;background:linear-gradient(90deg, rgba(255,215,120,.2), rgba(255,215,120,.95));width:0}
.yaw-knob{position:absolute;left:calc(50% - 24px);top:12px;width:48px;height:48px;border-radius:50%;background:var(--gold);box-shadow:0 8px 20px rgba(0,0,0,.35)}
.yaw-left,.yaw-right{position:absolute;top:-18px;font-size:11px;font-weight:900}
.yaw-left{left:10px}.yaw-right{right:10px}
.enter-btn{position:absolute;right:92px;bottom:40px;width:92px;height:92px;border-radius:24px;border:1px solid rgba(255,255,255,.16);background:var(--panel2);color:#fff;font-size:18px;font-weight:900;box-shadow:var(--shadow);pointer-events:auto}

/* bottom actions simplified */
.footer-grid{position:fixed;left:12px;right:12px;bottom:8px;z-index:999999 !important;display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
.fbtn{min-height:54px;padding:8px;border-radius:16px;border:1px solid var(--line);background:var(--panel);color:#fff;font-weight:900;font-size:14px;box-shadow:var(--shadow);cursor:pointer}
.fbtn .mini{display:none}

/* modals */
.modal{position:fixed;inset:0;z-index:80;display:none;background:rgba(0,0,0,.78);padding:14px 14px 260px 14px}
.modal.show{display:block}
.modal-card{max-width:980px;max-height:60vh;margin:6vh auto 0 auto;background:var(--panel2);border:1px solid var(--line);border-radius:22px;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.68)}
.modal-head{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:rgba(8,12,22,.96);border-bottom:1px solid rgba(255,255,255,.08)}
.modal-head h3{margin:0;color:var(--gold)}
.modal-body{padding:16px;display:grid;grid-template-columns:1.08fr .92fr;gap:14px}
.modal-box{border:1px solid rgba(255,255,255,.10);border-radius:16px;background:rgba(255,255,255,.04);padding:12px}
.modal-box h4{margin:0 0 8px;color:var(--gold)}
.modal-box p,.modal-box li{line-height:1.7;color:#edf4ff}
.modal-box ul{margin:8px 0 0 18px}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.act{min-height:52px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-weight:900;font-size:14px}

@keyframes ringSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes aura{0%{transform:scale(.86);opacity:.62}85%{transform:scale(1.26);opacity:0}100%{opacity:0}}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}

@media (max-width:980px){
  .center-wrap{width:min(64vw,360px);height:min(64vw,360px);top:34%}
  .footer-grid{grid-template-columns:repeat(4,1fr)}
  .yaw-wrap{width:min(42vw,250px)}
  .modal-body{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>

  <div class="topbar">
    <div class="titlebar">12345｜五指山悟空財神殿</div>
    <button class="infofab" id="infoToggle">☰ 神殿資訊</button>
  </div>

  <div class="livehud">
    <div class="livebox"><span class="k">KGEN</span> <span class="v" id="kgenBalance">—</span><br><span class="k">Allowance</span> <span class="v" id="allowanceTxt">—</span></div>
    <div class="livebox"><span class="k">聖盃</span> <span class="v" id="cupTopTxt">0 / 3</span><br><span class="k">狀態</span> <span class="v" id="walletBadge">未連線</span></div>
  </div>

  <div class="modal" id="infoModal">
    <div class="modal-card">
      <div class="modal-head">
        <h3>神殿資訊</h3>
        <button class="fbtn" style="min-height:auto;padding:10px 14px;width:auto" id="closeInfoBtn">關閉</button>
      </div>
      <div class="modal-body">
        <div class="modal-box">
          <h4>12345｜五指山悟空財神殿</h4>
          <p>V3.6.1 極簡沉浸版。主畫面只保留世界、悟空、控制與極簡 HUD。所有功能都收進彈窗，不再用大面板佔畫面。</p>
          <p>主流程：連接錢包 → Approve → 三次聖盃 → fortuneClaim。</p>
        </div>
        <div class="modal-box">
          <h4>即時資訊</h4>
          <p>最近節點：<b id="nearestTxt">—</b></p>
          <p>高度：<b id="altitudeTxt">20</b></p>
          <p>Yaw：<b id="yawTxt">180°</b></p>
          <p>區間：<b id="sideZoneTxt">多</b></p>
        </div>
      </div>
    </div>
  </div>

  <div class="center-wrap">
    <div class="ring">
      <div class="wukong-core">
        <img id="wukongImg" src="./assets/wukong_center.png" alt="悟空財神">
        <div class="wukong-eye left" id="eyeL"></div>
        <div class="wukong-eye right" id="eyeR"></div>
      </div>
      <div class="ring-glow"></div>
    </div>
  </div>

  <div class="crosshair"></div>
  <div class="node-tip" id="nodeTip"></div>

  <div class="controls">
    <div class="joy-wrap" id="joyWrap"><div class="joy-ring"></div><div class="joy-knob" id="joyKnob"></div></div>
    <div class="alt-wrap" id="altWrap"><div class="alt-label-top">上升</div><div class="alt-track"></div><div class="alt-knob" id="altKnob"></div><div class="alt-label-bottom">下降</div></div>
    <div class="yaw-wrap" id="yawWrap"><div class="yaw-left"></div><div class="yaw-right">右轉</div><div class="yaw-track"></div><div class="yaw-fill" id="yawFill"></div><div class="yaw-knob" id="yawKnob"></div></div>
    <button class="enter-btn" id="enterBtn">進入</button>
  </div>

  <div class="footer-grid">
    <button class="fbtn" id="btnPhoto">📸 拍照存證</button>
    <button class="fbtn" id="btnRecord">🎥 留影錄影</button>
    <button class="fbtn" id="btnFront">🤳 前鏡自拍</button>
    <button class="fbtn" id="btnRear">🌌 後鏡巡禮</button>
    <button class="fbtn" id="btnFortune">🧧 發財金</button>
    <button class="fbtn" id="btnHeartbeat">🫀 心跳</button>
    <button class="fbtn" id="btnIgnite">🌬️ 呼吸</button>
    <button class="fbtn" id="btnGuide">🗣️ 導覽</button>
  </div>

  <div class="modal" id="templeModal">
    <div class="modal-card">
      <div class="modal-head">
        <h3>五指山神殿操作中心</h3>
        <button class="fbtn" style="min-height:auto;padding:10px 14px;width:auto" id="closeModalBtn">關閉</button>
      </div>
      <div class="modal-body">
        <div class="modal-box">
          <h4 id="mainTitle">發財金流程</h4>
          <div id="mainBody"></div>
          <div class="act-grid">
            <button class="act" id="actConnect">🔗 連接錢包</button>
            <button class="act" id="actApprove">✅ Approve 授權</button>
            <button class="act" id="actCup">🥢 三次聖盃</button>
            <button class="act" id="actFortune">🧧 fortuneClaim</button>
            <button class="act" id="actHeartbeat">🫀 heartbeatClaim</button>
            <button class="act" id="actIgnite">🌬️ igniteAndClaim</button>
            <button class="act" id="actVow">🙏 vowTo 還願</button>
            <button class="act" id="actLamp">🪔 lightLamp 點燈</button>
            <button class="act" id="actWish">✨ makeWish 許願</button>
          </div>
          <p id="actionState" style="margin-top:12px;color:#7ff3ff;font-weight:800">狀態：尚未開始</p>
        </div>
        <div class="modal-box">
          <h4>完整說明</h4>
          <div id="sideBody"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const state={x:0,y:20,z:180,yaw:Math.PI,keys:{},nearestId:"12345",walletConnected:false,walletAddress:"",approved:false,cupCount:0,focus:"fortune",stars:Array.from({length:260},()=>({x:(Math.random()-0.5)*1800,y:(Math.random()-0.5)*800,z:Math.random()*2200+40,s:Math.random()*2+0.5})),mobile:{mx:0,my:0,alt:0,yaw:0,yawVel:0}};
const nodes={"16888":{x:-220,y:0,z:-140,color:"#9fd8ff",name:"16888｜廣寒宮入口"},"12345":{x:0,y:0,z:0,color:"#ffd978",name:"12345｜五指山悟空財神殿"},"11520":{x:260,y:0,z:-80,color:"#7ff3ff",name:"11520｜花果山交易所"},"8888":{x:180,y:0,z:220,color:"#ffb87f",name:"8888｜高老莊"},"7744":{x:-140,y:0,z:240,color:"#bda7ff",name:"7744｜流沙河"}};
const canvas=document.getElementById('scene'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)} addEventListener('resize',resize); resize();
const $=s=>document.querySelector(s);
const ui={nearest:$("#nearestTxt"),altitude:$("#altitudeTxt"),yaw:$("#yawTxt"),zone:$("#sideZoneTxt"),cupTop:$("#cupTopTxt"),wallet:$("#walletBadge"),mainBody:$("#mainBody"),sideBody:$("#sideBody"),actionState:$("#actionState"),kgenBalance:$("#kgenBalance"),allowance:$("#allowanceTxt"),wukong:$("#wukongImg"),eyeL:$("#eyeL"),eyeR:$("#eyeR"),tip:$("#nodeTip"),templeModal:$("#templeModal"),infoModal:$("#infoModal")};

function normalizeDeg(rad){ return ((((rad*180/Math.PI)%360)+360)%360); }
function sideZoneFromYaw(deg){ const signed = deg > 180 ? deg - 360 : deg; return (signed >= -90 && signed <= 90) ? "多" : "空"; }
function toast(msg){ ui.tip.textContent=msg; ui.tip.classList.add('show'); clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>ui.tip.classList.remove('show'),2200); }
function updateWukongFace(){ const deg = normalizeDeg(state.yaw); const signed = deg > 180 ? deg - 360 : deg; const offset = Math.max(-18, Math.min(18, signed/7)); const scale = 1 + Math.min(.06, Math.abs(signed)/700); ui.wukong.style.transform = `translateX(${offset}px) scale(${scale})`; const glow = Math.abs(signed) > 45 ? .88 : .34; ui.eyeL.style.opacity = glow; ui.eyeR.style.opacity = glow; ui.eyeL.style.left = `${25 + offset*0.18}%`; ui.eyeR.style.right = `${25 - offset*0.18}%`; }
function updateUI(){ const yawDeg = normalizeDeg(state.yaw); const zone = sideZoneFromYaw(yawDeg); ui.nearest.textContent = state.nearestId || "—"; ui.altitude.textContent = String(Math.round(state.y)); ui.yaw.textContent = `${Math.round(yawDeg)}°`; ui.zone.textContent = zone; ui.cupTop.textContent = `${state.cupCount} / 3`; ui.wallet.textContent = state.walletConnected ? "已連線" : "未連線"; ui.kgenBalance.textContent = state.walletConnected ? "待接鏈" : "—"; ui.allowance.textContent = state.approved ? "已授權" : "—"; updateWukongFace(); }

function setFocus(kind){
  state.focus = kind;
  const data = {
    fortune: { main:`<p>主流程：連接錢包 → Approve → 連續三次聖盃 → fortuneClaim 發財金。</p><ul><li>發財金範圍：1 到 888</li><li>冷卻：30 天</li><li>每個 epoch：最多 500 名</li></ul>`, side:`<p><b>KGEN</b> 是 TempleHeart 互動的核心代幣。發財金、還願、點燈、許願流程都圍繞 KGEN 展開。</p><p>三次聖盃完成前，不能領 fortuneClaim。</p>` },
    heartbeat: { main:`<p>heartbeatClaim 是固定節奏儀式。</p><ul><li>規則：每小時一次</li><li>用途：維持悟空心臟活性</li></ul>`, side:`<p>這不是買賣功能，而是神殿節奏功能。</p>` },
    ignite: { main:`<p>igniteAndClaim 是轉日時刻的呼吸。</p><ul><li>時間：UTC 00:00–00:10</li><li>每天只有一次視窗</li></ul>`, side:`<p>右側直桿控制上下高度，下方橫桿控制 360° 旋轉。</p>` },
    guide: { main:`<p>這裡是 12345 五指山悟空財神殿，不是 16888 廣寒宮入口，也不是買賣遊戲頁。</p><p>核心功能：Approve、三次聖盃、fortuneClaim、heartbeatClaim、igniteAndClaim、vowTo、lightLamp、makeWish。</p>`, side:`<p><b>KGEN</b> 是 TempleHeart 互動的核心代幣，會沿著 Heart ↔ 11520 Brain 的邏輯串接。</p><p>TempleHeart 合約尚未部署，這版先把完整產品體驗做成可展示成品。</p>` }
  };
  ui.mainBody.innerHTML = data[kind].main;
  ui.sideBody.innerHTML = data[kind].side;
}
function openTemple(kind="fortune"){ setFocus(kind); ui.templeModal.classList.add('show'); }
function closeTemple(){ ui.templeModal.classList.remove('show'); }
document.getElementById('closeModalBtn').onclick = closeTemple;
document.getElementById('infoToggle').onclick = ()=> ui.infoModal.classList.add('show');
document.getElementById('closeInfoBtn').onclick = ()=> ui.infoModal.classList.remove('show');

async function connectWallet(){ if(window.ethereum){ try{ const accounts = await window.ethereum.request({ method:'eth_requestAccounts' }); state.walletConnected = true; state.walletAddress = accounts && accounts[0] ? accounts[0] : "已連線"; toast('錢包已連線：' + state.walletAddress.slice(0,6) + '...' + state.walletAddress.slice(-4)); }catch(e){ toast('連線取消，先保留前端流程'); } } else { state.walletConnected = true; state.walletAddress = "展示模式"; toast('未偵測到錢包，切換展示模式'); } updateUI(); }
document.getElementById('actConnect').onclick = connectWallet;
document.getElementById('actApprove').onclick = ()=>{ if(!state.walletConnected){toast('請先連接錢包');return;} state.approved=true; ui.actionState.textContent='狀態：Approve 已完成。部署後即可正式簽名授權。'; toast('Approve 已完成（展示流程）'); updateUI(); };
document.getElementById('actCup').onclick = ()=>{ state.cupCount=Math.min(3,state.cupCount+1); ui.actionState.textContent=state.cupCount>=3?'狀態：連續三次聖盃完成，可以領 fortuneClaim 發財金。':`狀態：聖盃完成 ${state.cupCount} / 3，還需要連續完成。`; toast(state.cupCount>=3?'三次聖盃完成，可領發財金。':`聖盃 ${state.cupCount} / 3`); updateUI(); };
document.getElementById('actFortune').onclick = ()=>{ if(state.cupCount<3){toast('尚未完成連續三次聖盃，不能領發財金。');return;} ui.actionState.textContent='狀態：TempleHeart 尚未部署。已達三次聖盃條件，可進行 fortuneClaim（1~888 / 30天 / 500名）。'; toast('已達條件：fortuneClaim（待部署後接鏈）'); };
document.getElementById('actHeartbeat').onclick = ()=>{ ui.actionState.textContent='狀態：heartbeatClaim 每小時一次（待部署後接鏈）'; toast('heartbeatClaim：每小時一次'); };
document.getElementById('actIgnite').onclick = ()=>{ ui.actionState.textContent='狀態：igniteAndClaim UTC 00:00–00:10（待部署後接鏈）'; toast('igniteAndClaim：UTC 00:00–00:10'); };
document.getElementById('actVow').onclick = ()=>{ ui.actionState.textContent='狀態：vowTo 還願補血（待部署後接鏈）'; toast('vowTo：還願補血'); };
document.getElementById('actLamp').onclick = ()=>{ ui.actionState.textContent='狀態：lightLamp 點燈續命（待部署後接鏈）'; toast('lightLamp：點燈續命'); };
document.getElementById('actWish').onclick = ()=>{ ui.actionState.textContent='狀態：makeWish 許願 hash（待部署後接鏈）'; toast('makeWish：許願 hash'); };

document.getElementById('btnPhoto').onclick = ()=> toast('拍照存證：保留功能，後續可接裝置相機');
document.getElementById('btnRecord').onclick = ()=> toast('神殿留影錄影：保留功能，後續可接錄影');
document.getElementById('btnFront').onclick = ()=> toast('前鏡自拍：保留功能');
document.getElementById('btnRear').onclick = ()=> toast('後鏡巡禮：保留功能');
document.getElementById('btnFortune').onclick = ()=> openTemple('fortune');
document.getElementById('btnHeartbeat').onclick = ()=> openTemple('heartbeat');
document.getElementById('btnIgnite').onclick = ()=> openTemple('ignite');
document.getElementById('btnGuide').onclick = ()=> openTemple('guide');

const joyWrap=document.getElementById('joyWrap'), joyKnob=document.getElementById('joyKnob');
function joyMove(x,y){ const r=joyWrap.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2; let dx=x-cx, dy=y-cy; const max=38, len=Math.hypot(dx,dy)||1; if(len>max){dx=dx/len*max;dy=dy/len*max;} state.mobile.mx=dx/max; state.mobile.my=dy/max; joyKnob.style.left=(43+dx)+'px'; joyKnob.style.top=(43+dy)+'px'; }
function joyReset(){ state.mobile.mx=0; state.mobile.my=0; joyKnob.style.left='43px'; joyKnob.style.top='43px'; }
joyWrap.addEventListener('pointerdown',e=>{e.preventDefault();joyMove(e.clientX,e.clientY);}); joyWrap.addEventListener('pointermove',e=>{if(e.buttons) joyMove(e.clientX,e.clientY);}); joyWrap.addEventListener('pointerup',joyReset); joyWrap.addEventListener('pointercancel',joyReset);

const altWrap=document.getElementById('altWrap'), altKnob=document.getElementById('altKnob');
function altMove(y){ const r=altWrap.getBoundingClientRect(); const top=12,bottom=r.height-54; let yy=y-r.top-21; yy=Math.max(top,Math.min(bottom,yy)); altKnob.style.top=yy+'px'; const center=(top+bottom)/2; state.mobile.alt=(center-yy)/((bottom-top)/2); }
function altReset(){ altKnob.style.top='69px'; state.mobile.alt=0; }
altWrap.addEventListener('pointerdown',e=>{e.preventDefault();altMove(e.clientY);}); altWrap.addEventListener('pointermove',e=>{if(e.buttons) altMove(e.clientY);}); altWrap.addEventListener('pointerup',altReset); altWrap.addEventListener('pointercancel',altReset);

const yawWrap=document.getElementById('yawWrap'), yawKnob=document.getElementById('yawKnob'), yawFill=document.getElementById('yawFill');
function yawMove(x){ const r=yawWrap.getBoundingClientRect(); const min=14, max=r.width-56; let xx=x-r.left-21; xx=Math.max(min,Math.min(max,xx)); yawKnob.style.left=xx+'px'; const center=(min+max)/2; const ratio=(xx-center)/((max-min)/2); state.mobile.yaw=ratio; if(ratio>=0){ yawFill.style.left='50%'; yawFill.style.width=(ratio*50)+'%'; } else { yawFill.style.left=(50+ratio*50)+'%'; yawFill.style.width=(-ratio*50)+'%'; } }
function yawReset(){ state.mobile.yawVel = state.mobile.yaw * 2.4; state.mobile.yaw=0; yawKnob.style.left='calc(50% - 21px)'; yawFill.style.left='50%'; yawFill.style.width='0'; }
yawWrap.addEventListener('pointerdown',e=>{e.preventDefault();yawMove(e.clientX);}); yawWrap.addEventListener('pointermove',e=>{if(e.buttons) yawMove(e.clientX);}); yawWrap.addEventListener('pointerup',yawReset); yawWrap.addEventListener('pointercancel',yawReset);

document.getElementById('enterBtn').onclick = ()=> openTemple(state.nearestId === '12345' ? 'fortune' : 'guide');
addEventListener('keydown',e=>{ state.keys[e.key.toLowerCase()] = true; if(e.key==='Escape'){ closeTemple(); ui.infoModal.classList.remove('show'); } });
addEventListener('keyup',e=>{ state.keys[e.key.toLowerCase()] = false; });

function update(dt){ const dead=.12; const move=((state.keys['w']?1:0)-(state.keys['s']?1:0)) + (Math.abs(state.mobile.mx)>dead ? state.mobile.mx : 0); const strafe=((state.keys['d']?1:0)-(state.keys['a']?1:0)) + (Math.abs(state.mobile.my)>dead ? -state.mobile.my : 0); const vertical=((state.keys[' ']?1:0)-(state.keys['shift']?1:0)) + state.mobile.alt; let yawInput=((state.keys['e']?1:0)-(state.keys['q']?1:0)) + (Math.abs(state.mobile.yaw)>dead ? state.mobile.yaw : 0); if(Math.abs(yawInput) < dead && Math.abs(state.mobile.yawVel) > 0.01){ yawInput += state.mobile.yawVel; state.mobile.yawVel *= 0.93; } state.yaw += yawInput * dt * 1.75; const base=116, fx=Math.cos(state.yaw), fz=Math.sin(state.yaw), rx=Math.cos(state.yaw+Math.PI/2), rz=Math.sin(state.yaw+Math.PI/2); state.x += (fx*move + rx*strafe) * base * dt; state.z += (fz*move + rz*strafe) * base * dt; state.y += vertical * base * .72 * dt; state.y = Math.max(-80, Math.min(220, state.y)); let nearest=null,best=Infinity; Object.entries(nodes).forEach(([id,n])=>{ const dx=n.x-state.x, dy=n.y-state.y, dz=n.z-state.z, d=Math.hypot(dx,dy,dz); if(d<best){best=d; nearest=id;} }); const prevNearest = state.nearestId; state.nearestId = best < 110 ? nearest : null; if(state.nearestId && state.nearestId !== prevNearest){ toast(`按 Enter 進入 ${nodes[state.nearestId].name}`); } updateUI(); }
function project(wx,wy,wz){ const dx=wx-state.x, dy=wy-state.y, dz=wz-state.z; const cy=Math.cos(-state.yaw), sy=Math.sin(-state.yaw); const rx=dx*cy-dz*sy, rz=dx*sy+dz*cy; if(rz<=10) return null; const f=420/rz; return {x:innerWidth/2+rx*f, y:innerHeight/2-dy*f, s:Math.max(2,f*18)}; }
function drawBackground(){ const w=innerWidth,h=innerHeight; ctx.clearRect(0,0,w,h); const g=ctx.createRadialGradient(w/2,h*.42,20,w/2,h*.58,w*.82); g.addColorStop(0,'rgba(22,36,62,.78)'); g.addColorStop(1,'rgba(2,4,8,1)'); ctx.fillStyle=g; ctx.fillRect(0,0,w,h); for(const s of state.stars){ const p=project(s.x,s.y,s.z); if(!p) continue; ctx.fillStyle='rgba(127,243,255,.92)'; ctx.fillRect(p.x,p.y,s.s,s.s); } ctx.strokeStyle='rgba(127,243,255,.07)'; for(let gx=-680;gx<=680;gx+=60){ let first=true; ctx.beginPath(); for(let gz=-680;gz<=680;gz+=40){ const p=project(gx,0,gz); if(!p) continue; if(first){ctx.moveTo(p.x,p.y);first=false;} else ctx.lineTo(p.x,p.y);} ctx.stroke(); } for(let gz=-680;gz<=680;gz+=60){ let first=true; ctx.beginPath(); for(let gx=-680;gx<=680;gx+=40){ const p=project(gx,0,gz); if(!p) continue; if(first){ctx.moveTo(p.x,p.y);first=false;} else ctx.lineTo(p.x,p.y);} ctx.stroke(); } }
function drawNode(id,node){ const p=project(node.x,node.y,node.z); if(!p) return; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fillStyle=node.color; ctx.shadowBlur=18; ctx.shadowColor=node.color; ctx.fill(); ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(p.x,p.y,p.s*1.9,0,Math.PI*2); ctx.strokeStyle=id===state.nearestId?'rgba(255,255,255,.95)':'rgba(255,255,255,.20)'; ctx.lineWidth=2; ctx.stroke(); }

let last=performance.now();
function loop(now){ const dt=Math.min(.033,(now-last)/1000); last=now; drawBackground(); update(dt); Object.entries(nodes).forEach(([id,n])=>drawNode(id,n)); requestAnimationFrame(loop); }
setFocus('fortune'); updateUI(); requestAnimationFrame(loop);
</script>
