<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>KLINE V11.4 旋轉地形版</title>
<style>
:root{--bg:#03050b;--panel:rgba(0,0,0,.62);--line:rgba(255,255,255,.14);--gold:#f2d57a;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:Arial,sans-serif;touch-action:none}
canvas{position:fixed;inset:0}
.version,.coord,.hud{position:fixed;z-index:90;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 10px;font-size:12px;line-height:1.6}
.version{top:10px;left:10px}
.coord{top:50px;left:10px}
.hud{top:10px;right:10px;min-width:210px}
.controls{position:fixed;left:0;right:0;bottom:88px;height:186px;z-index:120;pointer-events:none}
.joy,.yaw,.alt{pointer-events:auto}
.joy{position:absolute;left:18px;bottom:6px;width:128px;height:128px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--line)}
.joy:before{content:"";position:absolute;inset:16px;border-radius:50%;border:1px solid rgba(255,255,255,.10)}
.joy-inner{position:absolute;left:42px;top:42px;width:44px;height:44px;border-radius:50%;background:var(--gold)}
.joy-label,.yaw-label,.alt-top,.alt-bottom{position:absolute;left:50%;transform:translateX(-50%);font-size:11px}
.joy-label{top:-18px}
.yaw{position:absolute;left:50%;transform:translateX(-50%);bottom:20px;width:min(52vw,360px);height:68px;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:999px}
.yaw-track{position:absolute;left:14px;right:14px;top:29px;height:10px;border-radius:999px;background:rgba(255,255,255,.14)}
.yaw-fill{position:absolute;left:50%;top:29px;height:10px;border-radius:999px;background:linear-gradient(90deg,rgba(113,216,255,.2),rgba(113,216,255,.9));width:0}
.yaw-inner{position:absolute;left:calc(50% - 24px);top:10px;width:48px;height:48px;border-radius:50%;background:var(--gold)}
.yaw-label{top:-18px}
.alt{position:absolute;right:18px;bottom:0;width:60px;height:176px;border-radius:30px;background:rgba(255,255,255,.07);border:1px solid var(--line)}
.alt-track{position:absolute;left:25px;top:12px;bottom:12px;width:10px;border-radius:999px;background:rgba(255,255,255,.14)}
.alt-inner{position:absolute;left:8px;top:66px;width:44px;height:44px;border-radius:50%;background:var(--gold)}
.alt-top{top:-18px}.alt-bottom{bottom:-18px}
.actions{position:fixed;left:10px;right:10px;bottom:10px;display:grid;grid-template-columns:repeat(8,1fr);gap:8px;z-index:130}
.btn{background:rgba(0,0,0,.62);border:1px solid var(--line);border-radius:12px;padding:10px 8px;font-size:12px;text-align:center}
.toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.84);border:1px solid #666;border-radius:12px;padding:12px 16px;display:none;z-index:200}
@media (max-width:820px){.actions{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div class="version">V11.4 旋轉地形版</div>
<div class="coord" id="coordBox">X: 0.0<br>Y: 0.0<br>Z: 0.0<br>地形: 草原</div>
<div class="hud" id="hud">載入中...</div>
<canvas id="bg"></canvas>

<div class="controls">
  <div class="joy" id="joy"><div class="joy-label">X / Y 平面</div><div class="joy-inner" id="joyInner"></div></div>
  <div class="yaw" id="yaw"><div class="yaw-label">場景旋轉</div><div class="yaw-track"></div><div class="yaw-fill" id="yawFill"></div><div class="yaw-inner" id="yawInner"></div></div>
  <div class="alt" id="alt"><div class="alt-top">Z+</div><div class="alt-track"></div><div class="alt-inner" id="altInner"></div><div class="alt-bottom">Z-</div></div>
</div>

<div class="actions">
  <div class="btn" onclick="toastMsg('X/Y 平面移動')">平面</div>
  <div class="btn" onclick="toastMsg('Z 軸只改高度')">高度</div>
  <div class="btn" onclick="switchMode()">切換模式</div>
  <div class="btn" onclick="toastMsg(currentTerrain())">查看地形</div>
  <div class="btn" onclick="toastMsg('森林區')">森林</div>
  <div class="btn" onclick="toastMsg('草原區')">草原</div>
  <div class="btn" onclick="toastMsg('湖泊區')">湖泊</div>
  <div class="btn" onclick="spawnBoss()">召喚Boss</div>
</div>

<div class="toast" id="toast"></div>

<script>
const bg=document.getElementById('bg'), ctx=bg.getContext('2d');
function fit(){bg.width=innerWidth; bg.height=innerHeight} addEventListener('resize',fit); fit();

const S={x:0,y:0,z:0,yaw:0,moveX:0,moveY:0,yawInput:0,zInput:0,hp:100,energy:100,score:0,mode:'BATTLE',monsters:[]};

function toastMsg(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(window.__toast); window.__toast=setTimeout(()=>el.style.display='none',1300);
}

function currentTerrain(){
  const x=S.x,y=S.y;
  if(x>120 && x<300 && y>-180 && y<40) return '湖泊';
  if(x<-120 && y>60) return '森林';
  if(x>260 && y>160) return '山地';
  return '草原';
}

function spawnMonster(type='normal'){
  const a=Math.random()*Math.PI*2,d=180+Math.random()*180;
  S.monsters.push({x:S.x+Math.cos(a)*d,y:S.y+Math.sin(a)*d,hp:type==='boss'?20:5,maxHp:type==='boss'?20:5,speed:type==='boss'?0.4:0.8,kind:type});
}
for(let i=0;i<6;i++) spawnMonster();
function spawnBoss(){spawnMonster('boss');toastMsg('Boss 出現');}

// rotate world around player by yaw
function worldToScreen(wx, wy, cx, baseY){
  const dx = wx - S.x;
  const dy = wy - S.y;
  const cos = Math.cos(-S.yaw), sin = Math.sin(-S.yaw);
  const rx = dx*cos - dy*sin;
  const ry = dx*sin + dy*cos;
  // Z only affects vertical camera/horizon, not XY plane logic
  return [cx + rx, baseY + ry*0.55 - S.z*10];
}

function drawTerrain(cx, horizon, baseY){
  const sky=ctx.createLinearGradient(0,0,0,baseY);
  sky.addColorStop(0,'#0b1832'); sky.addColorStop(0.55,'#193056'); sky.addColorStop(1,'#243858');
  ctx.fillStyle=sky; ctx.fillRect(0,0,bg.width,baseY);

  ctx.fillStyle='#355c2d';
  ctx.fillRect(0,baseY,bg.width,bg.height-baseY);

  // lake
  let pts=[[120,-180],[300,-180],[300,40],[120,40]].map(p=>worldToScreen(p[0],p[1],cx,baseY));
  ctx.fillStyle='rgba(70,130,220,.72)';
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]); pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1])); ctx.closePath(); ctx.fill();

  // forest zone
  pts=[[-320,40],[-120,40],[-120,260],[-320,260]].map(p=>worldToScreen(p[0],p[1],cx,baseY));
  ctx.fillStyle='rgba(28,80,34,.88)';
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]); pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1])); ctx.closePath(); ctx.fill();

  // mountain zone
  pts=[[260,160],[520,160],[520,360],[260,360]].map(p=>worldToScreen(p[0],p[1],cx,baseY));
  ctx.fillStyle='rgba(82,72,60,.90)';
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]); pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1])); ctx.closePath(); ctx.fill();

  // grid now rotates/moves with XY coordinates
  ctx.strokeStyle='rgba(255,255,255,.10)';
  for(let gy=-600; gy<=600; gy+=40){
    const p1=worldToScreen(-900,gy,cx,baseY), p2=worldToScreen(900,gy,cx,baseY);
    ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
  }
  for(let gx=-900; gx<=900; gx+=40){
    const p1=worldToScreen(gx,-800,cx,baseY), p2=worldToScreen(gx,800,cx,baseY);
    ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
  }

  // trees
  for(let i=-300;i<-130;i+=35){
    for(let j=70;j<250;j+=48){
      const [sx,sy]=worldToScreen(i,j,cx,baseY);
      ctx.fillStyle='#3a2617'; ctx.fillRect(sx-2,sy-8,4,12);
      ctx.fillStyle='#1f7a2d'; ctx.beginPath(); ctx.arc(sx,sy-14,10,0,Math.PI*2); ctx.fill();
    }
  }

  // mountains
  for(let i=280;i<500;i+=70){
    const [sx,sy]=worldToScreen(i,210+((i%140)?40:0),cx,baseY);
    ctx.fillStyle='#746657';
    ctx.beginPath(); ctx.moveTo(sx-30,sy+18); ctx.lineTo(sx,sy-25); ctx.lineTo(sx+30,sy+18); ctx.closePath(); ctx.fill();
  }

  // lake highlights
  for(let i=130;i<290;i+=26){
    const [sx,sy]=worldToScreen(i,-70 + Math.sin(i*0.1)*20,cx,baseY);
    ctx.strokeStyle='rgba(190,225,255,.45)';
    ctx.beginPath(); ctx.moveTo(sx-10,sy); ctx.lineTo(sx+10,sy); ctx.stroke();
  }
}

function update(){
  S.x += S.moveX*2.1;
  S.y += S.moveY*2.1;
  S.z += S.zInput*0.25; // stronger separation from Y axis
  S.yaw += S.yawInput*0.05;
  if(S.z>25) S.z=25; if(S.z<-25) S.z=-25;

  while(S.monsters.length<8) spawnMonster();
  S.monsters.forEach(m=>{
    const dx=S.x-m.x, dy=S.y-m.y, d=Math.hypot(dx,dy)||1;
    m.x += dx/d*m.speed; m.y += dy/d*m.speed;
  });
}
function draw(){
  ctx.clearRect(0,0,bg.width,bg.height);
  const cx=bg.width/2, horizon=bg.height*0.44 - S.z*6, baseY=bg.height*0.72 - S.z*12;
  drawTerrain(cx,horizon,baseY);

  // player stays center
  ctx.fillStyle='#83ff74';
  ctx.beginPath(); ctx.arc(cx,baseY,12,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.65)';
  ctx.beginPath(); ctx.moveTo(cx,baseY); ctx.lineTo(cx+Math.cos(S.yaw)*50, baseY+Math.sin(S.yaw)*28); ctx.stroke();

  // monsters rotate with terrain too
  S.monsters.forEach(m=>{
    const [sx,sy]=worldToScreen(m.x,m.y,cx,baseY);
    const r=m.kind==='boss'?18:10;
    ctx.fillStyle=m.kind==='boss' ? '#ffb36b' : '#ff3d3d';
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(sx-r, sy-r-10, r*2, 4);
    ctx.fillStyle='#83ff74'; ctx.fillRect(sx-r, sy-r-10, (m.hp/m.maxHp)*r*2, 4);
  });

  document.getElementById('coordBox').innerHTML=`X: ${S.x.toFixed(1)}<br>Y: ${S.y.toFixed(1)}<br>Z: ${S.z.toFixed(1)}<br>地形: ${currentTerrain()}`;
  let deg=(S.yaw*180/Math.PI)%360; if(deg<0) deg+=360;
  document.getElementById('hud').innerHTML=`模式：${S.mode}<br>HP：${Math.round(S.hp)}<br>能量：${Math.round(S.energy)}<br>怪物：${S.monsters.length}<br>分數：${S.score}<br>Yaw：${Math.round(deg)}°`;
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

function switchMode(){S.mode=S.mode==='BATTLE'?'PREDICT':'BATTLE';toastMsg('切換到 '+S.mode);}

// controls
(function(){
  const joy=document.getElementById('joy'), inner=document.getElementById('joyInner');
  function setP(x,y){
    const r=joy.getBoundingClientRect(); let dx=x-r.left-r.width/2, dy=y-r.top-r.height/2;
    const max=39, len=Math.hypot(dx,dy)||1; if(len>max){dx=dx/len*max; dy=dy/len*max;}
    S.moveX = dx/max;
    S.moveY = -dy/max;
    inner.style.left=(42+dx)+'px'; inner.style.top=(42+dy)+'px';
  }
  function reset(){S.moveX=0; S.moveY=0; inner.style.left='42px'; inner.style.top='42px';}
  joy.addEventListener('pointerdown',e=>{e.preventDefault(); setP(e.clientX,e.clientY); toastMsg('X/Y 平面方向已校正');});
  joy.addEventListener('pointermove',e=>{if(e.buttons) setP(e.clientX,e.clientY);});
  joy.addEventListener('pointerup',reset); joy.addEventListener('pointercancel',reset);
})();
(function(){
  const yaw=document.getElementById('yaw'), inner=document.getElementById('yawInner'), fill=document.getElementById('yawFill');
  function setP(x){
    const r=yaw.getBoundingClientRect(), max=(r.width/2)-24; let dx=x-r.left-r.width/2; if(dx>max)dx=max; if(dx<-max)dx=-max;
    S.yawInput=dx/max; inner.style.left=(r.width/2-24+dx)+'px';
    if(dx>=0){fill.style.left='50%'; fill.style.width=(dx/max*50)+'%';} else {fill.style.left=(50+dx/max*50)+'%'; fill.style.width=(-dx/max*50)+'%';}
  }
  function reset(){S.yawInput=0; inner.style.left='calc(50% - 24px)'; fill.style.left='50%'; fill.style.width='0';}
  yaw.addEventListener('pointerdown',e=>{e.preventDefault(); setP(e.clientX); toastMsg('現在旋轉會帶動整個地形與怪物');});
  yaw.addEventListener('pointermove',e=>{if(e.buttons) setP(e.clientX);});
  yaw.addEventListener('pointerup',reset); yaw.addEventListener('pointercancel',reset);
})();
(function(){
  const alt=document.getElementById('alt'), inner=document.getElementById('altInner');
  function setP(y){
    const r=alt.getBoundingClientRect(), max=(r.height/2)-24; let dy=y-r.top-r.height/2; if(dy>max)dy=max; if(dy<-max)dy=-max;
    S.zInput = -dy/max;
    inner.style.top=(66+dy)+'px';
  }
  function reset(){S.zInput=0; inner.style.top='66px';}
  alt.addEventListener('pointerdown',e=>{e.preventDefault(); setP(e.clientY); toastMsg('Z 軸現在只改高度/鏡頭，不再像 Y 軸');});
  alt.addEventListener('pointermove',e=>{if(e.buttons) setP(e.clientY);});
  alt.addEventListener('pointerup',reset); alt.addEventListener('pointercancel',reset);
})();

toastMsg('V11.4 已修正：Z 與 Y 分離，旋轉會帶動地形');
</script>
</body>
</html>
