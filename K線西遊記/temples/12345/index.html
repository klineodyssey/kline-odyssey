<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE V10 AI預測版</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
canvas{position:fixed;inset:0}

.version{position:fixed;top:10px;left:10px;background:#000;padding:6px 10px;border-radius:8px}
.hud{position:fixed;top:10px;right:10px;background:#000;padding:8px;border-radius:8px;font-size:12px}
</style>
</head>

<body>

<div class="version">V10 AI預測版</div>
<div class="hud" id="hud">AI運算中...</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

let yaw=0;

/* ===== 真行情 ===== */
let price=0;

async function fetchBTC(){
 try{
  let r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
  let d=await r.json();
  price=parseFloat(d.price);
 }catch(e){}
}
setInterval(fetchBTC,1000);

/* ===== AI預測（核心） ===== */
/* 模擬你的模型概念（多指標投票） */

function aiPredict(base){
 let votes=0;

 // 模擬指標
 let rsi=Math.random();
 let ma=Math.random();
 let momentum=Math.random();

 if(rsi>0.5) votes++;
 if(ma>0.5) votes++;
 if(momentum>0.5) votes++;

 return base + (votes-1.5)*5;
}

/* ===== K線 ===== */
let candles=[];
for(let i=0;i<200;i++){
 candles.push({o:0,c:0,p:0});
}

function gen(){
 let last=candles[candles.length-1].c;

 let real = price/1000 + (Math.random()-0.5)*2;
 let predict = aiPredict(real);

 candles.push({
  o:last,
  c:real,
  p:predict
 });

 if(candles.length>200) candles.shift();
}

/* ===== 畫圖 ===== */
function draw(){
 ctx.clearRect(0,0,c.width,c.height);

 let cx=c.width/2;
 let cy=c.height/2;

 let zone=Math.cos(yaw)>0;

 let g=ctx.createLinearGradient(0,0,0,c.height);
 if(zone){g.addColorStop(0,"#0033ff");g.addColorStop(1,"#000");}
 else{g.addColorStop(0,"#000");g.addColorStop(1,"#ff0000");}
 ctx.fillStyle=g;
 ctx.fillRect(0,0,c.width,c.height);

 let r=180;

 candles.forEach((k,i)=>{
  let t=i/candles.length*Math.PI*2+yaw;

  let x=cx+Math.cos(t)*r;
  let y=cy+Math.sin(t)*r;

  // 真實K線
  ctx.strokeStyle="#0f0";
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x,y-(k.c-k.o)*3);
  ctx.stroke();

  // AI預測（藍）
  ctx.strokeStyle="#00f";
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x,y-(k.p-k.o)*3);
  ctx.stroke();
 });

 document.getElementById("hud").innerText=
 "BTC:"+Math.round(price)+"\nAI預測已啟動";
}

function loop(){
 yaw+=0.01;
 gen();
 draw();
 requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
