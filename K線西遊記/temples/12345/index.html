<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE V2 Mobile Clean</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
canvas{position:fixed;inset:0}

/* 中央提示 */
.center{
 position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
 font-size:18px; text-align:center;
}

/* 手機控制 */
.joy{
 position:fixed; left:20px; bottom:120px;
 width:120px;height:120px;border-radius:50%;
 background:rgba(255,255,255,0.1);
}
.knob{
 position:absolute; left:40px; top:40px;
 width:40px;height:40px;border-radius:50%;
 background:#ffd978;
}
.btns{
 position:fixed; right:20px; bottom:120px;
 display:grid; gap:10px;
}
.btn{
 width:70px;height:70px;
 background:rgba(255,255,255,0.1);
 border-radius:15px;color:#fff;
 font-weight:bold;
}

/* Temple 視窗 */
.panel{
 position:fixed; inset:0;
 background:rgba(0,0,0,0.9);
 display:none;
 flex-direction:column;
 align-items:center;
 justify-content:center;
}
.panel.show{display:flex}
.panel button{
 margin:10px;
 padding:15px 20px;
 font-size:16px;
}
</style>
</head>
<body>

<div class="center">
  12345｜五指山悟空財神殿<br>
  靠近後點「進入」
</div>

<div class="joy" id="joy"><div class="knob" id="knob"></div></div>

<div class="btns">
  <button class="btn" id="up">上升</button>
  <button class="btn" id="down">下降</button>
  <button class="btn" id="enter">進入</button>
</div>

<div class="panel" id="panel">
  <h2>五指山財神殿</h2>
  <button onclick="alert('發財金 1~888')">領發財金</button>
  <button onclick="alert('每小時心跳')">心跳</button>
  <button onclick="alert('00:00點火')">點火</button>
  <button onclick="closePanel()">關閉</button>
</div>

<script>
const knob=document.getElementById('knob');
const joy=document.getElementById('joy');
let mx=0,my=0;

joy.ontouchmove=e=>{
 const t=e.touches[0];
 const r=joy.getBoundingClientRect();
 let dx=t.clientX-(r.left+r.width/2);
 let dy=t.clientY-(r.top+r.height/2);
 const max=40;
 const len=Math.hypot(dx,dy)||1;
 if(len>max){dx=dx/len*max;dy=dy/len*max;}
 knob.style.left=40+dx+"px";
 knob.style.top=40+dy+"px";
 mx=dx/max; my=dy/max;
};

joy.ontouchend=()=>{
 knob.style.left="40px";
 knob.style.top="40px";
 mx=0;my=0;
};

document.getElementById('enter').onclick=()=>{
 document.getElementById('panel').classList.add('show');
};

function closePanel(){
 document.getElementById('panel').classList.remove('show');
}
</script>

</body>
</html>
