<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>KLINE V10.3 真核心完整版</title>
<style>
:root{
  --bg:#02040a;
  --panel:rgba(0,0,0,.58);
  --line:rgba(255,255,255,.14);
  --gold:#f2d57a;
  --cyan:#71d8ff;
  --red:#ff6c6c;
  --green:#83ff74;
}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:Arial,sans-serif;touch-action:none}
canvas{position:fixed;inset:0}
.version{
  position:fixed;top:10px;left:10px;z-index:90;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:7px 11px;font-size:12px
}
.hud{
  position:fixed;top:10px;right:10px;z-index:90;min-width:170px;
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:10px 12px;font-size:12px;line-height:1.6
}
.hud .k{color:#aaa}
.core-shell{
  position:fixed;left:50%;top:44%;transform:translate(-50%,-50%);
  width:min(72vw,460px);height:min(72vw,460px);z-index:40;pointer-events:none
}
.core-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(242,213,122,.75);
  box-shadow:0 0 0 3px rgba(242,213,122,.08),0 0 44px rgba(242,213,122,.25), inset 0 0 24px rgba(255,255,255,.06);
  overflow:hidden
}
.core-glow{
  position:absolute;inset:-18px;border-radius:50%;
  border:1px solid rgba(242,213,122,.18);animation:aura 4.2s ease-out infinite
}
.core-label{
  position:absolute;left:50%;bottom:-42px;transform:translateX(-50%);
  background:rgba(0,0,0,.48);border:1px solid var(--line);border-radius:999px;
  padding:8px 14px;font-size:12px;white-space:nowrap
}
.cross{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:22px;height:22px;z-index:25;pointer-events:none}
.cross:before,.cross:after{content:"";position:absolute;background:#fff;opacity:.88}
.cross:before{left:10px;top:0;width:2px;height:22px}
.cross:after{left:0;top:10px;width:22px;height:2px}
.tip{
  position:fixed;left:50%;top:69%;transform:translateX(-50%);
  background:rgba(0,0,0,.46);border:1px solid var(--line);border-radius:999px;
  padding:10px 14px;font-size:12px;z-index:95;display:none
}
.tip.show{display:block;animation:fade 1.6s ease both}
.controls{
  position:fixed;left:0;right:0;bottom:88px;height:190px;z-index:120;pointer-events:none
}
.joy,.yaw,.alt{pointer-events:auto}
.joy{
  position:absolute;left:18px;bottom:6px;width:128px;height:128px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1px solid var(--line);box-shadow:0 8px 20px rgba(0,0,0,.35)
}
.joy:before{content:"";position:absolute;inset:16px;border-radius:50%;border:1px solid rgba(255,255,255,.10)}
.joy-inner{
  position:absolute;left:42px;top:42px;width:44px;height:44px;border-radius:50%;
  background:var(--gold);box-shadow:0 6px 16px rgba(0,0,0,.35)
}
.yaw{
  position:absolute;left:50%;transform:translateX(-50%);bottom:20px;width:min(52vw,360px);height:68px;
  background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:999px;box-shadow:0 8px 20px rgba(0,0,0,.35)
}
.yaw-track{position:absolute;left:14px;right:14px;top:29px;height:10px;border-radius:999px;background:rgba(255,255,255,.14)}
.yaw-fill{position:absolute;left:50%;top:29px;height:10px;border-radius:999px;background:linear-gradient(90deg,rgba(113,216,255,.2),rgba(113,216,255,.9));width:0}
.yaw-inner{
  position:absolute;left:calc(50% - 24px);top:10px;width:48px;height:48px;border-radius:50%;
  background:var(--gold);box-shadow:0 6px 16px rgba(0,0,0,.35)
}
.yaw-label{position:absolute;left:50%;top:-18px;transform:translateX(-50%);font-size:11px}
.alt{
  position:absolute;right:18px;bottom:0;width:60px;height:176px;border-radius:30px;
  background:rgba(255,255,255,.07);border:1px solid var(--line);box-shadow:0 8px 20px rgba(0,0,0,.35)
}
.alt-track{position:absolute;left:25px;top:12px;bottom:12px;width:10px;border-radius:999px;background:rgba(255,255,255,.14)}
.alt-inner{
  position:absolute;left:8px;top:66px;width:44px;height:44px;border-radius:50%;
  background:var(--gold);box-shadow:0 6px 16px rgba(0,0,0,.35)
}
.alt-top,.alt-bottom{position:absolute;left:50%;transform:translateX(-50%);font-size:11px}
.alt-top{top:-18px}.alt-bottom{bottom:-18px}
.actions{
  position:fixed;left:10px;right:10px;bottom:10px;display:grid;grid-template-columns:repeat(8,1fr);gap:8px;z-index:130
}
.btn{
  background:rgba(0,0,0,.62);border:1px solid var(--line);border-radius:12px;
  padding:10px 8px;font-size:12px;text-align:center
}
.toast{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.84);border:1px solid #666;border-radius:12px;
  padding:12px 16px;display:none;z-index:200
}
.chat{
  position:fixed;left:10px;bottom:66px;width:240px;height:160px;z-index:100;
  background:rgba(0,0,0,.62);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column
}
.chat-log{flex:1;padding:8px;font-size:11px;overflow:auto}
.chat-input{display:flex;border-top:1px solid rgba(255,255,255,.08)}
.chat-input input{flex:1;background:#000;border:none;color:#fff;padding:7px 8px;font-size:11px}
.chat-input button{background:#151515;color:#fff;border:none;padding:0 10px}
@keyframes aura{0%{transform:scale(.88);opacity:.55}80%{transform:scale(1.2);opacity:0}100%{opacity:0}}
@keyframes fade{0%{opacity:0;transform:translateX(-50%) translateY(6px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-6px)}}
@media (max-width:820px){
  .actions{grid-template-columns:repeat(4,1fr)}
  .core-shell{width:min(78vw,420px);height:min(78vw,420px);top:42%}
  .chat{width:210px}
}
</style>
</head>
<body>
<div class="version">V10.3 真核心完整版</div>
<div class="hud" id="hud">模式：BTC<br>價格：--<br>區域：多<br>Yaw：0°<br>座標：0,0,0</div>
<canvas id="bg"></canvas>

<div class="core-shell">
  <div class="core-ring"><canvas id="core"></canvas></div>
  <div class="core-glow"></div>
  <div class="core-label">12345｜五指山悟空財神殿 · 星球核心同步</div>
</div>

<div class="cross"></div>
<div class="tip" id="tip">拖動中間方向桿，核心與星流會同步變化</div>

<div class="controls">
  <div class="joy" id="joy"><div class="joy-inner" id="joyInner"></div></div>
  <div class="yaw" id="yaw">
    <div class="yaw-label">方向</div>
    <div class="yaw-track"></div>
    <div class="yaw-fill" id="yawFill"></div>
    <div class="yaw-inner" id="yawInner"></div>
  </div>
  <div class="alt" id="alt">
    <div class="alt-top">上升</div>
    <div class="alt-track"></div>
    <div class="alt-inner" id="altInner"></div>
    <div class="alt-bottom">下降</div>
  </div>
</div>

<div class="chat">
  <div class="chat-log" id="chatLog">客服：已切換到 V10.3 真核心完整版</div>
  <div class="chat-input">
    <input id="chatInput" placeholder="輸入問題"/>
    <button onclick="sendChat()">送出</button>
  </div>
</div>

<div class="actions">
  <div class="btn" onclick="claim()">發財金</div>
  <div class="btn" onclick="heartbeat()">心跳</div>
  <div class="btn" onclick="ignite()">呼吸</div>
  <div class="btn" onclick="switchMarket()">切換行情</div>
  <div class="btn" onclick="snap()">拍照</div>
  <div class="btn" onclick="record()">留影</div>
  <div class="btn" onclick="front()">前鏡</div>
  <div class="btn" onclick="rear()">後鏡</div>
</div>
<div class="toast" id="toast"></div>

<script>
const bg = document.getElementById('bg');
const bgx = bg.getContext('2d');
const core = document.getElementById('core');
const cx2 = core.getContext('2d');

function fit(){
  bg.width = innerWidth; bg.height = innerHeight;
  core.width = 460; core.height = 460;
}
addEventListener('resize', fit); fit();

const S = {
  mode:'BTC',
  price:0,
  x:0,z:0,alt:0,
  yaw:0,
  moveX:0, moveY:0, yawInput:0, altInput:0,
  stars:Array.from({length:220},()=>({x:(Math.random()-0.5)*innerWidth*1.8,y:(Math.random()-0.5)*innerHeight*1.8,s:Math.random()*2+0.6,d:Math.random()*0.8+0.4})),
  flow:Array.from({length:120},()=>({a:Math.random()*Math.PI*2,r:120+Math.random()*360,s:Math.random()*2+1,l:Math.random()})),
  candles:[]
};
for(let i=0;i<180;i++) S.candles.push({o:0,c:0,p:0,v:Math.random()*5+1});

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(window.__t);
  window.__t=setTimeout(()=>el.style.display='none',1500);
}
function tip(msg){
  const el=document.getElementById('tip');
  el.textContent=msg; el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}
function sendChat(){
  const input=document.getElementById('chatInput');
  const log=document.getElementById('chatLog');
  const v=input.value.trim();
  if(!v) return;
  log.innerHTML += '<br>你：'+v;
  if(v.includes('發財金')) log.innerHTML += '<br>客服：發財金入口已保留，等 TempleHeart 上鏈後直連。';
  else if(v.includes('方向')) log.innerHTML += '<br>客服：拖動中間橫桿，圓核心、星流、K線方向會同步。';
  else if(v.includes('行情')) log.innerHTML += '<br>客服：目前可切換 BTC / SIM。';
  else log.innerHTML += '<br>客服：系統已記錄。';
  log.scrollTop = log.scrollHeight;
  input.value='';
}
async function fetchBTC(){
  try{
    const r=await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
    const d=await r.json();
    S.price=parseFloat(d.price)||0;
  }catch(e){}
}
fetchBTC(); setInterval(fetchBTC, 2000);

function predict(base){
  let score=0;
  const a=Math.random(), b=Math.random(), c=Math.random();
  if(a>.5) score++;
  if(b>.5) score++;
  if(c>.5) score++;
  return base + (score-1.5)*4;
}
function gen(){
  const last=S.candles[S.candles.length-1].c;
  const real = S.mode==='BTC' ? ((S.price/1000)||last) + (Math.random()-.5)*1.1 : last + (Math.random()-.5)*3.6;
  const pred = predict(real);
  S.candles.push({o:last,c:real,p:pred,v:Math.random()*5+1});
  if(S.candles.length>180) S.candles.shift();
}
function update(){
  S.x += S.moveX*0.9;
  S.z += S.moveY*0.9;
  S.yaw += S.yawInput*0.045;
  S.alt += S.altInput*0.04;
  if(S.alt>8) S.alt=8;
  if(S.alt<-8) S.alt=-8;
  S.flow.forEach(f=>{
    f.a += 0.008 + S.yawInput*0.02;
    f.l -= 0.006;
    if(f.l<=0){
      f.a = Math.random()*Math.PI*2;
      f.r = 120+Math.random()*360;
      f.s = Math.random()*2+1;
      f.l = 1;
    }
  });
}
function drawBG(){
  bgx.clearRect(0,0,bg.width,bg.height);
  const bull = Math.cos(S.yaw) > 0;
  const grad = bgx.createLinearGradient(0,0,0,bg.height);
  if(bull){
    grad.addColorStop(0,'#0927e0'); grad.addColorStop(.45,'#071148'); grad.addColorStop(1,'#01040a');
  }else{
    grad.addColorStop(0,'#130505'); grad.addColorStop(.45,'#4a0d0d'); grad.addColorStop(1,'#01040a');
  }
  bgx.fillStyle=grad;
  bgx.fillRect(0,0,bg.width,bg.height);

  // stars
  for(const s of S.stars){
    const sx = (s.x + S.yawInput*8 + bg.width) % bg.width;
    const sy = (s.y + S.altInput*3 + bg.height) % bg.height;
    bgx.fillStyle='rgba(180,220,255,.85)';
    bgx.fillRect(sx, sy, s.s, s.s);
  }

  // flow lines / planet streams
  const cx=bg.width/2, cy=bg.height/2-20;
  S.flow.forEach(f=>{
    const x = cx + Math.cos(f.a + S.yaw)*f.r;
    const y = cy + Math.sin(f.a + S.yaw)*f.r*0.56;
    bgx.fillStyle = bull ? `rgba(120,220,255,${f.l*.9})` : `rgba(255,120,120,${f.l*.9})`;
    bgx.fillRect(x,y,f.s*1.1,f.s*1.1);
  });

  // soft horizon rings
  bgx.strokeStyle='rgba(255,255,255,.05)';
  for(let i=0;i<7;i++){
    bgx.beginPath();
    bgx.ellipse(cx, cy+160+i*26, 260+i*70, 40+i*16, 0, 0, Math.PI*2);
    bgx.stroke();
  }
}
function drawCore(){
  cx2.clearRect(0,0,core.width,core.height);
  const cx=core.width/2, cy=core.height/2;
  const bull = Math.cos(S.yaw) > 0;

  // inner planet glow
  const rg = cx2.createRadialGradient(cx,cy,28,cx,cy,190);
  rg.addColorStop(0, bull ? 'rgba(100,210,255,.35)' : 'rgba(255,110,110,.35)');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  cx2.fillStyle=rg;
  cx2.beginPath(); cx2.arc(cx,cy,190,0,Math.PI*2); cx2.fill();

  // orbital ring
  cx2.strokeStyle='rgba(242,213,122,.35)';
  cx2.lineWidth=1.4;
  cx2.beginPath();
  cx2.ellipse(cx,cy,170+S.alt*8,145+S.alt*6, S.yaw*0.3, 0, Math.PI*2);
  cx2.stroke();

  // streams inside core
  for(let i=0;i<42;i++){
    const a = i/42*Math.PI*2 + S.yaw*0.9;
    const r = 78 + (i%7)*10;
    const x = cx + Math.cos(a)*r;
    const y = cy + Math.sin(a)*r*0.84;
    cx2.fillStyle = bull ? 'rgba(130,230,255,.25)' : 'rgba(255,130,130,.25)';
    cx2.fillRect(x,y,2,2);
  }

  // circular K-line + AI
  const baseR = 124 + S.alt*7;
  S.candles.forEach((k,i)=>{
    const t = i/S.candles.length*Math.PI*2 + S.yaw;
    const rr = baseR + k.v*1.8;
    const x = cx + Math.cos(t)*rr;
    const y = cy + Math.sin(t)*rr*0.84;
    // real
    cx2.strokeStyle = k.c>=k.o ? '#83ff74' : '#ff6c6c';
    cx2.lineWidth = 1.25;
    cx2.beginPath();
    cx2.moveTo(x,y);
    cx2.lineTo(x,y-(k.c-k.o)*3.0);
    cx2.stroke();
    // ai
    cx2.strokeStyle = 'rgba(113,216,255,.95)';
    cx2.beginPath();
    cx2.moveTo(x+1.3,y);
    cx2.lineTo(x+1.3,y-(k.p-k.o)*3.0);
    cx2.stroke();
  });

  // core planet
  const pg = cx2.createRadialGradient(cx-18,cy-18,10,cx,cy,74);
  pg.addColorStop(0,'rgba(255,255,255,.18)');
  pg.addColorStop(.4, bull ? 'rgba(90,170,255,.26)' : 'rgba(255,90,90,.26)');
  pg.addColorStop(1,'rgba(10,10,20,.98)');
  cx2.fillStyle=pg;
  cx2.beginPath(); cx2.arc(cx,cy,62,0,Math.PI*2); cx2.fill();

  // planet streaks
  cx2.strokeStyle='rgba(255,255,255,.10)';
  for(let i=0;i<6;i++){
    cx2.beginPath();
    cx2.ellipse(cx, cy-18+i*7, 44, 8+i*1.2, S.yaw*0.5, 0, Math.PI*2);
    cx2.stroke();
  }

  // center core
  cx2.beginPath(); cx2.arc(cx,cy,16,0,Math.PI*2);
  cx2.fillStyle='rgba(242,213,122,.78)';
  cx2.fill();
}
function updateHUD(){
  const bull = Math.cos(S.yaw) > 0;
  let deg = (S.yaw*180/Math.PI)%360;
  if(deg<0) deg += 360;
  document.getElementById('hud').innerHTML =
    `模式：${S.mode}<br>價格：${S.price?Math.round(S.price):'--'}<br>區域：${bull?'多':'空'}<br>Yaw：${Math.round(deg)}°<br>座標：${S.x.toFixed(1)}, ${S.z.toFixed(1)}, ${S.alt.toFixed(1)}`;
}
function loop(){
  update();
  gen();
  drawBG();
  drawCore();
  updateHUD();
  requestAnimationFrame(loop);
}
loop();

// controls
(function(){
  const joy=document.getElementById('joy'), inner=document.getElementById('joyInner');
  function setP(x,y){
    const r=joy.getBoundingClientRect();
    let dx=x-r.left-r.width/2, dy=y-r.top-r.height/2;
    const max=39, len=Math.hypot(dx,dy)||1;
    if(len>max){ dx=dx/len*max; dy=dy/len*max; }
    S.moveX=dx/max; S.moveY=dy/max;
    inner.style.left=(42+dx)+'px'; inner.style.top=(42+dy)+'px';
  }
  function reset(){ S.moveX=0; S.moveY=0; inner.style.left='42px'; inner.style.top='42px'; }
  joy.addEventListener('pointerdown', e=>{ e.preventDefault(); setP(e.clientX,e.clientY); });
  joy.addEventListener('pointermove', e=>{ if(e.buttons) setP(e.clientX,e.clientY); });
  joy.addEventListener('pointerup', reset); joy.addEventListener('pointercancel', reset);
})();
(function(){
  const yaw=document.getElementById('yaw'), inner=document.getElementById('yawInner'), fill=document.getElementById('yawFill');
  function setP(x){
    const r=yaw.getBoundingClientRect(); const max=(r.width/2)-24;
    let dx=x-r.left-r.width/2; if(dx>max) dx=max; if(dx<-max) dx=-max;
    S.yawInput=dx/max; inner.style.left=(r.width/2-24+dx)+'px';
    if(dx>=0){ fill.style.left='50%'; fill.style.width=(dx/max*50)+'%'; }
    else{ fill.style.left=(50+dx/max*50)+'%'; fill.style.width=(-dx/max*50)+'%'; }
  }
  function reset(){ S.yawInput=0; inner.style.left='calc(50% - 24px)'; fill.style.left='50%'; fill.style.width='0'; }
  yaw.addEventListener('pointerdown', e=>{ e.preventDefault(); setP(e.clientX); tip('方向同步：星流 / 核心 / K線'); });
  yaw.addEventListener('pointermove', e=>{ if(e.buttons) setP(e.clientX); });
  yaw.addEventListener('pointerup', reset); yaw.addEventListener('pointercancel', reset);
})();
(function(){
  const alt=document.getElementById('alt'), inner=document.getElementById('altInner');
  function setP(y){
    const r=alt.getBoundingClientRect(); const max=(r.height/2)-24;
    let dy=y-r.top-r.height/2; if(dy>max) dy=max; if(dy<-max) dy=-max;
    S.altInput=-dy/max; inner.style.top=(66+dy)+'px';
  }
  function reset(){ S.altInput=0; inner.style.top='66px'; }
  alt.addEventListener('pointerdown', e=>{ e.preventDefault(); setP(e.clientY); });
  alt.addEventListener('pointermove', e=>{ if(e.buttons) setP(e.clientY); });
  alt.addEventListener('pointerup', reset); alt.addEventListener('pointercancel', reset);
})();

function claim(){ toast('發財金入口保留'); }
function heartbeat(){ toast('心跳入口保留'); }
function ignite(){ toast('呼吸入口保留'); }
function switchMarket(){ S.mode = S.mode==='BTC' ? 'SIM' : 'BTC'; toast('已切換到 '+S.mode); }
function snap(){ toast('拍照功能保留'); }
function record(){ toast('留影功能保留'); }
function front(){ toast('前鏡功能保留'); }
function rear(){ toast('後鏡功能保留'); }
</script>
</body>
</html>
