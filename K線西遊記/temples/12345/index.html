<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE V9 商業版</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
canvas{position:fixed;inset:0}

/* 左上版本 */
.version{
position:fixed;top:10px;left:10px;
background:rgba(0,0,0,.6);
padding:6px 10px;border-radius:10px;font-size:12px
}

/* HUD */
.hud{
position:fixed;top:10px;right:10px;
background:rgba(0,0,0,.6);
padding:10px;border-radius:10px;font-size:12px
}

/* 按鈕 */
.panel{
position:fixed;bottom:10px;left:50%;
transform:translateX(-50%);
display:flex;gap:8px
}
.btn{padding:8px 12px;background:#111;border:1px solid #555;border-radius:6px}

/* 行情 */
.market{
position:fixed;top:60px;right:10px;
background:rgba(0,0,0,.6);
padding:10px;border-radius:10px;font-size:12px
}
</style>
</head>

<body>

<div class="version">V9 商業版｜真行情</div>

<canvas id="c"></canvas>

<div class="hud" id="hud">行情載入中...</div>

<div class="market" id="market">
BTC: --
</div>

<div class="panel">
<button class="btn" onclick="switchMarket('BTC')">BTC</button>
<button class="btn" onclick="switchMarket('SIM')">模擬</button>
</div>

<script>

let mode="BTC";
let price=0;

/* ===== 真行情（Binance API） ===== */
async function fetchBTC(){
 try{
   let res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
   let data = await res.json();
   price = parseFloat(data.price);
   document.getElementById("market").innerText="BTC: "+price;
 }catch(e){}
}

/* ===== 切換 ===== */
function switchMarket(m){
 mode=m;
}

/* ===== K線 ===== */
const c=document.getElementById("c");
const ctx=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

let yaw=0;
let candles=[];

for(let i=0;i<150;i++){
 candles.push({o:0,c:0});
}

function gen(){
 let last=candles[candles.length-1].c;

 let n;

 if(mode==="BTC"){
   n = price/1000 + (Math.random()-0.5)*2;
 }else{
   n = last + (Math.random()-0.5)*4;
 }

 candles.push({o:last,c:n});
 if(candles.length>150)candles.shift();
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);

 let cx=c.width/2;
 let cy=c.height/2;

 let zone=Math.cos(yaw)>0;

 let g=ctx.createLinearGradient(0,0,0,c.height);
 if(zone){g.addColorStop(0,"#0033ff");g.addColorStop(1,"#000");}
 else{g.addColorStop(0,"#000");g.addColorStop(1,"#ff0000");}

 ctx.fillStyle=g;
 ctx.fillRect(0,0,c.width,c.height);

 let r=180;

 candles.forEach((k,i)=>{
   let t=i/candles.length*Math.PI*2+yaw;
   let x=cx+Math.cos(t)*r;
   let y=cy+Math.sin(t)*r;

   ctx.strokeStyle=k.c>=k.o?"#0f0":"#f00";
   ctx.beginPath();
   ctx.moveTo(x,y);
   ctx.lineTo(x,y-(k.c-k.o)*3);
   ctx.stroke();
 });

 document.getElementById("hud").innerText =
 "模式:"+mode+"\nYaw:"+Math.round(yaw*180/Math.PI);
}

function loop(){
 yaw+=0.01;
 gen();
 draw();
 requestAnimationFrame(loop);
}
loop();

/* ===== 每秒更新行情 ===== */
setInterval(fetchBTC,1000);

</script>

</body>
</html>
