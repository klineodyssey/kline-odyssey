<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE V10.1 FULL融合版</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
canvas{position:fixed;inset:0}

/* 版本 */
.version{position:fixed;top:10px;left:10px;background:#000;padding:6px 10px;border-radius:8px}

/* HUD */
.hud{position:fixed;top:10px;right:10px;background:#000;padding:10px;border-radius:8px;font-size:12px}

/* 左搖桿 */
.joy{position:fixed;bottom:120px;left:20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.1)}
.joy-inner{position:absolute;width:40px;height:40px;background:#fff;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}

/* 中間方向 */
.yaw{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:200px;height:40px;background:rgba(255,255,255,.1);border-radius:20px}

/* 右高度 */
.alt{position:fixed;bottom:120px;right:20px;width:50px;height:150px;background:rgba(255,255,255,.1);border-radius:30px}

/* 底部按鍵 */
.panel{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:90%}
.btn{background:#111;border:1px solid #555;border-radius:6px;padding:8px;text-align:center;font-size:12px}
</style>
</head>

<body>

<div class="version">V10.1 FULL融合版</div>
<div class="hud" id="hud">未連線</div>

<canvas id="c"></canvas>

<div class="joy"><div class="joy-inner"></div></div>
<div class="yaw"></div>
<div class="alt"></div>

<div class="panel">
<div class="btn" onclick="claim()">發財金</div>
<div class="btn" onclick="heartbeat()">心跳</div>
<div class="btn" onclick="ignite()">呼吸</div>
<div class="btn">拍照</div>
<div class="btn">留影</div>
<div class="btn">前鏡</div>
<div class="btn">後鏡</div>
<div class="btn">客服</div>
</div>

<script>
let yaw=0;
let price=0;

/* 真行情 */
async function fetchBTC(){
 try{
  let r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
  let d=await r.json();
  price=parseFloat(d.price);
 }catch{}
}
setInterval(fetchBTC,1000);

/* AI */
function predict(v){
 let score=0;
 if(Math.random()>0.5)score++;
 if(Math.random()>0.5)score++;
 if(Math.random()>0.5)score++;
 return v+(score-1.5)*5;
}

/* K線 */
const c=document.getElementById("c");
const ctx=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

let candles=[];
for(let i=0;i<200;i++)candles.push({o:0,c:0,p:0});

function gen(){
 let last=candles[candles.length-1].c;
 let real=price/1000+(Math.random()-0.5)*2;
 let p=predict(real);
 candles.push({o:last,c:real,p:p});
 if(candles.length>200)candles.shift();
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 let cx=c.width/2,cy=c.height/2;

 let zone=Math.cos(yaw)>0;
 ctx.fillStyle=zone?"#0015ff":"#220000";
 ctx.fillRect(0,0,c.width,c.height);

 let r=200;

 candles.forEach((k,i)=>{
  let t=i/candles.length*Math.PI*2+yaw;
  let x=cx+Math.cos(t)*r;
  let y=cy+Math.sin(t)*r;

  ctx.strokeStyle="#0f0";
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x,y-(k.c-k.o)*3);
  ctx.stroke();

  ctx.strokeStyle="#00f";
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x,y-(k.p-k.o)*3);
  ctx.stroke();
 });

 document.getElementById("hud").innerText=
 "BTC:"+Math.round(price)+"\nAI運作中";
}

function loop(){
 yaw+=0.01;
 gen();
 draw();
 requestAnimationFrame(loop);
}
loop();

/* 假功能 */
function claim(){alert("發財金")}
function heartbeat(){alert("心跳")}
function ignite(){alert("呼吸")}

</script>

</body>
</html>
