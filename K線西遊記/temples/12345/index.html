<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE Mobile Control Fix</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
canvas{position:fixed;inset:0}

/* 強制顯示手機控制 */
.mobile{
 position:fixed; inset:0; z-index:10; pointer-events:none;
}
.joy{
 position:fixed; left:20px; bottom:120px;
 width:120px;height:120px;border-radius:50%;
 background:rgba(255,255,255,0.1); pointer-events:auto;
}
.knob{
 position:absolute; left:40px; top:40px;
 width:40px;height:40px;border-radius:50%;
 background:#ffd978;
}
.btns{
 position:fixed; right:20px; bottom:120px;
 display:grid; gap:10px;
}
.btn{
 width:70px;height:70px;
 background:rgba(255,255,255,0.1);
 border-radius:15px;color:#fff;
 font-weight:bold;
 pointer-events:auto;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="mobile">
  <div class="joy" id="joy">
    <div class="knob" id="knob"></div>
  </div>

  <div class="btns">
    <button class="btn" id="up">上</button>
    <button class="btn" id="down">下</button>
    <button class="btn" id="enter">進入</button>
  </div>
</div>

<script>
const state={mx:0,my:0,up:false,down:false};

const joy=document.getElementById('joy');
const knob=document.getElementById('knob');

joy.addEventListener('touchstart',move);
joy.addEventListener('touchmove',move);
joy.addEventListener('touchend',reset);

function move(e){
 const t=e.touches[0];
 const r=joy.getBoundingClientRect();
 let dx=t.clientX-(r.left+r.width/2);
 let dy=t.clientY-(r.top+r.height/2);
 const max=40;
 const len=Math.hypot(dx,dy)||1;
 if(len>max){dx=dx/len*max;dy=dy/len*max;}
 knob.style.left=40+dx+"px";
 knob.style.top=40+dy+"px";
 state.mx=dx/max;
 state.my=dy/max;
}

function reset(){
 knob.style.left="40px";
 knob.style.top="40px";
 state.mx=0;state.my=0;
}

document.getElementById('up').ontouchstart=()=>state.up=true;
document.getElementById('up').ontouchend=()=>state.up=false;

document.getElementById('down').ontouchstart=()=>state.down=true;
document.getElementById('down').ontouchend=()=>state.down=false;

document.getElementById('enter').onclick=()=>alert("進入節點");

</script>
</body>
</html>
