<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE V7 完整營運版</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.min.js"></script>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
canvas{position:fixed;inset:0}

/* HUD */
.hud{
 position:fixed;top:10px;right:10px;
 background:rgba(0,0,0,.6);
 padding:12px;border-radius:10px;font-size:12px;line-height:1.5
}

/* 按鈕 */
.panel{
 position:fixed;bottom:10px;left:50%;
 transform:translateX(-50%);
 display:flex;gap:8px
}
.btn{
 padding:10px 14px;
 background:#111;border:1px solid #555;border-radius:6px;
 color:#fff;font-weight:bold
}
.btn:disabled{opacity:0.4}

/* 通知 */
.toast{
 position:fixed;top:50%;left:50%;
 transform:translate(-50%,-50%);
 background:#000;padding:12px 16px;
 border:1px solid #888;border-radius:8px;
 display:none
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="hud" id="hud">
未連線
</div>

<div class="panel">
<button class="btn" onclick="connect()">連接</button>
<button class="btn" id="btnClaim" onclick="claim()">發財金</button>
<button class="btn" id="btnHB" onclick="heartbeat()">心跳</button>
<button class="btn" id="btnIG" onclick="ignite()">呼吸</button>
</div>

<div class="toast" id="toast"></div>

<script>
const CONTRACT_ADDRESS = "填你的TempleHeart地址";

const ABI = [
 "function fortuneClaim(uint256 amount) external",
 "function heartbeatClaim() external",
 "function igniteAndClaim() external",
 "function balanceOf(address) view returns (uint256)",
 "function lastFortuneAt(address) view returns (uint256)",
 "function lastHeartbeatAt(address) view returns (uint256)"
];

let provider, signer, contract, user;

/* ===== UI ===== */
function toast(msg){
 const el=document.getElementById("toast");
 el.innerText=msg;
 el.style.display="block";
 setTimeout(()=>el.style.display="none",2000);
}

/* ===== Web3 ===== */
async function connect(){
 if(!window.ethereum){toast("請用MetaMask");return;}
 await window.ethereum.request({method:"eth_requestAccounts"});
 provider = new ethers.BrowserProvider(window.ethereum);
 signer = await provider.getSigner();
 user = await signer.getAddress();
 contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
 updateHUD();
}

async function updateHUD(){
 if(!contract)return;
 let txt="已連線\n"+user;
 document.getElementById("hud").innerText=txt;
}

/* ===== 功能 ===== */
async function claim(){
 try{
  disableBtns(true);
  const tx=await contract.fortuneClaim(88);
  toast("送出中");
  await tx.wait();
  toast("發財金成功");
 }catch(e){toast("失敗")}
 disableBtns(false);
}

async function heartbeat(){
 try{
  disableBtns(true);
  const tx=await contract.heartbeatClaim();
  toast("心跳中");
  await tx.wait();
  toast("完成");
 }catch(e){toast("失敗")}
 disableBtns(false);
}

async function ignite(){
 try{
  disableBtns(true);
  const tx=await contract.igniteAndClaim();
  toast("呼吸中");
  await tx.wait();
  toast("完成");
 }catch(e){toast("失敗")}
 disableBtns(false);
}

function disableBtns(v){
 document.getElementById("btnClaim").disabled=v;
 document.getElementById("btnHB").disabled=v;
 document.getElementById("btnIG").disabled=v;
}

/* ===== K線宇宙 ===== */
const c=document.getElementById("c");
const ctx=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

let yaw=0;
let candles=[];
for(let i=0;i<120;i++) candles.push({o:0,c:0});

function gen(){
 let last=candles[candles.length-1].c;
 let n=last+(Math.random()-0.5)*6;
 candles.push({o:last,c:n});
 if(candles.length>120)candles.shift();
}

function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 let cx=c.width/2,cy=c.height/2;

 let y=Math.cos(yaw);
 let zone=y>0?"多":"空";

 let grad=ctx.createLinearGradient(0,0,0,c.height);
 if(zone=="多"){grad.addColorStop(0,"#0033ff");grad.addColorStop(1,"#000");}
 else{grad.addColorStop(0,"#000");grad.addColorStop(1,"#ff0000");}
 ctx.fillStyle=grad;
 ctx.fillRect(0,0,c.width,c.height);

 let r=180;
 candles.forEach((k,i)=>{
   let t=i/candles.length*Math.PI*2+yaw;
   let h=(k.c-k.o)*2;
   let x=cx+Math.cos(t)*r;
   let y=cy+Math.sin(t)*r;
   ctx.strokeStyle=k.c>=k.o?"#0f0":"#f00";
   ctx.beginPath();
   ctx.moveTo(x,y);
   ctx.lineTo(x,y-h);
   ctx.stroke();
 });

 ctx.beginPath();
 ctx.arc(cx,cy,40,0,Math.PI*2);
 ctx.fillStyle="rgba(255,255,255,0.1)";
 ctx.fill();
}

function loop(){
 yaw+=0.01;
 gen();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
