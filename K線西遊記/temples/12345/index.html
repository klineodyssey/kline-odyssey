<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE V13.1 UI重構版</title>
<style>
body{margin:0;background:#05070f;color:#fff;font-family:Arial}
canvas{position:fixed;inset:0}

/* TOP HUD */
.hud{position:fixed;top:10px;right:10px;background:rgba(0,0,0,.6);padding:8px;border-radius:10px;font-size:12px}
.coord{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.6);padding:8px;border-radius:10px;font-size:12px}

/* CENTER CORE */
.core{
position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);
width:220px;height:220px;border-radius:50%;
border:2px solid gold;box-shadow:0 0 20px gold;
display:flex;align-items:center;justify-content:center;
}

/* CONTROLS */
.joy{
position:fixed;left:10px;bottom:100px;
width:120px;height:120px;border-radius:50%;
background:#222
}
.joy-inner{
position:absolute;width:40px;height:40px;background:gold;border-radius:50%;
left:40px;top:40px
}

.yaw{
position:fixed;left:50%;bottom:60px;transform:translateX(-50%);
width:260px;height:60px;background:#222;border-radius:30px
}
.yaw-inner{
position:absolute;width:40px;height:40px;background:gold;border-radius:50%;
left:110px;top:10px
}

.lev{
position:fixed;right:10px;bottom:100px;
width:60px;height:200px;background:#222;border-radius:30px
}
.lev-inner{
position:absolute;width:40px;height:40px;background:gold;border-radius:50%;
left:10px;top:80px
}

/* TOOLBAR */
.bar{
position:fixed;bottom:0;left:0;right:0;
display:grid;grid-template-columns:repeat(4,1fr);
background:#000
}
.btn{
padding:8px;font-size:11px;border:1px solid #333;text-align:center
}
</style>
</head>
<body>

<div class="coord" id="coord"></div>
<div class="hud" id="hud"></div>

<canvas id="c"></canvas>

<div class="core">K線核心</div>

<div class="joy" id="joy"><div class="joy-inner" id="ji"></div></div>
<div class="yaw" id="yaw"><div class="yaw-inner" id="yi"></div></div>
<div class="lev" id="lev"><div class="lev-inner" id="li"></div></div>

<div class="bar">
<div class="btn">地形</div>
<div class="btn">Boss</div>
<div class="btn">攻擊</div>
<div class="btn">技能</div>
</div>

<script>
const c=document.getElementById('c'),x=c.getContext('2d');
function fit(){c.width=innerWidth;c.height=innerHeight}fit();onresize=fit;

let S={x:0,ct:0,yaw:0,lev:0,t:0};

function zone(){
 let d=(S.yaw*180/Math.PI)%360;
 if(d>180)d-=360;if(d<-180)d+=360;
 return Math.abs(d)<=90?'多':'空';
}
function dir(){return zone()=='多'?1:-1;}

function update(){
 S.ct+=dir()*S.lev*0.02+(Math.random()-0.5)*0.1;
 S.t++;
}

function draw(){
 x.fillStyle="#000";x.fillRect(0,0,c.width,c.height);
 x.fillStyle="lime";
 x.fillText("CT:"+S.ct.toFixed(2),50,100);

 document.getElementById('coord').innerHTML=
 "X:"+S.x.toFixed(1)+"<br>CT:"+S.ct.toFixed(1);

 document.getElementById('hud').innerHTML=
 "Angle:"+((S.yaw*180/Math.PI).toFixed(1))+
 "<br>Zone:"+zone()+
 "<br>Lev:"+S.lev.toFixed(1);
}

function loop(){update();draw();requestAnimationFrame(loop)}loop();

/* controls */
let joy=document.getElementById('joy'),ji=document.getElementById('ji');
joy.onpointermove=e=>{
 if(e.buttons){
  let r=joy.getBoundingClientRect();
  let dx=e.clientX-r.left-60;
  let dy=e.clientY-r.top-60;
  S.x=dx/50;
  S.ct+=-dy*0.02;
  ji.style.left=(dx+60-20)+'px';
  ji.style.top=(dy+60-20)+'px';
 }
};

let yaw=document.getElementById('yaw'),yi=document.getElementById('yi');
yaw.onpointermove=e=>{
 if(e.buttons){
  let r=yaw.getBoundingClientRect();
  let dx=e.clientX-r.left-r.width/2;
  S.yaw=dx/100*Math.PI;
  yi.style.left=(dx+r.width/2-20)+'px';
 }
};

let lev=document.getElementById('lev'),li=document.getElementById('li');
lev.onpointermove=e=>{
 if(e.buttons){
  let r=lev.getBoundingClientRect();
  let y=e.clientY-r.top;
  let v=1-(y/r.height);
  S.lev=Math.max(0,v*150);
  li.style.top=(y-20)+'px';
 }
};
</script>

</body>
</html>
