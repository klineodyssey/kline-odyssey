<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE V4.2 完整體</title>
<style>
body{margin:0;background:#000;overflow:hidden}
canvas{position:fixed;inset:0}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

let angle=0;
let candles=[];
for(let i=0;i<120;i++){
  candles.push({o:0,c:0});
}

function gen(){
  let last=candles[candles.length-1].c;
  let n=last+(Math.random()-0.5)*20;
  candles.push({o:last,c:n});
  if(candles.length>120)candles.shift();
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  let cx=c.width/2;
  let cy=c.height/2;

  let y=Math.cos(angle);
  let isBull=y>0;

  // energy split
  let grad=ctx.createLinearGradient(0,0,0,c.height);
  if(isBull){
    grad.addColorStop(0,"#0033ff");
    grad.addColorStop(1,"#000");
  }else{
    grad.addColorStop(0,"#000");
    grad.addColorStop(1,"#ff0000");
  }
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,c.width,c.height);

  let radius=200;

  candles.forEach((k,i)=>{
    let t=i/candles.length*Math.PI*2+angle;
    let h=(k.c-k.o)*2;

    let x=cx+Math.cos(t)*radius;
    let y=cy+Math.sin(t)*radius;

    ctx.strokeStyle=k.c>=k.o?"#0f0":"#f00";
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x,y-h);
    ctx.stroke();
  });

  // core
  ctx.beginPath();
  ctx.arc(cx,cy,50,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,0.1)";
  ctx.fill();
}

function loop(){
  angle+=0.01;
  gen();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
