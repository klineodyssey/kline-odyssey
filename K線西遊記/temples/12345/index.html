<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KLINE V4 核心引擎版</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
#canvas{position:fixed;inset:0}
.hud{position:fixed;top:10px;right:10px;font-size:14px;background:rgba(0,0,0,.5);padding:8px;border-radius:10px}
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.btn{padding:10px 14px;background:#111;border:1px solid #444;border-radius:10px}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="hud" id="hud">ZONE: 多</div>
<div class="controls">
<button class="btn" onclick="dir=-1">←</button>
<button class="btn" onclick="dir=1">→</button>
</div>

<script>
const c=document.getElementById("canvas");
const ctx=c.getContext("2d");
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener("resize",resize);

let angle=0;
let dir=0;

let candles=[];
for(let i=0;i<60;i++){
  candles.push({o:50,h:60,l:40,c:50});
}

function update(){
  angle+=dir*0.02;

  // simulate price
  let last=candles[candles.length-1].c;
  let n=last+(Math.random()-0.5)*5;
  candles.push({o:last,h:Math.max(last,n)+2,l:Math.min(last,n)-2,c:n});
  if(candles.length>60)candles.shift();
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  let cx=c.width/2;
  let cy=c.height/2;
  let radius=200;

  // zone
  let y=Math.cos(angle);
  let zone=y>0?"多":"空";
  document.getElementById("hud").innerText="ZONE: "+zone;

  // energy background
  let grad=ctx.createRadialGradient(cx,cy,50,cx,cy,300);
  if(zone=="多"){
    grad.addColorStop(0,"rgba(0,150,255,0.6)");
    grad.addColorStop(1,"rgba(0,0,0,1)");
  }else{
    grad.addColorStop(0,"rgba(255,50,50,0.6)");
    grad.addColorStop(1,"rgba(0,0,0,1)");
  }
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,c.width,c.height);

  // draw candles
  let w=4;
  candles.forEach((k,i)=>{
    let x=cx-120+i*4;
    let y1=cy-k.h;
    let y2=cy-k.l;
    ctx.strokeStyle=k.c>=k.o?"#0f0":"#f00";
    ctx.beginPath();
    ctx.moveTo(x,y1);
    ctx.lineTo(x,y2);
    ctx.stroke();

    ctx.fillStyle=ctx.strokeStyle;
    ctx.fillRect(x-1,cy-k.o,2,k.o-k.c);
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
