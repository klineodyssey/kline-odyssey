<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K線西遊記 V1 - 孫悟空來戰 K 線</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    canvas { image-rendering: pixelated; }
    .joystick { touch-action: none; }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col">

  <!-- 上方資訊 -->
  <div class="bg-zinc-900 border-b border-yellow-500 p-3 flex justify-between items-center">
    <!-- 左上：血條 & 暗物質 -->
    <div class="flex gap-6">
      <div>
        <div class="text-xs text-emerald-400 flex items-center gap-1"><span class="text-lg">🩸</span>KGEN 血量</div>
        <div class="w-48 h-4 bg-zinc-800 rounded-full overflow-hidden">
          <div id="kgen-bar" class="h-full bg-emerald-500 w-[100%] transition-all"></div>
        </div>
        <div id="kgen-text" class="text-xs text-right mt-1">100 / 100</div>
      </div>
      <div>
        <div class="text-xs text-amber-400 flex items-center gap-1"><span class="text-lg">🌌</span>BNB 暗物質</div>
        <div class="w-48 h-4 bg-zinc-800 rounded-full overflow-hidden">
          <div id="bnb-bar" class="h-full bg-amber-500 w-[65%] transition-all"></div>
        </div>
        <div id="bnb-text" class="text-xs text-right mt-1">6.88 BNB</div>
      </div>
    </div>

    <!-- 右上：CT 現價 + 多空 -->
    <div class="text-center">
      <div id="ct-price" class="text-3xl font-bold text-white tabular-nums">68,888.88</div>
      <div id="direction" class="text-sm font-medium px-4 py-1 rounded-full inline-block mt-1 bg-green-600">多頭優勢</div>
    </div>

    <!-- 錢包 -->
    <button onclick="connectWallet()" 
            class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold px-6 py-2 rounded-xl flex items-center gap-2">
      <span id="wallet-status">🔗 連接錢包</span>
      <span id="wallet-address" class="text-xs font-mono"></span>
    </button>
  </div>

  <!-- 中間主畫面 -->
  <div class="flex-1 flex flex-col relative bg-zinc-950" style="min-height: 420px;">
    <!-- K線圖 -->
    <div class="absolute top-0 left-0 right-0 h-2/3 border-b border-zinc-700">
      <canvas id="klineChart" class="w-full h-full"></canvas>
    </div>

    <!-- 遊戲 Canvas（角色 + 妖怪 + 中線） -->
    <canvas id="gameCanvas" class="absolute bottom-0 left-0 right-0 h-2/3 w-full" style="pointer-events: none;"></canvas>

    <!-- 中線標示 -->
    <div class="absolute top-1/2 left-0 right-0 h-px bg-white/30 flex items-center justify-center pointer-events-none">
      <div class="bg-white/80 text-black text-[10px] px-3 rounded-full -mt-px">中線</div>
    </div>
  </div>

  <!-- 左下移動搖桿 -->
  <div class="absolute bottom-28 left-6 bg-black/70 backdrop-blur-md border border-white/30 rounded-3xl p-3 grid grid-cols-3 gap-1 w-28 joystick">
    <button onclick="move('up')" class="col-span-3 text-2xl">⬆</button>
    <button onclick="move('left')" class="text-2xl">⬅</button>
    <button onclick="move('down')" class="text-2xl">⬇</button>
    <button onclick="move('right')" class="text-2xl">➡</button>
  </div>

  <!-- 右下交易搖桿 -->
  <div class="absolute bottom-28 right-6 bg-black/70 backdrop-blur-md border border-white/30 rounded-3xl p-4 flex flex-col gap-3 w-28">
    <button onclick="trade('long')" 
            class="bg-emerald-600 hover:bg-emerald-500 py-3 rounded-2xl font-bold text-lg">做多 ↑</button>
    <button onclick="trade('short')" 
            class="bg-red-600 hover:bg-red-500 py-3 rounded-2xl font-bold text-lg">做空 ↓</button>
    <button onclick="setWarp()" 
            class="bg-purple-600 hover:bg-purple-500 py-2 rounded-2xl text-sm">Warp ×<span id="warp-level">5</span></button>
  </div>

  <!-- 底部功能列 -->
  <div class="bg-zinc-900 border-t border-yellow-500 p-2">
    <!-- 第一排 -->
    <div class="grid grid-cols-4 gap-2 mb-2">
      <button onclick="fortuneClaim()" class="bg-yellow-500 text-black font-bold py-3 rounded-2xl flex items-center justify-center gap-2 text-sm">
        ⭐ 發財金
      </button>
      <button onclick="makeWish()" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl text-sm">許願</button>
      <button onclick="openWalletModal()" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl text-sm">錢包</button>
      <button onclick="showHelp()" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl text-sm">客服</button>
    </div>
    <!-- 第二排 -->
    <div class="grid grid-cols-4 gap-2">
      <button onclick="lightLamp()" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl text-sm">點燈</button>
      <button onclick="vowTo()" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl text-sm">還願</button>
      <button onclick="openSettings()" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl text-sm">設定</button>
      <button onclick="switchTimeframe()" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl text-sm">K線切換</button>
    </div>
  </div>

  <!-- 彈窗容器 -->
  <div id="modal" onclick="if(event.target.id==='modal')hideModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div id="modal-content" class="bg-zinc-900 rounded-3xl p-8 max-w-sm w-full mx-4"></div>
  </div>

  <script>
    // ================ 變數 ================
    let kgen = 100;
    let bnb = 6.88;
    let ctPrice = 68888.88;
    let direction = "long"; // long or short
    let warp = 5;
    let blood = 100;
    let playerX = 300, playerY = 180;
    let monsters = [{x: 100, y: 180, type: 'back'}, {x: 500, y: 180, type: 'front'}];
    let chartInstance = null;
    let priceHistory = Array(60).fill().map((_, i) => 68000 + Math.random() * 2000);
    let timeframe = '1m';

    // ================ Chart.js K線 ================
    function initChart() {
      const ctx = document.getElementById('klineChart');
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: Array(60).fill(''),
          datasets: [{
            label: 'CT',
            data: priceHistory,
            borderColor: '#22c55e',
            borderWidth: 2,
            tension: 0.1,
            pointRadius: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { display: false }, y: { display: true, grid: { color: '#27272a' } } }
        }
      });
    }

    function updatePrice() {
      ctPrice += (Math.random() * 200 - 100);
      document.getElementById('ct-price').textContent = ctPrice.toFixed(2);
      priceHistory.shift();
      priceHistory.push(ctPrice);
      if (chartInstance) chartInstance.update('none');
      
      // 隨機切換多空優勢
      if (Math.random() > 0.9) {
        direction = direction === 'long' ? 'short' : 'long';
        const dirEl = document.getElementById('direction');
        dirEl.textContent = direction === 'long' ? '多頭優勢' : '空頭優勢';
        dirEl.className = direction === 'long' ? 'text-sm font-medium px-4 py-1 rounded-full inline-block mt-1 bg-green-600' : 'text-sm font-medium px-4 py-1 rounded-full inline-block mt-1 bg-red-600';
      }
    }

    // ================ 遊戲 Canvas ================
    const gameCanvas = document.getElementById('gameCanvas');
    const ctx = gameCanvas.getContext('2d');
    gameCanvas.width = window.innerWidth;
    gameCanvas.height = window.innerHeight * 0.4;

    function drawGame() {
      ctx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
      
      // 中線
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, gameCanvas.height / 2);
      ctx.lineTo(gameCanvas.width, gameCanvas.height / 2);
      ctx.stroke();

      // 角色（孫悟空簡易版）
      ctx.fillStyle = '#eab308';
      ctx.fillRect(playerX, playerY, 40, 40);
      ctx.fillStyle = '#fff';
      ctx.font = '24px system-ui';
      ctx.fillText('🐒', playerX + 4, playerY + 32);

      // 妖怪
      monsters.forEach(m => {
        ctx.fillStyle = m.type === 'back' ? '#a3a3a3' : '#ef4444';
        ctx.fillRect(m.x, m.y, 35, 35);
        ctx.fillStyle = '#fff';
        ctx.fillText(m.type === 'back' ? '👹' : '🐉', m.x + 4, m.y + 30);
      });

      // 血量條
      ctx.fillStyle = '#10b981';
      ctx.fillRect(40, 20, (blood / 100) * 200, 12);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.strokeRect(40, 20, 200, 12);
    }

    function move(dir) {
      if (blood <= 0) return;
      const step = 25;
      if (dir === 'left' && playerX > 50) playerX -= step;
      if (dir === 'right' && playerX < gameCanvas.width - 90) playerX += step;
      if (dir === 'up' && playerY > 50) playerY -= step;
      if (dir === 'down' && playerY < gameCanvas.height - 80) playerY += step;
      drawGame();
    }

    // ================ 交易邏輯 ================
    function trade(side) {
      if (blood <= 0) return alert('💀 血量歸零！無法行動');
      
      const isCorrect = (side === 'long' && direction === 'long') || (side === 'short' && direction === 'short');
      
      if (isCorrect) {
        blood = Math.min(100, blood + 15);
        alert(`✅ 做${side === 'long' ? '多' : '空'}正確！KGEN +15`);
      } else {
        blood = Math.max(0, blood - 25);
        alert(`❌ 做${side === 'long' ? '多' : '空'}錯誤！妖怪攻擊，KGEN -25`);
      }
      
      document.getElementById('kgen-bar').style.width = blood + '%';
      document.getElementById('kgen-text').textContent = `${blood} / 100`;
      drawGame();
      
      if (blood <= 0) alert('💀 血量歸零！遊戲鎖死，請點「還願」或「點燈」恢復');
    }

    function setWarp() {
      warp = warp === 5 ? 10 : (warp === 10 ? 20 : 5);
      document.getElementById('warp-level').textContent = warp;
      alert(`⚡ Warp 已切換為 ×${warp}`);
    }

    // ================ 合約模擬呼叫 ================
    async function connectWallet() {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          document.getElementById('wallet-status').innerHTML = '✅ 已連線';
          document.getElementById('wallet-address').textContent = accounts[0].slice(0,6) + '...' + accounts[0].slice(-4);
          alert('🎉 錢包連線成功！（模擬 BNB Chain）');
        } catch(e) { alert('連線失敗'); }
      } else {
        alert('請安裝 MetaMask 或 16888 錢包');
      }
    }

    function fortuneClaim() {
      const amount = prompt('選擇發財金額 (1 ~ 888)', '88');
      if (!amount) return;
      alert(`🚀 fortuneClaim(${amount}) 已發送！恭喜獲得 ${amount} KGEN`);
      kgen = Math.min(100, kgen + parseInt(amount)/10);
      document.getElementById('kgen-bar').style.width = kgen + '%';
    }

    function makeWish() {
      const hash = prompt('輸入許願內容（或直接按確認）', '願 K 線永遠向上');
      alert(`🙏 makeWish(${hash}) 已上鏈！`);
    }

    function lightLamp() {
      const days = prompt('點燈天數？', '7');
      alert(`🪔 lightLamp(${days}) 已點燈！`);
    }

    function vowTo() {
      alert('🔥 vowTo 已呼叫！還願成功，血量 +30');
      blood = Math.min(100, blood + 30);
      document.getElementById('kgen-bar').style.width = blood + '%';
      document.getElementById('kgen-text').textContent = `${blood} / 100`;
      drawGame();
    }

    function openWalletModal() { alert('💰 錢包餘額：\nKGEN: ' + kgen + '\nBNB: ' + bnb); }
    function showHelp() { alert('客服：這是 V1 Demo，歡迎加入 Telegram 討論群！'); }
    function openSettings() { alert('設定已開啟（V2 會有更多選項）'); }
    function switchTimeframe() {
      timeframe = timeframe === '1m' ? '5m' : '1m';
      alert('K線已切換至 ' + timeframe);
    }

    // ================ 啟動 ================
    window.onload = () => {
      initChart();
      setInterval(updatePrice, 1800);
      drawGame();
      setInterval(drawGame, 100);
      console.log('%c✅ K線西遊記 V6.9 前端整合檔 已載入成功！', 'color:#eab308; font-size:18px');
    };
  </script>
</body>
  </html>
