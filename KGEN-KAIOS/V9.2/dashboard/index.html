<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KAIOS V9.2 Sync Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">Read-only Sync</p>
      <h1>KAIOS V9.2 Sync Dashboard</h1>
      <p>顯示 approved draft 到 OPEN WorkQueue 的 Codex-only 同步狀態。此頁不寫入、不同步、不 Promote、不 claim。</p>
    </div>
    <a class="home" href="../">V9.2 Entry</a>
  </header>

  <main>
    <section class="cards" id="healthCards"></section>

    <section class="panel">
      <h2>Sync State</h2>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Source Draft</th>
              <th>Formal WorkOrder</th>
              <th>Status</th>
              <th>Dispatch Hold</th>
              <th>Reviewer</th>
            </tr>
          </thead>
          <tbody id="syncRows"></tbody>
        </table>
      </div>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Status Counts</h2>
        <div id="statusList" class="list"></div>
      </article>
      <article class="panel">
        <h2>Alerts</h2>
        <div id="alerts" class="list"></div>
      </article>
      <article class="panel">
        <h2>Recent Sync Audit</h2>
        <div id="audit" class="list"></div>
      </article>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
