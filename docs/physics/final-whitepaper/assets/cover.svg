    <text x="800" y="1660" font-size="34" font-weight="800" fill="#fff5d1">Author</text>
    <text x="800" y="1725" font-size="42" font-weight="900" fill="#ffffff">PrimeForge / 樂天帝</text>
    <text x="800" y="1800" font-size="30" fill="#d5c9aa">Release Date: 2026-07-09</text>
  </g>
  <g fill="#a99466" font-family="Arial, 'Noto Sans TC', sans-serif" text-anchor="middle">
