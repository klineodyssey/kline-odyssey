<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200" role="img" aria-labelledby="title desc">
  <title id="title">KGEN Universe Physics Runtime V4.0 Official Whitepaper Final Cover</title>
  <desc id="desc">Official black and gold cover for the KGEN Universe Physics Runtime V4.0 final whitepaper.</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#f7d985" stop-opacity="0.95"/>
      <stop offset="24%" stop-color="#b77b2d" stop-opacity="0.46"/>
      <stop offset="58%" stop-color="#10243d" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#050506" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#8f5f1e"/>
      <stop offset="45%" stop-color="#ffe7a0"/>
      <stop offset="100%" stop-color="#c28736"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="2200" fill="#050506"/>
  <rect width="1600" height="2200" fill="url(#core)"/>
  <g opacity="0.38">
    <circle cx="800" cy="900" r="520" fill="none" stroke="#f3c766" stroke-width="3"/>
    <circle cx="800" cy="900" r="380" fill="none" stroke="#48d9ff" stroke-width="2"/>
    <circle cx="800" cy="900" r="245" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M170 900 C420 770, 1090 770, 1430 900 C1090 1040, 420 1040, 170 900Z" fill="none" stroke="#f3c766" stroke-width="5"/>
    <path d="M230 1060 C500 970, 1060 970, 1370 1060" fill="none" stroke="#48d9ff" stroke-width="3"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="800" cy="900" r="62" fill="#fff2bc"/>
    <circle cx="800" cy="900" r="24" fill="#ffffff"/>
  </g>
  <g fill="#f8edcd" font-family="Arial, 'Noto Sans TC', sans-serif" text-anchor="middle">
