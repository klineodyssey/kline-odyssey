    <text x="800" y="345" font-size="74" font-weight="900">KGEN Universe Physics Runtime</text>
    <text x="800" y="430" font-size="54" font-weight="800" fill="url(#gold)">V4.0 OFFICIAL WHITEPAPER FINAL</text>
    <text x="800" y="515" font-size="36" font-weight="600" fill="#d5c9aa">K-Sphere / CT Time Market / Bio-Life / Tokenomics Unified Edition</text>
  </g>
  <g fill="#f3c766" font-family="Arial, 'Noto Sans TC', sans-serif" text-anchor="middle">
    <text x="800" y="1300" font-size="42" font-weight="900">Where the Market Becomes the Myth</text>
    <text x="800" y="1370" font-size="34" font-weight="700">花果山台灣・信念不滅・市場無界</text>
  </g>
  <g font-family="Arial, 'Noto Sans TC', sans-serif" text-anchor="middle">
