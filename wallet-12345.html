<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>KGEN 12345 Wallet Bridge</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#05070b;color:#ffe28a;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;padding:16px;box-sizing:border-box}
    .card{width:min(560px,92vw);border:1px solid rgba(255,215,120,.6);border-radius:20px;background:rgba(10,12,20,.96);padding:20px;box-shadow:0 0 32px rgba(255,215,120,.18)}
    a,button{display:block;width:100%;box-sizing:border-box;text-align:center;margin-top:10px;padding:13px;border-radius:14px;border:1px solid rgba(255,215,120,.5);background:#ffe28a;color:#111;font-weight:900;text-decoration:none;cursor:pointer;font-size:15px}
    .sub{background:rgba(255,255,255,.06);color:#fff}
    .mm{background:#f6851b;color:#111}
    .hint{margin-top:12px;padding:12px;border-radius:12px;background:rgba(255,255,255,.06);color:#e8f4ff;font-size:14px;line-height:1.55}
    code{color:#8ff;word-break:break-all;font-size:12px}
    .hidden{display:none!important}
  </style>
  <script>
    var BRIDGE_ABS='https://klineodyssey.github.io/kline-odyssey/wallet-12345.html';
    var INDEX_REL='K%E7%B7%9A%E8%A5%BF%E9%81%8A%E8%A8%98/temples/12345/index.html?bridge=1';
    var INDEX_ABS='https://klineodyssey.github.io/kline-odyssey/' + INDEX_REL;
    var METAMASK_DEEPLINK='https://metamask.app.link/dapp/klineodyssey.github.io/kline-odyssey/wallet-12345.html';
    var BSC_HEX='0x38';
    function ua(){ return navigator.userAgent || ''; }
    function hasEthereum(){ return !!(window.ethereum); }
    function isSocialInApp(){
      var s=ua();
      return /FBAN|FBAV|Facebook|Instagram|Line\//i.test(s);
    }
    function isMobile(){
      return /Android|iPhone|iPad|iPod|Mobile/i.test(ua());
    }
    function goIndex(){
      window.location.replace(INDEX_ABS);
    }
    function copyBridge(){
      var done=function(){ var b=document.getElementById('copyBtn'); if(b) b.textContent='已複製橋接網址'; };
      if(navigator.clipboard){ navigator.clipboard.writeText(BRIDGE_ABS).then(done); }
      else { done(); }
    }
    async function requestAccounts(){
      if(!hasEthereum()) return false;
      try{
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        return true;
      }catch(e){
        return false;
      }
    }
    async function ensureBSC(){
      if(!hasEthereum()) return false;
      try{
        var cid = await window.ethereum.request({ method: 'eth_chainId' });
        if(String(cid).toLowerCase() === BSC_HEX) return true;
        try{
          await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BSC_HEX }] });
        }catch(swErr){
          if(swErr && (swErr.code === 4902 || String(swErr.message || '').indexOf('Unrecognized') >= 0)){
            await window.ethereum.request({
              method: 'wallet_addEthereumChain',
              params: [{
                chainId: BSC_HEX,
                chainName: 'BNB Smart Chain',
                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                rpcUrls: ['https://bsc-dataseed.binance.org/'],
                blockExplorerUrls: ['https://bscscan.com']
              }]
            });
            await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BSC_HEX }] });
          }else{
            throw swErr;
          }
        }
        cid = await window.ethereum.request({ method: 'eth_chainId' });
        return String(cid).toLowerCase() === BSC_HEX;
      }catch(e){
        return false;
      }
    }
    async function connectWalletFlow(){
      var hint=document.getElementById('hint');
      var connectBtn=document.getElementById('connectBtn');
      if(connectBtn) connectBtn.disabled=true;
      if(hint) hint.textContent='MetaMask：eth_requestAccounts…';
      var okAcc = await requestAccounts();
      if(!okAcc){
        if(hint) hint.textContent='請在 MetaMask 確認連線後，再按「連結錢包」。';
        if(connectBtn) connectBtn.disabled=false;
        return;
      }
      if(hint) hint.textContent='MetaMask：切換 BSC（鏈 ID 56）…';
      var okBsc = await ensureBSC();
      if(hint) hint.textContent = okBsc ? 'BSC 已就緒，即將進入 12345 悟空財神殿…' : 'BSC 切換未完成，仍將進入神殿（請在神殿內再按連結錢包）';
      var enterBtn=document.getElementById('enterBtn');
      if(enterBtn) enterBtn.classList.remove('hidden');
      setTimeout(goIndex, okBsc ? 600 : 1200);
    }
    function render(){
      var hint=document.getElementById('hint');
      var enterBtn=document.getElementById('enterBtn');
      var connectBtn=document.getElementById('connectBtn');
      var mmBtn=document.getElementById('mmBtn');
      var noWallet=document.getElementById('noWallet');
      var social=document.getElementById('socialBlock');
      var desktopHint=document.getElementById('desktopHint');
      if(isSocialInApp()){
        if(social) social.classList.remove('hidden');
        if(hint) hint.textContent='目前在 Facebook/LINE/Instagram 內建瀏覽器。請按下方按鈕用 MetaMask App 開啟，不要在此內建瀏覽器直接連錢包。';
        if(mmBtn){ mmBtn.href=METAMASK_DEEPLINK; mmBtn.textContent='用 MetaMask 開啟'; }
        if(noWallet) noWallet.classList.remove('hidden');
        return;
      }
      if(hasEthereum()){
        if(hint) hint.textContent='已偵測到 MetaMask 內建瀏覽器。請先點「連結錢包」，成功後會自動進入神殿。';
        if(connectBtn) connectBtn.classList.remove('hidden');
        if(noWallet) noWallet.classList.add('hidden');
        return;
      }
      if(!isMobile() && desktopHint){
        desktopHint.classList.remove('hidden');
        if(hint) hint.textContent='桌機未偵測到錢包：請安裝 MetaMask 擴充功能，或用手機 MetaMask App 開啟。';
      }else if(hint){
        hint.textContent='未偵測到 window.ethereum。請用 MetaMask App 開啟本橋接頁，再連結錢包。';
      }
      if(noWallet) noWallet.classList.remove('hidden');
      if(mmBtn){ mmBtn.href=METAMASK_DEEPLINK; mmBtn.textContent='用 MetaMask 開啟'; }
    }
    window.addEventListener('DOMContentLoaded', function(){
      var connectBtn=document.getElementById('connectBtn');
      if(connectBtn){
        connectBtn.addEventListener('click', function(){
          connectWalletFlow();
        });
      }
      render();
    });
  </script>
</head>
<body>
  <div class="card">
    <h1>KGEN 12345 錢包橋接</h1>
    <p>ASCII 橋接頁 → <code>wallet-12345.html</code> → 連結錢包 → 神殿</p>
    <div class="hint" id="hint">載入中…</div>
    <div id="socialBlock" class="hidden hint">目前在 Facebook/LINE 內建瀏覽器，請按下方按鈕用 MetaMask App 開啟。</div>
    <div class="hidden hint" id="desktopHint">桌機未偵測到錢包：<b>請安裝 MetaMask</b>（<a href="https://metamask.io/download/" target="_blank" rel="noopener" style="color:#8ff;">metamask.io/download</a>）</div>
    <button class="mm hidden" id="connectBtn" type="button">連結錢包</button>
    <a class="hidden" href="#" id="enterBtn" onclick="goIndex();return false;">進入 12345 悟空財神殿</a>
    <div id="noWallet">
      <a class="mm" id="mmBtn" href="https://metamask.app.link/dapp/klineodyssey.github.io/kline-odyssey/wallet-12345.html">用 MetaMask 開啟</a>
    </div>
    <a href="#" onclick="goIndex();return false;">手動進入神殿</a>
    <button class="sub" id="copyBtn" onclick="copyBridge()">複製橋接網址</button>
  </div>
</body>
</html>
