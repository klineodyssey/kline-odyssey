    btns[4].onclick=e=>{e.preventDefault(); const p=$('kgen-heart-live-panel'); if(p) p.classList.toggle('k107-collapsed');};
    btns[5].onclick=e=>{e.preventDefault(); ensureCupSystem(); document.body.classList.add('k107-ops-open');};
    btns[6].onclick=e=>{e.preventDefault(); const p=$('k107-festival-panel'); if(p) p.classList.toggle('k107-hidden');};
    btns[7].onclick=e=>{e.preventDefault(); const p=$('coord-panel'); if(p) p.classList.toggle('k107-hidden');};
  }
  function hideServiceResidue(){
    qsa('body > div, body > section, body > button').forEach(el=>{ const t=(el.textContent||'').trim(); const id=(el.id||''); const cls=(el.className||'').toString(); if(/悟空客服|不封鎖操作|客服導覽|詳聊/.test(t) && !/footer|temple-modal|web3-panel|kgen-heart-live-panel/.test(id+' '+cls)){ el.style.display='none'; } });
  }
  function boot(){
    installCountdownWriteGuard(); setVersion(); patchHeartPanel(); patchCoordRules(); buildFestivalPanel(); ensureCupSystem(); patchFooter(); hideServiceResidue(); updateCountdownStable(); updateCupState();
    document.body.classList.remove('k107-ops-open');
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
  window.addEventListener('load',boot);
  setInterval(()=>{patchFooter();patchHeartPanel();patchCoordRules();hideServiceResidue();updateCupState();},1800);
  setInterval(updateCountdownStable,60000);
})();
</script>
